  <!-- Anti-flash: apply the active session theme before first paint -->
  <script>
    (function () {
      var m = null;
      try {
        var sessionId = localStorage.getItem('atlas::activeSessionId') || 'default';
        var sessionModes = JSON.parse(localStorage.getItem('atlas::appearanceBySession') || '{}');
        m = sessionModes[sessionId] || localStorage.getItem('atlas::appearanceMode');
      } catch (e) { }
      document.documentElement.dataset.theme = (m === 'night') ? 'night' : 'light';
    })();
  </script>
  <style>
    /* ============================================================
       THEME TOKENS
       Semantic day and night values for the Compass Hub.
       ============================================================ */
    :root {
      /* Canvas and surfaces */
      --surface-canvas: #f5f1e9;
      --surface-muted: #eee8de;
      --surface-panel: #ffffff;
      --surface-raised: #fffdf9;
      --surface-raised-hover: #ffffff;
      --surface-scrim: rgba(20, 17, 12, 0.50);

      /* Borders and text */
      --border-faint: #d4cfc8;
      --border-subtle: #e2dacf;
      --border-strong: #c6bbad;
      --text-subtle: #8f8578;
      --text-muted: #7a7268;
      --text-body: #3d3830;
      --text-heading: #1e1b16;

      /* Compass accent */
      --accent: #4f7772;
      --accent-soft: #78a19c;
      --accent-pale: #d9e9e6;
      --accent-dim: #eaf3f1;
      --accent-rgb: 79, 119, 114;
      --accent-soft-rgb: 120, 161, 156;
      --accent-ink: #ffffff;
      --brand-dot: #18b98f;

      /* Page atmosphere */
      --page-bg-day:
        radial-gradient(circle at 12% 3%, rgba(255, 255, 255, 0.76), transparent 34rem),
        radial-gradient(circle at 88% 22%, rgba(79, 119, 114, 0.075), transparent 40rem),
        linear-gradient(145deg, #f7f3ec 0%, #f5f1e9 52%, #f0ebe2 100%);
      --page-bg-night:
        radial-gradient(circle at 12% 3%, rgba(166, 220, 211, 0.055), transparent 34rem),
        radial-gradient(circle at 88% 22%, rgba(132, 202, 191, 0.095), transparent 40rem),
        linear-gradient(145deg, #1d1a17 0%, #221f1b 52%, #2d2925 100%);
      --page-bg: var(--page-bg-day);

      /* Hub chrome and controls */
      --chrome-surface: rgba(247, 244, 238, 0.86);
      --chrome-surface-mobile: rgba(247, 244, 238, 0.88);
      --chrome-border: rgba(126, 112, 94, 0.14);
      --world-nav-surface: rgba(238, 232, 222, 0.58);
      --world-nav-border: rgba(173, 160, 143, 0.34);
      --world-nav-hover: rgba(255, 253, 249, 0.72);
      --world-nav-active: rgba(255, 255, 255, 0.86);
      --world-nav-active-border: rgba(var(--accent-rgb), 0.24);
      --world-nav-active-text: var(--accent);
      --world-nav-inset-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.46);
      --world-nav-hover-shadow: 0 5px 14px rgba(49, 42, 32, 0.045);
      --control-surface: #fffdf9;
      --control-hover: #fffdf9;
      --control-border: rgba(49, 45, 38, 0.10);
      --control-border-hover: rgba(49, 45, 38, 0.16);
      --control-text: #504b43;
      --control-icon: #7b7469;
      --control-text-hover: #211f1b;
      --control-shadow: 0 2px 8px rgba(42, 37, 29, 0.045);
      --control-hover-shadow: 0 10px 30px rgba(42, 37, 29, 0.075);
      --mobile-control-surface: var(--surface-panel);
      --mobile-control-hover: var(--border-subtle);
      --mobile-control-border: var(--border-subtle);
      --drawer-section-surface: transparent;
      --drawer-button-surface: var(--surface-muted);
      --drawer-scrim: rgba(0, 0, 0, 0.40);
      --drawer-shadow: 4px 0 24px rgba(20, 17, 12, 0.15);
      --navigation-hover: var(--border-subtle);

      /* Library and card states */
      --library-surface: rgba(255, 253, 250, 0.88);
      --library-border: rgba(126, 112, 94, 0.24);
      --library-border-width: 1px;
      --library-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.90),
        0 16px 44px rgba(61, 56, 48, 0.07);
      --card-surface: rgba(255, 253, 249, 0.91);
      --card-surface-hover: rgba(255, 253, 249, 0.91);
      --card-border: rgba(173, 160, 143, 0.34);
      --card-border-width: 1px;
      --card-emphasis-ring-width: 1px;
      --card-hover-border: rgba(var(--accent-rgb), 0.54);
      --card-inprogress-border: rgba(var(--accent-rgb), 0.42);
      --card-explored-border: rgba(var(--accent-rgb), 0.34);
      --card-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.74),
        0 11px 30px rgba(49, 42, 32, 0.06);
      --card-hover-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.78),
        0 18px 42px rgba(49, 42, 32, 0.10);
      --card-explored-surface: rgba(239, 247, 245, 0.82);
      --launch-surface: rgba(217, 233, 230, 0.76);
      --launch-border: rgba(var(--accent-rgb), 0.27);
      --launch-text: var(--accent);
      --launch-shadow: none;
      --launch-hover-surface: var(--accent);
      --launch-hover-border: var(--accent);
      --launch-hover-text: #ffffff;
      --launch-hover-shadow: 0 7px 17px rgba(var(--accent-rgb), 0.17);
      --launch-inprogress-shadow: 0 4px 12px rgba(var(--accent-rgb), 0.22);
      /* Feedback states */
      --danger-bg: #fef2f2;
      --danger-bg-hover: #fee2e2;
      --danger-text: #dc2626;
      --danger-border: #fca5a5;
      --dialog-border: 0 solid transparent;

      /* Elevation, geometry, typography, and motion */
      --shadow-xs: 0 1px 2px rgba(30, 27, 22, 0.05);
      --shadow-md: 0 14px 38px rgba(49, 42, 32, 0.09);
      --shadow-lg: 0 24px 64px rgba(49, 42, 32, 0.13);
      --radius-sm: 6px;
      --radius-md: 16px;
      --radius-lg: 22px;
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --t: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
      --hub-theme-motion: 280ms cubic-bezier(0.4, 0, 0.2, 1);

      /* Shared Atlas integration contract */
      --cream: var(--surface-canvas);
      --cream-warm: var(--surface-muted);
      --white: var(--surface-panel);
      --stone-light: var(--border-subtle);
      --stone: var(--border-strong);
      --stone-dark: var(--text-subtle);
      --ink-faint: var(--border-faint);
      --ink-light: var(--text-muted);
      --ink: var(--text-body);
      --ink-dark: var(--text-heading);
    }

    html[data-theme="night"] {
      /* Canvas and surfaces */
      --surface-canvas: #221f1b;
      --surface-muted: #2d2925;
      --surface-panel: #38332d;
      --surface-raised: #453f38;
      --surface-raised-hover: #524b42;
      --surface-scrim: rgba(14, 12, 10, 0.74);

      /* Borders and text */
      --border-faint: #4c453d;
      --border-subtle: #635a4e;
      --border-strong: #877b6b;
      --text-subtle: #bab2a6;
      --text-muted: #cfc7ba;
      --text-body: #e7e0d4;
      --text-heading: #f5f0e8;

      /* Compass accent */
      --accent: #84cabf;
      --accent-soft: #a6dcd3;
      --accent-pale: #33574f;
      --accent-dim: #2c4c47;
      --accent-rgb: 132, 202, 191;
      --accent-soft-rgb: 166, 220, 211;
      --accent-ink: #17201e;
      --brand-dot: var(--accent);

      /* Hub chrome and controls */
      --chrome-surface: rgba(34, 31, 27, 0.95);
      --chrome-surface-mobile: rgba(34, 31, 27, 0.96);
      --chrome-border: rgba(99, 90, 78, 0.72);
      --world-nav-surface: rgba(45, 41, 37, 0.88);
      --world-nav-border: rgba(99, 90, 78, 0.72);
      --world-nav-hover: var(--surface-raised);
      --world-nav-active: var(--surface-raised-hover);
      --world-nav-active-border: rgba(var(--accent-rgb), 0.42);
      --world-nav-active-text: var(--accent-soft);
      --world-nav-inset-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.045);
      --world-nav-hover-shadow: none;
      --control-surface: var(--surface-raised);
      --control-hover: var(--surface-raised-hover);
      --control-border: var(--border-faint);
      --control-border-hover: var(--border-subtle);
      --control-text: var(--text-muted);
      --control-icon: var(--text-subtle);
      --control-text-hover: var(--text-heading);
      --control-shadow: 0 1px 2px rgba(0, 0, 0, 0.22);
      --control-hover-shadow: 0 2px 10px rgba(0, 0, 0, 0.30);
      --mobile-control-surface: var(--surface-raised);
      --mobile-control-hover: var(--surface-raised-hover);
      --mobile-control-border: var(--border-faint);
      --drawer-section-surface: var(--surface-muted);
      --drawer-button-surface: var(--surface-raised);
      --drawer-scrim: var(--surface-scrim);
      --drawer-shadow: 4px 0 32px rgba(0, 0, 0, 0.30);
      --navigation-hover: var(--surface-raised);

      /* Library and card states */
      --library-surface: var(--surface-muted);
      --library-border: var(--border-faint);
      --library-border-width: 1.5px;
      --library-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.035),
        0 18px 48px rgba(0, 0, 0, 0.14);
      --card-surface: var(--surface-raised);
      --card-surface-hover: var(--surface-raised-hover);
      --card-border: var(--border-faint);
      --card-border-width: 1.5px;
      --card-emphasis-ring-width: 0px;
      --card-hover-border: var(--accent);
      --card-inprogress-border: rgba(var(--accent-rgb), 0.72);
      --card-explored-border: rgba(var(--accent-rgb), 0.40);
      --card-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.05),
        0 14px 38px rgba(0, 0, 0, 0.17);
      --card-hover-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.065),
        0 19px 44px rgba(0, 0, 0, 0.23);
      --card-explored-surface: rgba(44, 76, 71, 0.78);
      --launch-surface: var(--accent);
      --launch-border: var(--accent);
      --launch-text: var(--accent-ink);
      --launch-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.12),
        0 4px 11px rgba(var(--accent-rgb), 0.13);
      --launch-hover-surface: var(--accent-soft);
      --launch-hover-border: var(--accent-soft);
      --launch-hover-text: var(--accent-ink);
      --launch-hover-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.16),
        0 7px 18px rgba(var(--accent-rgb), 0.20);
      --launch-inprogress-shadow: var(--launch-shadow);
      --page-bg: var(--page-bg-night);
      --dialog-border: 1px solid var(--border-faint);

      /* Elevation */
      --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.18);
      --shadow-md: 0 4px 18px rgba(0, 0, 0, 0.22);
      --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.30);
    }

    /* ============================================================
       RESET AND PAGE CANVAS
       ============================================================ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      min-height: 100%;
      background: var(--surface-canvas);
      scroll-behavior: smooth;
      overflow-y: scroll;
      scrollbar-gutter: stable;
    }

    body {
      position: relative;
      isolation: isolate;
      font-family: var(--font-body);
      background: transparent;
      color: var(--text-body);
      font-size: 15px;
      line-height: 1.65;
      min-height: 100svh;
      overflow-x: hidden;
      padding-top: 56px;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background-size: cover;
      background-position: center;
    }

    body::before {
      background: var(--page-bg-day);
      opacity: 1;
    }

    body::after {
      background: var(--page-bg-night);
      opacity: 0;
    }

    html[data-theme="night"] body::before {
      opacity: 0;
    }

    html[data-theme="night"] body::after {
      opacity: 1;
    }

    html.theme-changing body::before,
    html.theme-changing body::after {
      transition: opacity var(--hub-theme-motion);
    }

    /* ============================================================
       THEME MOTION
       Bridge owns theme state; the Hub owns surface interpolation.
       ============================================================ */

    html.theme-changing,
    html.theme-changing body,
    html.theme-changing .spine,
    html.theme-changing .spine-mark,
    html.theme-changing .spine-mark span,
    html.theme-changing .spine-worlds,
    html.theme-changing .spine-world-btn,
    html.theme-changing .spine-world-icon,
    html.theme-changing .spine-session-pill,
    html.theme-changing .spine-session-pill .pill-name,
    html.theme-changing .spine-btn,
    html.theme-changing .mobile-header,
    html.theme-changing .mobile-header-brand,
    html.theme-changing .mobile-header-mark,
    html.theme-changing .mobile-header-mark span,
    html.theme-changing .mobile-header-actions,
    html.theme-changing .mobile-header-btn,
    html.theme-changing .mobile-session-pill,
    html.theme-changing .mobile-session-pill span,
    html.theme-changing .drawer-header,
    html.theme-changing .drawer-footer,
    html.theme-changing .drawer-title,
    html.theme-changing .drawer-title span,
    html.theme-changing .drawer-close,
    html.theme-changing .drawer-nav-label,
    html.theme-changing .drawer-nav-item,
    html.theme-changing .drawer-nav-item .nav-soon,
    html.theme-changing .drawer-session-btn,
    html.theme-changing .drawer-session-btn span,
    html.theme-changing .drawer-appearance-btn,
    html.theme-changing .hub-intro,
    html.theme-changing .hub-eyebrow,
    html.theme-changing .hub-title,
    html.theme-changing .hub-desc,
    html.theme-changing .subject-library,
    html.theme-changing .subject-library-title,
    html.theme-changing .subject-card,
    html.theme-changing .subject-card-title,
    html.theme-changing .subject-card-hook,
    html.theme-changing .subject-card-progress-label,
    html.theme-changing .subject-card-progress-track,
    html.theme-changing .subject-card-progress-fill,
    html.theme-changing .btn-launch,
    html.theme-changing .empty-library,
    html.theme-changing .empty-library-icon,
    html.theme-changing .empty-library h2,
    html.theme-changing .empty-library p,
    html.theme-changing .bridge-error,
    html.theme-changing .bridge-error h2,
    html.theme-changing .bridge-error p,
    html.theme-changing .btn-primary,
    html.theme-changing .btn-ghost,
    html.theme-changing .confirm-panel,
    html.theme-changing .confirm-title,
    html.theme-changing .confirm-message,
    html.theme-changing .confirm-input,
    html.theme-changing .confirm-error,
    html.theme-changing .btn-danger,
    html.theme-changing .hub-toast {
      transition:
        background-color var(--hub-theme-motion),
        background var(--hub-theme-motion),
        color var(--hub-theme-motion),
        border-color var(--hub-theme-motion),
        box-shadow var(--hub-theme-motion),
        opacity var(--hub-theme-motion),
        fill var(--hub-theme-motion),
        stroke var(--hub-theme-motion);
    }

    html.theme-changing .drawer {
      transition:
        transform 0.28s cubic-bezier(0.4, 0, 0.2, 1),
        background-color var(--hub-theme-motion),
        background var(--hub-theme-motion),
        color var(--hub-theme-motion),
        border-color var(--hub-theme-motion),
        box-shadow var(--hub-theme-motion),
        opacity var(--hub-theme-motion);
    }

    /* ============================================================
       DESKTOP SPINE AND WORLD NAVIGATION
       ============================================================ */
    .spine {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      background: var(--chrome-surface);
      backdrop-filter: blur(22px) saturate(1.12);
      border-bottom: 1px solid var(--chrome-border);
      display: flex;
      align-items: center;
      height: 56px;
      padding: 0 1.5rem;
      gap: 0.5rem;
    }

    .spine-mark {
      font-family: var(--font-display);
      font-size: 1.22rem;
      font-weight: 400;
      color: var(--text-heading);
      letter-spacing: -0.01em;
      flex: 1 1 0;
      cursor: default;
      user-select: none;
      white-space: nowrap;
      line-height: 1;
    }

    .spine-mark span {
      color: var(--brand-dot);
    }

    /* Hub shortcuts */
    .spine-worlds {
      display: flex;
      align-items: center;
      gap: 0.18rem;
      flex: 0 0 auto;
      padding: 0.2rem;
      border-radius: 999px;
      background: var(--world-nav-surface);
      border: 1px solid var(--world-nav-border);
      box-shadow: var(--world-nav-inset-shadow);
    }

    .spine-world-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.42rem;
      min-height: 32px;
      padding: 0.32rem 0.82rem;
      border-radius: 999px;
      border: 1px solid transparent;
      background: transparent;
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: nowrap;
    }

    .spine-world-icon {
      width: 13px;
      height: 13px;
      opacity: 0.72;
      flex-shrink: 0;
    }

    .spine-world-btn:hover {
      color: var(--text-body);
      background: var(--world-nav-hover);
      border-color: var(--world-nav-border);
      box-shadow: var(--world-nav-hover-shadow);
    }

    .spine-world-btn:hover .spine-world-icon {
      opacity: 1;
    }

    .spine-world-btn.is-active {
      color: var(--world-nav-active-text);
      background: var(--world-nav-active);
      border-color: var(--world-nav-active-border);
      box-shadow: var(--shadow-xs);
      cursor: default;
    }

    .spine-world-btn.is-active .spine-world-icon {
      opacity: 1;
    }

    .spine-world-btn[aria-disabled="true"] {
      opacity: 0.5;
      cursor: default;
    }

    .spine-world-btn[aria-disabled="true"]:hover {
      color: var(--text-muted);
      background: transparent;
      border-color: transparent;
      box-shadow: none;
    }

    /* Header actions */
    .spine-actions {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex: 1 1 0;
      justify-content: flex-end;
    }

    .spine-session-pill {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.48rem 0.9rem;
      border-radius: 999px;
      border: 1px solid var(--control-border);
      background: var(--control-surface);
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--control-text);
      cursor: pointer;
      transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
      max-width: 170px;
      white-space: nowrap;
      overflow: hidden;
    }

    .spine-session-pill:hover {
      border-color: var(--control-border-hover);
      background: var(--control-hover);
      color: var(--control-text-hover);
      box-shadow: var(--control-hover-shadow);
    }

    .spine-session-pill .pill-name {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .spine-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 1px solid var(--control-border);
      background: var(--control-surface);
      color: var(--control-icon);
      cursor: pointer;
      transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--control-shadow);
      flex-shrink: 0;
    }

    .spine-btn:hover {
      color: var(--control-text-hover);
      background: var(--control-hover);
      border-color: var(--control-border-hover);
      box-shadow: var(--control-hover-shadow);
    }

    .appearance-icon {
      display: block;
      flex-shrink: 0;
    }

    .appearance-icon--sun {
      display: none;
    }

    html[data-theme="night"] .appearance-icon--moon {
      display: none;
    }

    html[data-theme="night"] .appearance-icon--sun {
      display: block;
    }

    /* ============================================================
       MOBILE HEADER AND DRAWER
       ============================================================ */
    .mobile-header {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      background: var(--chrome-surface-mobile);
      backdrop-filter: blur(20px) saturate(1.1);
      border-bottom: 1px solid var(--chrome-border);
      height: 56px;
      padding: 0 1rem;
      align-items: center;
      gap: 0.5rem;
    }

    .mobile-header-brand {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      flex: 1;
      min-width: 0;
    }

    .mobile-header-mark {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--text-heading);
      letter-spacing: -0.01em;
      line-height: 1;
    }

    .mobile-header-mark span {
      color: var(--brand-dot);
    }

    .mobile-header-actions {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      flex-shrink: 0;
    }

    .mobile-header-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 1px solid var(--mobile-control-border);
      background: var(--mobile-control-surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--t);
      flex-shrink: 0;
    }

    .mobile-header-btn:hover {
      color: var(--text-body);
      background: var(--mobile-control-hover);
    }

    .mobile-session-pill {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.25rem 0.7rem;
      border-radius: 20px;
      border: 1px solid var(--mobile-control-border);
      background: var(--mobile-control-surface);
      font-size: 0.76rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      max-width: 130px;
      height: 40px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .mobile-session-pill span {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Mobile drawer */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: var(--drawer-scrim);
      z-index: 400;
      backdrop-filter: blur(4px);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition:
        opacity 0.2s ease,
        visibility 0s linear 0.2s;
    }

    .drawer-overlay.open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition:
        opacity 0.2s ease,
        visibility 0s;
    }

    .drawer {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: min(300px, 85vw);
      background: var(--surface-panel);
      z-index: 500;
      display: flex;
      flex-direction: column;
      box-shadow: var(--drawer-shadow);
      transform: translate3d(-100%, 0, 0);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
      backface-visibility: hidden;
    }

    .drawer.open {
      transform: translate3d(0, 0, 0);
    }

    .drawer-header {
      padding: 1.2rem 1.2rem 1rem;
      border-bottom: 1px solid var(--border-subtle);
      background: var(--drawer-section-surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .drawer-title {
      font-family: var(--font-display);
      font-size: 1rem;
      color: var(--text-heading);
    }

    .drawer-title span {
      color: var(--brand-dot);
    }

    .drawer-close {
      width: 30px;
      height: 30px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-subtle);
      background: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
    }

    .drawer-close:hover {
      background: var(--surface-muted);
    }

    .drawer-nav {
      flex: 1;
      padding: 0.8rem;
      overflow-y: auto;
    }

    .drawer-nav-label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--border-faint);
      padding: 0.6rem 0.75rem 0.35rem;
    }

    .drawer-nav-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.75rem 0.9rem;
      border-radius: var(--radius-md);
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--t);
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      min-height: 44px;
    }

    .drawer-nav-item:hover {
      background: var(--navigation-hover);
      color: var(--text-body);
    }

    .drawer-nav-item[aria-disabled="true"] {
      opacity: 0.5;
      cursor: default;
    }

    .drawer-nav-item[aria-disabled="true"]:hover {
      background: none;
      color: var(--text-muted);
    }

    .drawer-nav-item .nav-soon {
      margin-left: auto;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-subtle);
    }

    .drawer-nav-item.is-active {
      background: var(--accent-dim);
      color: var(--accent);
      cursor: default;
    }

    .drawer-nav-item.is-active:hover {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .drawer-footer {
      padding: 0.8rem;
      border-top: 1px solid var(--border-subtle);
      background: var(--drawer-section-surface);
    }

    .drawer-footer-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 0.5rem;
    }

    .drawer-session-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 0.9rem;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
      background: var(--drawer-button-surface);
      font-size: 0.84rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      min-height: 44px;
      overflow: hidden;
    }

    .drawer-session-btn span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .drawer-appearance-btn {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
      background: var(--drawer-button-surface);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* ============================================================
       MAIN HUB LAYOUT AND INTRODUCTION
       ============================================================ */
    .hub-main {
      position: relative;
      z-index: 1;
      max-width: 1020px;
      margin: 0 auto;
      padding: 3.35rem 1.75rem 6rem;
      animation: hubPageFadeIn 0.45s ease both;
    }

    /* Hub introduction */
    .hub-intro {
      padding: 0 0 1.25rem;
      margin-bottom: 0;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .hub-eyebrow {
      font-size: 0.73rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: none;
      color: var(--accent);
      margin-bottom: 0.72rem;
    }

    .hub-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4.4vw, 2.75rem);
      color: var(--text-heading);
      font-weight: 400;
      line-height: 1.08;
      letter-spacing: -0.02em;
      margin-bottom: 0.68rem;
    }

    .hub-desc {
      font-size: 0.94rem;
      color: var(--text-body);
      opacity: 0.68;
      font-weight: 400;
      line-height: 1.7;
      max-width: 58ch;
    }

    /* ============================================================
       SUBJECT LIBRARY
       One curated operational collection.
       ============================================================ */

    .subject-library {
      margin-top: 1.45rem;
      padding: 1.7rem 1.75rem 1.85rem;
      border: var(--library-border-width) solid var(--library-border);
      border-radius: var(--radius-lg);
      background: var(--library-surface);
      box-shadow: var(--library-shadow);
    }

    .subject-library-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.15rem;
    }

    .subject-library-title {
      font-family: var(--font-display);
      font-size: 1.24rem;
      line-height: 1.25;
      font-weight: 400;
      color: var(--text-heading);
    }

    .subject-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1rem;
    }

    /* ============================================================
       SUBJECT CARDS AND PROGRESS STATES
       ============================================================ */

    .subject-card {
      position: relative;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 224px;
      padding: 1.4rem 1.4rem 1.35rem;
      overflow: hidden;
      border: var(--card-border-width) solid var(--card-border);
      border-radius: 20px;
      background: var(--card-surface);
      color: var(--text-body);
      text-align: left;
      text-decoration: none;
      box-shadow: var(--card-shadow);
      transition: var(--t);
    }

    .subject-card:hover {
      border-color: var(--card-hover-border);
      background: var(--card-surface-hover);
      box-shadow:
        0 0 0 var(--card-emphasis-ring-width) var(--card-hover-border),
        var(--card-hover-shadow);
      transform: translateY(-2px);
    }

    .subject-card:focus-visible {
      outline: 3px solid rgba(var(--accent-rgb), 0.34);
      outline-offset: 3px;
    }

    .subject-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.6rem;
      margin-bottom: 0.72rem;
    }

    .subject-card-title {
      font-family: var(--font-display);
      font-size: 1.16rem;
      line-height: 1.28;
      font-weight: 400;
      color: var(--text-heading);
    }

    .subject-card-hook {
      margin-bottom: 0.85rem;
      color: var(--text-muted);
      font-size: 0.82rem;
      line-height: 1.58;
      display: -webkit-box;
      line-clamp: 4;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .subject-card-footer {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 0.8rem;
      margin-top: auto;
    }

    .subject-card-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.14rem;
      min-width: 0;
    }

    .subject-card-progress-label {
      color: var(--accent);
      font-size: 0.69rem;
      font-weight: 500;
      line-height: 1.4;
    }

    .btn-launch {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      min-width: 100px;
      min-height: 38px;
      padding: 0.44rem 0.9rem;
      flex-shrink: 0;
      margin-left: auto;
      border: 1px solid var(--launch-border);
      border-radius: 999px;
      background: var(--launch-surface);
      color: var(--launch-text);
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 600;
      line-height: 1;
      white-space: nowrap;
      transition: var(--t);
      box-shadow: var(--launch-shadow);
    }

    .subject-card:hover .btn-launch {
      border-color: var(--launch-hover-border);
      background: var(--launch-hover-surface);
      color: var(--launch-hover-text);
      box-shadow: var(--launch-hover-shadow);
      transform: translateY(-1px);
    }

    /* Progress states */

    .subject-card-progress-track {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      overflow: hidden;
      background: rgba(var(--accent-rgb), 0.09);
    }

    .subject-card-progress-fill {
      display: block;
      width: var(--subject-progress);
      height: 100%;
      background: var(--accent);
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .subject-card--inprogress {
      border-color: var(--card-inprogress-border);
      box-shadow:
        0 0 0 var(--card-emphasis-ring-width) var(--card-inprogress-border),
        var(--card-shadow);
    }

    .subject-card--inprogress .btn-launch {
      background: var(--accent);
      color: var(--accent-ink);
      border-color: var(--accent);
      box-shadow: var(--launch-inprogress-shadow);
    }

    .subject-card--inprogress:hover .btn-launch {
      background: var(--accent-soft);
      border-color: var(--accent-soft);
    }

    .subject-card--explored {
      background: var(--card-explored-surface);
      border-color: var(--card-explored-border);
    }

    /* ============================================================
       EMPTY AND ERROR STATES
       ============================================================ */
    .empty-library {
      text-align: center;
      padding: 4rem 1rem;
    }

    .empty-library-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--accent-pale);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
      color: var(--accent);
    }

    .empty-library h2 {
      font-family: var(--font-display);
      font-size: 1.35rem;
      color: var(--text-heading);
      font-weight: 400;
      margin-bottom: 0.5rem;
    }

    .empty-library p {
      font-size: 0.88rem;
      color: var(--text-muted);
      line-height: 1.65;
      max-width: 44ch;
      margin: 0 auto;
    }

    /* Bridge error */
    .bridge-error {
      max-width: 480px;
      margin: 4rem auto;
      text-align: center;
      padding: 0 1rem;
    }

    .bridge-error h2 {
      font-family: var(--font-display);
      font-size: 1.3rem;
      color: var(--text-heading);
      font-weight: 400;
      margin-bottom: 0.5rem;
    }

    .bridge-error p {
      font-size: 0.88rem;
      color: var(--text-muted);
      line-height: 1.65;
    }

    /* ============================================================
       HUB-OWNED DIALOG AND ACTIONS
       ============================================================ */

    .btn-primary {
      padding: 0.58rem 1.05rem;
      border-radius: var(--radius-sm);
      border: none;
      background: var(--accent);
      color: var(--accent-ink);
      font-family: var(--font-body);
      font-size: 0.84rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--t);
      white-space: nowrap;
      min-height: 42px;
    }

    .btn-primary:hover {
      background: var(--accent-soft);
    }

    .btn-ghost {
      padding: 0.58rem 0.95rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-subtle);
      background: var(--surface-muted);
      font-family: var(--font-body);
      font-size: 0.84rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--t);
      min-height: 42px;
    }

    .btn-ghost:hover {
      border-color: var(--border-strong);
      color: var(--text-body);
    }

    .confirm-dialog {
      position: fixed;
      inset: 0;
      z-index: 800;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: var(--surface-scrim);
      backdrop-filter: blur(6px);
    }

    .confirm-dialog.open {
      display: flex;
      animation: fadeIn 0.15s ease;
    }

    .confirm-panel {
      background: var(--surface-panel);
      border: var(--dialog-border);
      border-radius: var(--radius-md);
      max-width: 360px;
      width: 100%;
      padding: 1.4rem;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.2s cubic-bezier(0.34, 1.25, 0.64, 1);
    }

    .confirm-title {
      font-size: 0.94rem;
      font-weight: 600;
      color: var(--text-heading);
      margin-bottom: 0.45rem;
    }

    .confirm-message {
      font-size: 0.83rem;
      color: var(--text-muted);
      line-height: 1.55;
      margin-bottom: 1.1rem;
    }

    .confirm-input {
      width: 100%;
      padding: 0.58rem 0.8rem;
      border: 1.5px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 0.86rem;
      color: var(--text-body);
      background: var(--surface-panel);
      outline: none;
      transition: var(--t);
      margin-bottom: 0.45rem;
      display: none;
      min-height: 42px;
    }

    .confirm-input.visible {
      display: block;
    }

    .confirm-input:focus {
      border-color: var(--accent);
    }

    .confirm-error {
      font-size: 0.76rem;
      color: var(--danger-text);
      margin-bottom: 0.75rem;
      display: none;
    }

    .confirm-error.visible {
      display: block;
    }

    .confirm-actions {
      display: flex;
      gap: 0.45rem;
      justify-content: flex-end;
    }

    .btn-danger {
      padding: 0.55rem 0.95rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--danger-border);
      background: var(--danger-bg);
      color: var(--danger-text);
      font-family: var(--font-body);
      font-size: 0.83rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--t);
      min-height: 40px;
    }

    .btn-danger:hover {
      background: var(--danger-bg-hover);
    }

    /* ============================================================
       HUB TOAST
       ============================================================ */
    .hub-toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--surface-panel);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-md);
      padding: 0.65rem 1.15rem;
      font-size: 0.84rem;
      color: var(--text-muted);
      z-index: 900;
      box-shadow: var(--shadow-md);
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
      max-width: calc(100vw - 2rem);
    }

    .hub-toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ============================================================
       UTILITIES AND KEYFRAMES
       ============================================================ */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
    }

    @keyframes hubPageFadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ============================================================
       MOTION PREFERENCES
       ============================================================ */
    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ============================================================
       RESPONSIVE LAYOUT
       ============================================================ */
    @media (min-width: 681px) and (max-width: 920px) {
      .subject-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 680px) {

      html,
      body {
        background: var(--page-bg);
      }

      body::before,
      body::after {
        display: none !important;
        content: none !important;
      }

      .spine {
        display: none !important;
      }

      .mobile-header {
        display: flex !important;
      }

      .hub-main {
        padding: 2.15rem 1rem 4.5rem;
      }

      .hub-intro {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
        margin-bottom: 0;
        padding-bottom: 1.9rem;
      }

      .hub-title {
        font-size: clamp(2rem, 10vw, 2.45rem);
      }

      .subject-library {
        margin-top: 2.35rem;
        padding: 1.15rem;
      }

      .subject-grid {
        grid-template-columns: 1fr;
      }

      .subject-card {
        min-height: 0;
        padding: 1.3rem 1.25rem 1.35rem;
      }
    }

    @media (min-width: 681px) {
      .mobile-header {
        display: none !important;
      }

      .drawer-overlay,
      .drawer {
        display: none !important;
      }
    }
  </style>
</head>

  <!-- ============================================================ MAIN -->

  <!-- ============================================================ SCRIPTS -->
  <script src="../shared/compass-catalog-data.js"></script>
  <script src="../shared/atlas-content-registry.js"></script>
  <script src="../shared/atlas-session-panel.js"></script>
  <script src="../shared/atlas-search.js"></script>
  <script>
    'use strict';

    /* ================================================================
       COMPASS HUB V1
       Reads state through AtlasBridge. Catalog metadata comes from CompassCatalogData.
       ================================================================ */

    // ---- Bridge guard -----------------------------------------------
    if (!window.AtlasBridge) {
      document.getElementById('hub-main').innerHTML =
        '<div class="bridge-error">' +
        '<h2>Compass can\'t start</h2>' +
        '<p>The shared runtime didn\'t load. Reload the page, and check that <code>shared/atlas-bridge.js</code> is in place.</p>' +
        '</div>';
    }
    const Bridge = window.AtlasBridge;

    const ATLAS_ID = 'atlas';
    const COMPASS_ID = 'compass';
    const ARCADE_ID = 'arcade';
    const ACTIVE_HUB_ID = COMPASS_ID;

    const HUB_NAV = {
      atlas: {
        id: ATLAS_ID,
        name: 'Atlas',
        desc: 'Gateway',
        alwaysAvailable: true,
        launchUrl: '../index.html',
        smallIcon: '<svg class="spine-world-icon" width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true"><path d="M6.5 1.4L11.6 6.5L6.5 11.6L1.4 6.5Z" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round"/><path d="M6.5 3.6L9.4 6.5L6.5 9.4L3.6 6.5Z" stroke="currentColor" stroke-width="1.15" stroke-linejoin="round" opacity="0.75"/></svg>'
      },
      compass: {
        id: COMPASS_ID,
        name: 'Compass',
        desc: 'Deep conversation subjects for thoughtful English.',
        alwaysAvailable: true,
        launchUrl: window.location.href,
        smallIcon: '<svg class="spine-world-icon" width="13" height="13" viewBox="0 0 14 14" fill="none" aria-hidden="true"><circle cx="7" cy="7" r="5.2" stroke="currentColor" stroke-width="1.25"/><circle cx="7" cy="7" r="1.6" stroke="currentColor" stroke-width="1.15"/><path d="M7 1.8v1.6M7 10.6v1.6M1.8 7h1.6M10.6 7h1.6" stroke="currentColor" stroke-width="1.15" stroke-linecap="round"/></svg>'
      },
      arcade: {
        id: ARCADE_ID,
        name: 'Arcade',
        desc: 'Conversation games.',
        worldId: ARCADE_ID,
        smallIcon: '<svg class="spine-world-icon" width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true"><rect x="1.5" y="3" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M4.5 6.5h2M5.5 5.5v2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><circle cx="8.5" cy="6.5" r="0.6" fill="currentColor"/><circle cx="10" cy="5.5" r="0.6" fill="currentColor"/></svg>'
      }
    };

    /* ================================================================
       COMPASS CATALOG
       Shared catalog metadata comes from shared/compass-catalog-data.js.
       ================================================================ */

    const COMPASS_CATALOG_DATA = window.CompassCatalogData;

    const COMPASS_CATALOG = COMPASS_CATALOG_DATA
      ? COMPASS_CATALOG_DATA.getCompassCatalogMap()
      : {};

    const COMPASS_AVAILABLE_SUBJECT_SLUGS = COMPASS_CATALOG_DATA
      ? COMPASS_CATALOG_DATA.getBuiltCompassSubjectSlugs()
      : [];

    /* ================================================================
       REGISTRATION
       Compass world and subject items are registered idempotently on load.
       ================================================================ */

    function compassSubjectSlug(subject) {
      return String(subject.registryId || '')
        .replace(/^compass:/, '')
        .trim();
    }

    function getCompassSubjectLaunchUrl(subject) {
      const slug = compassSubjectSlug(subject);
      return slug ? './' + slug + '/index.html' : '';
    }

    function withLaunchOrigin(url, origin) {
      if (!url) return '';

      try {
        const destination = new URL(url, window.location.href);
        destination.searchParams.set('from', origin);
        return destination.href;
      } catch {
        return url;
      }
    }

    function registerWithBridge() {
      if (window.AtlasContentRegistry && typeof AtlasContentRegistry.registerCompass === 'function') {
        AtlasContentRegistry.registerCompass();
      }
    }

    /* ================================================================
       HELPERS
       ================================================================ */

    function escHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function resolveStatus(state) {
      if (!state || typeof state !== 'object') {
        return 'new';
      }

      const status = String(state.status || '').toLowerCase();
      const progress = state.progress || {};
      const raw = state.progressRaw || {};

      if (status === 'complete') {
        return 'explored';
      }

      const explored = Number(progress.explored) || 0;
      const exploredIds = Array.isArray(raw.exploredIds)
        ? raw.exploredIds.length
        : 0;

      if (explored > 0 || exploredIds > 0) {
        return 'inprogress';
      }

      return 'new';
    }

    function getSubjectCardState(subject) {
      const progress = subject.state && subject.state.progress
        ? subject.state.progress
        : {};

      const total = Math.max(0, Number(progress.total) || 0);
      const explored = Math.max(
        0,
        Math.min(Number(progress.explored) || 0, total || Infinity)
      );

      if (subject.status === 'explored') {
        return {
          mode: 'explored',
          actionLabel: 'Revisit',
          progressLabel: explored > 0
            ? explored + ' path' + (explored === 1 ? '' : 's') + ' explored'
            : 'Explored',
          progressPercent: 100
        };
      }

      if (subject.status === 'inprogress' && explored > 0) {
        return {
          mode: 'inprogress',
          actionLabel: 'Continue',
          progressLabel:
            explored + ' path' + (explored === 1 ? '' : 's') + ' explored',
          progressPercent: total > 0
            ? Math.round((explored / total) * 100)
            : 0
        };
      }

      return {
        mode: 'new',
        actionLabel: 'Explore',
        progressLabel: '',
        progressPercent: 0
      };
    }

    /* ================================================================
       SAFE BRIDGE READS
       ================================================================ */

    function getActiveSession() {
      try { return Bridge.readActiveSession(); }
      catch (e) { return { id: 'default', name: 'Default' }; }
    }
    function getSessions() {
      try { return Bridge.readSessions() || []; }
      catch (e) { return []; }
    }
    function getRegistry() {
      try { return Bridge.readRegistry(); }
      catch (e) { return { worlds: {}, items: {}, sessionStates: {}, recentActivity: [] }; }
    }
    function isDefaultSession(s) {
      return s && s.id === (Bridge.defaultSessionId || 'default');
    }

    /* ================================================================
       CATALOG MERGE
       Returns a flat array of merged subject objects.
       Only subjects registered in the bridge with world=compass,
       type=subject, status=available are included.
       ================================================================ */

    function getOperationalSubjects() {
      const reg = getRegistry();
      const session = getActiveSession();
      const sessionStates = ((reg.sessionStates || {})[session.id]) || {};

      return COMPASS_AVAILABLE_SUBJECT_SLUGS
        .map(slug => {
          const subject = Object.values(COMPASS_CATALOG).find(item =>
            compassSubjectSlug(item) === slug
          );

          if (!subject) return null;

          const relativeLaunchUrl = getCompassSubjectLaunchUrl(subject);
          const launchUrl = relativeLaunchUrl
            ? withLaunchOrigin(
              new URL(relativeLaunchUrl, window.location.href).href,
              'compass'
            )
            : '';

          if (!launchUrl) return null;

          const item = (reg.items || {})[subject.registryId] || null;
          const state = sessionStates[subject.registryId] || null;

          return {
            registryId: subject.registryId,
            title: subject.title,
            launchUrl,
            hook: subject.hook || '',
            status: resolveStatus(state),
            state,
            contentVersion: item ? item.contentVersion || null : null
          };
        })
        .filter(Boolean);
    }

    /* ================================================================
       APPEARANCE
       ================================================================ */

    function updateAppearanceButtons(mode) {
      const label = mode === 'night'
        ? 'Switch to day mode'
        : 'Switch to night mode';

      ['spine-appearance-btn', 'drawer-appearance-btn'].forEach(id => {
        const el = document.getElementById(id);

        if (el) {
          el.setAttribute('aria-label', label);
        }
      });
    }

    function toggleAppearance() {
      const cur = Bridge.readAppearanceMode();
      const next = cur === 'night' ? 'light' : 'night';
      Bridge.setAppearanceMode(next);
    }

    /* ================================================================
       SESSION LABELS
       ================================================================ */

    function setSessionLabels() {
      const s = getActiveSession();
      const name = AtlasSessionPanel.getSessionDisplayName(s);
      ['spine-session-name', 'mobile-session-name', 'drawer-session-name'].forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.textContent = name;
          const trigger = el.closest('button');
          if (trigger) trigger.setAttribute('aria-label', 'Open session panel. Working with ' + name);
        }
      });
    }

    /* ================================================================
       NAVIGATION
       Matches Atlas hub navigation, adapted only for Compass host IDs.
       ================================================================ */

    function navigateTo(url) {
      if (!url) {
        showToast('That destination is not available on this device yet.');
        return;
      }

      if (window.AtlasSearch && typeof AtlasSearch.navigateTo === 'function') {
        AtlasSearch.navigateTo(url);
        return;
      }

      window.location.href = url;
    }

    function resolveWorld(reg, worldId) {
      const worlds = reg.worlds || {};
      if (worlds[worldId]) return worlds[worldId];

      return Object.values(worlds).find(w =>
        w && (w.registryId === worldId || w.id === worldId || w.world === worldId)
      ) || null;
    }

    function worldHasItems(reg, worldId) {
      const prefix = worldId + ':';
      return Object.keys(reg.items || {}).some(k => k.indexOf(prefix) === 0);
    }

    function getWorldLaunchUrl(reg, worldId) {
      if (worldId === ARCADE_ID) return '../arcade/index.html';

      const w = resolveWorld(reg, worldId);
      return (w && w.launchUrl) ? w.launchUrl : null;
    }

    function isWorldAvailable(reg, worldId) {
      return !!getWorldLaunchUrl(reg, worldId);
    }

    function openWorld(worldId) {
      const reg = getRegistry();
      const url = getWorldLaunchUrl(reg, worldId);

      if (url) {
        navigateTo(url);
        return;
      }

      if (worldId === COMPASS_ID && worldHasItems(reg, COMPASS_ID)) {
        showToast('Compass is registered, but its hub is not linked on this device yet.');
        return;
      }

      showToast('This world is coming soon.');
    }

    function isHubAvailable(hub, reg) {
      if (!hub) return false;
      if (hub.alwaysAvailable) return true;

      if (hub.worldId === COMPASS_ID) {
        return isWorldAvailable(reg, COMPASS_ID) || worldHasItems(reg, COMPASS_ID);
      }

      if (hub.worldId === ARCADE_ID) {
        return isWorldAvailable(reg, ARCADE_ID);
      }

      return false;
    }

    function openHub(hubId) {
      const hub = HUB_NAV[hubId];
      if (!hub) return;

      if (hub.id === ACTIVE_HUB_ID) {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }

      if (hub.worldId) {
        openWorld(hub.worldId);
        return;
      }

      if (hub.launchUrl) {
        navigateTo(hub.launchUrl);
        return;
      }

      showToast('That destination is not available yet.');
    }

    function renderSpineHubNav() {
      const reg = getRegistry();
      const host = document.getElementById('spine-hub-nav');
      if (!host) return;

      host.querySelectorAll('[data-hub-id]').forEach(button => {
        const hubId = button.dataset.hubId;
        const hub = HUB_NAV[hubId];

        if (!hub) return;

        const active = hub.id === ACTIVE_HUB_ID;
        const available = isHubAvailable(hub, reg);

        button.classList.toggle('is-active', active);

        if (active) {
          button.setAttribute('aria-current', 'page');
          button.removeAttribute('aria-disabled');
          button.removeAttribute('onclick');
          button.title = hub.name;
          return;
        }

        button.removeAttribute('aria-current');
        button.title = available
          ? 'Open ' + hub.name
          : hub.name + ' — coming soon';

        if (available) {
          button.removeAttribute('aria-disabled');
          button.setAttribute('onclick', "openHub('" + hub.id + "')");
        } else {
          button.setAttribute('aria-disabled', 'true');
          button.removeAttribute('onclick');
        }
      });
    }

    function renderDrawerHubNav() {
      const reg = getRegistry();
      const host = document.getElementById('drawer-hub-nav');
      if (!host) return;

      host.innerHTML = Object.values(HUB_NAV).map(hub => {
        const active = hub.id === ACTIVE_HUB_ID;
        const available = isHubAvailable(hub, reg);
        const disabledAttr = available ? '' : ' aria-disabled="true"';
        const activeClass = active ? ' is-active' : '';
        const onclick = available ? ' onclick="closeDrawer();openHub(\'' + hub.id + '\')"' : '';

        return '<button class="drawer-nav-item' + activeClass + '"' +
          disabledAttr +
          onclick +
          (active ? ' aria-current="page"' : '') +
          '>' +
          hub.smallIcon +
          escHtml(hub.name) +
          (available ? '' : '<span class="nav-soon">Soon</span>') +
          '</button>';
      }).join('');
    }

    let toastTimer = null;
    function showToast(text) {
      let el = document.getElementById('hub-toast');
      if (!el) {
        el = document.createElement('div');
        el.id = 'hub-toast';
        el.className = 'hub-toast';
        el.setAttribute('role', 'status');
        document.body.appendChild(el);
      }
      el.textContent = text;
      requestAnimationFrame(() => el.classList.add('visible'));
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('visible'), 3200);
    }

    /* ================================================================
       RENDER
       One curated operational collection containing only playable subjects.
       Progress and continuation state live directly on the standard cards.
       ================================================================ */

    function renderHub() {
      if (!Bridge) return;

      registerWithBridge();

      const main = document.getElementById('hub-main');
      const session = getActiveSession();
      const subjects = getOperationalSubjects();

      setSessionLabels();
      renderSpineHubNav();
      renderDrawerHubNav();

      if (!subjects.length) {
        main.innerHTML = renderIntro(session) + renderEmptyLibrary();
        return;
      }

      main.innerHTML =
        renderIntro(session) +
        renderSubjectCollection(subjects);
    }

    function renderIntro(session) {
      const eyebrow = isDefaultSession(session)
        ? 'Compass'
        : 'Welcome, ' + escHtml(session.name);

      return (
        '<div class="hub-intro">' +
        '<div class="hub-intro-text">' +
        '<div class="hub-eyebrow">' + eyebrow + '</div>' +
        '<h1 class="hub-title">Explore the subjects that shape our lives.</h1>' +
        '<p class="hub-desc">Choose a topic, share your ideas, and see where the conversation goes.</p>' +
        '</div>' +
        '</div>'
      );
    }

    function renderSubjectCollection(subjects) {
      const cards = subjects
        .map(subject => renderSubjectCard(subject))
        .join('');

      return (
        '<section class="subject-library">' +
        '<div class="subject-library-header">' +
        '<h2 class="subject-library-title">Choose a subject</h2>' +
        '</div>' +
        '<div class="subject-grid">' +
        cards +
        '</div>' +
        '</section>'
      );
    }

    function renderSubjectCard(subject) {
      const cardState = getSubjectCardState(subject);

      const progressHtml = cardState.mode !== 'new'
        ? '<span class="subject-card-progress-track" aria-hidden="true">' +
        '<span class="subject-card-progress-fill"></span>' +
        '</span>'
        : '';

      const progressMeta = cardState.progressLabel
        ? '<span class="subject-card-progress-label">' +
        escHtml(cardState.progressLabel) +
        '</span>'
        : '';

      return (
        '<a class="subject-card subject-card--' + escHtml(cardState.mode) + '" ' +
        'href="' + escHtml(subject.launchUrl) + '" ' +
        'style="--subject-progress:' + cardState.progressPercent + '%" ' +
        'aria-label="' + escHtml(cardState.actionLabel + ' ' + subject.title) + '">' +

        '<div class="subject-card-header">' +
        '<h3 class="subject-card-title">' +
        escHtml(subject.title) +
        '</h3>' +
        '</div>' +

        (subject.hook
          ? '<p class="subject-card-hook">' +
          escHtml(subject.hook) +
          '</p>'
          : '') +

        '<div class="subject-card-footer">' +
        (progressMeta
          ? '<div class="subject-card-meta">' +
          progressMeta +
          '</div>'
          : '') +

        '<span class="btn-launch">' +
        escHtml(cardState.actionLabel) +
        '<svg width="11" height="11" viewBox="0 0 11 11" fill="none" aria-hidden="true">' +
        '<path d="M2 5.5h7M6 2.5l3 3-3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>' +
        '</svg>' +
        '</span>' +
        '</div>' +

        progressHtml +
        '</a>'
      );
    }

    function renderEmptyLibrary() {
      return (
        '<div class="empty-library">' +
        '<div class="empty-library-icon">' +
        '<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M12 4v3M12 17v3M4 12h3M17 12h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>' +
        '</div>' +
        '<h2>No subjects available</h2>' +
        '<p>Compass could not find any playable subjects on this device.</p>' +
        '</div>'
      );
    }

    /* ================================================================
       DRAWER
       ================================================================ */

    function openDrawer() {
      renderDrawerHubNav();
      const overlay = document.getElementById('drawer-overlay');
      overlay.style.display = 'block';
      document.getElementById('drawer').classList.add('open');
      document.body.style.overflow = 'hidden';
      setTimeout(() => overlay.classList.add('open'), 10);
    }
    function closeDrawer() {
      const overlay = document.getElementById('drawer-overlay');
      overlay.classList.remove('open');
      document.getElementById('drawer').classList.remove('open');
      document.body.style.overflow = '';
      setTimeout(() => { overlay.style.display = ''; }, 300);
    }

    /* ================================================================
       SESSION MODAL
       ================================================================ */

    function openSessionPanel(trigger = document.activeElement) {
      if (window.AtlasSessionPanel) AtlasSessionPanel.open(trigger);
    }

    async function handleRenameSession(session) {
      const id = session.id;
      const sessions = getSessions();
      const s = sessions.find(x => x.id === id);
      if (!s) return;
      const newName = await showConfirm({
        title: 'Rename session',
        message: 'Give this session a new name.',
        okLabel: 'Rename', okClass: 'btn-primary',
        inputMode: true, inputValue: s.name
      });
      if (!newName || newName === s.name) return;
      const renamed = Bridge.renameSession(id, newName);
      if (!renamed) {
        showToast('That name is already in use.');
        return;
      }
      renderHub();
    }

    async function handleDeleteSession(session) {
      const id = session.id;
      const sessions = getSessions();
      const s = sessions.find(x => x.id === id);

      if (!s) return;

      const ok = await showConfirm({
        title: 'Delete session?',
        message: 'This permanently removes ' + s.name + ', their progress, and their saved language from this device.',
        okLabel: 'Delete session'
      });

      if (!ok) return;

      const ledger = Bridge.readLedger();
      let ledgerChanged = false;

      Object.keys(ledger.entries || {}).forEach(entryId => {
        const entry = ledger.entries[entryId];

        if (entry && entry.sessionId === id) {
          delete ledger.entries[entryId];
          ledgerChanged = true;
        }
      });

      if (ledgerChanged) {
        Bridge.writeLedger(ledger);
      }

      const reg = getRegistry();

      if (reg.sessionStates) {
        delete reg.sessionStates[id];
      }

      reg.recentActivity = (reg.recentActivity || []).filter(item =>
        item && item.sessionId !== id
      );

      Bridge.writeRegistry(reg);

      Bridge.deleteSession(id);

      renderHub();
    }

    /* ================================================================
       CONFIRM DIALOG
       ================================================================ */

    let confirmResolver = null;
    function showConfirm(opts) {
      opts = opts || {};
      return new Promise(resolve => {
        confirmResolver = resolve;
        document.getElementById('confirm-title').textContent = opts.title || '';
        document.getElementById('confirm-message').textContent = opts.message || '';
        const okBtn = document.getElementById('confirm-ok-btn');
        okBtn.textContent = opts.okLabel || 'OK';
        okBtn.className = opts.okClass || 'btn-danger';
        const inp = document.getElementById('confirm-input');
        inp.className = 'confirm-input' + (opts.inputMode ? ' visible' : '');
        inp.value = opts.inputValue || '';
        document.getElementById('confirm-error').className = 'confirm-error';
        document.getElementById('confirm-dialog').classList.add('open');
        if (opts.inputMode) setTimeout(() => { inp.focus(); inp.select(); }, 50);
      });
    }
    function resolveConfirm(ok) {
      const inp = document.getElementById('confirm-input');
      const isInput = inp.classList.contains('visible');
      if (!ok) {
        document.getElementById('confirm-dialog').classList.remove('open');
        if (confirmResolver) { confirmResolver(isInput ? null : false); confirmResolver = null; }
        return;
      }
      const value = isInput ? inp.value.trim() : true;
      document.getElementById('confirm-dialog').classList.remove('open');
      if (confirmResolver) { confirmResolver(value); confirmResolver = null; }
    }
    document.getElementById('confirm-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') resolveConfirm(true);
      if (e.key === 'Escape') {
        e.stopPropagation();
        resolveConfirm(false);
      }
    });

    /* ================================================================
       GLOBAL KEYS
       ================================================================ */

    document.addEventListener('keydown', e => {
      if (e.defaultPrevented) return;

      if (e.key === 'Escape') {
        if (document.getElementById('confirm-dialog').classList.contains('open')) {
          e.stopImmediatePropagation();
          resolveConfirm(false);
          return;
        }
        if (window.AtlasSessionPanel && AtlasSessionPanel.isOpen()) return;
        if (document.getElementById('drawer').classList.contains('open')) { closeDrawer(); return; }
      }
    });

    /* ================================================================
       LIVE REFRESH
       ================================================================ */

    function refresh() {
      if (!Bridge) return;
      const mode = Bridge.applyAppearanceMode(Bridge.readAppearanceMode());
      updateAppearanceButtons(mode);
      renderHub();
    }

    window.addEventListener('atlas:session-change', refresh);
    window.addEventListener('atlas:appearance-change', e => {
      const mode = (e.detail && e.detail.mode) || Bridge.readAppearanceMode();
      updateAppearanceButtons(mode);
    });
    window.addEventListener('focus', refresh);
    window.addEventListener('pageshow', refresh);
    document.addEventListener('visibilitychange', () => { if (!document.hidden) refresh(); });
    window.addEventListener('storage', e => {
      if (!e || !e.key) return;
      const k = e.key;
      if (k === Bridge.keys.appearance || k === Bridge.keys.appearanceBySession) {
        const mode = Bridge.applyAppearanceMode(Bridge.readAppearanceMode());
        updateAppearanceButtons(mode);
        return;
      }

      if (k === 'atlas::sessions' || k === 'atlas::activeSessionId' || k === 'atlas::registry' || k === 'learning::ledger') {
        refresh();
      }
    });

    /* ================================================================
       INIT
       ================================================================ */

    function init() {
      if (!Bridge) return;

      const mode = Bridge.readAppearanceMode();
      Bridge.applyAppearanceMode(mode);
      updateAppearanceButtons(mode);
      setSessionLabels();
      renderSpineHubNav();
      renderDrawerHubNav();

      if (window.AtlasSearch && typeof AtlasSearch.init === 'function') {
        AtlasSearch.init({
          activeHubId: 'compass',
          atlasUrl: '../index.html',
          compassUrl: './index.html',
          arcadeUrl: '../arcade/index.html'
        });
      }

      AtlasSessionPanel.mount({
        root: '#atlas-session-panel-root',
        initialView: 'manage',
        onRenameSession: handleRenameSession,
        onDeleteSession: handleDeleteSession
      });

      renderHub();
    }

    init();
  </script>
</body>

</html>
