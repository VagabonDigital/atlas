  <!-- Anti-flash: apply the active session theme before first paint -->
  <script>
    (function () {
      var m = null;
      try {
        var sessionId = localStorage.getItem('atlas::activeSessionId') || 'default';
        var sessionModes = JSON.parse(localStorage.getItem('atlas::appearanceBySession') || '{}');
        m = sessionModes[sessionId] || localStorage.getItem('atlas::appearanceMode');
      } catch (e) { }
      document.documentElement.dataset.theme = (m === 'night') ? 'night' : 'light';
    })();
  </script>
  <style>
    /* ============================================================
       COMPASS HUB — DESIGN TOKENS
       Library surface: warmer than Atlas, less immersive than a lesson module.
       Cream paper, teal accent, high readability. No heavy background overlays.
       ============================================================ */
    :root {
      --cream: #f5f1e9;
      --cream-warm: #eee8de;
      --stone-light: #e2dacf;
      --stone: #c6bbad;
      --stone-dark: #8f8578;
      --ink-faint: #d4cfc8;
      --ink-light: #7a7268;
      --ink: #3d3830;
      --ink-dark: #1e1b16;
      --accent: #4f7772;
      --accent-soft: #78a19c;
      --accent-pale: #d9e9e6;
      --accent-dim: #eaf3f1;
      --accent-rgb: 79, 119, 114;
      --accent-soft-rgb: 120, 161, 156;
      --page-bg-day:
        radial-gradient(circle at 12% 3%, rgba(255, 255, 255, 0.76), transparent 34rem),
        radial-gradient(circle at 88% 22%, rgba(79, 119, 114, 0.075), transparent 40rem),
        linear-gradient(145deg, #f7f3ec 0%, #f5f1e9 52%, #f0ebe2 100%);
      --page-bg-night:
        radial-gradient(circle at 12% 3%, rgba(159, 206, 201, 0.055), transparent 34rem),
        radial-gradient(circle at 88% 22%, rgba(131, 185, 179, 0.095), transparent 40rem),
        linear-gradient(145deg, #2f2923 0%, #3a332b 52%, #40372f 100%);
      --page-bg: var(--page-bg-day);
      --white: #ffffff;
      --viewed-bg: #f0f7f6;
      --covered-bg: #d6eae8;
      --covered-acc: #4a7c78;
      --danger-bg: #fef2f2;
      --danger-text: #dc2626;
      --danger-border: #fca5a5;
      --shadow-xs: 0 1px 2px rgba(30, 27, 22, 0.05);
      --shadow-sm: 0 6px 18px rgba(49, 42, 32, 0.055);
      --shadow-md: 0 14px 38px rgba(49, 42, 32, 0.09);
      --shadow-lg: 0 24px 64px rgba(49, 42, 32, 0.13);
      --radius-sm: 6px;
      --radius-md: 16px;
      --radius-lg: 22px;
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --t: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
      --hub-theme-motion: 280ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ============================================================ NIGHT TOKENS */
    html[data-theme="night"] {
      --cream: #3a332b;
      --cream-warm: #463d33;
      --stone-light: #6d6052;
      --stone: #837568;
      --stone-dark: #b9aea1;
      --ink-faint: #746759;
      --ink-light: #d6cabc;
      --ink: #eee4d7;
      --ink-dark: #f3eadf;
      --white: #4c4237;
      --accent: #83b9b3;
      --accent-soft: #9fcec9;
      --accent-pale: #3d625e;
      --accent-dim: #344f4b;
      --accent-rgb: 131, 185, 179;
      --accent-soft-rgb: 159, 206, 201;
      --page-bg: var(--page-bg-night);
      --viewed-bg: #374f4b;
      --covered-bg: #416a64;
      --covered-acc: #a8d6d1;
      --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.18);
      --shadow-sm: 0 1px 4px rgba(0, 0, 0, 0.16);
      --shadow-md: 0 4px 18px rgba(0, 0, 0, 0.22);
      --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.30);
    }

    /* ============================================================
   THEME MOTION
   Bridge owns theme state. Compass owns how Compass surfaces interpolate.
   Source pattern matched to Atlas hub motion.
   ============================================================ */

    html.theme-changing,
    html.theme-changing body,
    html.theme-changing .hub-atmosphere-layer::after,
    html.theme-changing .spine,

    html.theme-changing .spine-btn,
    html.theme-changing .mobile-header,
    html.theme-changing .mobile-header-brand,
    html.theme-changing .mobile-header-mark,
    html.theme-changing .mobile-header-mark span,
    html.theme-changing .mobile-header-actions,
    html.theme-changing .mobile-header-btn,
    html.theme-changing .mobile-session-pill,
    html.theme-changing .mobile-session-pill span,
    html.theme-changing .drawer-header,
    html.theme-changing .drawer-footer,
    html.theme-changing .drawer-title,
    html.theme-changing .drawer-title span,
    html.theme-changing .drawer-close,
    html.theme-changing .drawer-nav-label,
    html.theme-changing .drawer-nav-item,
    html.theme-changing .drawer-nav-item .nav-soon,
    html.theme-changing .drawer-session-btn,
    html.theme-changing .drawer-session-btn span,
    html.theme-changing .drawer-appearance-btn,
    html.theme-changing .hub-intro,
    html.theme-changing .hub-eyebrow,
    html.theme-changing .hub-title,
    html.theme-changing .hub-desc,
    html.theme-changing .hub-meta-chip,
    html.theme-changing .zone-label,
    html.theme-changing .inprogress-empty,
    html.theme-changing .inprogress-empty strong,
    html.theme-changing .progress-card,
    html.theme-changing .progress-card-title,
    html.theme-changing .progress-card-hook,
    html.theme-changing .progress-card-meta,
    html.theme-changing .progress-rail,
    html.theme-changing .progress-rail-fill,
    html.theme-changing .status-badge,
    html.theme-changing .available-zone-header,
    html.theme-changing .browse-heading,
    html.theme-changing .browse-heading-title,
    html.theme-changing .browse-heading-copy,
    html.theme-changing .search-field,
    html.theme-changing .search-icon,

    html.theme-changing .search-hint,
    html.theme-changing .search-results-label,
    html.theme-changing .category-header,

    html.theme-changing .category-count,
    html.theme-changing .subject-card,

    html.theme-changing .subject-card-title,

    html.theme-changing .timestamp-chip,

    html.theme-changing .bridge-error,

    html.theme-changing .modal-panel,
    html.theme-changing .modal-header,
    html.theme-changing .modal-title,
    html.theme-changing .modal-close,
    html.theme-changing .modal-helper,
    html.theme-changing .modal-section-label,
    html.theme-changing .session-input,
    html.theme-changing .btn-primary,
    html.theme-changing .btn-ghost,
    html.theme-changing .confirm-panel,
    html.theme-changing .confirm-title,
    html.theme-changing .confirm-message,
    html.theme-changing .confirm-input,
    html.theme-changing .confirm-error,
    html.theme-changing .btn-danger,
    html.theme-changing .hub-toast {
      transition:
        background-color var(--hub-theme-motion),
        background var(--hub-theme-motion),
        color var(--hub-theme-motion),
        border-color var(--hub-theme-motion),
        box-shadow var(--hub-theme-motion),
        opacity var(--hub-theme-motion),
        fill var(--hub-theme-motion),
        stroke var(--hub-theme-motion);
    }

    html.theme-changing .hub-atmosphere-layer {
      transition:
        opacity var(--hub-theme-motion),
        filter var(--hub-theme-motion);
    }

    html.theme-changing .drawer {
      transition:
        transform 0.28s cubic-bezier(0.4, 0, 0.2, 1),
        background-color var(--hub-theme-motion),
        background var(--hub-theme-motion),
        color var(--hub-theme-motion),
        border-color var(--hub-theme-motion),
        box-shadow var(--hub-theme-motion),
        opacity var(--hub-theme-motion);
    }

    /* ============================================================ RESET */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      min-height: 100%;
      background: var(--cream);
      scroll-behavior: smooth;
      overflow-y: scroll;
      scrollbar-gutter: stable;
    }

    body {
      position: relative;
      isolation: isolate;
      font-family: var(--font-body);
      background: transparent;
      color: var(--ink);
      font-size: 15px;
      line-height: 1.65;
      min-height: 100svh;
      overflow-x: hidden;
      padding-top: 56px;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background-size: cover;
      background-position: center;
    }

    body::before {
      background: var(--page-bg-day);
      opacity: 1;
    }

    body::after {
      background: var(--page-bg-night);
      opacity: 0;
    }

    html[data-theme="night"] body::before {
      opacity: 0;
    }

    html[data-theme="night"] body::after {
      opacity: 1;
    }

    html.theme-changing body::before,
    html.theme-changing body::after {
      transition: opacity var(--hub-theme-motion);
    }

    .hub-atmosphere-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: blur(5px) saturate(0.76) contrast(0.94);
      transform: scale(1.02);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .hub-atmosphere-layer::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(247, 244, 238, 0.42), rgba(245, 241, 233, 0.72)),
        radial-gradient(circle at 22% 12%, transparent 0, rgba(245, 241, 233, 0.28) 58%);
    }

    .hub-atmosphere-layer.visible {
      opacity: 0.18;
    }

    html[data-theme="night"] .hub-atmosphere-layer.visible {
      opacity: 0.12;
      filter: blur(5px) saturate(0.72) brightness(0.72) contrast(0.94);
    }

    html[data-theme="night"] .hub-atmosphere-layer::after {
      background:
        linear-gradient(180deg, rgba(48, 42, 35, 0.48), rgba(58, 51, 43, 0.74)),
        radial-gradient(circle at 22% 12%, transparent 0, rgba(58, 51, 43, 0.24) 58%);
    }

    /* ============================================================ SPINE (desktop) */
    .spine {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      background: rgba(247, 244, 238, 0.86);
      backdrop-filter: blur(22px) saturate(1.12);
      border-bottom: 1px solid rgba(126, 112, 94, 0.14);
      display: flex;
      align-items: center;
      height: 56px;
      padding: 0 1.5rem;
      gap: 0.6rem;
    }

    html[data-theme="night"] .spine {
      background: rgba(50, 44, 37, 0.95);
      border-bottom-color: rgba(109, 96, 82, 0.55);
    }

    .spine-mark {
      font-family: var(--font-display);
      font-size: 1.22rem;
      font-weight: 400;
      color: var(--ink-dark);
      letter-spacing: -0.01em;
      flex: 1 1 0;
      cursor: default;
      user-select: none;
      white-space: nowrap;
      line-height: 1;
    }

    .spine-mark span {
      color: #18b98f;
    }

    /* Hub shortcuts */
    .spine-worlds {
      display: flex;
      align-items: center;
      gap: 0.18rem;
      flex: 0 0 auto;
      padding: 0.2rem;
      border-radius: 999px;
      background: rgba(238, 232, 222, 0.58);
      border: 1px solid rgba(173, 160, 143, 0.34);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.46);
    }

    .spine-worlds.is-loading {
      visibility: hidden;
    }

    .spine-world-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.42rem;
      min-height: 32px;
      padding: 0.32rem 0.82rem;
      border-radius: 999px;
      border: 1px solid transparent;
      background: transparent;
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--ink-light);
      cursor: pointer;
      transition: var(--t);
      white-space: nowrap;
    }

    .spine-world-icon {
      width: 13px;
      height: 13px;
      opacity: 0.72;
      flex-shrink: 0;
    }

    .spine-world-btn:hover {
      color: var(--accent);
      background: rgba(255, 255, 255, 0.72);
      border-color: rgba(var(--accent-rgb), 0.20);
      box-shadow: var(--shadow-xs);
    }

    .spine-world-btn:hover .spine-world-icon {
      opacity: 1;
    }

    .spine-world-btn.is-active {
      color: var(--accent);
      background: rgba(255, 255, 255, 0.86);
      border-color: rgba(var(--accent-rgb), 0.24);
      box-shadow: var(--shadow-xs);
      cursor: default;
    }

    .spine-world-btn.is-active .spine-world-icon {
      opacity: 1;
    }

    .spine-world-btn[aria-disabled="true"] {
      opacity: 0.5;
      cursor: default;
    }

    .spine-world-btn[aria-disabled="true"]:hover {
      color: var(--ink-light);
      background: transparent;
      border-color: transparent;
      box-shadow: none;
    }

    html[data-theme="night"] .spine-worlds {
      background: rgba(70, 61, 51, 0.72);
      border-color: rgba(255, 255, 255, 0.13);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.045);
    }

    html[data-theme="night"] .spine-world-btn:hover {
      background: rgba(88, 76, 64, 0.88);
      border-color: rgba(var(--accent-rgb), 0.34);
      color: var(--accent-soft);
    }

    html[data-theme="night"] .spine-world-btn.is-active {
      background: rgba(88, 76, 64, 0.94);
      border-color: rgba(var(--accent-rgb), 0.42);
      color: var(--accent-soft);
    }

    /* Header actions */
    .spine-actions {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex: 1 1 0;
      justify-content: flex-end;
    }

    .spine-session-pill {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.48rem 0.9rem;
      border-radius: 999px;
      border: 1px solid var(--stone-light);
      background: var(--white);
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--ink-light);
      cursor: pointer;
      transition: var(--t);
      max-width: 170px;
      white-space: nowrap;
      overflow: hidden;
      box-shadow: var(--shadow-xs);
    }

    .spine-session-pill:hover {
      border-color: var(--accent-soft);
      color: var(--ink);
      background: var(--accent-dim);
    }

    html[data-theme="night"] .spine-session-pill {
      background: rgba(76, 66, 55, 0.78);
      border-color: rgba(255, 255, 255, 0.15);
      color: var(--ink-light);
      box-shadow: none;
    }

    html[data-theme="night"] .spine-session-pill:hover {
      background: rgba(88, 76, 64, 0.90);
      border-color: rgba(var(--accent-rgb), 0.38);
      color: var(--accent-soft);
    }

    html[data-theme="night"] .mobile-session-pill {
      background: rgba(76, 66, 55, 0.78);
      border-color: rgba(255, 255, 255, 0.15);
      color: var(--ink-light);
    }

    .spine-session-pill .pill-name {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .spine-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 1px solid rgba(173, 160, 143, 0.32);
      background: rgba(255, 253, 249, 0.58);
      color: var(--ink-light);
      cursor: pointer;
      transition: var(--t);
      box-shadow: 0 4px 12px rgba(49, 42, 32, 0.04);
      flex-shrink: 0;
    }

    .spine-btn:hover {
      background: rgba(255, 255, 255, 0.86);
      border-color: rgba(var(--accent-rgb), 0.28);
      color: var(--accent);
    }

    html[data-theme="night"] .spine-btn {
      background: rgba(76, 66, 55, 0.78);
      border-color: rgba(255, 255, 255, 0.15);
    }

    html[data-theme="night"] .spine-btn:hover {
      background: rgba(88, 76, 64, 0.90);
      border-color: rgba(131, 185, 179, 0.38);
      color: var(--accent-soft);
    }

    /* ============================================================ MOBILE HEADER */
    .mobile-header {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      background: rgba(247, 244, 238, 0.88);
      backdrop-filter: blur(20px) saturate(1.1);
      border-bottom: 1px solid rgba(126, 112, 94, 0.14);
      height: 56px;
      padding: 0 1rem;
      align-items: center;
      gap: 0.5rem;
    }

    html[data-theme="night"] .mobile-header {
      background: rgba(50, 44, 37, 0.96);
      border-bottom-color: rgba(109, 96, 82, 0.55);
    }

    .mobile-header-brand {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      flex: 1;
      min-width: 0;
    }

    .mobile-header-mark {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--ink-dark);
      letter-spacing: -0.01em;
      line-height: 1;
    }

    .mobile-header-mark span {
      color: #18b98f;
    }

    .mobile-header-actions {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      flex-shrink: 0;
    }

    .mobile-header-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 1px solid var(--stone-light);
      background: var(--white);
      color: var(--ink-light);
      cursor: pointer;
      transition: var(--t);
      flex-shrink: 0;
    }

    .mobile-header-btn:hover {
      color: var(--ink);
      background: var(--stone-light);
    }

    html[data-theme="night"] .mobile-header-btn {
      background: rgba(76, 66, 55, 0.78);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .mobile-session-pill {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.25rem 0.7rem;
      border-radius: 20px;
      border: 1px solid var(--stone-light);
      background: var(--white);
      font-size: 0.76rem;
      font-weight: 500;
      color: var(--ink-light);
      cursor: pointer;
      max-width: 130px;
      height: 40px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .mobile-session-pill span {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ============================================================ MOBILE DRAWER */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 400;
      backdrop-filter: blur(4px);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition:
        opacity 0.2s ease,
        visibility 0s linear 0.2s;
    }

    .drawer-overlay.open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition:
        opacity 0.2s ease,
        visibility 0s;
    }

    .drawer {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: min(300px, 85vw);
      background: var(--white);
      z-index: 500;
      display: flex;
      flex-direction: column;
      box-shadow: 4px 0 24px rgba(20, 17, 12, 0.15);
      transform: translate3d(-100%, 0, 0);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
      backface-visibility: hidden;
    }

    .drawer.open {
      transform: translate3d(0, 0, 0);
    }

    .drawer-header {
      padding: 1.2rem 1.2rem 1rem;
      border-bottom: 1px solid var(--stone-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .drawer-title {
      font-family: var(--font-display);
      font-size: 1rem;
      color: var(--ink-dark);
    }

    .drawer-title span {
      color: #18b98f;
    }

    .drawer-close {
      width: 30px;
      height: 30px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--stone-light);
      background: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--ink-light);
    }

    .drawer-close:hover {
      background: var(--cream-warm);
    }

    .drawer-nav {
      flex: 1;
      padding: 0.8rem;
      overflow-y: auto;
    }

    .drawer-nav-label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-faint);
      padding: 0.6rem 0.75rem 0.35rem;
    }

    .drawer-nav-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.75rem 0.9rem;
      border-radius: var(--radius-md);
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--ink-light);
      cursor: pointer;
      transition: var(--t);
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      min-height: 44px;
    }

    .drawer-nav-item:hover {
      background: var(--stone-light);
      color: var(--ink);
    }

    .drawer-nav-item[aria-disabled="true"] {
      opacity: 0.5;
      cursor: default;
    }

    .drawer-nav-item[aria-disabled="true"]:hover {
      background: none;
      color: var(--ink-light);
    }

    .drawer-nav-item .nav-soon {
      margin-left: auto;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--stone-dark);
    }

    .drawer-nav-item.is-active {
      background: var(--accent-dim);
      color: var(--accent);
      cursor: default;
    }

    .drawer-nav-item.is-active:hover {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .drawer-footer {
      padding: 0.8rem;
      border-top: 1px solid var(--stone-light);
    }

    .drawer-footer-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 0.5rem;
    }

    .drawer-session-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 0.9rem;
      border-radius: var(--radius-md);
      border: 1px solid var(--stone-light);
      background: var(--cream-warm);
      font-size: 0.84rem;
      font-weight: 500;
      color: var(--ink-light);
      cursor: pointer;
      min-height: 44px;
      overflow: hidden;
    }

    .drawer-session-btn span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .drawer-appearance-btn {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-md);
      border: 1px solid var(--stone-light);
      background: var(--cream-warm);
      color: var(--ink-light);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    html[data-theme="night"] .drawer {
      background: #4c4237;
    }

    html[data-theme="night"] .drawer-header,
    html[data-theme="night"] .drawer-footer {
      background: #463d33;
      border-color: rgba(255, 255, 255, 0.13);
    }

    html[data-theme="night"] .drawer-session-btn,
    html[data-theme="night"] .drawer-appearance-btn {
      background: rgba(76, 66, 55, 0.78);
      border-color: rgba(255, 255, 255, 0.15);
      color: var(--ink-light);
    }

    /* ============================================================ MAIN LAYOUT */
    .hub-main {
      position: relative;
      z-index: 1;
      max-width: 1020px;
      margin: 0 auto;
      padding: 3.35rem 1.75rem 6rem;
    }

    /* ============================================================ HUB INTRO */
    .hub-intro {
      margin-bottom: 2.65rem;
      padding-bottom: 2.25rem;
      border-bottom: 1px solid rgba(var(--accent-rgb), 0.19);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    html[data-theme="night"] .hub-intro {
      border-bottom-color: rgba(var(--accent-rgb), 0.28);
    }

    .hub-eyebrow {
      font-size: 0.73rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: none;
      color: var(--accent);
      margin-bottom: 0.72rem;
    }

    .hub-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4.4vw, 2.75rem);
      color: var(--ink-dark);
      font-weight: 400;
      line-height: 1.08;
      letter-spacing: -0.02em;
      margin-bottom: 0.68rem;
    }

    .hub-desc {
      font-size: 0.94rem;
      color: var(--ink);
      opacity: 0.68;
      font-weight: 400;
      line-height: 1.7;
      max-width: 58ch;
    }

    .hub-meta {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .hub-meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.32rem 0.75rem;
      border-radius: 999px;
      border: 1px solid rgba(173, 160, 143, 0.28);
      background: rgba(255, 253, 249, 0.68);
      backdrop-filter: blur(10px);
      font-size: 0.76rem;
      font-weight: 500;
      color: var(--ink-light);
    }

    .hub-meta-chip.session {
      color: var(--accent);
      border-color: rgba(var(--accent-rgb), 0.25);
      background: var(--accent-dim);
    }

    .hub-meta-chip.count {
      color: var(--stone-dark);
    }

    /* ============================================================ IN PROGRESS ZONE */
    .zone-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.17em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .inprogress-zone {
      margin-bottom: 2.8rem;
    }

    .inprogress-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    .progress-card {
      display: flex;
      flex-direction: column;
      background: rgba(255, 253, 249, 0.86);
      border: 1px solid rgba(173, 160, 143, 0.32);
      border-radius: var(--radius-lg);
      padding: 1.45rem 1.5rem 1.55rem;
      box-shadow: 0 14px 40px rgba(49, 42, 32, 0.07), inset 0 1px 0 rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(14px) saturate(1.08);
      transition: var(--t);
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .progress-rail {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 2px;
      background: rgba(var(--accent-rgb), 0.08);
      overflow: hidden;
    }

    .progress-rail-fill {
      height: 100%;
      background: rgba(var(--accent-rgb), 0.5);
      border-radius: 0 2px 2px 0;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .progress-rail.is-complete .progress-rail-fill {
      background: var(--accent);
      border-radius: 0;
    }

    .progress-card:hover {
      border-color: rgba(var(--accent-rgb), 0.46);
      box-shadow: 0 18px 46px rgba(49, 42, 32, 0.11), inset 0 1px 0 rgba(255, 255, 255, 0.78);
      transform: translateY(-2px);
    }

    .progress-card:focus-visible {
      outline: 3px solid rgba(var(--accent-rgb), 0.34);
      outline-offset: 3px;
    }

    .progress-card-hook {
      font-size: 0.84rem;
      color: var(--ink-light);
      line-height: 1.5;
      margin-bottom: 1rem;
      display: -webkit-box;
      line-clamp: 1;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .progress-card-title {
      font-family: var(--font-display);
      font-size: 1.18rem;
      color: var(--ink-dark);
      line-height: 1.3;
      margin-bottom: 0.62rem;
    }

    .progress-card-meta {
      font-size: 0.74rem;
      color: var(--stone-dark);
      line-height: 1.4;
      min-width: 0;
    }

    .progress-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-top: auto;
    }

    .btn-launch-sm {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      min-width: 108px;
      min-height: 40px;
      padding: 0.48rem 1rem;
      border-radius: 999px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--t);
    }

    .btn-launch:hover,
    .btn-launch-sm:hover {
      background: #3f6763;
      color: #fff;
      border-color: #3f6763;
      box-shadow: 0 7px 18px rgba(var(--accent-rgb), 0.18);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.7rem;
      font-weight: 500;
      padding: 0.2rem 0.55rem;
      border-radius: 20px;
    }

    .status-badge.new {
      background: var(--cream-warm);
      color: var(--stone-dark);
    }

    .status-badge.inprogress {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .status-badge.explored {
      background: var(--covered-bg);
      color: var(--covered-acc);
    }

    html[data-theme="night"] .status-badge.explored {
      color: var(--accent-soft);
    }

    .inprogress-empty {
      background: var(--cream-warm);
      border: 1px dashed var(--stone);
      border-radius: var(--radius-md);
      padding: 1.5rem 1.75rem;
      font-size: 0.88rem;
      color: var(--stone-dark);
      line-height: 1.6;
    }

    .inprogress-empty strong {
      display: block;
      font-size: 0.9rem;
      color: var(--ink-light);
      margin-bottom: 0.25rem;
    }

    /* ============================================================ AVAILABLE NOW */
    .available-zone {
      margin-bottom: 3.25rem;
    }

    .available-zone-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.85rem;
    }

    .browse-heading {
      margin-bottom: 1.2rem;
    }

    .browse-heading-title {
      font-family: var(--font-display);
      font-size: 1.28rem;
      font-weight: 400;
      color: var(--ink-dark);
      margin-bottom: 0.18rem;
    }

    .browse-heading-copy {
      font-size: 0.78rem;
      color: var(--stone-dark);
    }

    /* ============================================================ SEARCH */
    .search-zone {
      margin-bottom: 2.8rem;
    }

    .search-field-wrap {
      position: relative;
      max-width: 620px;
    }

    html[data-theme="night"] .search-field {
      background: rgba(76, 66, 55, 0.78);
      border-color: rgba(255, 255, 255, 0.15);
      color: var(--ink);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.045) inset,
        0 10px 28px rgba(0, 0, 0, 0.18);
    }

    html[data-theme="night"] .search-field:focus {
      border-color: rgba(var(--accent-rgb), 0.52);
      box-shadow:
        0 0 0 4px rgba(var(--accent-rgb), 0.14),
        0 12px 30px rgba(0, 0, 0, 0.22);
    }

    .search-icon {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--stone-dark);
      pointer-events: none;
    }

    .search-field {
      width: 100%;
      min-height: 48px;
      padding: 0.78rem 2.7rem 0.78rem 2.7rem;
      border: 1px solid rgba(173, 160, 143, 0.34);
      border-radius: 18px;
      font-family: var(--font-body);
      font-size: 0.92rem;
      color: var(--ink);
      background: rgba(255, 253, 249, 0.76);
      outline: none;
      transition: border-color var(--t), box-shadow var(--t);
      box-shadow: 0 10px 28px rgba(49, 42, 32, 0.055), inset 0 1px 0 rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
    }

    .search-field::placeholder {
      color: var(--stone-dark);
    }

    .search-field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(var(--accent-rgb), 0.12), 0 12px 30px rgba(49, 42, 32, 0.07);
    }

    .search-clear {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: none;
      background: var(--stone-light);
      color: var(--ink-light);
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--t);
    }

    .search-clear.visible {
      display: flex;
    }

    .search-clear:hover {
      background: var(--stone);
      color: var(--ink);
    }

    .search-hint {
      margin-top: 0.55rem;
      font-size: 0.74rem;
      color: var(--stone-dark);
    }

    .search-results-label {
      display: none;
      margin-top: 0.75rem;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--ink-light);
    }

    .search-results-label.visible {
      display: block;
    }

    /* ============================================================ CATEGORY GROUPS */
    .category-group {
      margin-bottom: 3.4rem;
    }

    .category-header {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      margin-bottom: 1.15rem;
      padding-bottom: 0.72rem;
      border-bottom: 1px solid rgba(173, 160, 143, 0.28);
    }

    .category-title {
      font-family: var(--font-display);
      font-size: 1.18rem;
      color: var(--ink-dark);
      font-weight: 400;
    }

    .category-count {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--stone-dark);
      letter-spacing: 0.04em;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
    }

    /* ============================================================ SUBJECT CARDS */
    .subject-card {
      display: flex;
      flex-direction: column;
      background: rgba(255, 253, 249, 0.78);
      border: 1px solid rgba(173, 160, 143, 0.3);
      border-radius: 20px;
      padding: 1.4rem 1.45rem 1.3rem;
      box-shadow: 0 10px 28px rgba(49, 42, 32, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.64);
      backdrop-filter: blur(12px) saturate(1.06);
      cursor: pointer;
      transition: var(--t);
      position: relative;
      overflow: hidden;
      text-align: left;
      font-family: var(--font-body);
    }

    .subject-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent-soft));
      opacity: 0;
      transition: opacity var(--t);
    }

    .subject-card:hover {
      border-color: rgba(var(--accent-rgb), 0.44);
      box-shadow: 0 18px 42px rgba(49, 42, 32, 0.095), inset 0 1px 0 rgba(255, 255, 255, 0.72);
      transform: translateY(-2px);
    }

    .subject-card:hover::after {
      opacity: 1;
    }

    .subject-card:focus-visible {
      outline: 3px solid rgba(var(--accent-rgb), 0.34);
      outline-offset: 3px;
    }

    .subject-card.is-explored {
      opacity: 1;
      background: rgba(239, 247, 245, 0.78);
      border-color: rgba(var(--accent-rgb), 0.32);
    }

    .subject-card.is-explored::after {
      opacity: 0.6;
    }

    .subject-card.is-hidden {
      display: none;
    }

    .subject-card:not([role="button"]) {
      cursor: default;
      background: rgba(250, 247, 241, 0.58);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
    }

    .subject-card:not([role="button"]):hover {
      border-color: rgba(173, 160, 143, 0.3);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
      transform: none;
    }

    .subject-card:not([role="button"]):hover::after {
      opacity: 0;
    }

    .subject-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.7rem;
    }

    .subject-card-title {
      font-family: var(--font-display);
      font-size: 1.08rem;
      color: var(--ink-dark);
      line-height: 1.3;
      font-weight: 400;
      flex: 1;
    }

    .subject-card-hook {
      font-size: 0.83rem;
      color: var(--ink-light);
      line-height: 1.55;
      flex: 1;
      margin-bottom: 1.15rem;
      min-height: calc(0.81rem * 1.55 * 3);
      display: -webkit-box;
      line-clamp: 3;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .subject-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-top: auto;
    }

    .subject-card-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      min-width: 0;
    }

    .timestamp-chip {
      font-size: 0.7rem;
      color: var(--stone-dark);
      font-style: italic;
    }

    .btn-launch {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      min-width: 104px;
      min-height: 38px;
      padding: 0.44rem 0.95rem;
      border-radius: 999px;
      border: 1px solid rgba(var(--accent-rgb), 0.26);
      background: rgba(217, 233, 230, 0.72);
      color: var(--accent);
      font-family: var(--font-body);
      font-size: 0.76rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--t);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-launch.is-soon,
    .btn-launch.is-soon:hover {
      background: rgba(238, 232, 222, 0.64);
      border-color: rgba(173, 160, 143, 0.26);
      color: var(--stone-dark);
      cursor: default;
      box-shadow: none;
    }

    /* Night card states */
    html[data-theme="night"] .subject-card,
    html[data-theme="night"] .progress-card {
      background: rgba(76, 66, 55, 0.76);
      border-color: rgba(255, 255, 255, 0.12);
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    html[data-theme="night"] .subject-card:hover,
    html[data-theme="night"] .progress-card:hover {
      background: rgba(91, 78, 65, 0.82);
      border-color: rgba(var(--accent-rgb), 0.48);
    }

    html[data-theme="night"] .subject-card:not([role="button"]),
    html[data-theme="night"] .subject-card:not([role="button"]):hover {
      background: rgba(70, 61, 51, 0.58);
      border-color: rgba(255, 255, 255, 0.09);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.035);
    }

    html[data-theme="night"] .btn-launch,
    html[data-theme="night"] .btn-launch-sm {
      background: rgba(var(--accent-rgb), 0.22);
      border-color: rgba(var(--accent-rgb), 0.38);
      color: var(--accent-soft);
    }

    html[data-theme="night"] .btn-launch:hover,
    html[data-theme="night"] .btn-launch-sm:hover {
      background: rgba(var(--accent-rgb), 0.55);
      color: #fff;
    }

    html[data-theme="night"] .btn-launch-sm {
      background: var(--accent);
      border-color: var(--accent);
      color: #1f2d2b;
    }

    .spine-world-btn:focus-visible,
    .spine-session-pill:focus-visible,
    .spine-btn:focus-visible,
    .mobile-header-btn:focus-visible,
    .mobile-session-pill:focus-visible,
    .search-clear:focus-visible,
    .btn-launch:focus-visible,
    .btn-launch-sm:focus-visible {
      outline: 3px solid rgba(var(--accent-rgb), 0.36);
      outline-offset: 3px;
    }

    html[data-theme="night"] .hub-meta-chip {
      background: rgba(76, 66, 55, 0.78);
      border-color: rgba(255, 255, 255, 0.13);
    }

    html[data-theme="night"] .hub-meta-chip.session {
      background: rgba(var(--accent-rgb), 0.18);
      border-color: rgba(var(--accent-rgb), 0.28);
      color: var(--accent-soft);
    }

    /* ============================================================ NO RESULTS */
    .no-results-banner {
      display: none;
      text-align: center;
      padding: 3rem 1rem;
      color: var(--stone-dark);
    }

    .no-results-banner.visible {
      display: block;
    }

    .no-results-banner p {
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .no-results-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      color: var(--ink-light);
      margin-bottom: 0.4rem;
    }

    /* ============================================================ EMPTY STATE */
    .empty-library {
      text-align: center;
      padding: 4rem 1rem;
    }

    .empty-library-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--accent-pale);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;

    }

      color: var(--ink-dark);

    .bridge-error h2 {
      font-family: var(--font-display);
      font-size: 1.3rem;
      color: var(--ink-dark);
      font-weight: 400;
      margin-bottom: 0.5rem;
    }

    .bridge-error p {
      font-size: 0.88rem;
      color: var(--ink-light);
      line-height: 1.65;

    /* ============================================================ SETTINGS MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(20, 17, 12, 0.52);
      backdrop-filter: blur(6px);
      z-index: 600;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .modal-overlay.open {
      display: flex;
      animation: fadeIn 0.18s ease;
    }

    .modal-panel {
      background: var(--white);
      border-radius: var(--radius-lg);
      max-width: 420px;
      width: 100%;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.22s cubic-bezier(0.34, 1.25, 0.64, 1);

      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    html[data-theme="night"] .modal-panel {
      background: #4c4237;
      border: 1px solid rgba(255, 255, 255, 0.13);
    }

    .modal-header {
      padding: 1.3rem 1.5rem 1rem;
      border-bottom: 1px solid var(--stone-light);

      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;

      background: #463d33;
      border-bottom-color: rgba(255, 255, 255, 0.13);
    }

    .modal-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--ink-dark);
    }

    .modal-close {
      width: 30px;
      height: 30px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--stone-light);
      background: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--ink-light);

      background: var(--cream-warm);

    .modal-body {
      padding: 1.2rem 1.5rem 1.5rem;
      overflow-y: auto;
      flex: 1;

    .modal-helper {

      color: var(--stone-dark);

    .modal-section-label {

    .session-input {
      flex: 1;
      padding: 0.58rem 0.8rem;
      border: 1.5px solid var(--stone-light);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 0.86rem;
      color: var(--ink);
      background-color: var(--white);
      outline: none;
      transition: border-color var(--t);
      min-height: 42px;
    }

    .session-input:focus {
      border-color: var(--accent);
    }

    html[data-theme="night"] .session-input {
      background-color: rgba(58, 51, 43, 0.82);
      border-color: rgba(255, 255, 255, 0.16);
      color: var(--ink);
    }

    select.session-input {
      appearance: none;
      padding-right: 2.35rem;
      background-image: url("data:image/svg+xml,%3Csvg width='14' height='14' viewBox='0 0 14 14' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M3.5 5.25L7 8.75L10.5 5.25' stroke='%237a7268' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-size: 14px 14px;
      background-position: right 0.7rem center;
    }

    html[data-theme="night"] select.session-input {
      background-image: url("data:image/svg+xml,%3Csvg width='14' height='14' viewBox='0 0 14 14' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M3.5 5.25L7 8.75L10.5 5.25' stroke='%23d6cabc' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    }

    .btn-primary {
      padding: 0.58rem 1.05rem;
      border-radius: var(--radius-sm);
      border: none;
      background: var(--accent);
      color: #fff;
      font-family: var(--font-body);
      font-size: 0.84rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--t);
      white-space: nowrap;
      min-height: 42px;
    }

    .btn-primary:hover {
      background: var(--accent-soft);
    }

    .btn-ghost {
      padding: 0.58rem 0.95rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--stone-light);
      background: var(--cream-warm);
      font-family: var(--font-body);
      font-size: 0.84rem;
      font-weight: 500;
      color: var(--ink-light);
      cursor: pointer;
      transition: var(--t);
      min-height: 42px;
    }

    .btn-ghost:hover {
      border-color: var(--stone);
      color: var(--ink);
    }

    /* ============================================================ CONFIRM DIALOG */
    .confirm-dialog {
      position: fixed;
      inset: 0;
      z-index: 800;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: rgba(20, 17, 12, 0.50);
      backdrop-filter: blur(6px);
    }

    .confirm-dialog.open {
      display: flex;
      animation: fadeIn 0.15s ease;
    }

    .confirm-panel {
      background: var(--white);
      border-radius: var(--radius-md);
      max-width: 360px;
      width: 100%;
      padding: 1.4rem;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.2s cubic-bezier(0.34, 1.25, 0.64, 1);
    }

    html[data-theme="night"] .confirm-panel {
      background: #4c4237;
      border: 1px solid rgba(255, 255, 255, 0.13);
    }

    .confirm-title {
      font-size: 0.94rem;
      font-weight: 600;
      color: var(--ink-dark);
      margin-bottom: 0.45rem;
    }

    .confirm-message {
      font-size: 0.83rem;
      color: var(--ink-light);
      line-height: 1.55;
      margin-bottom: 1.1rem;
    }

    .confirm-input {
      width: 100%;
      padding: 0.58rem 0.8rem;
      border: 1.5px solid var(--stone-light);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 0.86rem;
      color: var(--ink);
      background: var(--white);
      outline: none;
      transition: var(--t);
      margin-bottom: 0.45rem;
      display: none;
      min-height: 42px;
    }

    .confirm-input.visible {
      display: block;
    }

    .confirm-input:focus {
      border-color: var(--accent);
    }

    .confirm-error {
      font-size: 0.76rem;
      color: var(--danger-text);
      margin-bottom: 0.75rem;
      display: none;
    }

    .confirm-error.visible {
      display: block;
    }

    .confirm-actions {
      display: flex;
      gap: 0.45rem;
      justify-content: flex-end;
    }

    .btn-danger {
      padding: 0.55rem 0.95rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--danger-border);
      background: var(--danger-bg);
      color: var(--danger-text);
      font-family: var(--font-body);
      font-size: 0.83rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--t);
      min-height: 40px;
    }

    .btn-danger:hover {
      background: #fee2e2;
    }

    /* ============================================================ TOAST */
    .hub-toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--white);
      border: 1px solid var(--stone);
      border-radius: var(--radius-md);
      padding: 0.65rem 1.15rem;
      font-size: 0.84rem;
      color: var(--ink-light);
      z-index: 900;
      box-shadow: var(--shadow-md);
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
      max-width: calc(100vw - 2rem);
    }

    .hub-toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ============================================================ UTILITIES */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ============================================================ RESPONSIVE */
    @media (max-width: 680px) {
      .spine {
        display: none !important;
      }

      .mobile-header {
        display: flex !important;
      }

      .hub-main {
        padding: 2.15rem 1rem 4.5rem;
      }

      .hub-intro {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
        margin-bottom: 2.25rem;
        padding-bottom: 1.8rem;
      }

      .hub-title {
        font-size: clamp(2rem, 10vw, 2.45rem);
      }

      .progress-card,
      .subject-card {
        padding: 1.3rem 1.25rem;
      }

      .category-grid {
        grid-template-columns: 1fr;
      }

      .inprogress-grid {
        grid-template-columns: 1fr;
      }

      .hub-meta {
        flex-direction: row;
      }
    }

    @media (min-width: 681px) {
      .mobile-header {
        display: none !important;
      }

      .drawer-overlay,
      .drawer {
        display: none !important;
      }
    }
  </style>
</head>

<body data-atlas-surface="hub">
  <div class="hub-atmosphere-layer" id="hub-atmosphere-layer" aria-hidden="true"></div>
  <!-- ============================================================ DESKTOP SPINE -->

    <div class="spine-actions">
      <button class="spine-session-pill" onclick="openSessionPanel(this)"

    /* ================================================================

    const COMPASS_CATEGORIES = [

    /* ================================================================
       REGISTRATION
       Compass world and subject items are registered idempotently on load.
       ================================================================ */

    function compassSubjectSlug(subject) {
      return String(subject.registryId || '')
        .replace(/^compass:/, '')
        .trim();
    }

    function getCompassSubjectLaunchUrl(subject) {
      const slug = compassSubjectSlug(subject);
      return slug ? './' + slug + '/index.html' : '';
    }

    function registerWithBridge() {
      if (!Bridge) return;

      try {
        Bridge.upsertWorld({
          registryId: 'compass',
          world: 'compass',
          type: 'world',
          title: 'Compass',
          description: 'Deep conversation subjects for thoughtful English, cultural reflection, and human communication.',
          status: 'available',
          launchUrl: new URL('./index.html', window.location.href).href
        });
      } catch (e) { }

      Object.values(COMPASS_CATALOG).forEach(subject => {
        try {
          const slug = compassSubjectSlug(subject);
          const isAvailable = COMPASS_AVAILABLE_SUBJECT_SLUGS.includes(slug);
          const relativeLaunchUrl = isAvailable ? getCompassSubjectLaunchUrl(subject) : '';
          const launchUrl = relativeLaunchUrl
            ? new URL(relativeLaunchUrl, window.location.href).href
            : '';

          Bridge.upsertItem({
            registryId: subject.registryId,
            world: 'compass',
            type: 'subject',
            title: subject.title,
            description: subject.hook || '',
            hook: subject.hook || '',
            categoryId: subject.categoryId || '',
            categoryTitle: getCategoryTitle(subject.categoryId),
            durationLabel: subject.durationLabel || '45–60 min',
            order: subject.order || 0,
            status: isAvailable ? 'available' : 'soon',
            launchUrl: launchUrl
          });
        } catch (e) { }
      });
    }

    /* ================================================================
       HELPERS
       ================================================================ */

    function escHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function formatRelativeTime(ts) {
      if (!ts) return '';

      const now = Date.now();
      const diff = now - ts;
      const days = Math.floor(diff / 86400000);

      if (days === 0) return 'used today';
      if (days === 1) return 'used yesterday';
      if (days < 7) return 'used ' + days + ' days ago';
      if (days < 14) return 'used last week';

      const weeks = Math.floor(days / 7);

      if (weeks < 5) {
        return 'used ' + weeks + ' weeks ago';
      }

      return 'used a while ago';
    }

    function resolveStatus(state) {
      if (!state || typeof state !== 'object') {
        return 'new';
      }

      const status = String(state.status || '').toLowerCase();
      const progress = state.progress || {};
      const raw = state.progressRaw || {};

      if (status === 'complete') {
        return 'explored';
      }

      const explored = Number(progress.explored) || 0;
      const exploredIds = Array.isArray(raw.exploredIds)
        ? raw.exploredIds.length
        : 0;

      if (explored > 0 || exploredIds > 0) {
        return 'inprogress';
      }

      return 'new';
    }

    function getCategoryTitle(categoryId) {
      const cat = COMPASS_CATEGORIES.find(c => c.id === categoryId);
      return cat ? cat.title : 'Compass';
    }

    function statusBadgeHtml(status) {
      const labels = { new: 'New', inprogress: 'In progress', explored: 'Explored' };
      return '<span class="status-badge ' + status + '">' + (labels[status] || status) + '</span>';
    }

    function subjectButtonLabel(status, available) {
      if (!available) return 'Soon';

      const labels = { new: 'Explore', inprogress: 'Continue', explored: 'Revisit' };
      return labels[status] || 'Explore';
    }

    function subjectProgressPercent(s) {
      if (!s) return null;
      if (s.status === 'explored') return 100;

      const p = s.state && s.state.progress ? s.state.progress : null;
      if (!p || typeof p !== 'object') return null;

      const total = Number(p.total) || 0;
      const explored = Number(p.explored) || 0;

      if (total <= 0 || explored <= 0) return null;

      const pct = Math.round((explored / total) * 100);
      return Math.max(0, Math.min(100, pct));
    }

       ================================================================ */

    function getActiveSession() {
      try { return Bridge.readActiveSession(); }
      catch (e) { return { id: 'default', name: 'Default' }; }
    }
    function getSessions() {
      try { return Bridge.readSessions() || []; }
      catch (e) { return []; }
    }
    function getRegistry() {
      try { return Bridge.readRegistry(); }
      catch (e) { return { worlds: {}, items: {}, sessionStates: {}, recentActivity: [] }; }
    }
    function isDefaultSession(s) {
      return s && s.id === (Bridge.defaultSessionId || 'default');
    }

    /* ================================================================
       CATALOG MERGE
       Returns a flat array of merged subject objects.
       Only subjects registered in the bridge with world=compass,
       type=subject, status=available are included.
       ================================================================ */

    function getMergedSubjects() {
      const reg = getRegistry();
      const session = getActiveSession();
      const sessionStates = ((reg.sessionStates || {})[session.id]) || {};
      const merged = [];

      Object.values(COMPASS_CATALOG).forEach(cat => {
        const slug = compassSubjectSlug(cat);
        const locallyAvailable = COMPASS_AVAILABLE_SUBJECT_SLUGS.includes(slug);
        const relativeLaunchUrl = locallyAvailable ? getCompassSubjectLaunchUrl(cat) : '';
        const launchUrl = relativeLaunchUrl
          ? new URL(relativeLaunchUrl, window.location.href).href
          : '';

        const item = (reg.items || {})[cat.registryId] || null;
        const state = sessionStates[cat.registryId] || null;

        const isAvailable = locallyAvailable && !!launchUrl;
        const status = isAvailable ? resolveStatus(state) : 'new';
        const ts = state ? (state.lastTouchedAt || state.lastOpenedAt || state.updatedAt || 0) : 0;

        merged.push({
          registryId: cat.registryId,
          title: cat.title,
          launchUrl: isAvailable ? launchUrl : '',
          categoryId: cat.categoryId,
          order: cat.order,
          durationLabel: cat.durationLabel || '45–60 min',
          hook: cat.hook || '',
          status: status,
          ts: ts,
          state: state,
          available: !!isAvailable,
          contentVersion: item ? item.contentVersion || null : null
        });
      });

      return merged;
    }

    function getInProgressSubjects(merged) {
      return merged
        .filter(s => s.status === 'inprogress')
        .sort((a, b) => b.ts - a.ts)
        .slice(0, 3);
    }

    function getAvailableSubjects(merged) {
      const preferredOrder = new Map(
        COMPASS_AVAILABLE_SUBJECT_SLUGS.map((slug, index) => [
          slug,
          index
        ])
      );

      return merged
        .filter(subject => subject.available)
        .sort((a, b) => {
          const aOrder = preferredOrder.get(
            compassSubjectSlug(a)
          );

          const bOrder = preferredOrder.get(
            compassSubjectSlug(b)
          );

          return (aOrder ?? 999) - (bOrder ?? 999);
        });
    }

      return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 17 17" fill="none"><path d="M14.5 10.2A7 7 0 0 1 6.8 2.5a7 7 0 1 0 7.7 7.7Z" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"/></svg>';

    function updateAppearanceButtons(mode) {
      const icon = mode === 'night' ? sunSvg(16) : moonSvg(16);
      const label = mode === 'night' ? 'Switch to day mode' : 'Switch to night mode';
      ['spine-appearance-btn', 'mobile-appearance-btn'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.innerHTML = icon; el.setAttribute('aria-label', label); }
      });
      const da = document.getElementById('drawer-appearance-btn');
      if (da) da.innerHTML = mode === 'night' ? sunSvg(16) : moonSvg(16);
    }

    function toggleAppearance() {
      const cur = Bridge.readAppearanceMode();
      const next = cur === 'night' ? 'light' : 'night';
      Bridge.setAppearanceMode(next);
    }

    /* ================================================================
    SETTINGS — Compass atmosphere image
    ================================================================ */

    function readCompassAtmosphereMode() {
      try {
        const mode = localStorage.getItem(COMPASS_ATMOSPHERE_MODE_KEY);
        if (mode === 'custom' || mode === 'none' || mode === 'default') return mode;

        return localStorage.getItem(COMPASS_ATMOSPHERE_KEY) ? 'custom' : 'default';
      } catch (e) {
        return 'default';
      }
    }

    function readCompassCustomAtmosphereImage() {
      try { return localStorage.getItem(COMPASS_ATMOSPHERE_KEY) || ''; }
      catch (e) { return ''; }
    }

    function getCompassAtmosphereImage() {
      const mode = readCompassAtmosphereMode();

      if (mode === 'none') return '';
      if (mode === 'custom') return readCompassCustomAtmosphereImage();

      return COMPASS_DEFAULT_ATMOSPHERE;
    }

    function writeCompassAtmosphereSettings(mode, url) {
      const cleanMode = (mode === 'custom' || mode === 'none' || mode === 'default') ? mode : 'default';
      const cleanUrl = (url || '').trim();

      try {
        localStorage.setItem(COMPASS_ATMOSPHERE_MODE_KEY, cleanMode);

        if (cleanUrl) localStorage.setItem(COMPASS_ATMOSPHERE_KEY, cleanUrl);
        else localStorage.removeItem(COMPASS_ATMOSPHERE_KEY);
      } catch (e) { }

      applyCompassAtmosphereImage();
    }

    function cssImageUrl(url) {
      return 'url("' + String(url || '').replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '")';
    }

    function applyCompassAtmosphereImage() {
      const layer = document.getElementById('hub-atmosphere-layer');
      if (!layer) return;

      const image = getCompassAtmosphereImage();

      if (!image) {
        layer.style.backgroundImage = '';
        layer.classList.remove('visible');
        return;
      }

      layer.style.backgroundImage = cssImageUrl(image);
      layer.classList.add('visible');
    }

    function handleCompassAtmosphereModeChange() {
      const mode = document.getElementById('compass-atmosphere-mode');
      const row = document.getElementById('compass-custom-atmosphere-row');

      if (!mode || !row) return;

      row.style.display = mode.value === 'custom' ? '' : 'none';
    }

    function openSettingsModal() {
      const mode = document.getElementById('compass-atmosphere-mode');
      const input = document.getElementById('compass-atmosphere-input');

      if (mode) mode.value = readCompassAtmosphereMode();
      if (input) input.value = readCompassCustomAtmosphereImage();

      handleCompassAtmosphereModeChange();

      document.getElementById('settings-modal').classList.add('open');
      document.body.style.overflow = 'hidden';

      setTimeout(() => {
        const currentMode = readCompassAtmosphereMode();
        const el = currentMode === 'custom'
          ? document.getElementById('compass-atmosphere-input')
          : document.getElementById('compass-atmosphere-mode');

        if (el) el.focus();
      }, 50);
    }

    function closeSettingsModal() {
      document.getElementById('settings-modal').classList.remove('open');
      document.body.style.overflow = '';
    }

    function handleSettingsModalClick(e) {
      if (e.target === document.getElementById('settings-modal')) closeSettingsModal();
    }

    function handleSaveSettings() {
      const modeEl = document.getElementById('compass-atmosphere-mode');
      const input = document.getElementById('compass-atmosphere-input');

      const mode = modeEl ? modeEl.value : 'default';
      const customUrl = input ? input.value.trim() : '';

      if (mode === 'custom' && !customUrl) {
        showToast('Add a custom image URL, or choose Default or No atmosphere.');
        if (input) input.focus();
        return;
      }

      writeCompassAtmosphereSettings(mode, customUrl);
      closeSettingsModal();

      const labels = {
        default: 'Compass atmosphere reset to default.',
        custom: 'Compass custom atmosphere saved.',
        none: 'Compass atmosphere removed.'
      };

      showToast(labels[mode] || 'Compass atmosphere saved.');
    }

    function handleRevertAtmosphere() {
      writeCompassAtmosphereSettings('default', '');
      closeSettingsModal();
      showToast('Compass atmosphere reset to default.');
    }


    /* ================================================================
       SESSION LABELS
       ================================================================ */

    function setSessionLabels() {
      const s = getActiveSession();
      const name = AtlasSessionPanel.getSessionDisplayName(s);
      ['spine-session-name', 'mobile-session-name', 'drawer-session-name'].forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.textContent = name;
          const trigger = el.closest('button');
          if (trigger) trigger.setAttribute('aria-label', 'Open session panel. Working with ' + name);
        }
      });

    /* ================================================================
       NAVIGATION
       Matches Atlas hub navigation, adapted only for Compass host IDs.
       ================================================================ */

    function navigateTo(url) {
      if (!url) {
        showToast('That destination is not available on this device yet.');
        return;
      }

      if (window.AtlasSearch && typeof AtlasSearch.navigateTo === 'function') {
        AtlasSearch.navigateTo(url);
        return;
      }

      window.location.href = url;
    }

    function resolveWorld(reg, worldId) {
      const worlds = reg.worlds || {};
      if (worlds[worldId]) return worlds[worldId];

      return Object.values(worlds).find(w =>
        w && (w.registryId === worldId || w.id === worldId || w.world === worldId)
      ) || null;
    }

    function worldHasItems(reg, worldId) {
      const prefix = worldId + ':';
      return Object.keys(reg.items || {}).some(k => k.indexOf(prefix) === 0);
    }

    function getWorldLaunchUrl(reg, worldId) {
      if (worldId === ARCADE_ID) return '../arcade/index.html';

      const w = resolveWorld(reg, worldId);
      return (w && w.launchUrl) ? w.launchUrl : null;
    }

    function isWorldAvailable(reg, worldId) {
      return !!getWorldLaunchUrl(reg, worldId);
    }

    function openWorld(worldId) {
      const reg = getRegistry();
      const url = getWorldLaunchUrl(reg, worldId);

      if (url) {
        navigateTo(url);
        return;
      }

      if (worldId === COMPASS_ID && worldHasItems(reg, COMPASS_ID)) {
        showToast('Compass is registered, but its hub is not linked on this device yet.');
        return;
      }

      showToast('This world is coming soon.');
    }

    function isHubAvailable(hub, reg) {
      if (!hub) return false;
      if (hub.alwaysAvailable) return true;

      if (hub.worldId === COMPASS_ID) {
        return isWorldAvailable(reg, COMPASS_ID) || worldHasItems(reg, COMPASS_ID);
      }

      if (hub.worldId === ARCADE_ID) {
        return isWorldAvailable(reg, ARCADE_ID);
      }

      return false;
    }

    function openHub(hubId) {
      const hub = HUB_NAV[hubId];
      if (!hub) return;

      if (hub.id === ACTIVE_HUB_ID) {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }

      if (hub.worldId) {
        openWorld(hub.worldId);
        return;
      }

      if (hub.launchUrl) {
        navigateTo(hub.launchUrl);
        return;
      }

      showToast('That destination is not available yet.');
    }

    function renderSpineHubNav() {
      const reg = getRegistry();
      const host = document.getElementById('spine-hub-nav');
      if (!host) return;

      host.innerHTML = Object.values(HUB_NAV).map(hub => {
        const active = hub.id === ACTIVE_HUB_ID;
        const available = isHubAvailable(hub, reg);
        const disabledAttr = available ? '' : ' aria-disabled="true"';
        const activeClass = active ? ' is-active' : '';
        const onclick = available ? ' onclick="openHub(\'' + hub.id + '\')"' : '';
        const title = active
          ? hub.name
          : available
            ? 'Open ' + hub.name
            : hub.name + ' — coming soon';

        return '<button class="spine-world-btn' + activeClass + '"' +
          disabledAttr +
          onclick +
          (active ? ' aria-current="page"' : '') +
          ' title="' + escHtml(title) + '">' +
          hub.smallIcon +
          '<span>' + escHtml(hub.name) + '</span>' +
          '</button>';
      }).join('');

      host.classList.remove('is-loading');
    }

    function renderDrawerHubNav() {
      const reg = getRegistry();
      const host = document.getElementById('drawer-hub-nav');
      if (!host) return;

      host.innerHTML = Object.values(HUB_NAV).map(hub => {
        const active = hub.id === ACTIVE_HUB_ID;
        const available = isHubAvailable(hub, reg);
        const disabledAttr = available ? '' : ' aria-disabled="true"';
        const activeClass = active ? ' is-active' : '';
        const onclick = available ? ' onclick="closeDrawer();openHub(\'' + hub.id + '\')"' : '';

        return '<button class="drawer-nav-item' + activeClass + '"' +
          disabledAttr +
          onclick +
          (active ? ' aria-current="page"' : '') +
          '>' +
          hub.smallIcon +
          escHtml(hub.name) +
          (available ? '' : '<span class="nav-soon">Soon</span>') +
          '</button>';
      }).join('');
    }

    let toastTimer = null;
    function showToast(text) {
      let el = document.getElementById('hub-toast');
      if (!el) {
        el = document.createElement('div');
        el.id = 'hub-toast';
        el.className = 'hub-toast';
        el.setAttribute('role', 'status');
        document.body.appendChild(el);
      }
      el.textContent = text;
      requestAnimationFrame(() => el.classList.add('visible'));
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('visible'), 3200);
    }

    /* ================================================================
       SEARCH
       ================================================================ */

    let currentQuery = '';

    function focusSearch() {
      const field = document.getElementById('search-field');
      if (field) { field.focus(); field.select(); }
    }

    function handleSearchInput(val) {
      currentQuery = (val || '').trim().toLowerCase();
      const clearBtn = document.getElementById('search-clear');
      if (clearBtn) clearBtn.classList.toggle('visible', currentQuery.length > 0);
      applySearchFilter();
    }

    function clearSearch() {
      const field = document.getElementById('search-field');
      if (field) field.value = '';
      handleSearchInput('');
      field && field.focus();
    }

    function applySearchFilter() {
      const q = currentQuery;
      const groups = document.querySelectorAll('.category-group');
      const inProgressZone = document.getElementById('inprogress-zone');
      const availableZone = document.getElementById('available-zone');

      if (inProgressZone) {
        inProgressZone.style.display = q ? 'none' : '';
      }

      if (availableZone) {
        availableZone.style.display = q ? 'none' : '';
      }

      let totalVisible = 0;

      groups.forEach(group => {
        const cards = group.querySelectorAll('.subject-card');
        let groupVisible = 0;
        cards.forEach(card => {
          const title = (card.dataset.title || '').toLowerCase();
          const hook = (card.dataset.hook || '').toLowerCase();
          const cat = (card.dataset.cat || '').toLowerCase();
          const matches = !q || title.includes(q) || hook.includes(q) || cat.includes(q);
          card.classList.toggle('is-hidden', !matches);
          if (matches) groupVisible++;
        });
        group.style.display = groupVisible > 0 ? '' : 'none';
        totalVisible += groupVisible;
      });

      const noBanner = document.getElementById('no-results-banner');
      if (noBanner) noBanner.classList.toggle('visible', q.length > 0 && totalVisible === 0);

      const resultsLabel = document.getElementById('search-results-label');
      if (resultsLabel) {
        if (q) {
          resultsLabel.textContent = totalVisible + ' subject' + (totalVisible !== 1 ? 's' : '') + ' match' + (totalVisible === 1 ? 'es' : '') + ' \u201c' + q + '\u201d';
          resultsLabel.classList.add('visible');
        } else {
          resultsLabel.classList.remove('visible');
        }
      }
    }

    function handleSearchKeydown(e) {
      if (e.key === 'Enter') {
        const first = Array.from(
          document.querySelectorAll(
            '.category-group .subject-card:not(.is-hidden)'
          )
        ).find(card => card.dataset.url);

        if (first) {
          navigateTo(first.dataset.url);
        }
      }
    }

    /* ================================================================
       RENDER
       ================================================================ */

    function renderHub() {
      if (!Bridge) return;

      registerWithBridge();

      const main = document.getElementById('hub-main');
      const session = getActiveSession();
      const merged = getMergedSubjects();
      const inProgress = getInProgressSubjects(merged);
      const availableNow = getAvailableSubjects(merged);

      applyCompassAtmosphereImage();

      setSessionLabels();
      renderSpineHubNav();
      renderDrawerHubNav();

      // No registered subjects yet
      if (merged.length === 0) {
        main.innerHTML = renderIntro(session, 0) + renderEmptyLibrary();
        bindSearch();
        return;
      }

      main.innerHTML =
        renderIntro(session, availableNow.length) +
        renderInProgressZone(inProgress) +
        renderAvailableNowZone(availableNow) +
        renderBrowseHeading() +
        renderSearchZone() +
        renderNoResultsBanner() +
        renderCategoryGroups(merged);

      bindSearch();
      applySearchFilter();
    }

    function renderIntro(session, count) {
      const isDefault = isDefaultSession(session);
      const eyebrow = isDefault ? 'Compass' : 'Welcome, ' + escHtml(session.name);
      const countText = count > 0
        ? count + ' available path' + (count !== 1 ? 's' : '')
        : 'No subjects registered yet';

      return (
        '<div class="hub-intro">' +
        '<div class="hub-intro-text">' +
        '<div class="hub-eyebrow">' + eyebrow + '</div>' +
        '<h1 class="hub-title">Choose a subject</h1>' +
        '<p class="hub-desc">Open a conversation path, continue something already started, or search for the direction that fits today’s lesson.</p>' +
        '</div>' +
        '<div class="hub-meta">' +
        '<div class="hub-meta-chip count">' + escHtml(countText) + '</div>' +
        '</div>' +
        '</div>'
      );
    }

    function renderInProgressZone(inProgress) {
      if (!inProgress.length) {
        return '';
      }

      const cards = inProgress.map(subject => {
        const timestamp = subject.ts
          ? formatRelativeTime(subject.ts)
          : '';

        const meta = getCategoryTitle(subject.categoryId) +
          (timestamp ? ' · ' + timestamp : '');

        const percent = subjectProgressPercent(subject);

        const rail = percent !== null
          ? '<div class="progress-rail" aria-hidden="true">' +
          '<div class="progress-rail-fill" style="width:' + percent + '%"></div>' +
          '</div>'
          : '';

        return (
          '<div class="progress-card" role="button" tabindex="0" ' +
          'onclick="navigateTo(\'' + escHtml(subject.launchUrl) + '\')" ' +
          'onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();navigateTo(\'' + escHtml(subject.launchUrl) + '\')}" ' +
          'aria-label="Continue ' + escHtml(subject.title) + '">' +

          '<div class="progress-card-title">' +
          escHtml(subject.title) +
          '</div>' +

          (subject.hook
            ? '<p class="progress-card-hook">' +
            escHtml(subject.hook) +
            '</p>'
            : '') +

          '<div class="progress-card-footer">' +
          '<div class="progress-card-meta">' +
          escHtml(meta) +
          '</div>' +

          '<button class="btn-launch-sm" ' +
          'onclick="event.stopPropagation();navigateTo(\'' +
          escHtml(subject.launchUrl) +
          '\')" ' +
          'aria-label="Continue ' +
          escHtml(subject.title) +
          '">' +

          'Continue' +

          '<svg width="11" height="11" viewBox="0 0 11 11" fill="none" aria-hidden="true">' +
          '<path d="M2 5.5h7M6 2.5l3 3-3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>' +
          '</svg>' +

          '</button>' +
          '</div>' +
          rail +
          '</div>'

      return (
        '<section class="inprogress-zone" id="inprogress-zone">' +
        '<div class="zone-label">In progress</div>' +
        '<div class="inprogress-grid">' +

        '</div>' +
        '</section>'

      const cards = subjects

      return (

        '<div class="available-zone-header">' +
        '<div class="zone-label" style="margin-bottom:0">Available now</div>' +

    function renderSearchZone() {
      return (

        '</span>' +
        '<input class="search-field" id="search-field" type="text" ' +

        '<svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M1 1l7 7M8 1L1 8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>' +
        '</button>' +
        '</div>' +
