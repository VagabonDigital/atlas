    function renderNoResultsBanner() {
      return (
        '<div class="no-results-banner" id="no-results-banner">' +
        '<p class="no-results-title">No subjects match that search.</p>' +
        '<p>Try a different word, or browse the categories below.</p>' +
        '</div>'
      );
    }

    function renderCategoryGroups(merged) {
      // Build category map
      const catMap = {};
      COMPASS_CATEGORIES.forEach(c => { catMap[c.id] = c; });

      // Group merged subjects by categoryId
      const groups = {}; // categoryId -> subjects[]
      const uncategorized = [];

      merged.forEach(s => {
        if (s.categoryId === '__uncategorized__' || !catMap[s.categoryId]) {
          uncategorized.push(s);
        } else {
          if (!groups[s.categoryId]) groups[s.categoryId] = [];
          groups[s.categoryId].push(s);
        }
      });

      // Sort subjects within each group
      Object.values(groups).forEach(arr => arr.sort((a, b) => a.order - b.order));
      if (uncategorized.length) uncategorized.sort((a, b) => a.title.localeCompare(b.title));

      // Render in category order
      let html = '<div class="categories-zone">';

      COMPASS_CATEGORIES
        .slice()
        .sort((a, b) => a.order - b.order)
        .forEach(cat => {
          const subjects = groups[cat.id];
          if (!subjects || subjects.length === 0) return;
          html += renderCategoryGroup(cat.title, subjects);
        });

      if (uncategorized.length) {
        html += renderCategoryGroup('Uncategorized', uncategorized);
      }

      html += '</div>';
      return html;
    }

    function renderCategoryGroup(title, subjects) {
      const cards = subjects.map(s => renderSubjectCard(s)).join('');
      return (
        '<div class="category-group">' +
        '<div class="category-header">' +
        '<h2 class="category-title">' + escHtml(title) + '</h2>' +
        '<span class="category-count">' + subjects.length + ' subject' + (subjects.length !== 1 ? 's' : '') + '</span>' +
        '</div>' +
        '<div class="category-grid">' + cards + '</div>' +
        '</div>'
      );
    }

    function renderSubjectCard(s) {
      const ts =
        s.status !== 'new' && s.ts
          ? formatRelativeTime(s.ts)
          : '';
      const isExplored = s.status === 'explored';
      const isAvailable = !!s.available;

      // data attributes for search filtering
      const catEntry = COMPASS_CATALOG[s.registryId];
      const catTitle = catEntry
        ? (
          COMPASS_CATEGORIES.find(
            category => category.id === catEntry.categoryId
          ) || {}
        ).title || ''
        : '';

      const cardClass = 'subject-card' + (isExplored ? ' is-explored' : '');

      const cardActionAttrs = isAvailable
        ? 'role="button" tabindex="0" ' +
        'onclick="navigateTo(\'' + escHtml(s.launchUrl) + '\')" ' +
        'onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();navigateTo(\'' + escHtml(s.launchUrl) + '\')}"'
        : '';

      const buttonHtml = isAvailable
        ? '<button class="btn-launch" onclick="event.stopPropagation();navigateTo(\'' + escHtml(s.launchUrl) + '\')" ' +
        'aria-label="Launch ' + escHtml(s.title) + '">' +
        escHtml(subjectButtonLabel(s.status, isAvailable)) +
        '<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M2 5.5h7M6 2.5l3 3-3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
        '</button>'
        : '<button class="btn-launch is-soon" disabled aria-label="' + escHtml(s.title) + ' is coming soon">Soon</button>';

      return (
        '<div class="' + cardClass + '" ' +
        cardActionAttrs + ' ' +
        'data-title="' + escHtml(s.title.toLowerCase()) + '" ' +
        'data-hook="' + escHtml((s.hook || '').toLowerCase()) + '" ' +
        'data-cat="' + escHtml(catTitle.toLowerCase()) + '" ' +
        'data-url="' + escHtml(isAvailable ? s.launchUrl : '') + '" ' +
        'aria-label="' + escHtml(s.title) + (isAvailable ? (isExplored ? ' — Explored' : '') : ' — Coming soon') + '">' +
        '<div class="subject-card-header">' +
        '<h3 class="subject-card-title">' + escHtml(s.title) + '</h3>' +
        (s.status !== 'new' ? statusBadgeHtml(s.status) : '') +
        '</div>' +
        (s.hook ? '<p class="subject-card-hook">' + escHtml(s.hook) + '</p>' : '') +
        '<div class="subject-card-footer">' +
        '<div class="subject-card-meta">' +

        (ts
          ? '<span class="timestamp-chip">' +
          escHtml(ts) +
          '</span>'
          : '') +

        '</div>' +
        buttonHtml +
        '</div>' +
        '</div>'
      );
    }

    function renderEmptyLibrary() {
      return (

        '<div class="empty-library-icon">' +
        '<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M12 4v3M12 17v3M4 12h3M17 12h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>' +
        '</div>' +
        '<h2>No subjects registered yet</h2>' +

        '</div>'

    /* ================================================================
       SESSION MODAL
       ================================================================ */

    function openSessionPanel(trigger = document.activeElement) {
      if (window.AtlasSessionPanel) AtlasSessionPanel.open(trigger);
    }

    async function handleRenameSession(session) {
      const id = session.id;
      const sessions = getSessions();
      const s = sessions.find(x => x.id === id);
      if (!s) return;
      const newName = await showConfirm({
        title: 'Rename session',
        message: 'Give this session a new name.',
        okLabel: 'Rename', okClass: 'btn-primary',
        inputMode: true, inputValue: s.name
      });
      if (!newName || newName === s.name) return;
      const renamed = Bridge.renameSession(id, newName);
      if (!renamed) {
        showToast('That name is already in use.');
        return;
      }
      renderHub();
    }

    async function handleDeleteSession(session) {
      const id = session.id;
      const sessions = getSessions();
      const s = sessions.find(x => x.id === id);

      if (!s) return;

      const ok = await showConfirm({
        title: 'Delete session?',
        message: 'This permanently removes ' + s.name + ', their progress, and their saved language from this device.',
        okLabel: 'Delete session'
      });

      if (!ok) return;

      const ledger = Bridge.readLedger();
      let ledgerChanged = false;

      Object.keys(ledger.entries || {}).forEach(entryId => {
        const entry = ledger.entries[entryId];

        if (entry && entry.sessionId === id) {
          delete ledger.entries[entryId];
          ledgerChanged = true;
        }
      });

      if (ledgerChanged) {
        Bridge.writeLedger(ledger);
      }

      const reg = getRegistry();

      if (reg.sessionStates) {
        delete reg.sessionStates[id];
      }

      reg.recentActivity = (reg.recentActivity || []).filter(item =>
        item && item.sessionId !== id
      );

      Bridge.writeRegistry(reg);

      Bridge.deleteSession(id);

      renderHub();
    }

    /* ================================================================
       CONFIRM DIALOG
       ================================================================ */

    let confirmResolver = null;
    function showConfirm(opts) {
      opts = opts || {};
      return new Promise(resolve => {
        confirmResolver = resolve;
        document.getElementById('confirm-title').textContent = opts.title || '';
        document.getElementById('confirm-message').textContent = opts.message || '';
        const okBtn = document.getElementById('confirm-ok-btn');
        okBtn.textContent = opts.okLabel || 'OK';
        okBtn.className = opts.okClass || 'btn-danger';
        const inp = document.getElementById('confirm-input');
        inp.className = 'confirm-input' + (opts.inputMode ? ' visible' : '');
        inp.value = opts.inputValue || '';
        document.getElementById('confirm-error').className = 'confirm-error';
        document.getElementById('confirm-dialog').classList.add('open');
        if (opts.inputMode) setTimeout(() => { inp.focus(); inp.select(); }, 50);
      });
    }
    function resolveConfirm(ok) {
      const inp = document.getElementById('confirm-input');
      const isInput = inp.classList.contains('visible');
      if (!ok) {
        document.getElementById('confirm-dialog').classList.remove('open');
        if (confirmResolver) { confirmResolver(isInput ? null : false); confirmResolver = null; }
        return;
      }
      const value = isInput ? inp.value.trim() : true;
      document.getElementById('confirm-dialog').classList.remove('open');
      if (confirmResolver) { confirmResolver(value); confirmResolver = null; }
    }
    document.getElementById('confirm-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') resolveConfirm(true);
      if (e.key === 'Escape') {
        e.stopPropagation();
        resolveConfirm(false);
      }
    });

    /* ================================================================
       GLOBAL KEYS
       ================================================================ */

    document.addEventListener('keydown', e => {
      if (e.defaultPrevented) return;

      const active = document.activeElement;
      const inInput = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.isContentEditable);

      if (e.key === '/' && !inInput) {
        e.preventDefault();
        focusSearch();
        return;
      }

      if (e.key === 'Escape') {
        if (document.getElementById('confirm-dialog').classList.contains('open')) {
          e.stopImmediatePropagation();
          resolveConfirm(false);
          return;
        }
        if (window.AtlasSessionPanel && AtlasSessionPanel.isOpen()) return;
        if (document.getElementById('settings-modal').classList.contains('open')) { closeSettingsModal(); return; }
        if (document.getElementById('drawer').classList.contains('open')) { closeDrawer(); return; }
        if (currentQuery) { clearSearch(); return; }
      }
    });

    /* ================================================================
       LIVE REFRESH
       ================================================================ */

    function refresh() {
      if (!Bridge) return;
      const mode = Bridge.applyAppearanceMode(Bridge.readAppearanceMode());
      updateAppearanceButtons(mode);
      renderHub();
    }

    window.addEventListener('atlas:session-change', refresh);
    window.addEventListener('atlas:appearance-change', e => {
      const mode = (e.detail && e.detail.mode) || Bridge.readAppearanceMode();
      updateAppearanceButtons(mode);
    });
    window.addEventListener('focus', refresh);
    window.addEventListener('pageshow', refresh);
    document.addEventListener('visibilitychange', () => { if (!document.hidden) refresh(); });
    window.addEventListener('storage', e => {
      if (!e || !e.key) return;
      const k = e.key;
      if (k === Bridge.keys.appearance || k === Bridge.keys.appearanceBySession) {
        const mode = Bridge.applyAppearanceMode(Bridge.readAppearanceMode());
        updateAppearanceButtons(mode);
        return;
      }

      if (
        k === COMPASS_ATMOSPHERE_KEY ||
        k === COMPASS_ATMOSPHERE_MODE_KEY
      ) {
        applyCompassAtmosphereImage();
        return;
      }

      if (k === 'atlas::sessions' || k === 'atlas::activeSessionId' || k === 'atlas::registry' || k === 'learning::ledger') {
        refresh();
      }
    });

    /* ================================================================
       INIT
       ================================================================ */

    function init() {
      if (!Bridge) return;

      const mode = Bridge.readAppearanceMode();
      Bridge.applyAppearanceMode(mode);
      updateAppearanceButtons(mode);
      applyCompassAtmosphereImage();

      setSessionLabels();
      renderSpineHubNav();
      renderDrawerHubNav();

      if (window.AtlasSearch && typeof AtlasSearch.init === 'function') {
        AtlasSearch.init({
          activeHubId: 'compass',
          atlasUrl: '../index.html',
          compassUrl: './index.html',
          arcadeUrl: '../arcade/index.html'
        });
      }

      AtlasSessionPanel.mount({
        root: '#atlas-session-panel-root',
        initialView: 'manage',
        onRenameSession: handleRenameSession,
        onDeleteSession: handleDeleteSession
      });

      renderHub();
    }

    init();
  </script>
</body>

</html>
