    /* ================================================================
       REGISTRATION
       Compass world and subject items are registered idempotently on load.
       ================================================================ */

    function compassSubjectSlug(subject) {
      return String(subject.registryId || '')
        .replace(/^compass:/, '')
        .trim();
    }

    function getCompassSubjectLaunchUrl(subject) {
      const slug = compassSubjectSlug(subject);
      return slug ? './subjects/' + slug + '.html' : '';
    }

    function registerWithBridge() {
      if (!Bridge) return;

      try {
        Bridge.upsertWorld({
          registryId: 'compass',
          world: 'compass',
          type: 'world',
          title: 'Compass',
          description: 'Deep conversation subjects for thoughtful English, cultural reflection, and human communication.',
          status: 'available',
          launchUrl: new URL('./index.html', window.location.href).href
        });
      } catch (e) { }

      Object.values(COMPASS_CATALOG).forEach(subject => {
        try {
          const launchUrl = getCompassSubjectLaunchUrl(subject);
          if (!launchUrl) return;

          Bridge.upsertItem({
            registryId: subject.registryId,
            world: 'compass',
            type: 'subject',
            title: subject.title,
            description: subject.hook || '',
            hook: subject.hook || '',
            categoryId: subject.categoryId || '',
            categoryTitle: getCategoryTitle(subject.categoryId),
            durationLabel: subject.durationLabel || '45–60 min',
            order: subject.order || 0,
            status: 'available',
            launchUrl: new URL(launchUrl, window.location.href).href
          });
        } catch (e) { }
      });
    }

    /* ================================================================
       HELPERS
       ================================================================ */

    function escHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function formatRelativeTime(ts) {
      if (!ts) return '';
      const now = Date.now();
      const diff = now - ts;
      const days = Math.floor(diff / 86400000);
      if (days === 0) return 'opened today';
      if (days === 1) return 'opened yesterday';
      if (days < 7) return 'opened ' + days + ' days ago';
      if (days < 14) return 'opened last week';
      const weeks = Math.floor(days / 7);
      if (weeks < 5) return 'opened ' + weeks + ' weeks ago';
      return 'opened a while ago';
    }

    function resolveStatus(state) {
      if (!state || state.status === 'not-started') return 'new';
      const s = (state.status || '').toLowerCase();
      if (s === 'completed' || s === 'complete' || s === 'explored' || state.lessonCompletedAt) return 'explored';
      if (
        s === 'in-progress' || s === 'in_progress' || s === 'started' ||
        (state.progress && (
          (Number(state.progress.viewed) > 0) ||
          (Number(state.progress.covered) > 0)
        ))
      ) return 'inprogress';
      if (state.lastTouchedAt || state.lastOpenedAt || state.updatedAt) return 'inprogress';
      return 'new';
    }

    function getCategoryTitle(categoryId) {
      const cat = COMPASS_CATEGORIES.find(c => c.id === categoryId);
      return cat ? cat.title : 'Compass';
    }

    function statusBadgeHtml(status) {
      const labels = { new: 'New', inprogress: 'In progress', explored: 'Explored' };
      return '<span class="status-badge ' + status + '">' + (labels[status] || status) + '</span>';
    }

    function subjectButtonLabel(status) {
      const labels = { new: 'Explore', inprogress: 'Continue', explored: 'Revisit' };
      return labels[status] || 'Explore';
    }

    function subjectProgressPercent(s) {
      if (!s) return null;
      if (s.status === 'explored') return 100;

      const p = s.state && s.state.progress ? s.state.progress : null;
      if (!p || typeof p !== 'object') return null;

      const total = Number(p.total) || 0;
      const covered = Number(p.covered) || 0;

      if (total <= 0 || covered <= 0) return null;

      const pct = Math.round((covered / total) * 100);
      return Math.max(0, Math.min(100, pct));
    }

    /* ================================================================
       SAFE BRIDGE READS
       ================================================================ */

    function getActiveSession() {
      try { return Bridge.readActiveSession(); }
      catch (e) { return { id: 'default', name: 'Default' }; }
    }
    function getSessions() {
      try { return Bridge.readSessions() || []; }
      catch (e) { return []; }
    }
    function getRegistry() {
      try { return Bridge.readRegistry(); }
      catch (e) { return { worlds: {}, items: {}, sessionStates: {}, recentActivity: [] }; }
    }
    function isDefaultSession(s) {
      return s && s.id === (Bridge.defaultSessionId || 'default');
    }

    /* ================================================================
       CATALOG MERGE
       Returns a flat array of merged subject objects.
       Only subjects registered in the bridge with world=compass,
       type=subject, status=available are included.
       ================================================================ */

    function getMergedSubjects() {
      const reg = getRegistry();
      const session = getActiveSession();
      const sessionStates = ((reg.sessionStates || {})[session.id]) || {};
      const merged = [];

      Object.values(COMPASS_CATALOG).forEach(cat => {
        const item = (reg.items || {})[cat.registryId] || null;
        const state = sessionStates[cat.registryId] || null;

        const isAvailable =
          item &&
          item.world === 'compass' &&
          item.type === 'subject' &&
          item.status === 'available' &&
          item.launchUrl;

        const status = isAvailable ? resolveStatus(state) : 'new';
        const ts = state ? (state.lastTouchedAt || state.lastOpenedAt || state.updatedAt || 0) : 0;

        merged.push({
          registryId: cat.registryId,
          title: (item && item.title) || cat.title,
          launchUrl: isAvailable ? item.launchUrl : '',
          categoryId: cat.categoryId,
          order: cat.order,
          durationLabel: cat.durationLabel || '45–60 min',
          hook: cat.hook || '',
          status: status,
          ts: ts,
          state: state,
          available: !!isAvailable,
          contentVersion: item ? item.contentVersion || null : null
        });
      });

      return merged;
    }

    function getInProgressSubjects(merged) {
      return merged
        .filter(s => s.status === 'inprogress')
        .sort((a, b) => b.ts - a.ts)
        .slice(0, 3);
    }

    /* ================================================================
       APPEARANCE
       ================================================================ */

    function sunSvg(size) {
      return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 17 17" fill="none"><circle cx="8.5" cy="8.5" r="3" stroke="currentColor" stroke-width="1.35"/><path d="M8.5 1.5v2M8.5 13.5v2M1.5 8.5h2M13.5 8.5h2M3.7 3.7l1.4 1.4M11.9 11.9l1.4 1.4M11.9 5.1l1.4-1.4M3.7 13.3l1.4-1.4" stroke="currentColor" stroke-width="1.35" stroke-linecap="round"/></svg>';
    }
    function moonSvg(size) {
      return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 17 17" fill="none"><path d="M14.5 10.2A7 7 0 0 1 6.8 2.5a7 7 0 1 0 7.7 7.7Z" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    }

    function updateAppearanceButtons(mode) {
      const icon = mode === 'night' ? sunSvg(16) : moonSvg(16);
      const label = mode === 'night' ? 'Switch to day mode' : 'Switch to night mode';
      ['spine-appearance-btn', 'mobile-appearance-btn'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.innerHTML = icon; el.setAttribute('aria-label', label); }
      });
      const da = document.getElementById('drawer-appearance-btn');
      if (da) da.innerHTML = mode === 'night' ? sunSvg(16) : moonSvg(16);
    }

    function toggleAppearance() {
      const cur = Bridge.readAppearanceMode();
      const next = cur === 'night' ? 'light' : 'night';
      document.documentElement.classList.add('theme-changing');
      setTimeout(() => document.documentElement.classList.remove('theme-changing'), 500);
      Bridge.setAppearanceMode(next);
      document.documentElement.dataset.theme = next;
      updateAppearanceButtons(next);
    }

    /* ================================================================
             SETTINGS — Compass atmosphere image
             ================================================================ */

    function readCompassAtmosphereMode() {
      try {
        const mode = localStorage.getItem(COMPASS_ATMOSPHERE_MODE_KEY);
        if (mode === 'custom' || mode === 'none' || mode === 'default') return mode;

        return localStorage.getItem(COMPASS_ATMOSPHERE_KEY) ? 'custom' : 'default';
      } catch (e) {
        return 'default';
      }
    }

    function readCompassCustomAtmosphereImage() {
      try { return localStorage.getItem(COMPASS_ATMOSPHERE_KEY) || ''; }
      catch (e) { return ''; }
    }

    function getCompassAtmosphereImage() {
      const mode = readCompassAtmosphereMode();

      if (mode === 'none') return '';
      if (mode === 'custom') return readCompassCustomAtmosphereImage();

      return COMPASS_DEFAULT_ATMOSPHERE;
    }

    function writeCompassAtmosphereSettings(mode, url) {
      const cleanMode = (mode === 'custom' || mode === 'none' || mode === 'default') ? mode : 'default';
      const cleanUrl = (url || '').trim();

      try {
        localStorage.setItem(COMPASS_ATMOSPHERE_MODE_KEY, cleanMode);

        if (cleanUrl) localStorage.setItem(COMPASS_ATMOSPHERE_KEY, cleanUrl);
        else localStorage.removeItem(COMPASS_ATMOSPHERE_KEY);
      } catch (e) { }

      applyCompassAtmosphereImage();
    }

    function cssImageUrl(url) {
      return 'url("' + String(url || '').replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '")';
    }

    function applyCompassAtmosphereImage() {
      const layer = document.getElementById('hub-atmosphere-layer');
      if (!layer) return;

      const image = getCompassAtmosphereImage();

      if (!image) {
        layer.style.backgroundImage = '';
        layer.classList.remove('visible');
        return;
      }

      layer.style.backgroundImage = cssImageUrl(image);
      layer.classList.add('visible');
    }

    function handleCompassAtmosphereModeChange() {
      const mode = document.getElementById('compass-atmosphere-mode');
      const row = document.getElementById('compass-custom-atmosphere-row');

      if (!mode || !row) return;

      row.style.display = mode.value === 'custom' ? '' : 'none';
    }

    function openSettingsModal() {
      const mode = document.getElementById('compass-atmosphere-mode');
      const input = document.getElementById('compass-atmosphere-input');

      if (mode) mode.value = readCompassAtmosphereMode();
      if (input) input.value = readCompassCustomAtmosphereImage();

      handleCompassAtmosphereModeChange();

      document.getElementById('settings-modal').classList.add('open');
      document.body.style.overflow = 'hidden';

      setTimeout(() => {
        const currentMode = readCompassAtmosphereMode();
        const el = currentMode === 'custom'
          ? document.getElementById('compass-atmosphere-input')
          : document.getElementById('compass-atmosphere-mode');

        if (el) el.focus();
      }, 50);
    }

    function closeSettingsModal() {
      document.getElementById('settings-modal').classList.remove('open');
      document.body.style.overflow = '';
    }

    function handleSettingsModalClick(e) {
      if (e.target === document.getElementById('settings-modal')) closeSettingsModal();
    }

    function handleSaveSettings() {
      const modeEl = document.getElementById('compass-atmosphere-mode');
      const input = document.getElementById('compass-atmosphere-input');

      const mode = modeEl ? modeEl.value : 'default';
      const customUrl = input ? input.value.trim() : '';

      if (mode === 'custom' && !customUrl) {
        showToast('Add a custom image URL, or choose Default or No atmosphere.');
        if (input) input.focus();
        return;
      }

      writeCompassAtmosphereSettings(mode, customUrl);
      closeSettingsModal();

      const labels = {
        default: 'Compass atmosphere reset to default.',
        custom: 'Compass custom atmosphere saved.',
        none: 'Compass atmosphere removed.'
      };

      showToast(labels[mode] || 'Compass atmosphere saved.');
    }

    function handleRevertAtmosphere() {
      writeCompassAtmosphereSettings('default', '');
      closeSettingsModal();
      showToast('Compass atmosphere reset to default.');
    }


    /* ================================================================
       SESSION LABELS
       ================================================================ */

    function setSessionLabels() {
      const s = getActiveSession();
      const name = isDefaultSession(s) ? 'Session' : (s.name || 'Session');
      ['spine-session-name', 'mobile-session-name', 'drawer-session-name'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = name;
      });
    }

    /* ================================================================
       NAVIGATION
       Matches Atlas hub navigation, adapted only for Compass host IDs.
       ================================================================ */

    function navigateTo(url) {
      if (!url) {
        showToast('That destination is not available on this device yet.');
        return;
      }

      if (window.AtlasSearch && typeof AtlasSearch.navigateTo === 'function') {
        AtlasSearch.navigateTo(url);
        return;
      }

      window.location.href = url;
    }

    function resolveWorld(reg, worldId) {
      const worlds = reg.worlds || {};
      if (worlds[worldId]) return worlds[worldId];

      return Object.values(worlds).find(w =>
        w && (w.registryId === worldId || w.id === worldId || w.world === worldId)
      ) || null;
    }

    function worldHasItems(reg, worldId) {
      const prefix = worldId + ':';
      return Object.keys(reg.items || {}).some(k => k.indexOf(prefix) === 0);
    }

    function getWorldLaunchUrl(reg, worldId) {
      if (worldId === ARCADE_ID) return '../arcade/index.html';

      const w = resolveWorld(reg, worldId);
      return (w && w.launchUrl) ? w.launchUrl : null;
    }

    function isWorldAvailable(reg, worldId) {
      return !!getWorldLaunchUrl(reg, worldId);
    }

    function openWorld(worldId) {
      const reg = getRegistry();
      const url = getWorldLaunchUrl(reg, worldId);

      if (url) {
        navigateTo(url);
        return;
      }

      if (worldId === COMPASS_ID && worldHasItems(reg, COMPASS_ID)) {
        showToast('Compass is registered, but its hub is not linked on this device yet.');
        return;
      }

      showToast('This world is coming soon.');
    }

    function isHubAvailable(hub, reg) {
      if (!hub) return false;
      if (hub.alwaysAvailable) return true;

      if (hub.worldId === COMPASS_ID) {
        return isWorldAvailable(reg, COMPASS_ID) || worldHasItems(reg, COMPASS_ID);
      }

      if (hub.worldId === ARCADE_ID) {
        return isWorldAvailable(reg, ARCADE_ID);
      }

      return false;
    }

    function openHub(hubId) {
      const hub = HUB_NAV[hubId];
      if (!hub) return;

      if (hub.id === ACTIVE_HUB_ID) {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }

      if (hub.worldId) {
        openWorld(hub.worldId);
        return;
      }

      if (hub.launchUrl) {
        navigateTo(hub.launchUrl);
        return;
      }

      showToast('That destination is not available yet.');
    }

    function renderSpineHubNav() {
      const reg = getRegistry();
      const host = document.getElementById('spine-hub-nav');
      if (!host) return;

      host.innerHTML = Object.values(HUB_NAV).map(hub => {
        const active = hub.id === ACTIVE_HUB_ID;
        const available = isHubAvailable(hub, reg);
        const disabledAttr = available ? '' : ' aria-disabled="true"';
        const activeClass = active ? ' is-active' : '';
        const onclick = available ? ' onclick="openHub(\'' + hub.id + '\')"' : '';
        const title = active
          ? hub.name
          : available
            ? 'Open ' + hub.name
            : hub.name + ' — coming soon';

        return '<button class="spine-world-btn' + activeClass + '"' +
          disabledAttr +
          onclick +
          (active ? ' aria-current="page"' : '') +
          ' title="' + escHtml(title) + '">' +
          hub.smallIcon +
          '<span>' + escHtml(hub.name) + '</span>' +
          '</button>';
      }).join('');
    }

    function renderDrawerHubNav() {
      const reg = getRegistry();
      const host = document.getElementById('drawer-hub-nav');
      if (!host) return;

      host.innerHTML = Object.values(HUB_NAV).map(hub => {
        const active = hub.id === ACTIVE_HUB_ID;
        const available = isHubAvailable(hub, reg);
        const disabledAttr = available ? '' : ' aria-disabled="true"';
        const activeClass = active ? ' is-active' : '';
        const onclick = available ? ' onclick="closeDrawer();openHub(\'' + hub.id + '\')"' : '';

        return '<button class="drawer-nav-item' + activeClass + '"' +
          disabledAttr +
          onclick +
          (active ? ' aria-current="page"' : '') +
          '>' +
          hub.smallIcon +
          escHtml(hub.name) +
          (available ? '' : '<span class="nav-soon">Soon</span>') +
          '</button>';
      }).join('');
    }

    let toastTimer = null;
    function showToast(text) {
      let el = document.getElementById('hub-toast');
      if (!el) {
        el = document.createElement('div');
        el.id = 'hub-toast';
        el.className = 'hub-toast';
        el.setAttribute('role', 'status');
        document.body.appendChild(el);
      }
      el.textContent = text;
      requestAnimationFrame(() => el.classList.add('visible'));
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('visible'), 3200);
    }

    /* ================================================================
       SEARCH
       ================================================================ */

    let currentQuery = '';

    function focusSearch() {
      const field = document.getElementById('search-field');
      if (field) { field.focus(); field.select(); }
    }

    function handleSearchInput(val) {
      currentQuery = (val || '').trim().toLowerCase();
      const clearBtn = document.getElementById('search-clear');
      if (clearBtn) clearBtn.classList.toggle('visible', currentQuery.length > 0);
      applySearchFilter();
    }

    function clearSearch() {
      const field = document.getElementById('search-field');
      if (field) field.value = '';
      handleSearchInput('');
      field && field.focus();
    }

    function applySearchFilter() {
      const q = currentQuery;
      const groups = document.querySelectorAll('.category-group');
      let totalVisible = 0;

      groups.forEach(group => {
        const cards = group.querySelectorAll('.subject-card');
        let groupVisible = 0;
        cards.forEach(card => {
          const title = (card.dataset.title || '').toLowerCase();
          const hook = (card.dataset.hook || '').toLowerCase();
          const cat = (card.dataset.cat || '').toLowerCase();
          const matches = !q || title.includes(q) || hook.includes(q) || cat.includes(q);
          card.classList.toggle('is-hidden', !matches);
          if (matches) groupVisible++;
        });
        group.style.display = groupVisible > 0 ? '' : 'none';
        totalVisible += groupVisible;
      });

      const noBanner = document.getElementById('no-results-banner');
      if (noBanner) noBanner.classList.toggle('visible', q.length > 0 && totalVisible === 0);

      const resultsLabel = document.getElementById('search-results-label');
      if (resultsLabel) {
        if (q) {
          resultsLabel.textContent = totalVisible + ' subject' + (totalVisible !== 1 ? 's' : '') + ' match' + (totalVisible === 1 ? 'es' : '') + ' \u201c' + q + '\u201d';
          resultsLabel.classList.add('visible');
        } else {
          resultsLabel.classList.remove('visible');
        }
      }
    }

    function handleSearchKeydown(e) {
      if (e.key === 'Enter') {
        // Launch first visible registered result
        const first = document.querySelector('.subject-card:not(.is-hidden)');
        if (first && first.dataset.url) navigateTo(first.dataset.url);
      }
      if (e.key === 'Escape') {
        clearSearch();
        document.getElementById('search-field').blur();
      }
    }

    /* ================================================================
       RENDER
       ================================================================ */

    function renderHub() {
      if (!Bridge) return;

      registerWithBridge();

      const main = document.getElementById('hub-main');
      const session = getActiveSession();
      const merged = getMergedSubjects();
      const inProgress = getInProgressSubjects(merged);

      applyCompassAtmosphereImage();

      setSessionLabels();
      renderSpineHubNav();
      renderDrawerHubNav();

      // No registered subjects yet
      if (merged.length === 0) {
        main.innerHTML = renderIntro(session, 0) + renderEmptyLibrary();
        bindSearch();
        return;
      }

      main.innerHTML =
        renderIntro(session, merged.length) +
        renderInProgressZone(inProgress, session) +
        renderSearchZone() +
        renderNoResultsBanner() +
        renderCategoryGroups(merged);

      bindSearch();
    }

    function renderIntro(session, count) {
      const isDefault = isDefaultSession(session);
      const eyebrow = isDefault ? 'Compass' : 'Welcome, ' + escHtml(session.name);
      const countText = count > 0
        ? count + ' available path' + (count !== 1 ? 's' : '')
        : 'No subjects registered yet';

      return (
        '<div class="hub-intro">' +
        '<div class="hub-intro-text">' +
        '<div class="hub-eyebrow">' + eyebrow + '</div>' +
        '<h1 class="hub-title">Choose a subject</h1>' +
        '<p class="hub-desc">Open a conversation path, continue something already started, or search for the direction that fits today’s lesson.</p>' +
        '</div>' +
        '<div class="hub-meta">' +
        '<div class="hub-meta-chip count">' + escHtml(countText) + '</div>' +
        '</div>' +
        '</div>'
      );
    }

    function renderInProgressZone(inProgress, session) {
      let inner = '';
      if (inProgress.length === 0) {
        inner =
          '<div class="inprogress-empty">' +
          '<strong>Nothing in progress yet.</strong>' +
          'Start with a Compass subject below. Browse by category or search for a topic.' +
          '</div>';
      } else {
        const cards = inProgress.map(s => {
          const ts = s.ts ? formatRelativeTime(s.ts) : '';
          const meta = getCategoryTitle(s.categoryId) + (ts ? ' · ' + ts : '');
          const pct = subjectProgressPercent(s);
          const rail = pct !== null
            ? '<div class="progress-rail' + (pct >= 100 ? ' is-complete' : '') + '" aria-hidden="true">' +
            '<div class="progress-rail-fill" style="width:' + pct + '%"></div>' +
            '</div>'
            : '';

          return (
            '<div class="progress-card" role="button" tabindex="0" ' +
            'onclick="navigateTo(\'' + escHtml(s.launchUrl) + '\')" ' +
            'onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();navigateTo(\'' + escHtml(s.launchUrl) + '\')}" ' +
            'aria-label="Continue ' + escHtml(s.title) + '">' +
            '<div class="progress-card-title">' + escHtml(s.title) + '</div>' +
            (s.hook ? '<p class="progress-card-hook">' + escHtml(s.hook) + '</p>' : '') +
            '<div class="progress-card-footer">' +
            '<div class="progress-card-meta">' + escHtml(meta) + '</div>' +
            '<button class="btn-launch-sm" onclick="event.stopPropagation();navigateTo(\'' + escHtml(s.launchUrl) + '\')" aria-label="Continue ' + escHtml(s.title) + '">' +
            'Continue' +
            '<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M2 5.5h7M6 2.5l3 3-3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
            '</button>' +
            '</div>' +
            rail +
            '</div>'
          );
        }).join('');
        inner = '<div class="inprogress-grid">' + cards + '</div>';
      }

      return (
        '<div class="inprogress-zone">' +
        '<div class="zone-label">In Progress</div>' +
        inner +
        '</div>'
      );
    }

    function renderSearchZone() {
      return (
        '<div class="search-zone">' +
        '<div class="search-field-wrap">' +
        '<span class="search-icon" aria-hidden="true">' +
        '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.3"/><path d="M10.5 10.5l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>' +
        '</span>' +
        '<input class="search-field" id="search-field" type="text" placeholder="Search subjects by title, category, or topic…" autocomplete="off" autocorrect="off" spellcheck="false" aria-label="Search subjects">' +
        '<button class="search-clear" id="search-clear" onclick="clearSearch()" aria-label="Clear search">' +
        '<svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M1 1l7 7M8 1L1 8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>' +
        '</button>' +
        '</div>' +
        '<div class="search-results-label" id="search-results-label"></div>' +
        '</div>'
      );
    }

    function renderNoResultsBanner() {
      return (
        '<div class="no-results-banner" id="no-results-banner">' +
        '<p class="no-results-title">No subjects match that search.</p>' +
        '<p>Try a different word, or browse the categories below.</p>' +
        '</div>'
      );
    }

    function renderCategoryGroups(merged) {
      // Build category map
      const catMap = {};
      COMPASS_CATEGORIES.forEach(c => { catMap[c.id] = c; });

      // Group merged subjects by categoryId
      const groups = {}; // categoryId -> subjects[]
      const uncategorized = [];

      merged.forEach(s => {
        if (s.categoryId === '__uncategorized__' || !catMap[s.categoryId]) {
          uncategorized.push(s);
        } else {
          if (!groups[s.categoryId]) groups[s.categoryId] = [];
          groups[s.categoryId].push(s);
        }
      });

      // Sort subjects within each group
      Object.values(groups).forEach(arr => arr.sort((a, b) => a.order - b.order));
      if (uncategorized.length) uncategorized.sort((a, b) => a.title.localeCompare(b.title));

      // Render in category order
      let html = '<div class="categories-zone">';

      COMPASS_CATEGORIES
        .slice()
        .sort((a, b) => a.order - b.order)
        .forEach(cat => {
          const subjects = groups[cat.id];
          if (!subjects || subjects.length === 0) return;
          html += renderCategoryGroup(cat.title, subjects);
        });

      if (uncategorized.length) {
        html += renderCategoryGroup('Uncategorized', uncategorized);
      }

      html += '</div>';
      return html;
    }

    function renderCategoryGroup(title, subjects) {
      const cards = subjects.map(s => renderSubjectCard(s)).join('');
      return (
        '<div class="category-group">' +
        '<div class="category-header">' +
        '<h2 class="category-title">' + escHtml(title) + '</h2>' +
        '<span class="category-count">' + subjects.length + ' subject' + (subjects.length !== 1 ? 's' : '') + '</span>' +
        '</div>' +
        '<div class="category-grid">' + cards + '</div>' +
        '</div>'
      );
    }

    function renderSubjectCard(s) {
      const ts = s.ts ? formatRelativeTime(s.ts) : '';
      const isExplored = s.status === 'explored';

      // data attributes for search filtering
      const catEntry = COMPASS_CATALOG[s.registryId];
      const catTitle = catEntry ? (COMPASS_CATEGORIES.find(c => c.id === catEntry.categoryId) || {}).title || '' : '';

      return (
        '<div class="subject-card' + (isExplored ? ' is-explored' : '') + '" ' +
        'role="button" tabindex="0" ' +
        'data-title="' + escHtml(s.title.toLowerCase()) + '" ' +
        'data-hook="' + escHtml((s.hook || '').toLowerCase()) + '" ' +
        'data-cat="' + escHtml(catTitle.toLowerCase()) + '" ' +
        'data-url="' + escHtml(s.launchUrl) + '" ' +
        'onclick="navigateTo(\'' + escHtml(s.launchUrl) + '\')" ' +
        'onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();navigateTo(\'' + escHtml(s.launchUrl) + '\')}"' +
        'aria-label="' + escHtml(s.title) + (isExplored ? ' — Explored' : '') + '">' +
        '<div class="subject-card-header">' +
        '<h3 class="subject-card-title">' + escHtml(s.title) + '</h3>' +
        (s.status !== 'new' ? statusBadgeHtml(s.status) : '') +
        '</div>' +
        (s.hook ? '<p class="subject-card-hook">' + escHtml(s.hook) + '</p>' : '') +
        '<div class="subject-card-footer">' +
        '<div class="subject-card-meta">' +
        (ts ? '<span class="timestamp-chip">' + escHtml(ts) + '</span>' : '') +
        '</div>' +
        '<button class="btn-launch" onclick="event.stopPropagation();navigateTo(\'' + escHtml(s.launchUrl) + '\')" ' +
        'aria-label="Launch ' + escHtml(s.title) + '">' +
        escHtml(subjectButtonLabel(s.status)) +
        '<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M2 5.5h7M6 2.5l3 3-3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
        '</button>' +
        '</div>' +
        '</div>'
      );
    }

    function renderEmptyLibrary() {
      return (
        '<div class="empty-library">' +
        '<div class="empty-library-icon">' +
        '<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M12 4v3M12 17v3M4 12h3M17 12h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>' +
        '</div>' +
        '<h2>No subjects registered yet</h2>' +
        '<p>Compass subjects will appear here once they\'re registered with the bridge. Open a subject module to register it.</p>' +
        '</div>'
      );
    }

    function bindSearch() {
      const field = document.getElementById('search-field');
      if (!field) return;
      field.addEventListener('input', e => handleSearchInput(e.target.value));
      field.addEventListener('keydown', handleSearchKeydown);
    }

    /* ================================================================
       DRAWER
       ================================================================ */

    function openDrawer() {
      renderDrawerHubNav();
      const overlay = document.getElementById('drawer-overlay');
      overlay.style.display = 'block';
      document.getElementById('drawer').classList.add('open');
      document.body.style.overflow = 'hidden';
      setTimeout(() => overlay.classList.add('open'), 10);
    }
    function closeDrawer() {
      const overlay = document.getElementById('drawer-overlay');
      overlay.classList.remove('open');
      document.getElementById('drawer').classList.remove('open');
      document.body.style.overflow = '';
      setTimeout(() => { overlay.style.display = ''; }, 300);
    }

    /* ================================================================
       SESSION MODAL
       ================================================================ */

    function openSessionModal() {
      renderSessionList();
      clearSessionError();
      document.getElementById('session-modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeSessionModal() {
      document.getElementById('session-modal').classList.remove('open');
      document.body.style.overflow = '';
    }
    function handleSessionModalClick(e) {
      if (e.target === document.getElementById('session-modal')) closeSessionModal();
    }
    function clearSessionError() {
      const el = document.getElementById('session-create-error');
      el.textContent = ''; el.className = 'session-error';
    }
    function showSessionError(msg) {
      const el = document.getElementById('session-create-error');
      el.textContent = msg; el.className = 'session-error visible';
    }

    function renderSessionList() {
      const sessions = getSessions();
      const active = getActiveSession();
      const defId = Bridge.defaultSessionId || 'default';
      const helper = document.getElementById('session-modal-helper');
      helper.textContent = isDefaultSession(active)
        ? 'Add a learner name to keep each student\'s progress separate.'
        : 'Active session: ' + active.name + '. Switch to change the active learner.';

      document.getElementById('session-list').innerHTML = sessions.map(s => {
        const isActive = s.id === active.id;
        const isDefault = s.id === defId;
        return (
          '<div class="session-item ' + (isActive ? 'active' : '') + '">' +
          '<span class="session-item-name">' + escHtml(s.name) + '</span>' +
          (isActive ? '<span class="session-item-badge">Active</span>' : '') +
          '<div class="session-item-actions">' +
          (!isActive ? '<button class="session-action-btn" title="Switch" onclick="handleSwitchSession(\'' + escHtml(s.id) + '\')" aria-label="Switch to ' + escHtml(s.name) + '">' +
            '<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M2 5.5h7M6 2.5l3 3-3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>' : '') +
          (!isDefault ? '<button class="session-action-btn" title="Rename" onclick="handleRenameSession(\'' + escHtml(s.id) + '\')" aria-label="Rename ' + escHtml(s.name) + '">' +
            '<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M7.5 1.5l2 2M1 9.5l.5-2 5-5L8 4.5l-5 5L1 9.5Z" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/></svg></button>' : '') +
          (!isDefault ? '<button class="session-action-btn danger" title="Delete" onclick="handleDeleteSession(\'' + escHtml(s.id) + '\')" aria-label="Delete ' + escHtml(s.name) + '">' +
            '<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1 1l9 9M10 1L1 10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></button>' : '') +
          '</div>' +
          '</div>'
        );
      }).join('');
    }

    function handleCreateSession() {
      const input = document.getElementById('new-session-input');
      const name = input.value.trim();
      clearSessionError();
      if (!name) { showSessionError('Enter a name to create a session.'); return; }
      const created = Bridge.createSession(name);
      if (!created) {
        showSessionError('That name is already in use.');
        input.style.borderColor = 'var(--danger-text)';
        setTimeout(() => { input.style.borderColor = ''; }, 1200);
        return;
      }
      input.value = '';
      renderSessionList();
    }

    function handleSwitchSession(id) {
      const result = Bridge.setActiveSession(id);
      if (!result) { showSessionError('Couldn\'t switch to that session.'); return; }
      closeSessionModal();
    }

    async function handleRenameSession(id) {
      const sessions = getSessions();
      const s = sessions.find(x => x.id === id);
      if (!s) return;
      const newName = await showConfirm({
        title: 'Rename session',
        message: 'Give this session a new name.',
        okLabel: 'Rename', okClass: 'btn-primary',
        inputMode: true, inputValue: s.name
      });
      if (!newName || newName === s.name) return;
      const renamed = Bridge.renameSession(id, newName);
      if (!renamed) {
        showToast('That name is already in use.');
        return;
      }
      renderSessionList();
      renderHub();
    }

    async function handleDeleteSession(id) {
      const sessions = getSessions();
      const s = sessions.find(x => x.id === id);
      if (!s) return;
      const ok = await showConfirm({
        title: 'Delete session?',
        message: 'This permanently removes ' + s.name + ', their progress, and their covered language from this device.',
        okLabel: 'Delete session'
      });
      if (!ok) return;
      Bridge.deleteSession(id);
      renderSessionList();
      renderHub();
    }

    /* ================================================================
       CONFIRM DIALOG
       ================================================================ */

    let confirmResolver = null;
    function showConfirm(opts) {
      opts = opts || {};
      return new Promise(resolve => {
        confirmResolver = resolve;
        document.getElementById('confirm-title').textContent = opts.title || '';
        document.getElementById('confirm-message').textContent = opts.message || '';
        const okBtn = document.getElementById('confirm-ok-btn');
        okBtn.textContent = opts.okLabel || 'OK';
        okBtn.className = opts.okClass || 'btn-danger';
        const inp = document.getElementById('confirm-input');
        inp.className = 'confirm-input' + (opts.inputMode ? ' visible' : '');
        inp.value = opts.inputValue || '';
        document.getElementById('confirm-error').className = 'confirm-error';
        document.getElementById('confirm-dialog').classList.add('open');
        if (opts.inputMode) setTimeout(() => { inp.focus(); inp.select(); }, 50);
      });
    }
    function resolveConfirm(ok) {
      const inp = document.getElementById('confirm-input');
      const isInput = inp.classList.contains('visible');
      if (!ok) {
        document.getElementById('confirm-dialog').classList.remove('open');
        if (confirmResolver) { confirmResolver(isInput ? null : false); confirmResolver = null; }
        return;
      }
      const value = isInput ? inp.value.trim() : true;
      document.getElementById('confirm-dialog').classList.remove('open');
      if (confirmResolver) { confirmResolver(value); confirmResolver = null; }
    }
    document.getElementById('confirm-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') resolveConfirm(true);
      if (e.key === 'Escape') resolveConfirm(false);
    });

    /* ================================================================
       GLOBAL KEYS
       ================================================================ */

    document.addEventListener('keydown', e => {
      if (e.defaultPrevented) return;

      const active = document.activeElement;
      const inInput = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.isContentEditable);

      if (e.key === '/' && !inInput) {
        e.preventDefault();
        focusSearch();
        return;
      }

      if (e.key === 'Escape') {
        if (document.getElementById('confirm-dialog').classList.contains('open')) { resolveConfirm(false); return; }
        if (document.getElementById('session-modal').classList.contains('open')) { closeSessionModal(); return; }
        if (document.getElementById('settings-modal').classList.contains('open')) { closeSettingsModal(); return; }
        if (document.getElementById('drawer').classList.contains('open')) { closeDrawer(); return; }
        if (currentQuery) { clearSearch(); return; }
      }
    });

    /* ================================================================
       LIVE REFRESH
       ================================================================ */

    function refresh() {
      if (!Bridge) return;
      renderHub();
    }

    window.addEventListener('atlas:session-change', refresh);
    window.addEventListener('atlas:appearance-change', e => {
      const mode = (e.detail && e.detail.mode) || Bridge.readAppearanceMode();
      document.documentElement.dataset.theme = mode;
      updateAppearanceButtons(mode);
    });
    window.addEventListener('focus', refresh);
    window.addEventListener('pageshow', refresh);
    document.addEventListener('visibilitychange', () => { if (!document.hidden) refresh(); });
    window.addEventListener('storage', e => {
      if (!e || !e.key) return;
      const k = e.key;
      if (k === 'atlas::appearanceMode') {
        document.documentElement.dataset.theme = Bridge.readAppearanceMode();
        updateAppearanceButtons(Bridge.readAppearanceMode());
        return;
      }

      if (k === COMPASS_ATMOSPHERE_KEY) {
        applyCompassAtmosphereImage();
        return;
      }

      if (k === 'atlas::sessions' || k === 'atlas::activeSessionId' || k === 'atlas::registry' || k === 'learning::ledger') {
        refresh();
      }
    });

    /* ================================================================
       INIT
       ================================================================ */

    function init() {
      if (!Bridge) return;

      const mode = Bridge.readAppearanceMode();
      document.documentElement.dataset.theme = mode;
      updateAppearanceButtons(mode);
      applyCompassAtmosphereImage();

      registerWithBridge();

      if (window.AtlasSearch && typeof AtlasSearch.init === 'function') {
        AtlasSearch.init({
          activeHubId: 'compass',
          atlasUrl: '../index.html',
          compassUrl: './index.html',
          arcadeUrl: '../arcade/index.html'
        });
      }

      renderHub();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>

</html>
