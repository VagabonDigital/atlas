<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compass · Subject Library</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath d='M50 4L96 50L50 96L4 50Z' fill='%2357C7B7' stroke='%232D7D78' stroke-width='5' stroke-linejoin='round'/%3E%3Cpath d='M50 18L82 50L50 82L18 50Z' fill='%23F3FFFC' stroke='%23FFFFFF' stroke-width='3' stroke-linejoin='round'/%3E%3Cpath d='M50 15L62 50L50 85L38 50Z' fill='%233F8F88' stroke='%232D7D78' stroke-width='3' stroke-linejoin='round'/%3E%3Cpath d='M50 15L62 50L50 47Z' fill='%2389DDD0'/%3E%3Ccircle cx='50' cy='50' r='5' fill='%232D7D78'/%3E%3Cpath d='M50 18L50 30M82 50L70 50M50 82L50 70M18 50L30 50' stroke='%2357C7B7' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../shared/atlas-search.css">

  <!-- Anti-flash: apply saved theme before first paint -->
  <script>
    (function () {
      var m = null;
      try { m = localStorage.getItem('atlas::appearanceMode'); } catch (e) { }
      document.documentElement.dataset.theme = (m === 'night') ? 'night' : 'light';
    })();
  </script>
  <style>
    /* ============================================================
       COMPASS HUB — DESIGN TOKENS
       Library surface: warmer than Atlas, less immersive than a lesson module.
       Cream paper, teal accent, high readability. No heavy background overlays.
       ============================================================ */
    :root {
      --cream: #f7f4ef;
      --cream-warm: #f0ebe2;
      --stone-light: #e8e2d9;
      --stone: #c8bfb0;
      --stone-dark: #9a9083;
      --ink-faint: #d4cfc8;
      --ink-light: #7a7268;
      --ink: #3d3830;
      --ink-dark: #1e1b16;
      --accent: #4a7c78;
      --accent-soft: #6b9e9a;
      --accent-pale: #d6eae8;
      --accent-dim: #e8f4f3;
      --accent-rgb: 74, 124, 120;
      --accent-soft-rgb: 107, 158, 154;
      --white: #ffffff;
      --viewed-bg: #f0f7f6;
      --covered-bg: #d6eae8;
      --covered-acc: #4a7c78;
      --danger-bg: #fef2f2;
      --danger-text: #dc2626;
      --danger-border: #fca5a5;
      --shadow-xs: 0 1px 2px rgba(30, 27, 22, 0.05);
      --shadow-sm: 0 1px 4px rgba(30, 27, 22, 0.07);
      --shadow-md: 0 4px 16px rgba(30, 27, 22, 0.10);
      --shadow-lg: 0 8px 32px rgba(30, 27, 22, 0.13);
      --radius-sm: 6px;
      --radius-md: 12px;
      --radius-lg: 18px;
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --t: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html[data-theme="night"] {
      --cream: #3a332b;
      --cream-warm: #463d33;
      --stone-light: #6d6052;
      --stone: #837568;
      --stone-dark: #b9aea1;
      --ink-faint: #746759;
      --ink-light: #d6cabc;
      --ink: #eee4d7;
      --ink-dark: #f3eadf;
      --white: #4c4237;
      --accent: #83b9b3;
      --accent-soft: #9fcec9;
      --accent-pale: #3d625e;
      --accent-dim: #344f4b;
      --accent-rgb: 131, 185, 179;
      --accent-soft-rgb: 159, 206, 201;
      --viewed-bg: #374f4b;
      --covered-bg: #416a64;
      --covered-acc: #a8d6d1;
      --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.18);
      --shadow-sm: 0 1px 4px rgba(0, 0, 0, 0.16);
      --shadow-md: 0 4px 18px rgba(0, 0, 0, 0.22);
      --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.30);
    }

    html.theme-changing *,
    html.theme-changing *::before,
    html.theme-changing *::after {
      transition:
        background-color 0.45s ease,
        background 0.45s ease,
        color 0.45s ease,
        border-color 0.45s ease,
        box-shadow 0.45s ease !important;
    }

    /* ============================================================ RESET */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      min-height: 100%;
      scroll-behavior: smooth;
      overflow-y: scroll;
      scrollbar-gutter: stable;
    }

    body {
      font-family: var(--font-body);
      background: var(--cream);
      color: var(--ink);
      font-size: 15px;
      line-height: 1.65;
      min-height: 100svh;
      overflow-x: hidden;
      padding-top: 56px;
    }

    .hub-atmosphere-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity var(--t);
    }

    .hub-atmosphere-layer.visible {
      opacity: 0.08;
    }

    html[data-theme="night"] .hub-atmosphere-layer.visible {
      opacity: 0.06;
    }

    /* ============================================================ SPINE (desktop) */
    .spine {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      background: rgba(245, 247, 243, 0.96);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(var(--accent-rgb), 0.12);
      display: flex;
      align-items: center;
      height: 56px;
      padding: 0 1.5rem;
      gap: 0.6rem;
    }

    html[data-theme="night"] .spine {
      background: rgba(50, 44, 37, 0.95);
      border-bottom-color: rgba(109, 96, 82, 0.55);
    }

    .spine-mark {
      font-family: var(--font-display);
      font-size: 1.22rem;
      font-weight: 400;
      color: var(--ink-dark);
      letter-spacing: -0.01em;
      flex: 1 1 0;
      cursor: default;
      user-select: none;
      white-space: nowrap;
      line-height: 1;
    }

    .spine-mark span {
      color: var(--accent);
    }

    /* Centered hub shortcut group */
    .spine-worlds {
      display: flex;
      align-items: center;
      gap: 0.18rem;
      flex: 0 0 auto;
      padding: 0.2rem;
      border-radius: 999px;
      background: rgba(240, 235, 226, 0.72);
      border: 1px solid rgba(200, 191, 176, 0.52);
      box-shadow: 0 1px 3px rgba(30, 27, 22, 0.035);
    }

    .spine-world-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.42rem;
      min-height: 32px;
      padding: 0.32rem 0.82rem;
      border-radius: 999px;
      border: 1px solid transparent;
      background: transparent;
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--ink-light);
      cursor: pointer;
      transition: var(--t);
      white-space: nowrap;
    }

    .spine-world-icon {
      width: 13px;
      height: 13px;
      opacity: 0.72;
      flex-shrink: 0;
    }

    .spine-world-btn:hover {
      color: var(--accent);
      background: rgba(255, 255, 255, 0.72);
      border-color: rgba(var(--accent-rgb), 0.20);
      box-shadow: var(--shadow-xs);
    }

    .spine-world-btn:hover .spine-world-icon {
      opacity: 1;
    }

    .spine-world-btn.is-active {
      color: var(--accent);
      background: rgba(255, 255, 255, 0.86);
      border-color: rgba(var(--accent-rgb), 0.24);
      box-shadow: var(--shadow-xs);
      cursor: default;
    }

    .spine-world-btn.is-active .spine-world-icon {
      opacity: 1;
    }

    .spine-world-btn[aria-disabled="true"] {
      opacity: 0.5;
      cursor: default;
    }

    .spine-world-btn[aria-disabled="true"]:hover {
      color: var(--ink-light);
      background: transparent;
      border-color: transparent;
      box-shadow: none;
    }

    html[data-theme="night"] .spine-worlds {
      background: rgba(70, 61, 51, 0.72);
      border-color: rgba(255, 255, 255, 0.13);
    }

    html[data-theme="night"] .spine-world-btn:hover {
      background: rgba(88, 76, 64, 0.88);
      border-color: rgba(var(--accent-rgb), 0.34);
      color: var(--accent-soft);
    }

    html[data-theme="night"] .spine-world-btn.is-active {
      background: rgba(88, 76, 64, 0.94);
      border-color: rgba(var(--accent-rgb), 0.42);
      color: var(--accent-soft);
    }

    /* Right actions */
    .spine-actions {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex: 1 1 0;
      justify-content: flex-end;
    }

    .spine-session-pill {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.48rem 0.9rem;
      border-radius: 999px;
      border: 1px solid var(--stone-light);
      background: var(--white);
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--ink-light);
      cursor: pointer;
      transition: var(--t);
      max-width: 170px;
      white-space: nowrap;
      overflow: hidden;
      box-shadow: var(--shadow-xs);
    }

    .spine-session-pill:hover {
      border-color: var(--accent-soft);
      color: var(--ink);
      background: var(--accent-dim);
    }

    .spine-session-pill .pill-name {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .spine-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 1px solid rgba(200, 191, 176, 0.42);
      background: rgba(255, 255, 255, 0.58);
      color: var(--ink-light);
      cursor: pointer;
      transition: var(--t);
      box-shadow: 0 1px 3px rgba(30, 27, 22, 0.045);
      flex-shrink: 0;
    }

    .spine-btn:hover {
      background: rgba(255, 255, 255, 0.86);
      border-color: rgba(var(--accent-rgb), 0.28);
      color: var(--accent);
    }

    html[data-theme="night"] .spine-btn {
      background: rgba(76, 66, 55, 0.78);
      border-color: rgba(255, 255, 255, 0.15);
    }

    html[data-theme="night"] .spine-btn:hover {
      background: rgba(88, 76, 64, 0.90);
      border-color: rgba(131, 185, 179, 0.38);
      color: var(--accent-soft);
    }

    /* ============================================================ MOBILE HEADER */
    .mobile-header {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      background: rgba(247, 244, 239, 0.96);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--stone-light);
      height: 56px;
      padding: 0 1rem;
      align-items: center;
      gap: 0.5rem;
    }

    html[data-theme="night"] .mobile-header {
      background: rgba(50, 44, 37, 0.96);
      border-bottom-color: rgba(109, 96, 82, 0.55);
    }

    .mobile-header-brand {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      flex: 1;
      min-width: 0;
    }

    .mobile-header-mark {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--ink-dark);
      letter-spacing: -0.01em;
      line-height: 1;
    }

    .mobile-header-mark span {
      color: var(--accent);
    }

    .mobile-header-actions {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      flex-shrink: 0;
    }

    .mobile-header-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--stone-light);
      background: var(--white);
      color: var(--ink-light);
      cursor: pointer;
      transition: var(--t);
      flex-shrink: 0;
    }

    .mobile-header-btn:hover {
      color: var(--ink);
      background: var(--stone-light);
    }

    html[data-theme="night"] .mobile-header-btn {
      background: rgba(76, 66, 55, 0.78);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .mobile-session-pill {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.3rem 0.65rem;
      border-radius: 999px;
      border: 1px solid var(--stone-light);
      background: var(--white);
      font-size: 0.74rem;
      font-weight: 500;
      color: var(--ink-light);
      cursor: pointer;
      max-width: 120px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    /* ============================================================ MOBILE DRAWER */
    .drawer-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(20, 17, 12, 0.40);
      z-index: 400;
      backdrop-filter: blur(4px);
    }

    .drawer-overlay.open {
      display: block;
      animation: fadeIn 0.2s ease;
    }

    .drawer {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: min(300px, 85vw);
      background: var(--white);
      z-index: 500;
      display: flex;
      flex-direction: column;
      box-shadow: 4px 0 24px rgba(20, 17, 12, 0.15);
      transform: translateX(-100%);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-header {
      padding: 1.2rem 1.2rem 1rem;
      border-bottom: 1px solid var(--stone-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .drawer-title {
      font-family: var(--font-display);
      font-size: 1rem;
      color: var(--ink-dark);
    }

    .drawer-close {
      width: 30px;
      height: 30px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--stone-light);
      background: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--ink-light);
    }

    .drawer-close:hover {
      background: var(--cream-warm);
    }

    .drawer-nav {
      flex: 1;
      padding: 0.8rem;
      overflow-y: auto;
    }

    .drawer-nav-label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-faint);
      padding: 0.6rem 0.75rem 0.35rem;
    }

    .drawer-nav-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.75rem 0.9rem;
      border-radius: var(--radius-md);
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--ink-light);
      cursor: pointer;
      transition: var(--t);
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      min-height: 44px;
    }

    .drawer-nav-item:hover {
      background: var(--stone-light);
      color: var(--ink);
    }

    .drawer-nav-item[aria-disabled="true"] {
      opacity: 0.5;
      cursor: default;
    }

    .drawer-nav-item[aria-disabled="true"]:hover {
      background: none;
      color: var(--ink-light);
    }

    .drawer-nav-item .nav-soon {
      margin-left: auto;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--stone-dark);
    }

    .drawer-nav-item.is-active {
      background: var(--accent-dim);
      color: var(--accent);
      cursor: default;
    }

    .drawer-nav-item.is-active:hover {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .drawer-footer {
      padding: 0.8rem;
      border-top: 1px solid var(--stone-light);
    }

    .drawer-footer-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 0.5rem;
    }

    .drawer-session-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 0.9rem;
      border-radius: var(--radius-md);
      border: 1px solid var(--stone-light);
      background: var(--cream-warm);
      font-size: 0.84rem;
      font-weight: 500;
      color: var(--ink-light);
      cursor: pointer;
      min-height: 44px;
      overflow: hidden;
    }

    .drawer-session-btn span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .drawer-appearance-btn {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-md);
      border: 1px solid var(--stone-light);
      background: var(--cream-warm);
      color: var(--ink-light);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    html[data-theme="night"] .drawer,
    html[data-theme="night"] .mobile-header {
      background: #4c4237;
    }

    html[data-theme="night"] .drawer-header,
    html[data-theme="night"] .drawer-footer {
      background: #463d33;
      border-color: rgba(255, 255, 255, 0.13);
    }

    html[data-theme="night"] .drawer-session-btn,
    html[data-theme="night"] .drawer-appearance-btn {
      background: rgba(76, 66, 55, 0.78);
      border-color: rgba(255, 255, 255, 0.15);
      color: var(--ink-light);
    }

    /* ============================================================ MAIN LAYOUT */
    .hub-main {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 5rem;
    }

    /* ============================================================ HUB INTRO */
    .hub-intro {
      margin-bottom: 2rem;
      padding-bottom: 1.75rem;
      border-bottom: 1px solid rgba(var(--accent-rgb), 0.26);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    html[data-theme="night"] .hub-intro {
      border-bottom-color: rgba(var(--accent-rgb), 0.28);
    }

    .hub-eyebrow {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      text-transform: none;
      color: var(--accent);
      margin-bottom: 0.55rem;
    }

    .hub-title {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 3.5vw, 2.1rem);
      color: var(--ink-dark);
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: 0.4rem;
    }

    .hub-desc {
      font-size: 0.9rem;
      color: var(--ink);
      opacity: 0.68;
      font-weight: 400;
      line-height: 1.6;
      max-width: 52ch;
    }

    .hub-meta {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .hub-meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.32rem 0.75rem;
      border-radius: 999px;
      border: 1px solid var(--stone-light);
      background: var(--white);
      font-size: 0.76rem;
      font-weight: 500;
      color: var(--ink-light);
    }

    .hub-meta-chip.session {
      color: var(--accent);
      border-color: rgba(var(--accent-rgb), 0.25);
      background: var(--accent-dim);
    }

    .hub-meta-chip.count {
      color: var(--stone-dark);
    }

    /* ============================================================ IN PROGRESS ZONE */
    .zone-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.85rem;
    }

    .inprogress-zone {
      margin-bottom: 2rem;
    }

    .inprogress-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 0.85rem;
    }

    .progress-card {
      display: flex;
      flex-direction: column;
      background: var(--white);
      border: 1.5px solid var(--stone-light);
      border-radius: var(--radius-md);
      padding: 1.1rem 1.2rem 1.3rem;
      transition: var(--t);
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .progress-rail {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      background: rgba(var(--accent-rgb), 0.14);
      overflow: hidden;
    }

    .progress-rail-fill {
      height: 100%;
      background: var(--accent-soft);
      border-radius: 0 2px 2px 0;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .progress-rail.is-complete .progress-rail-fill {
      background: var(--accent);
      border-radius: 0;
    }

    .progress-card:hover {
      border-color: var(--accent-soft);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .progress-card-hook {
      font-size: 0.81rem;
      color: var(--ink-light);
      line-height: 1.5;
      margin-bottom: 0.85rem;
      display: -webkit-box;
      line-clamp: 1;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .progress-card-title {
      font-family: var(--font-display);
      font-size: 0.98rem;
      color: var(--ink-dark);
      line-height: 1.3;
      margin-bottom: 0.5rem;
    }

    .progress-card-meta {
      font-size: 0.74rem;
      color: var(--stone-dark);
      line-height: 1.4;
      min-width: 0;
    }

    .progress-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-top: auto;
    }

    .btn-launch-sm {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      min-width: 108px;
      padding: 0.42rem 0.9rem;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(var(--accent-rgb), 0.3);
      background: var(--accent-pale);
      color: var(--accent);
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--t);
    }

    .btn-launch-sm:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.7rem;
      font-weight: 500;
      padding: 0.2rem 0.55rem;
      border-radius: 20px;
    }

    .status-badge.new {
      background: var(--cream-warm);
      color: var(--stone-dark);
    }

    .status-badge.inprogress {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .status-badge.explored {
      background: var(--covered-bg);
      color: var(--covered-acc);
    }

    html[data-theme="night"] .status-badge.explored {
      color: var(--accent-soft);
    }

    .inprogress-empty {
      background: var(--cream-warm);
      border: 1px dashed var(--stone);
      border-radius: var(--radius-md);
      padding: 1.5rem 1.75rem;
      font-size: 0.88rem;
      color: var(--stone-dark);
      line-height: 1.6;
    }

    .inprogress-empty strong {
      display: block;
      font-size: 0.9rem;
      color: var(--ink-light);
      margin-bottom: 0.25rem;
    }

    /* ============================================================ SEARCH */
    .search-zone {
      margin-bottom: 2rem;
    }

    .search-field-wrap {
      position: relative;
      max-width: 520px;
    }

    .search-icon {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--stone-dark);
      pointer-events: none;
    }

    .search-field {
      width: 100%;
      padding: 0.72rem 2.5rem 0.72rem 2.5rem;
      border: 1.5px solid var(--stone-light);
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: 0.92rem;
      color: var(--ink);
      background: var(--white);
      outline: none;
      transition: border-color var(--t), box-shadow var(--t);
      box-shadow: var(--shadow-xs);
    }

    .search-field::placeholder {
      color: var(--stone-dark);
    }

    .search-field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.10);
    }

    .search-clear {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: none;
      background: var(--stone-light);
      color: var(--ink-light);
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--t);
    }

    .search-clear.visible {
      display: flex;
    }

    .search-clear:hover {
      background: var(--stone);
      color: var(--ink);
    }

    .search-hint {
      margin-top: 0.55rem;
      font-size: 0.74rem;
      color: var(--stone-dark);
    }

    .search-results-label {
      display: none;
      margin-top: 0.75rem;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--ink-light);
    }

    .search-results-label.visible {
      display: block;
    }

    /* ============================================================ CATEGORY GROUPS */
    .category-group {
      margin-bottom: 2.5rem;
    }

    .category-header {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      margin-bottom: 1rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--stone-light);
    }

    .category-title {
      font-family: var(--font-display);
      font-size: 1.05rem;
      color: var(--ink-dark);
      font-weight: 400;
    }

    .category-count {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--stone-dark);
      letter-spacing: 0.04em;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 0.9rem;
    }

    /* ============================================================ SUBJECT CARDS */
    .subject-card {
      display: flex;
      flex-direction: column;
      background: var(--white);
      border: 1.5px solid var(--stone-light);
      border-radius: var(--radius-md);
      padding: 1.2rem 1.25rem 1.1rem;
      cursor: pointer;
      transition: var(--t);
      position: relative;
      overflow: hidden;
      text-align: left;
      font-family: var(--font-body);
    }

    .subject-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-soft));
      opacity: 0;
      transition: opacity var(--t);
    }

    .subject-card:hover {
      border-color: var(--accent-soft);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .subject-card:hover::after {
      opacity: 1;
    }

    .subject-card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .subject-card.is-explored {
      opacity: 0.82;
      border-color: rgba(var(--accent-rgb), 0.3);
    }

    .subject-card.is-explored::after {
      opacity: 0.6;
    }

    .subject-card.is-hidden {
      display: none;
    }

    .subject-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.55rem;
    }

    .subject-card-title {
      font-family: var(--font-display);
      font-size: 0.98rem;
      color: var(--ink-dark);
      line-height: 1.3;
      font-weight: 400;
      flex: 1;
    }

    .subject-card-hook {
      font-size: 0.81rem;
      color: var(--ink-light);
      line-height: 1.55;
      flex: 1;
      margin-bottom: 0.9rem;
      min-height: calc(0.81rem * 1.55 * 3);
      display: -webkit-box;
      line-clamp: 3;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .subject-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-top: auto;
    }

    .subject-card-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      min-width: 0;
    }

    .category-chip {
      --chip-rgb: 74, 124, 120;
      display: inline-flex;
      align-items: center;
      padding: 0.18rem 0.5rem;
      border-radius: 999px;
      border: 1px solid rgba(var(--chip-rgb), 0.24);
      background: rgba(var(--chip-rgb), 0.11);
      color: rgb(var(--chip-rgb));
      font-size: 0.68rem;
      font-weight: 600;
      line-height: 1.2;
    }

    .category-chip.cat-relationships-society {
      --chip-rgb: 166, 78, 88;
    }

    .category-chip.cat-self-identity {
      --chip-rgb: 126, 82, 174;
    }

    .category-chip.cat-mind-behaviour {
      --chip-rgb: 62, 116, 184;
    }

    .category-chip.cat-work-purpose {
      --chip-rgb: 178, 118, 42;
    }

    .category-chip.cat-culture-world {
      --chip-rgb: 78, 138, 72;
    }

    .category-chip.cat-language-expression {
      --chip-rgb: 34, 138, 132;
    }

    .category-chip.cat-society-ideas {
      --chip-rgb: 88, 96, 148;
    }

    html[data-theme="night"] .category-chip {
      background: rgba(var(--chip-rgb), 0.20);
      border-color: rgba(var(--chip-rgb), 0.36);
    }

    .timestamp-chip {
      font-size: 0.7rem;
      color: var(--stone-dark);
      font-style: italic;
    }

    .btn-launch {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      min-width: 104px;
      padding: 0.4rem 0.85rem;
      padding: 0.4rem 0.85rem;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(var(--accent-rgb), 0.3);
      background: var(--accent-pale);
      color: var(--accent);
      font-family: var(--font-body);
      font-size: 0.76rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--t);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-launch:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* Night mode card overrides */
    html[data-theme="night"] .subject-card,
    html[data-theme="night"] .progress-card {
      background: rgba(88, 76, 64, 0.55);
      border-color: rgba(255, 255, 255, 0.13);
    }

    html[data-theme="night"] .subject-card:hover,
    html[data-theme="night"] .progress-card:hover {
      background: rgba(98, 85, 71, 0.72);
      border-color: rgba(var(--accent-rgb), 0.48);
    }

    html[data-theme="night"] .btn-launch,
    html[data-theme="night"] .btn-launch-sm {
      background: rgba(var(--accent-rgb), 0.22);
      border-color: rgba(var(--accent-rgb), 0.38);
      color: var(--accent-soft);
    }

    html[data-theme="night"] .btn-launch:hover,
    html[data-theme="night"] .btn-launch-sm:hover {
      background: rgba(var(--accent-rgb), 0.55);
      color: #fff;
    }

    html[data-theme="night"] .hub-meta-chip {
      background: rgba(76, 66, 55, 0.78);
      border-color: rgba(255, 255, 255, 0.13);
    }

    html[data-theme="night"] .hub-meta-chip.session {
      background: rgba(var(--accent-rgb), 0.18);
      border-color: rgba(var(--accent-rgb), 0.28);
      color: var(--accent-soft);
    }

    /* ============================================================ NO RESULTS */
    .no-results-banner {
      display: none;
      text-align: center;
      padding: 3rem 1rem;
      color: var(--stone-dark);
    }

    .no-results-banner.visible {
      display: block;
    }

    .no-results-banner p {
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .no-results-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      color: var(--ink-light);
      margin-bottom: 0.4rem;
    }

    /* ============================================================ EMPTY STATE (no registered subjects) */
    .empty-library {
      text-align: center;
      padding: 4rem 1rem;
    }

    .empty-library-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--accent-pale);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
      color: var(--accent);
    }

    .empty-library h2 {
      font-family: var(--font-display);
      font-size: 1.35rem;
      color: var(--ink-dark);
      font-weight: 400;
      margin-bottom: 0.5rem;
    }

    .empty-library p {
      font-size: 0.88rem;
      color: var(--ink-light);
      line-height: 1.65;
      max-width: 44ch;
      margin: 0 auto;
    }

    /* ============================================================ BRIDGE ERROR */
    .bridge-error {
      max-width: 480px;
      margin: 4rem auto;
      text-align: center;
      padding: 0 1rem;
    }

    .bridge-error h2 {
      font-family: var(--font-display);
      font-size: 1.3rem;
      color: var(--ink-dark);
      font-weight: 400;
      margin-bottom: 0.5rem;
    }

    .bridge-error p {
      font-size: 0.88rem;
      color: var(--ink-light);
      line-height: 1.65;
    }

    /* ============================================================ SESSION MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(20, 17, 12, 0.52);
      backdrop-filter: blur(6px);
      z-index: 600;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .modal-overlay.open {
      display: flex;
      animation: fadeIn 0.18s ease;
    }

    .modal-panel {
      background: var(--white);
      border-radius: var(--radius-lg);
      max-width: 420px;
      width: 100%;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.22s cubic-bezier(0.34, 1.25, 0.64, 1);
      max-height: 90svh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    html[data-theme="night"] .modal-panel {
      background: #4c4237;
      border: 1px solid rgba(255, 255, 255, 0.13);
    }

    .modal-header {
      padding: 1.3rem 1.5rem 1rem;
      border-bottom: 1px solid var(--stone-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    html[data-theme="night"] .modal-header {
      background: #463d33;
      border-bottom-color: rgba(255, 255, 255, 0.13);
    }

    .modal-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--ink-dark);
    }

    .modal-close {
      width: 30px;
      height: 30px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--stone-light);
      background: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--ink-light);
    }

    .modal-close:hover {
      background: var(--cream-warm);
    }

    .modal-body {
      padding: 1.2rem 1.5rem 1.5rem;
      overflow-y: auto;
      flex: 1;
    }

    .modal-helper {
      font-size: 0.78rem;
      color: var(--stone-dark);
      margin-bottom: 0.9rem;
      line-height: 1.5;
    }

    .modal-section-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin: 0.9rem 0 0.45rem;
    }

    .session-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 0.7rem;
    }

    .session-item {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.6rem 0.8rem;
      border: 1px solid var(--stone-light);
      border-radius: var(--radius-sm);
      background: var(--cream-warm);
      transition: var(--t);
    }

    .session-item.active {
      border-color: var(--accent);
      background: var(--accent-pale);
    }

    html[data-theme="night"] .session-item {
      background: rgba(70, 61, 51, 0.74);
      border-color: rgba(255, 255, 255, 0.13);
    }

    html[data-theme="night"] .session-item.active {
      background: rgba(52, 79, 75, 0.76);
      border-color: rgba(131, 185, 179, 0.48);
    }

    .session-item-name {
      flex: 1;
      font-size: 0.86rem;
      font-weight: 500;
      color: var(--ink);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .session-item-badge {
      font-size: 0.64rem;
      font-weight: 600;
      background: var(--accent);
      color: #fff;
      border-radius: 20px;
      padding: 0.12rem 0.45rem;
    }

    .session-item-actions {
      display: flex;
      gap: 0.3rem;
      flex-shrink: 0;
    }

    .session-action-btn {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--stone-light);
      background: var(--white);
      color: var(--stone-dark);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--t);
    }

    .session-action-btn:hover {
      color: var(--ink);
      border-color: var(--stone);
    }

    .session-action-btn.danger:hover {
      color: var(--danger-text);
      border-color: var(--danger-border);
      background: var(--danger-bg);
    }

    html[data-theme="night"] .session-action-btn {
      background: rgba(76, 66, 55, 0.78);
      border-color: rgba(255, 255, 255, 0.13);
      color: var(--ink-light);
    }

    .session-new-form {
      display: flex;
      gap: 0.45rem;
    }

    .session-input {
      flex: 1;
      padding: 0.58rem 0.8rem;
      border: 1.5px solid var(--stone-light);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 0.86rem;
      color: var(--ink);
      background: var(--white);
      outline: none;
      transition: border-color var(--t);
      min-height: 42px;
    }

    .session-input:focus {
      border-color: var(--accent);
    }

    html[data-theme="night"] .session-input {
      background: rgba(58, 51, 43, 0.82);
      border-color: rgba(255, 255, 255, 0.16);
      color: var(--ink);
    }

    select.session-input {
      appearance: none;
      padding-right: 2.35rem;
      background-image: url("data:image/svg+xml,%3Csvg width='14' height='14' viewBox='0 0 14 14' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M3.5 5.25L7 8.75L10.5 5.25' stroke='%237a7268' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-size: 14px 14px;
      background-position: right 0.7rem center;
    }

    html[data-theme="night"] select.session-input {
      background-image: url("data:image/svg+xml,%3Csvg width='14' height='14' viewBox='0 0 14 14' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M3.5 5.25L7 8.75L10.5 5.25' stroke='%23d6cabc' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    }

    .btn-primary {
      padding: 0.58rem 1.05rem;
      border-radius: var(--radius-sm);
      border: none;
      background: var(--accent);
      color: #fff;
      font-family: var(--font-body);
      font-size: 0.84rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--t);
      white-space: nowrap;
      min-height: 42px;
    }

    .btn-primary:hover {
      background: var(--accent-soft);
    }

    .btn-ghost {
      padding: 0.58rem 0.95rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--stone-light);
      background: var(--cream-warm);
      font-family: var(--font-body);
      font-size: 0.84rem;
      font-weight: 500;
      color: var(--ink-light);
      cursor: pointer;
      transition: var(--t);
      min-height: 42px;
    }

    .btn-ghost:hover {
      border-color: var(--stone);
      color: var(--ink);
    }

    .session-error {
      font-size: 0.76rem;
      color: var(--danger-text);
      margin-top: 0.45rem;
      min-height: 1rem;
      opacity: 0;
      transition: opacity var(--t);
    }

    .session-error.visible {
      opacity: 1;
    }

    /* ============================================================ CONFIRM DIALOG */
    .confirm-dialog {
      position: fixed;
      inset: 0;
      z-index: 800;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: rgba(20, 17, 12, 0.50);
      backdrop-filter: blur(6px);
    }

    .confirm-dialog.open {
      display: flex;
      animation: fadeIn 0.15s ease;
    }

    .confirm-panel {
      background: var(--white);
      border-radius: var(--radius-md);
      max-width: 360px;
      width: 100%;
      padding: 1.4rem;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.2s cubic-bezier(0.34, 1.25, 0.64, 1);
    }

    html[data-theme="night"] .confirm-panel {
      background: #4c4237;
      border: 1px solid rgba(255, 255, 255, 0.13);
    }

    .confirm-title {
      font-size: 0.94rem;
      font-weight: 600;
      color: var(--ink-dark);
      margin-bottom: 0.45rem;
    }

    .confirm-message {
      font-size: 0.83rem;
      color: var(--ink-light);
      line-height: 1.55;
      margin-bottom: 1.1rem;
    }

    .confirm-input {
      width: 100%;
      padding: 0.58rem 0.8rem;
      border: 1.5px solid var(--stone-light);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 0.86rem;
      color: var(--ink);
      background: var(--white);
      outline: none;
      transition: var(--t);
      margin-bottom: 0.45rem;
      display: none;
      min-height: 42px;
    }

    .confirm-input.visible {
      display: block;
    }

    .confirm-input:focus {
      border-color: var(--accent);
    }

    .confirm-error {
      font-size: 0.76rem;
      color: var(--danger-text);
      margin-bottom: 0.75rem;
      display: none;
    }

    .confirm-error.visible {
      display: block;
    }

    .confirm-actions {
      display: flex;
      gap: 0.45rem;
      justify-content: flex-end;
    }

    .btn-danger {
      padding: 0.55rem 0.95rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--danger-border);
      background: var(--danger-bg);
      color: var(--danger-text);
      font-family: var(--font-body);
      font-size: 0.83rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--t);
      min-height: 40px;
    }

    .btn-danger:hover {
      background: #fee2e2;
    }

    /* ============================================================ TOAST */
    .hub-toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--white);
      border: 1px solid var(--stone);
      border-radius: var(--radius-md);
      padding: 0.65rem 1.15rem;
      font-size: 0.84rem;
      color: var(--ink-light);
      z-index: 900;
      box-shadow: var(--shadow-md);
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
      max-width: calc(100vw - 2rem);
    }

    .hub-toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ============================================================ UTILITIES */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ============================================================ RESPONSIVE */
    @media (max-width: 680px) {
      .spine {
        display: none !important;
      }

      .mobile-header {
        display: flex !important;
      }

      .hub-main {
        padding: 1.75rem 1rem 4rem;
      }

      .hub-intro {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.75rem;
      }

      .category-grid {
        grid-template-columns: 1fr;
      }

      .inprogress-grid {
        grid-template-columns: 1fr;
      }

      .hub-meta {
        flex-direction: row;
      }
    }

    @media (min-width: 681px) {
      .mobile-header {
        display: none !important;
      }

      .drawer-overlay,
      .drawer {
        display: none !important;
      }
    }
  </style>
</head>
