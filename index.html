      reg.recentActivity = (reg.recentActivity || []).filter(a => a && a.sessionId !== id);
      Bridge.writeRegistry(reg);

      // 3) Remove this session's welcome image.
      const atmosphereMap = readSessionAtmosphereImages();
      if (atmosphereMap[id]) {
        delete atmosphereMap[id];
        writeSessionAtmosphereImages(atmosphereMap);
      }

      // 4) Remove the session record itself (bridge owns active reassignment).
      Bridge.deleteSession(id); // dispatches event if it was active

      renderHome();
    }

    // ================================================================
    // MOBILE DRAWER
    // ================================================================
    function openDrawer() {
      renderDrawerHubNav();
      const overlay = document.getElementById('drawer-overlay');
      overlay.style.display = 'block';
      document.getElementById('drawer').classList.add('open');
      document.body.style.overflow = 'hidden';
      setTimeout(() => overlay.classList.add('open'), 10);
    }
    function closeDrawer() {
      const overlay = document.getElementById('drawer-overlay');
      overlay.classList.remove('open');
      document.getElementById('drawer').classList.remove('open');
      document.body.style.overflow = '';
      setTimeout(() => { overlay.style.display = ''; }, 300);
    }

    // ================================================================
    // HEADER / DRAWER HUB NAVIGATION
    // Header nav is hub-level: Atlas, Compass, Arcade.
    // WORLDS remains lesson-world data for Atlas cards.
    // ================================================================
    function isHubAvailable(hub, reg) {
      if (!hub) return false;
      if (hub.alwaysAvailable) return true;

      if (hub.worldId === COMPASS_ID) {
        return isWorldAvailable(reg, COMPASS_ID) || worldHasItems(reg, COMPASS_ID);
      }

      if (hub.worldId === ARCADE_ID) {
        return isWorldAvailable(reg, ARCADE_ID);
      }

      return false;
    }

    function openHub(hubId) {
      const hub = HUB_NAV[hubId];
      if (!hub) return;

      if (hub.id === ACTIVE_HUB_ID) {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }

      if (hub.worldId) {
        openWorld(hub.worldId);
        return;
      }

      if (hub.launchUrl) {
        navigateTo(hub.launchUrl);
        return;
      }

      showToast('That destination is not available yet.');
    }

    function renderSpineHubNav() {
      const reg = getRegistry();
      const host = document.getElementById('spine-worlds');
      if (!host) return;

      host.innerHTML = Object.values(HUB_NAV).map(hub => {
        const active = hub.id === ACTIVE_HUB_ID;
        const available = isHubAvailable(hub, reg);
        const disabledAttr = available ? '' : ' aria-disabled="true"';
        const activeClass = active ? ' is-active' : '';
        const onclick = available ? ' onclick="openHub(\'' + hub.id + '\')"' : '';
        const title = active
          ? hub.name
          : available
            ? 'Open ' + hub.name
            : hub.name + ' \u2014 coming soon';

        return '<button class="spine-world-btn' + activeClass + '"' +
          disabledAttr +
          onclick +
          (active ? ' aria-current="page"' : '') +
          ' title="' + escAttr(title) + '">' +
          hub.smallIcon +
          hub.name +
          '</button>';
      }).join('');
    }

    function renderDrawerHubNav() {
      const reg = getRegistry();
      const host = document.getElementById('drawer-worlds');
      if (!host) return;

      host.innerHTML = Object.values(HUB_NAV).map(hub => {
        const active = hub.id === ACTIVE_HUB_ID;
        const available = isHubAvailable(hub, reg);
        const disabledAttr = available ? '' : ' aria-disabled="true"';
        const activeClass = active ? ' is-active' : '';
        const onclick = available ? ' onclick="closeDrawer();openHub(\'' + hub.id + '\')"' : '';

        return '<button class="drawer-nav-item' + activeClass + '"' +
          disabledAttr +
          onclick +
          (active ? ' aria-current="page"' : '') +
          '>' +
          hub.smallIcon +
          hub.name +
          (available ? '' : '<span class="nav-soon">Soon</span>') +
          '</button>';
      }).join('');
    }

    // ================================================================
    // LANGUAGE REVIEW — focused inline view (replaces home content)
    // ================================================================
    let reviewState = null; // { set: [...], idx, revealed }
    let defaultSetupDismissed = false;

    function openLanguageReview() {
      const session = getActiveSession();
      const ledger = getLedger();
      const set = getReviewSet(ledger, session.id);
      if (!set.length) { renderHome(); return; } // nothing to review; stay home
      reviewState = { set: set, idx: 0, revealed: false };
      renderReviewView();
    }
    function closeLanguageReview() {
      reviewState = null;
      renderHome();
    }
    function reviewReveal() {
      if (!reviewState) return;
      reviewState.revealed = true;
      renderReviewView();
    }
    function reviewNext() {
      if (!reviewState) return;
      if (reviewState.idx < reviewState.set.length - 1) {
        reviewState.idx++;
        reviewState.revealed = false;
        renderReviewView();
      }
    }
    function reviewPrev() {
      if (!reviewState) return;
      if (reviewState.idx > 0) {
        reviewState.idx--;
        reviewState.revealed = false;
        renderReviewView();
      }
    }
    function renderReviewView() {
      const session = getActiveSession();
      const st = reviewState;
      const entry = st.set[st.idx];
      const total = st.set.length;
      const atLast = st.idx === total - 1;
      const contextName = isDefaultSession(session) ? 'this session' : escHtml(session.name);

      const savedText = value => typeof value === 'string' ? value.trim() : '';
      const promptText = savedText(entry.atlasPrompt) || savedText(entry.reviewPrompt);
      const meaningText = savedText(entry.definition) || savedText(entry.def);
      const beforeText = savedText(entry.ordinary);
      const upgradeText = savedText(entry.upgraded) || savedText(entry.inAction);

      const type = entry.type ? '<div class="recall-type">' + escHtml(entry.type) + '</div>' : '';
      const prompt = promptText
        ? '<div class="recall-prompt"><span class="recall-prompt-label">Prompt</span>' + escHtml(promptText) + '</div>'
        : '';

      let answer = '';
      if (st.revealed) {
        const meaning = meaningText
          ? '<div class="recall-answer-section"><div class="recall-answer-label">Meaning</div><div class="recall-def">' + escHtml(meaningText) + '</div></div>'
          : '';
        const before = beforeText
          ? '<div class="recall-answer-section example"><div class="recall-answer-label">Before</div><div class="recall-inaction">' + escHtml(beforeText) + '</div></div>'
          : '';
        const upgrade = upgradeText
          ? '<div class="recall-answer-section example"><div class="recall-answer-label">Upgrade</div><div class="recall-inaction">' + escHtml(upgradeText) + '</div></div>'
          : '';
        answer = '<div class="recall-answer">' + meaning + before + upgrade +
          (!meaning && !before && !upgrade ? '<div class="recall-def" style="color:var(--ink-quiet)">No further detail was saved for this item.</div>' : '') +
          '</div>';
      }

      const revealOrNav = st.revealed
        ? '<div class="review-controls">' +
        '<button class="review-nav-btn" onclick="reviewPrev()" ' + (st.idx === 0 ? 'disabled' : '') + '>' +
        '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 3L5 7l4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>Previous</button>' +
        (atLast
          ? '<button class="review-nav-btn primary" onclick="closeLanguageReview()">Done</button>'
          : '<button class="review-nav-btn primary" onclick="reviewNext()">Next' +
          '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>') +
        '</div>'
        : '<button class="recall-reveal-btn" onclick="reviewReveal()">' +
        '<svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M1 7.5S3.5 3 7.5 3s6.5 4.5 6.5 4.5-2.5 4.5-6.5 4.5S1 7.5 1 7.5Z" stroke="currentColor" stroke-width="1.2"/><circle cx="7.5" cy="7.5" r="1.8" stroke="currentColor" stroke-width="1.2"/></svg>' +
        'Reveal meaning</button>';

      const main = document.getElementById('atlas-main');
      main.className = ''; // detach .atlas-main constraints; review-view sets its own
      main.innerHTML =
        '<div class="review-view">' +
        '<div class="review-topbar">' +
        '<button class="review-back" onclick="closeLanguageReview()">' +
        '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M8.5 3L4.5 7l4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>Back</button>' +
        '<span class="review-progress">' + (st.idx + 1) + ' of ' + total + '</span>' +
        '</div>' +
        '<div class="review-heading">' +
        '<div class="review-heading-label">Saved language</div>' +
        '<h1 class="review-heading-title">Warm up before you start</h1>' +
        '</div>' +
        '<p class="review-context">Saved language for ' + contextName + '. Try to recall the meaning before revealing.</p>' +
        '<div class="recall-card">' +
        type +
        '<div class="recall-term">' + escHtml(entry.term || '\u2014') + '</div>' +
        prompt +
        (st.revealed ? answer : revealOrNav) +
        '</div>' +
        (st.revealed ? revealOrNav : '') +
        '</div>';
    }

    // ================================================================
    // HOME RENDER
    // ================================================================
    function setSessionLabels() {
      const session = getActiveSession();
      const display = AtlasSessionPanel.getSessionDisplayName(session);
      ['spine-session-name', 'mobile-session-name', 'drawer-session-name'].forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.textContent = display;
          const trigger = el.closest('button');
          if (trigger) trigger.setAttribute('aria-label', 'Open session panel. Working with ' + display);
        }
      });
    }

    function renderHome() {
      reviewState = null;
      const main = document.getElementById('atlas-main');
      main.className = 'atlas-main';

      const session = getActiveSession();
      const reg = getRegistry();
      const ledger = getLedger();

      applyEffectiveAtmosphereImage();

      setSessionLabels();
      renderSpineHubNav();

      const isDefault = isDefaultSession(session);
      const continueItem = getContinueItem(reg, session.id);
      const latestHandoff = continueItem ? getLatestHandoff(session.id) : null;
      const continueHandoff = getMatchingCompassHandoff(continueItem, latestHandoff);
      const reviewSet = getReviewSet(ledger, session.id);
      const hasContinue = !!continueItem;
      const hasReview = reviewSet.length > 0;
      const sessionStates = (reg.sessionStates || {})[session.id];
      const hasHistory = !!(sessionStates && Object.keys(sessionStates).length);

      if (!continueHandoff || continueHandoff.id !== expandedContinueHandoffId) {
        expandedContinueHandoffId = null;
      }

      // True-empty state: default session, no saved language, no history.
      if (isDefault && !defaultSetupDismissed && !hasContinue && !hasReview && !hasHistory) {
        main.innerHTML = renderEmptyState();
        return;
      }

      main.innerHTML = renderGateway(
        session,
        isDefault,
        continueItem,
        continueHandoff,
        hasContinue,
        reviewSet,
        hasReview
      );
    }

    function renderEmptyState() {
      return '' +
        '<div class="empty-setup">' +
        '<div class="today-label">Welcome</div>' +
        '<h1 class="empty-setup-title">Who is this lesson with?</h1>' +
        '<p class="empty-setup-sub">Add a name to keep each learner\u2019s progress and review separate, or continue without one.</p>' +
        '<div class="empty-form">' +
        '<input class="session-input" id="empty-name-input" type="text" placeholder="Learner name" maxlength="40" autocomplete="off" style="flex:1">' +
        '<button class="btn-primary" onclick="startWithName()">Start lesson</button>' +
        '</div>' +
        '<button class="empty-default-link" onclick="startWithDefault()">Continue without a name</button>' +
        '</div>' +
        '<p class="doors-label" style="margin-top:2.25rem">Choose a world</p>' +
        renderDoors();
    }
    function startWithName() {
      const inp = document.getElementById('empty-name-input');
      if (!inp) return;
      const name = inp.value.trim();
      if (!name) { inp.focus(); return; }
      const created = Bridge.createSession(name);
      if (!created) {
        inp.style.borderColor = 'var(--danger)';
        setTimeout(() => { inp.style.borderColor = ''; }, 1200);
        return;
      }
      // Event listener re-renders; call renderHome directly too for immediacy.
      renderHome();
    }
    function startWithDefault() {
      defaultSetupDismissed = true;
      renderHome();
    }

    function renderGateway(session, isDefault, continueItem, continueHandoff, hasContinue, reviewSet, hasReview) {
      // Greeting copy — warm, plain, no system language.
      let welcomeMain, welcomeSub;
      if (hasContinue) {
        welcomeMain = isDefault ? 'Ready to continue.' : 'Welcome back, ' + escHtml(session.name) + '.';
        welcomeSub = '';
      } else {
        welcomeMain = isDefault ? 'Ready when you are.' : 'Welcome, ' + escHtml(session.name) + '.';
        welcomeSub = 'Choose a direction for today\u2019s lesson.';
      }

      return '' +
        '<div class="context-anchor">' +
        '<div class="today-label">Today</div>' +
        '<h1 class="welcome-line">' + welcomeMain + '</h1>' +
        (welcomeSub ? '<p class="welcome-sub">' + welcomeSub + '</p>' : '') +
        '</div>' +
        (hasContinue ? renderContinueCard(continueItem, continueHandoff) : '') +
        (hasReview ? renderReviewRow(reviewSet.length) : '') +
        '<p class="doors-label">Choose a world</p>' +
        renderDoors();
    }

    function renderContinueCard(item, handoff) {
      const url = item.launchUrl || '';
      const meta = continueLabel(item);
      const world = itemWorldLabel(item);
      const metaLine = world ? meta + ' \u00b7 ' + world : meta;
      const pct = continueCoverage(item);
      const exploredItems = handoff && Array.isArray(handoff.exploredItems)
        ? handoff.exploredItems.filter(explored =>
          explored && typeof explored.title === 'string' && explored.title.trim()
        )
        : [];
      const savedLanguageCount = handoff
        ? Math.max(0, Math.floor(Number(handoff.savedLanguageCount) || 0))
        : 0;
      const pickupLabel = handoff && typeof handoff.pickupLabel === 'string'
        ? handoff.pickupLabel.trim()
        : '';
      const pickupRef = handoff && typeof handoff.pickupRef === 'string'
        ? handoff.pickupRef.trim()
        : '';
      const finalExploredItem = exploredItems[exploredItems.length - 1] || null;
      const anchorLabel = pickupLabel || (finalExploredItem
        ? finalExploredItem.title.trim()
        : '');
      let anchorIndex = -1;

      if (anchorLabel && exploredItems.length) {
        if (pickupRef) {
          anchorIndex = exploredItems.map(explored => explored.id).lastIndexOf(pickupRef);
        }

        if (anchorIndex < 0 && pickupLabel) {
          anchorIndex = exploredItems.map(explored => explored.title.trim()).lastIndexOf(pickupLabel);
        }

        if (anchorIndex < 0 && !pickupLabel) {
          anchorIndex = exploredItems.length - 1;
        }
      }

      const recapExploredItems = !anchorLabel || exploredItems.length === 0
        ? exploredItems
        : exploredItems.length === 1
          ? []
          : anchorIndex >= 0
            ? exploredItems.slice(0, anchorIndex)
            : exploredItems;
      const hasRecapEvidence = exploredItems.length > 0 || savedLanguageCount > 0;
      const handoffId = handoff && typeof handoff.id === 'string'
        ? handoff.id
        : '';
      const recapExpanded = Boolean(
        hasRecapEvidence && handoffId && expandedContinueHandoffId === handoffId
      );
      const recapId = 'continue-recap-region';
      const subjectTitle = handoff && typeof handoff.subjectTitle === 'string' && handoff.subjectTitle.trim()
        ? handoff.subjectTitle.trim()
        : itemTitle(item);

      const rail = (pct !== null)
        ? '<div class="continue-rail' + (pct >= 100 ? ' is-complete' : '') + '" aria-hidden="true">' +
        '<div class="continue-rail-fill" style="width:' + pct + '%"></div>' +
        '</div>'
        : '';

      const pickup = anchorLabel
        ? '<div class="continue-pickup"><span class="continue-pickup-label">Pick up from</span> \u2014 ' + escHtml(anchorLabel) + '</div>'
        : '';

      const exploredSection = recapExploredItems.length
        ? '<div class="continue-recap-section">' +
        '<h3 class="continue-recap-heading">You explored</h3>' +
        '<ul class="continue-recap-list">' + recapExploredItems.map(explored =>
          '<li>' + escHtml(explored.title.trim()) + '</li>'
        ).join('') + '</ul>' +
        '</div>'
        : '';

      const savedLanguageSection = savedLanguageCount > 0
        ? '<div class="continue-recap-section">' +
        '<h3 class="continue-recap-heading">Saved language</h3>' +
        '<p class="continue-recap-copy">' + savedLanguageCount + ' item' + (savedLanguageCount === 1 ? '' : 's') + ' saved</p>' +
        '</div>'
        : '';

      const endedOnSection = anchorLabel
        ? '<div class="continue-recap-section">' +
        '<h3 class="continue-recap-heading">We ended on</h3>' +
        '<p class="continue-recap-copy">' + escHtml(anchorLabel) + '</p>' +
        '</div>'
        : '';

      const recap = hasRecapEvidence
        ? '<section class="continue-recap" id="' + recapId + '" role="region" aria-label="Last lesson recap for ' + escAttr(subjectTitle) + '"' + (recapExpanded ? '' : ' hidden') + '>' +
        '<div class="continue-recap-kicker">Last lesson \u00b7 ' + escHtml(subjectTitle) + '</div>' +
        exploredSection +
        savedLanguageSection +
        endedOnSection +
        '</section>'
        : '';

      const recapToggle = hasRecapEvidence
        ? '<button type="button" class="continue-action" id="continue-recap-toggle" ' +
        'data-handoff-id="' + escAttr(handoffId) + '" ' +
        'aria-expanded="' + String(recapExpanded) + '" aria-controls="' + recapId + '" ' +
        'onclick="toggleContinueRecapFromButton(this)">' +
        (recapExpanded ? 'Close recap' : 'Open recap') +
        '</button>'
        : '';

      const continueButton = '<button type="button" class="continue-action is-primary" ' +
        'data-launch-url="' + escAttr(url) + '" onclick="navigateFromContinueButton(this)" ' +
        'aria-label="Continue ' + escAttr(itemTitle(item)) + '">' +
        '<span>Continue</span>' +
        '<span class="continue-arrow" aria-hidden="true">' +
        '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 8h8M9 5l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
        '</span>' +
        '</button>';
      const continueActions = '<div class="continue-actions">' + recapToggle + continueButton + '</div>';

      return '' +
        '<div class="continue-card' + (rail ? ' has-rail' : '') + (recapExpanded ? ' is-expanded' : '') + '">' +
        '<div class="continue-summary">' +
        '<div class="continue-icon">' +
        '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 9h10M10 5l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
        '</div>' +
        '<div class="continue-body">' +
        '<div class="continue-kicker">Continue</div>' +
        '<div class="continue-title">' + escHtml(itemTitle(item)) + '</div>' +
        '<div class="continue-meta">' + escHtml(metaLine) + '</div>' +
        pickup +
        '</div>' +
        (recapExpanded ? '' : continueActions) +
        '</div>' +
        recap +
        (recapExpanded ? continueActions : '') +
        rail +
        '</div>';
    }

    function toggleContinueRecapFromButton(button) {
      const handoffId = button && button.dataset
        ? button.dataset.handoffId || ''
        : '';

      if (!handoffId) return;

      expandedContinueHandoffId = expandedContinueHandoffId === handoffId
        ? null
        : handoffId;

      renderHome();

      window.requestAnimationFrame(() => {
        const toggle = document.getElementById('continue-recap-toggle');
        if (toggle) toggle.focus({ preventScroll: true });
      });
    }

    function navigateFromContinueButton(button) {
      navigateTo(button && button.dataset ? button.dataset.launchUrl || '' : '');
    }

    function renderReviewRow(count) {
      const countLabel = count + ' saved item' + (count !== 1 ? 's' : '') + ' ready';
      return '' +
        '<button class="review-row" onclick="openLanguageReview()" aria-label="Open saved language review">' +
        '<div class="review-row-icon">' +
        '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 2.5h5c.7 0 1.3.3 1.8.7.5-.4 1.1-.7 1.8-.7H14c.3 0 .5.2.5.5v10c0 .3-.2.5-.5.5h-2.5c-.7 0-1.3.3-1.8.7-.5-.4-1.1-.7-1.8-.7H4c-.3 0-.5-.2-.5-.5v-10C3.5 2.7 3.7 2.5 4 2.5Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M9.5 3v11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>' +
        '</div>' +
        '<div class="review-row-body">' +
        '<div class="review-row-name">Saved language</div>' +
        '<div class="review-row-count">Review before you start \u00b7 ' + countLabel + '</div>' +
        '</div>' +
        '<div class="review-row-arrow">' +
        '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7h8M8 4l3 3-3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
        '</div>' +
        '</button>';
    }

    function renderDoors() {
      const reg = getRegistry();
      return '<div class="doors-grid">' +
        renderDoor(WORLDS.compass, reg) +
        renderDoor(WORLDS.arcade, reg) +
        '</div>';
    }
    function renderDoor(world, reg) {
      // Compass counts as available if it has a hub URL OR registered items.
      const available = isWorldAvailable(reg, world.id) ||
        (world.id === COMPASS_ID && worldHasItems(reg, COMPASS_ID));
      const cls = 'door ' + world.cssClass + (available ? '' : ' door-unavailable');
      const interactive = available
        ? 'role="button" tabindex="0" onclick="openWorld(\'' + world.id + '\')" ' +
        'onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();openWorld(\'' + world.id + '\')}"'
        : 'aria-disabled="true"';
      const footer = available
        ? '<div class="door-footer"><div class="door-arrow"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 8h8M9 5l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div>'
        : '<div class="door-footer"><span class="door-soon-badge">Coming soon</span></div>';
      return '<div class="' + cls + '" ' + interactive +
        ' aria-label="' + escAttr(world.name) + (available ? '' : ' (coming soon)') + '">' +
        '<div class="door-icon">' + world.iconSvg + '</div>' +
        '<div class="door-name">' + escHtml(world.name) + '</div>' +
        '<h2 class="door-title">' + escHtml(world.name) + '</h2>' +
        '<p class="door-desc">' + escHtml(world.desc) + '</p>' +
        footer +
        '</div>';
    }

    // ================================================================
    // SETTINGS — Atlas welcome image
    // Session-specific image. Global favourites only.
    // ================================================================

    function readSessionAtmosphereImages() {
      try { return JSON.parse(localStorage.getItem(SESSION_ATMOSPHERE_KEY) || '{}') || {}; }
      catch (e) { return {}; }
    }

    function writeSessionAtmosphereImages(map) {
      try {
        if (Object.keys(map).length) {
          localStorage.setItem(SESSION_ATMOSPHERE_KEY, JSON.stringify(map));
        } else {
          localStorage.removeItem(SESSION_ATMOSPHERE_KEY);
        }
      } catch (e) { }
    }

    function readSessionAtmosphereImage(sessionId) {
      return readSessionAtmosphereImages()[sessionId] || '';
    }

    function writeCurrentSessionAtmosphereImage(url) {
      const session = getActiveSession();
      const clean = (url || '').trim();
      const map = readSessionAtmosphereImages();

      if (clean) map[session.id] = clean;
      else delete map[session.id];

      writeSessionAtmosphereImages(map);
    }

    function readEffectiveAtmosphereImage() {
      const session = getActiveSession();
      return readSessionAtmosphereImage(session.id);
    }

    function readAtmosphereFavorites() {
      try {
        const list = JSON.parse(localStorage.getItem(ATMOSPHERE_FAVORITES_KEY) || '[]');
        return Array.isArray(list) ? list.filter(Boolean) : [];
      } catch (e) {
        return [];
      }
    }

    function writeAtmosphereFavorites(list) {
      const clean = Array.from(new Set((list || []).map(x => String(x || '').trim()).filter(Boolean)))
        .slice(0, MAX_ATMOSPHERE_FAVORITES);

      try {
        if (clean.length) localStorage.setItem(ATMOSPHERE_FAVORITES_KEY, JSON.stringify(clean));
        else localStorage.removeItem(ATMOSPHERE_FAVORITES_KEY);
      } catch (e) { }
    }

    function cssImageUrl(url) {
      return 'url("' + String(url || '').replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '")';
    }

    function applyAtmosphereImage(url) {
      const layer = document.getElementById('atmosphere-layer');
      if (!layer) return;

      const clean = (url || '').trim();
      if (!clean) {
        layer.style.backgroundImage = '';
        layer.classList.remove('visible');
        return;
      }

      layer.style.backgroundImage = cssImageUrl(clean);
      layer.classList.add('visible');
    }

    function applyEffectiveAtmosphereImage() {
      applyAtmosphereImage(readEffectiveAtmosphereImage());
    }

    function updateAtmospherePreview(url) {
      const preview = document.getElementById('atmosphere-preview');
      const image = document.getElementById('atmosphere-preview-image');
      if (!preview || !image) return;

      const clean = (url || '').trim();

      if (!clean) {
        image.style.backgroundImage = '';
        preview.classList.remove('has-image');
        return;
      }

      image.style.backgroundImage = cssImageUrl(clean);
      preview.classList.add('has-image');
    }

    function renderAtmosphereFavorites() {
      const host = document.getElementById('atmosphere-favorites-list');
      if (!host) return;

      const favorites = readAtmosphereFavorites();

      if (!favorites.length) {
        host.innerHTML = '<div class="atmosphere-empty-favorites">No saved favourites yet.</div>';
        return;
      }

      host.innerHTML = favorites.map(url => {
        const encoded = escAttr(encodeURIComponent(url));

        return '<div class="atmosphere-favorite-item">' +
          '<div class="atmosphere-favorite-thumb" style="background-image:' + escAttr(cssImageUrl(url)) + '"></div>' +
          '<div class="atmosphere-favorite-url" title="' + escAttr(url) + '">' + escHtml(url) + '</div>' +
          '<div class="atmosphere-favorite-actions">' +
          '<button class="atmosphere-mini-btn" data-url="' + encoded + '" onclick="useAtmosphereFavoriteFromButton(this)">Use</button>' +
          '<button class="atmosphere-mini-btn danger" data-url="' + encoded + '" onclick="deleteAtmosphereFavoriteFromButton(this)">Delete</button>' +
          '</div>' +
          '</div>';
      }).join('');
    }

    function openSettingsModal() {
      const session = getActiveSession();
      const currentUrl = readSessionAtmosphereImage(session.id);

      const input = document.getElementById('atmosphere-input');
      if (input) input.value = currentUrl;

      updateAtmospherePreview(currentUrl);
      renderAtmosphereFavorites();

      document.getElementById('settings-modal').classList.add('open');
      document.body.style.overflow = 'hidden';

      setTimeout(() => {
        const el = document.getElementById('atmosphere-input');
        if (el) el.focus();
      }, 50);
    }

    function closeSettingsModal() {
      document.getElementById('settings-modal').classList.remove('open');
      document.body.style.overflow = '';
      applyEffectiveAtmosphereImage();
    }

    function handleSettingsModalClick(e) {
      if (e.target === document.getElementById('settings-modal')) closeSettingsModal();
    }

    function handleAtmospherePreviewInput() {
      const input = document.getElementById('atmosphere-input');
      updateAtmospherePreview(input ? input.value : '');
    }

    function handleSaveSettings() {
      const input = document.getElementById('atmosphere-input');
      const clean = input ? input.value.trim() : '';

      if (!clean) {
        showToast('Add an image URL, or use Remove image.');
        if (input) input.focus();
        return;
      }

      writeCurrentSessionAtmosphereImage(clean);
      applyEffectiveAtmosphereImage();
      closeSettingsModal();
      showToast('Welcome image saved for this session.');
    }

    function handleRemoveAtmosphere() {
      writeCurrentSessionAtmosphereImage('');
      const input = document.getElementById('atmosphere-input');
      if (input) input.value = '';

      updateAtmospherePreview('');
      applyEffectiveAtmosphereImage();
      closeSettingsModal();
      showToast('Welcome image removed for this session.');
    }

    function handleSaveAtmosphereFavorite() {
      const input = document.getElementById('atmosphere-input');
      const clean = input ? input.value.trim() : '';

      if (!clean) {
        showToast('Add an image URL before saving it to favourites.');
        if (input) input.focus();
        return;
      }

      const favorites = readAtmosphereFavorites();
      writeAtmosphereFavorites([clean].concat(favorites));
      renderAtmosphereFavorites();
      showToast('Image saved to favourites.');
    }

    function useAtmosphereFavoriteFromButton(btn) {
      const url = decodeURIComponent(btn.getAttribute('data-url') || '');
      const input = document.getElementById('atmosphere-input');

      if (input) input.value = url;
      updateAtmospherePreview(url);
    }

    function deleteAtmosphereFavoriteFromButton(btn) {
      const url = decodeURIComponent(btn.getAttribute('data-url') || '');
      const favorites = readAtmosphereFavorites().filter(x => x !== url);

      writeAtmosphereFavorites(favorites);
      renderAtmosphereFavorites();
      showToast('Favourite removed.');
    }

    // ================================================================
    // GLOBAL KEYS
    // ================================================================
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        if (window.AtlasSearch && AtlasSearch.isOpen && AtlasSearch.isOpen()) return;
        if (document.getElementById('confirm-dialog').classList.contains('open')) {
          e.stopImmediatePropagation();
          resolveConfirm(false);
          return;
        }
        if (window.AtlasSessionPanel && AtlasSessionPanel.isOpen()) return;
        if (document.getElementById('settings-modal').classList.contains('open')) { closeSettingsModal(); return; }
        if (document.getElementById('drawer').classList.contains('open')) { closeDrawer(); return; }
        if (reviewState) { closeLanguageReview(); return; }
      }
    });

    // ================================================================
    // LIVE RE-READ
    // Re-read bridge state on the agreed triggers. No invented events.
    // When in the focused review view, refresh it in place (re-validating
    // the saved language set) instead of bouncing the user back home.
    // ================================================================
    function refreshFromBridge() {
      applyAppearance(Bridge.readAppearanceMode(), false);

      if (reviewState) {
        const session = getActiveSession();
        const ledger = getLedger();
        const set = getReviewSet(ledger, session.id);
        if (!set.length) { closeLanguageReview(); return; }
        // Keep position where possible.
        reviewState.set = set;
        if (reviewState.idx > set.length - 1) reviewState.idx = set.length - 1;
        renderReviewView();
        return;
      }
      renderHome();
    }

    window.addEventListener('atlas:session-change', () => {
      // Switching learners must reset any in-progress review.
      reviewState = null;
      refreshFromBridge();
    });
    window.addEventListener('atlas:appearance-change', e => {
      const mode = (e.detail && e.detail.mode) || Bridge.readAppearanceMode();
      applyAppearance(mode, false);
    });
    window.addEventListener('focus', refreshFromBridge);
    document.addEventListener('visibilitychange', () => { if (!document.hidden) refreshFromBridge(); });
    window.addEventListener('pageshow', refreshFromBridge);
    window.addEventListener('storage', e => {
      // React only to keys the bridge owns.
      if (!e || !e.key) return;
      const k = e.key;
      if (k === Bridge.keys.appearance || k === Bridge.keys.appearanceBySession) {
        applyAppearance(Bridge.readAppearanceMode(), false);
        return;
      }
      if (k === SESSION_ATMOSPHERE_KEY || k === ATMOSPHERE_FAVORITES_KEY) {
        applyEffectiveAtmosphereImage();

        if (document.getElementById('settings-modal').classList.contains('open')) {
          renderAtmosphereFavorites();
        }

        return;
      }

      if (k === 'atlas::sessions' || k === 'atlas::activeSessionId' ||
        k === 'atlas::handoffs' ||
        k === 'atlas::registry' || k === 'learning::ledger') {
        refreshFromBridge();
      }
    });

    // ================================================================
    // UTILITIES
    // ================================================================
    function escHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function escAttr(s) { return escHtml(s); }

    // ================================================================
    // INIT
    // ================================================================
    function init() {
      if (!window.AtlasBridge) return; // guard already rendered a message

      const mode = Bridge.readAppearanceMode();
      document.documentElement.dataset.theme = mode;
      updateAppearanceButtons(mode);
      applyEffectiveAtmosphereImage();

      AtlasSearch.init({
        activeHubId: 'atlas',
        atlasUrl: './index.html',
        compassUrl: './compass/index.html',
        arcadeUrl: './arcade/index.html'
      });

      AtlasSessionPanel.mount({
        root: '#atlas-session-panel-root',
        initialView: 'manage',
        onRenameSession: handleRenameSession,
        onDeleteSession: handleDeleteSession
      });

      renderHome();
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>

</html>
