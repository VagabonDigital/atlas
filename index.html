  ==========================================================================
  ATLAS V2 · GATEWAY RUNTIME
  SmartStudy™ Methodology
  --------------------------------------------------------------------------
  The calm threshold between learning worlds.

  Atlas does not teach the lesson.
  Atlas remembers where the lesson lives.

  It reads the bridge, restores the active session, surfaces the next path,
  and gives the tutor a quiet place to begin: Continue, Review, or choose a
  world.

  Compass may deepen.
  Arcade may play.
  Business may sharpen.
  The bridge remains the contract.
  Atlas opens the way.
  --------------------------------------------------------------------------
  LIMEN APERIT · PONS MEMINIT · ORBES VOCANT
  ==========================================================================
-->

  <!-- Anti-flash: apply the active session theme before first paint. -->
  <script>
    (function () {
      var m = null;
      try {
        var sessionId = localStorage.getItem('atlas::activeSessionId') || 'default';
        var sessionModes = JSON.parse(localStorage.getItem('atlas::appearanceBySession') || '{}');
        m = sessionModes[sessionId] || localStorage.getItem('atlas::appearanceMode');
      } catch (e) { m = null; }
      document.documentElement.dataset.theme = (m === 'night') ? 'night' : 'light';
    })();
  </script>
  <style>
    /* ============================================================
       THEME TOKENS
       ============================================================ */

    /*
     * Registered colors allow the premium card gradients to
     * interpolate smoothly during the theme transition.
     */
    @property --door-c1 {
      syntax: '<color>';
      inherits: false;
      initial-value: transparent;
    }

    @property --door-c2 {
      syntax: '<color>';
      inherits: false;
      initial-value: transparent;
    }

    @property --rail-1 {
      syntax: '<color>';
      inherits: false;
      initial-value: transparent;
    }

    @property --rail-2 {
      syntax: '<color>';
      inherits: false;
      initial-value: transparent;
    }

    :root {
      /* Canvas and surfaces */
      --surface-canvas: #f3f0e9;
      --surface-muted: #ebe7de;
      --surface-panel: #fffdf9;
      --surface-raised: #fffdf9;
      --surface-drawer-scrim: rgba(0, 0, 0, 0.40);
      --surface-modal-scrim: rgba(0, 0, 0, 0.45);
      --surface-dialog-scrim: rgba(0, 0, 0, 0.50);

      /* Borders and text */
      --border-faint: rgba(49, 45, 38, 0.10);
      --border-subtle: rgba(49, 45, 38, 0.16);
      --text-subtle: #aaa297;
      --text-muted: #7b7469;
      --text-body: #504b43;
      --text-heading: #211f1b;

      /* Atlas accent */
      --accent: #526c67;
      --accent-soft: #718b85;
      --accent-pale: #e2e9e5;
      --accent-rgb: 82, 108, 103;
      --accent-ink: #ffffff;

      /* Page atmosphere */
      --page-bg-day:
        radial-gradient(circle at 12% -8%, rgba(82, 108, 103, 0.12), transparent 34rem),
        radial-gradient(circle at 100% 18%, rgba(122, 110, 154, 0.055), transparent 34rem),
        #f3f0e9;
      --page-bg-night:
        radial-gradient(circle at 12% -8%, rgba(142, 170, 163, 0.12), transparent 34rem),
        radial-gradient(circle at 100% 18%, rgba(122, 110, 154, 0.055), transparent 34rem),
        #1b1d1c;
      --atmosphere-opacity: 0.22;
      --atmosphere-filter: blur(4px) saturate(0.86) brightness(1) contrast(1);

      /* Hub chrome and controls */
      --chrome-surface: rgba(243, 240, 233, 0.84);
      --chrome-surface-mobile: rgba(243, 240, 233, 0.88);
      --world-nav-surface: var(--surface-muted);
      --world-nav-border: var(--border-faint);
      --world-nav-hover: rgba(255, 253, 249, 0.72);
      --world-nav-hover-border: var(--border-faint);
      --world-nav-hover-shadow: 0 5px 14px rgba(42, 37, 29, 0.045);
      --world-nav-active-surface: var(--surface-raised);
      --world-nav-active-border: var(--border-subtle);
      --world-nav-active-text: var(--text-heading);
      --control-surface: var(--surface-raised);
      --control-border: var(--border-faint);
      --control-border-hover: var(--border-subtle);
      --control-text: var(--text-body);
      --control-icon: var(--text-muted);
      --control-text-hover: var(--text-heading);
      --drawer-button-surface: var(--surface-muted);
      --drawer-shadow: 4px 0 24px rgba(0, 0, 0, 0.15);
      --navigation-hover: var(--surface-muted);

      /* Continuation and review states */
      --continue-surface: rgba(255, 253, 248, 0.84);
      --continue-border: rgba(82, 108, 103, 0.16);
      --continue-shadow:
        0 22px 56px rgba(55, 47, 35, 0.10),
        inset 0 1px 0 rgba(255, 255, 255, 0.76);
      --continue-action-surface: rgba(255, 255, 255, 0.34);
      --continue-action-hover: rgba(255, 255, 255, 0.72);
      --continue-primary-surface: var(--accent);
      --continue-primary-hover: #445e59;
      --continue-primary-ink: #ffffff;
      --continue-recap-surface: rgba(244, 241, 234, 0.68);
      --continue-recap-border: rgba(var(--accent-rgb), 0.15);
      --continue-recap-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.62);
      --continue-rail-fill-alpha: 0.38;
      --continue-rail-complete-alpha: 0.50;
      --review-row-surface: rgba(255, 253, 249, 0.62);
      --review-row-hover: rgba(255, 253, 249, 0.84);
      --review-row-shadow: var(--shadow-sm);
      --review-row-hover-shadow: 0 7px 20px rgba(42, 37, 29, 0.065);

      /* World navigation cards */
      --world-card-surface: rgba(255, 253, 249, 0.74);
      --world-card-border: rgba(49, 45, 38, 0.11);
      --compass-card-start: rgba(255, 253, 249, 0.90);
      --compass-card-end: rgba(92, 122, 110, 0.075);
      --compass-mark-start: #5c7a6e;
      --compass-mark-end: #7fa898;
      --compass-icon-surface: rgba(92, 122, 110, 0.12);
      --compass-text: #5c7a6e;
      --arcade-card-start: rgba(255, 253, 249, 0.92);
      --arcade-card-end: rgba(223, 87, 47, 0.035);
      --arcade-mark-start: #df572f;
      --arcade-mark-end: #ef7652;
      --arcade-icon-surface: rgba(223, 87, 47, 0.09);
      --arcade-text: #df572f;

      /* Feedback states */
      --danger-text: #b23a2e;
      --danger-bg: #fbf1f0;
      --danger-bg-hover: #ffeeee;
      --danger-border: rgba(178, 58, 46, 0.3);

      /* Elevation, geometry, typography, and motion */
      --shadow-sm: 0 2px 8px rgba(42, 37, 29, 0.045);
      --shadow-md: 0 10px 30px rgba(42, 37, 29, 0.075);
      --shadow-lg: 0 20px 56px rgba(42, 37, 29, 0.11);
      --radius-sm: 5px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --radius-xl: 20px;
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --motion-standard: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
      --hub-theme-motion: 280ms cubic-bezier(0.4, 0, 0.2, 1);

      /* Shared Atlas integration contract */
      --ink: var(--text-heading);
      --ink-quiet: var(--text-muted);
      --bg-raised: var(--surface-raised);
      --danger: var(--danger-text);
    }

    html[data-theme="night"] {
      /* Canvas and surfaces */
      --surface-canvas: #1b1d1c;
      --surface-muted: #212421;
      --surface-panel: #252826;
      --surface-raised: #252826;

      /* Borders and text */
      --border-faint: rgba(255, 255, 255, 0.08);
      --border-subtle: rgba(255, 255, 255, 0.14);
      --text-subtle: #55534e;
      --text-muted: #89847b;
      --text-body: #bdb8ae;
      --text-heading: #ebe9e4;

      /* Atlas accent */
      --accent: #8eaaa3;
      --accent-soft: #a4bdb7;
      --accent-pale: #2a3330;
      --accent-rgb: 142, 170, 163;
      --accent-ink: #ffffff;

      /* Page atmosphere */
      --atmosphere-wash-1: rgba(27, 29, 28, 0.18);
      --atmosphere-wash-2: rgba(27, 29, 28, 0.66);
      --atmosphere-wash-3: rgba(27, 29, 28, 0.38);
      --atmosphere-opacity: 0.11;
      --atmosphere-filter: blur(4px) saturate(0.8) brightness(0.68) contrast(0.98);

      /* Hub chrome and controls */
      --chrome-surface: rgba(27, 29, 28, 0.86);
      --chrome-surface-mobile: rgba(27, 29, 28, 0.90);
      --world-nav-hover: rgba(255, 255, 255, 0.055);
      --world-nav-hover-border: rgba(255, 255, 255, 0.10);
      --world-nav-hover-shadow: none;

      /* Continuation and review states */
      --continue-surface: rgba(39, 45, 42, 0.88);
      --continue-border: rgba(142, 170, 163, 0.25);
      --continue-shadow:
        0 24px 60px rgba(0, 0, 0, 0.26),
        inset 0 1px 0 rgba(255, 255, 255, 0.055);
      --continue-action-surface: rgba(255, 255, 255, 0.045);
      --continue-action-hover: rgba(255, 255, 255, 0.085);
      --continue-primary-surface: var(--accent);
      --continue-primary-hover: var(--accent);
      --continue-primary-ink: #17201e;
      --continue-recap-surface: rgba(17, 21, 19, 0.22);
      --continue-recap-border: rgba(var(--accent-rgb), 0.16);
      --continue-recap-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.035);
      --continue-rail-fill-alpha: 0.68;
      --continue-rail-complete-alpha: 0.82;
      --review-row-surface: rgba(37, 40, 38, 0.72);
      --review-row-hover: rgba(37, 40, 38, 0.72);

      /* World navigation cards */
      --world-card-border: var(--border-faint);
      --compass-card-start: rgba(37, 40, 38, 0.90);
      --compass-card-end: rgba(127, 168, 150, 0.085);
      --compass-mark-start: #8db7a7;
      --compass-mark-end: #b0d0c4;
      --compass-icon-surface: rgba(141, 183, 167, 0.17);
      --compass-text: #8db7a7;
      --arcade-card-start: rgba(37, 40, 38, 0.92);
      --arcade-card-end: rgba(255, 129, 93, 0.045);
      --arcade-mark-start: #ff815d;
      --arcade-mark-end: #ff9a7a;
      --arcade-icon-surface: rgba(255, 129, 93, 0.11);
      --arcade-text: #ff815d;

      /* Elevation */
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.22);
      --shadow-md: 0 2px 10px rgba(0, 0, 0, 0.30);
      --shadow-lg: 0 6px 26px rgba(0, 0, 0, 0.40);
    }

    /* ============================================================
       RESET AND PAGE CANVAS
       ============================================================ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      min-height: 100%;
      background: var(--surface-canvas);
      scroll-behavior: smooth;
      overflow-y: scroll;
      overflow-x: clip;
      scrollbar-gutter: stable;
    }

    body {
      position: relative;
      isolation: isolate;
      font-family: var(--font-body);
      background: transparent;
      color: var(--text-heading);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100svh;
      overflow-x: visible;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background-size: cover;
      background-position: center;
    }

    body::before {
      background: var(--page-bg-day);
      opacity: 1;
    }

    body::after {
      background: var(--page-bg-night);
      opacity: 0;
    }

    html[data-theme="night"] body::before {
      opacity: 0;
    }

    html[data-theme="night"] body::after {
      opacity: 1;
    }

    html.theme-changing body::before,
    html.theme-changing body::after {
      transition: opacity var(--hub-theme-motion);
    }

    .atmosphere-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-size: cover;
      background-position: center;
      filter: var(--atmosphere-filter);
      transform: scale(1.018);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .atmosphere-layer.visible {
      opacity: var(--atmosphere-opacity);
    }

    .atmosphere-layer::before,
    .atmosphere-layer::after {
      content: '';
      position: absolute;
      inset: 0;
      transition: opacity var(--motion-standard);
    }

    /* Day Wash */
    .atmosphere-layer::before {
      background:
        linear-gradient(180deg, rgba(243, 240, 233, 0.22), rgba(243, 240, 233, 0.68)),
        radial-gradient(circle at 50% 18%, transparent 0, rgba(243, 240, 233, 0.36) 68%);
      opacity: 1;
    }

    /* Night Wash */
    .atmosphere-layer::after {
      background:
        linear-gradient(180deg, rgba(27, 29, 28, 0.18), rgba(27, 29, 28, 0.66)),
        radial-gradient(circle at 50% 18%, transparent 0, rgba(27, 29, 28, 0.38) 68%);
      opacity: 0;
    }

    html[data-theme="night"] .atmosphere-layer::before {
      opacity: 0;
    }

    html[data-theme="night"] .atmosphere-layer::after {
      opacity: 1;
    }

    /* ============================================================
       THEME MOTION
       Bridge owns theme state. Atlas owns how Atlas surfaces interpolate.
       Source pattern for Compass and Arcade hub motion.
       ============================================================ */

    html.theme-changing,
    html.theme-changing body,
    html.theme-changing .atmosphere-layer::after,
    html.theme-changing .spine,
    html.theme-changing .spine *,
    html.theme-changing .mobile-header,
    html.theme-changing .mobile-header *,
    html.theme-changing .drawer-header,
    html.theme-changing .drawer-footer,
    html.theme-changing .drawer-title,
    html.theme-changing .drawer-title *,
    html.theme-changing .drawer-nav-label,
    html.theme-changing .drawer-nav-item,
    html.theme-changing .drawer-session-btn,
    html.theme-changing .drawer-session-btn *,
    html.theme-changing .drawer-appearance-btn,
    html.theme-changing .context-anchor::after,
    html.theme-changing .today-label,
    html.theme-changing .welcome-line,
    html.theme-changing .welcome-sub,
    html.theme-changing .continue-card,
    html.theme-changing .continue-card *,
    html.theme-changing .continue-recap,
    html.theme-changing .continue-recap *,
    html.theme-changing .continue-icon,
    html.theme-changing .continue-rail,
    html.theme-changing .continue-rail-fill,
    html.theme-changing .review-row,
    html.theme-changing .review-row *,
    html.theme-changing .door,
    html.theme-changing .door *,
    html.theme-changing .door::before,
    html.theme-changing .door-soon-badge,
    html.theme-changing .review-view,
    html.theme-changing .review-view *,
    html.theme-changing .recall-card,
    html.theme-changing .recall-card *,
    html.theme-changing .review-back,
    html.theme-changing .review-nav-btn,
    html.theme-changing .modal-panel,
    html.theme-changing .modal-panel *,
    html.theme-changing .modal-header,
    html.theme-changing .session-input,
    html.theme-changing .btn-primary,
    html.theme-changing .btn-ghost,
    html.theme-changing .atmosphere-preview,
    html.theme-changing .atmosphere-preview *,
    html.theme-changing .atmosphere-favorite-item,
    html.theme-changing .atmosphere-mini-btn,
    html.theme-changing .confirm-panel,
    html.theme-changing .confirm-panel *,
    html.theme-changing .btn-danger,
    html.theme-changing .empty-setup,
    html.theme-changing .empty-setup *,
    html.theme-changing .atlas-toast {
      transition:
        background-color var(--hub-theme-motion),
        background var(--hub-theme-motion),
        color var(--hub-theme-motion),
        border-color var(--hub-theme-motion),
        box-shadow var(--hub-theme-motion),
        opacity var(--hub-theme-motion),
        fill var(--hub-theme-motion),
        stroke var(--hub-theme-motion);
    }

    html.theme-changing .atmosphere-layer {
      transition:
        opacity var(--hub-theme-motion),
        filter var(--hub-theme-motion);
    }

    html.theme-changing .drawer {
      transition:
        transform 0.28s cubic-bezier(0.4, 0, 0.2, 1),
        background-color var(--hub-theme-motion),
        background var(--hub-theme-motion),
        color var(--hub-theme-motion),
        border-color var(--hub-theme-motion),
        box-shadow var(--hub-theme-motion),
        opacity var(--hub-theme-motion);
    }

    html.theme-changing .atmosphere-layer::before,
    html.theme-changing .atmosphere-layer::after {
      transition: opacity var(--hub-theme-motion);
    }

    html.theme-changing .door {
      transition:
        --door-c1 var(--hub-theme-motion),
        --door-c2 var(--hub-theme-motion),
        border-color var(--hub-theme-motion),
        box-shadow var(--hub-theme-motion);
    }

    html.theme-changing .door::before {
      transition:
        --rail-1 var(--hub-theme-motion),
        --rail-2 var(--hub-theme-motion),
        opacity var(--hub-theme-motion);
    }

    /* ============================================================
       DESKTOP SPINE AND WORLD NAVIGATION
       ============================================================ */
    .spine {
      position: sticky;
      top: 0;
      z-index: 200;
      background: var(--chrome-surface);
      backdrop-filter: blur(22px) saturate(1.08);
      border-bottom: 1px solid var(--border-faint);
      display: flex;
      align-items: center;
      height: 56px;
      padding: 0 1.5rem;
      gap: 0.5rem;
    }

    .spine-mark {
      font-family: var(--font-display);
      font-size: 1.22rem;
      color: var(--text-heading);
      letter-spacing: -0.01em;
      flex: 1 1 0;
      cursor: default;
      user-select: none;
    }

    .spine-mark span {
      color: var(--accent);
    }

    .spine-worlds {
      display: flex;
      align-items: center;
      gap: 0.18rem;
      flex: 0 0 auto;
      padding: 0.2rem;
      border-radius: 999px;
      background: var(--world-nav-surface);
      border: 1px solid var(--world-nav-border);
      box-shadow: var(--shadow-sm);
    }

    .spine-world-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.42rem;
      min-height: 32px;
      padding: 0.32rem 0.82rem;
      border-radius: 999px;
      border: 1px solid transparent;
      background: transparent;
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--motion-standard);
      white-space: nowrap;
    }

    .spine-world-btn svg {
      width: 13px;
      height: 13px;
      opacity: 0.72;
      flex-shrink: 0;
    }

    .spine-world-btn:hover {
      color: var(--text-heading);
      background: var(--world-nav-hover);
      border-color: var(--world-nav-hover-border);
      box-shadow: var(--world-nav-hover-shadow);
    }

    .spine-world-btn:hover svg {
      opacity: 1;
    }

    .spine-world-btn.is-active {
      color: var(--world-nav-active-text);
      background: var(--world-nav-active-surface);
      border-color: var(--world-nav-active-border);
      box-shadow: var(--shadow-sm);
      cursor: default;
    }

    .spine-world-btn.is-active svg {
      opacity: 1;
    }

    .spine-world-btn[aria-disabled="true"] {
      opacity: 0.5;
      cursor: default;
    }

    .spine-world-btn[aria-disabled="true"]:hover {
      color: var(--text-muted);
      background: transparent;
      border-color: transparent;
      box-shadow: none;
    }

    .spine-actions {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex: 1 1 0;
      justify-content: flex-end;
    }

    .spine-session-pill {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.48rem 0.9rem;
      border-radius: 999px;
      border: 1px solid var(--control-border);
      background: var(--control-surface);
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--control-text);
      cursor: pointer;
      transition: var(--motion-standard);
      max-width: 170px;
      white-space: nowrap;
      overflow: hidden;
    }

    .spine-session-pill:hover {
      border-color: var(--control-border-hover);
      color: var(--control-text-hover);
      box-shadow: var(--shadow-md);
    }

    .spine-session-pill .pill-name {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .spine-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 1px solid var(--control-border);
      background: var(--control-surface);
      color: var(--control-icon);
      cursor: pointer;
      transition: var(--motion-standard);
      box-shadow: var(--shadow-sm);
      flex-shrink: 0;
    }

    .spine-btn:hover {
      color: var(--control-text-hover);
      border-color: var(--control-border-hover);
      box-shadow: var(--shadow-md);
    }

    .appearance-icon {
      display: block;
      flex-shrink: 0;
    }

    .appearance-icon--sun {
      display: none;
    }

    html[data-theme="night"] .appearance-icon--moon {
      display: none;
    }

    html[data-theme="night"] .appearance-icon--sun {
      display: block;
    }

    /* ============================================================
       MOBILE HEADER AND DRAWER
       ============================================================ */
    .mobile-header {
      display: none;
      position: sticky;
      top: 0;
      z-index: 200;
      background: var(--chrome-surface-mobile);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border-faint);
      height: 56px;
      padding: 0 1rem;
      align-items: center;
      gap: 0.5rem;
    }

    .mobile-header-mark {
      font-family: var(--font-display);
      font-size: 1.05rem;
      color: var(--text-heading);
      letter-spacing: -0.01em;
      flex: 1;
    }

    .mobile-header-mark span {
      color: var(--accent);
    }

    .mobile-header-actions {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      flex-shrink: 0;
    }

    .mobile-header-session {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.76rem;
      font-weight: 500;
      color: var(--text-body);
      cursor: pointer;
      padding: 0.25rem 0.7rem;
      border: 1px solid var(--control-border);
      border-radius: 20px;
      background: var(--control-surface);
      max-width: 130px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      height: 40px;
    }

    .mobile-header-session span {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mobile-header-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid var(--control-border);
      background: var(--control-surface);
      color: var(--control-icon);
      cursor: pointer;
      transition: var(--motion-standard);
      flex-shrink: 0;
    }

    .mobile-header-btn:hover {
      color: var(--control-text-hover);
    }

    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: var(--surface-drawer-scrim);
      z-index: 400;
      backdrop-filter: blur(4px);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition:
        opacity 0.2s ease,
        visibility 0s linear 0.2s;
    }

    .drawer-overlay.open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition:
        opacity 0.2s ease,
        visibility 0s;
    }

    .drawer {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: min(300px, 85vw);
      background: var(--surface-raised);
      z-index: 500;
      display: flex;
      flex-direction: column;
      box-shadow: var(--drawer-shadow);
      transform: translate3d(-100%, 0, 0);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
      backface-visibility: hidden;
    }

    .drawer.open {
      transform: translate3d(0, 0, 0);
    }

    .drawer-header {
      padding: 1.2rem 1.2rem 1rem;
      border-bottom: 1px solid var(--border-faint);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .drawer-title {
      font-family: var(--font-display);
      font-size: 1.05rem;
      color: var(--text-heading);
    }

    .drawer-title span {
      color: var(--accent);
    }

    .drawer-close {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-faint);
      background: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
    }

    .drawer-close:hover {
      background: var(--navigation-hover);
      color: var(--text-heading);
    }

    .drawer-nav {
      flex: 1;
      padding: 0.8rem;
      overflow-y: auto;
    }

    .drawer-nav-label {
      font-size: 0.64rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-subtle);
      padding: 0.6rem 0.9rem 0.4rem;
    }

    .drawer-nav-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.8rem 0.9rem;
      border-radius: var(--radius-md);
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-body);
      cursor: pointer;
      transition: var(--motion-standard);
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      min-height: 44px;
    }

    .drawer-nav-item:hover {
      background: var(--navigation-hover);
      color: var(--text-heading);
    }

    .drawer-nav-item[aria-disabled="true"] {
      opacity: 0.5;
      cursor: default;
    }

    .drawer-nav-item[aria-disabled="true"]:hover {
      background: none;
      color: var(--text-body);
    }

    .drawer-nav-item .nav-soon {
      margin-left: auto;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-subtle);
    }

    .drawer-nav-item.is-active {
      background: var(--accent-pale);
      color: var(--text-heading);
      cursor: default;
    }

    .drawer-nav-item.is-active:hover {
      background: var(--accent-pale);
      color: var(--text-heading);
    }

    .drawer-footer {
      padding: 0.8rem;
      border-top: 1px solid var(--border-faint);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .drawer-footer-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .drawer-session-btn {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 0.9rem;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-faint);
      background: var(--drawer-button-surface);
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text-body);
      cursor: pointer;
      min-height: 44px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .drawer-session-btn span {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .drawer-appearance-btn {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-faint);
      background: var(--drawer-button-surface);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* ============================================================
       MAIN ATLAS LAYOUT AND INTRODUCTION
       ============================================================ */
    .atlas-main {
      position: relative;
      z-index: 1;
      max-width: 880px;
      margin: 0 auto;
      padding: 3.35rem 1.5rem 5rem;
      animation: hubPageFadeIn 0.45s ease both;
    }

    .context-anchor {
      margin-bottom: 2rem;
    }

    .today-label {
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.8rem;
    }

    .welcome-line {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 2.7rem);
      color: var(--text-heading);
      line-height: 1.12;
      margin-bottom: 0.6rem;
      font-weight: 400;
      letter-spacing: -0.015em;
    }

    .welcome-sub {
      font-size: 0.92rem;
      color: var(--text-muted);
      font-weight: 300;
    }

    /* ============================================================
       CONTINUE OR RESUME SECTION
       ============================================================ */
    .continue-card {
      background-color: var(--continue-surface);
      border: 1px solid var(--continue-border);
      border-radius: 22px;
      margin-bottom: 1.35rem;
      transition: var(--motion-standard);
      position: relative;
      overflow: hidden;
      box-shadow: var(--continue-shadow);
      backdrop-filter: blur(22px) saturate(1.08);
      -webkit-backdrop-filter: blur(22px) saturate(1.08);
      transform: translateY(0);
    }

    .continue-card:hover,
    .continue-card:focus-within {
      border-color: rgba(var(--accent-rgb), 0.28);
      box-shadow:
        var(--continue-shadow),
        0 10px 30px rgba(var(--accent-rgb), 0.08);
      transform: translateY(-1px);
    }

    .continue-card--compass {
      --accent: #5c7a6e;
      --accent-soft: #718f83;
      --accent-rgb: 92, 122, 110;
      --continue-primary-surface: var(--accent);
      --continue-primary-hover: #4f6c61;
      --continue-primary-ink: #ffffff;
    }

    .continue-card--arcade {
      --accent: #df572f;
      --accent-soft: #ef7652;
      --accent-rgb: 223, 87, 47;
      --continue-primary-surface: var(--accent);
      --continue-primary-hover: #c94a24;
      --continue-primary-ink: #ffffff;
    }

    html[data-theme="night"] .continue-card--compass {
      --accent: #8eaaa3;
      --accent-soft: #a4bdb7;
      --accent-rgb: 142, 170, 163;
      --continue-primary-surface: var(--accent);
      --continue-primary-hover: var(--accent-soft);
      --continue-primary-ink: #17201e;
    }

    html[data-theme="night"] .continue-card--arcade {
      --accent: #ec7652;
      --accent-soft: #ff9a7a;
      --accent-rgb: 236, 118, 82;
      --continue-primary-surface: var(--accent);
      --continue-primary-hover: var(--accent-soft);
      --continue-primary-ink: #211418;
    }

    .continue-summary {
      display: flex;
      align-items: center;
      gap: 1.15rem;
      padding: 1.45rem 1.5rem 1.2rem;
    }

    .continue-card.has-rail {
      padding-bottom: 1px;
    }

    .continue-pickup {
      margin-top: 0.62rem;
      color: var(--text-body);
      font-size: 0.82rem;
      line-height: 1.45;
    }

    .continue-pickup-label {
      color: var(--accent);
      font-weight: 650;
    }

    .continue-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.55rem;
    }

    .continue-summary>.continue-actions {
      flex-wrap: nowrap;
      margin-left: auto;
    }

    .continue-card>.continue-actions {
      padding: 0 1.5rem 1.3rem;
    }

    .continue-action {
      min-height: 40px;
      border-radius: 999px;
      padding: 0.55rem 1rem;
      border: 1px solid rgba(var(--accent-rgb), 0.2);
      background-color: var(--continue-action-surface);
      color: var(--text-body);
      font: inherit;
      font-size: 0.79rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--motion-standard);
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(var(--accent-rgb), 0.04);
    }

    .continue-action:hover {
      border-color: rgba(var(--accent-rgb), 0.2);
      background: rgba(var(--accent-rgb), 0.07);
      color: var(--accent);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.14),
        0 6px 16px rgba(var(--accent-rgb), 0.09);
      transform: translateY(-1px);
    }

    .continue-action:active {
      border-color: rgba(var(--accent-rgb), 0.2);
      background: rgba(var(--accent-rgb), 0.1);
      box-shadow: inset 0 1px 3px rgba(var(--accent-rgb), 0.08);
      transform: translateY(0);
    }

    .continue-action:focus-visible {
      outline: 3px solid rgba(var(--accent-rgb), 0.52);
      outline-offset: 3px;
    }

    .continue-action.is-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      border-color: var(--continue-primary-surface);
      background: var(--continue-primary-surface);
      color: var(--continue-primary-ink);
      box-shadow: 0 4px 12px rgba(var(--accent-rgb), 0.18);
    }

    .continue-action.is-primary:hover {
      background: var(--continue-primary-hover);
      border-color: var(--continue-primary-hover);
      color: var(--continue-primary-ink);
      box-shadow: 0 8px 20px rgba(var(--accent-rgb), 0.24);
    }

    .continue-action.is-primary:active {
      box-shadow: 0 3px 8px rgba(var(--accent-rgb), 0.16);
    }

    .continue-recap {
      margin: 0 1.5rem 1.15rem;
      padding: 1.25rem 1.3rem;
      border: 1px solid var(--continue-recap-border);
      border-radius: 16px;
      background-color: var(--continue-recap-surface);
      box-shadow: var(--continue-recap-shadow);
    }

    .continue-recap[hidden] {
      display: none;
    }

    .continue-recap-kicker {
      color: var(--accent);
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      line-height: 1.45;
      text-transform: uppercase;
    }

    .continue-recap-section {
      margin-top: 1rem;
    }

    .continue-recap-heading {
      margin: 0 0 0.38rem;
      color: var(--text-heading);
      font-size: 0.84rem;
      font-weight: 600;
    }

    .continue-recap-list {
      margin: 0;
      padding-left: 1.15rem;
      color: var(--text-body);
      font-size: 0.84rem;
      line-height: 1.6;
    }

    .continue-recap-copy {
      margin: 0;
      color: var(--text-body);
      font-size: 0.84rem;
      line-height: 1.55;
    }

    .continue-rail {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 2px;
      background: rgba(var(--accent-rgb), 0.09);
      overflow: hidden;
    }

    .continue-rail-fill {
      height: 100%;
      background: rgba(var(--accent-rgb), var(--continue-rail-fill-alpha));
      border-radius: 0 2px 2px 0;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .continue-rail.is-complete .continue-rail-fill {
      background: rgba(var(--accent-rgb), var(--continue-rail-complete-alpha));
      border-radius: 0;
    }

    .continue-icon {
      width: 46px;
      height: 46px;
      flex-shrink: 0;
      border-radius: 14px;
      border: 1px solid rgba(var(--accent-rgb), 0.14);
      background: rgba(var(--accent-rgb), 0.10);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .continue-body {
      flex: 1;
      min-width: 0;
    }

    .continue-kicker {
      font-size: 0.64rem;
      font-weight: 650;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.3rem;
    }

    .continue-title {
      font-family: var(--font-display);
      font-size: clamp(1.15rem, 2.4vw, 1.38rem);
      font-weight: 400;
      color: var(--text-heading);
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .continue-meta {
      font-size: 0.77rem;
      color: var(--text-muted);
      margin-top: 0.22rem;
    }

    .continue-arrow {
      display: inline-flex;
      color: currentColor;
      flex-shrink: 0;
      transition: transform var(--motion-standard);
    }

    .continue-action.is-primary:hover .continue-arrow {
      transform: translateX(2px);
    }

    .continue-action.is-primary:active .continue-arrow {
      transform: translateX(0);
    }

    /* Saved-language continuation */
    .review-row {
      display: flex;
      align-items: center;
      gap: 1.15rem;
      background: var(--review-row-surface);
      border: 1px solid var(--border-faint);
      border-radius: 14px;
      padding: 0.95rem 1.5rem;
      margin-bottom: 2rem;
      cursor: pointer;
      transition: var(--motion-standard);
      width: 100%;
      text-align: left;
      font-family: var(--font-body);
      box-shadow: var(--review-row-shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .review-row:hover {
      border-color: rgba(var(--accent-rgb), 0.22);
      background: var(--review-row-hover);
      box-shadow: var(--review-row-hover-shadow);
    }

    .review-row:focus-visible {
      outline: 3px solid rgba(var(--accent-rgb), 0.5);
      outline-offset: 3px;
    }

    .review-row-icon {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      border-radius: 12px;
      background: var(--accent-pale);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .review-row-body {
      flex: 1;
      min-width: 0;
    }

    .review-row-name {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-body);
      margin-bottom: 0.1rem;
    }

    .review-row-count {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .review-row-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.38rem;
      flex-shrink: 0;
      color: var(--text-muted);
      font-size: 0.76rem;
      font-weight: 600;
      white-space: nowrap;
      transition: var(--motion-standard);
    }

    .review-row-cta svg {
      transition: transform var(--motion-standard);
    }

    .review-row:hover .review-row-cta {
      color: var(--accent);
    }

    .review-row:hover .review-row-cta svg {
      transform: translateX(2px);
    }

    /* ============================================================
       WORLD NAVIGATION CARDS
       ============================================================ */
    .doors-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .doors-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.15rem;
      margin-bottom: 1.5rem;
    }

    .door {
      display: flex;
      flex-direction: column;
      background: var(--world-card-surface);
      border: 1px solid var(--world-card-border);
      border-radius: 20px;
      padding: 1.65rem 1.5rem 1.4rem;
      cursor: pointer;
      transition: var(--motion-standard);
      text-decoration: none;
      position: relative;
      overflow: hidden;
      min-height: 164px;
      width: 100%;
      text-align: left;
      font-family: var(--font-body);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .door-compass {
      --door-c1: var(--compass-card-start);
      --door-c2: var(--compass-card-end);
      background: linear-gradient(
        145deg,
        var(--door-c1),
        var(--door-c2)
      );
    }

    .door-arcade {
      --door-c1: var(--arcade-card-start);
      --door-c2: var(--arcade-card-end);
      background: linear-gradient(
        145deg,
        var(--door-c1),
        var(--door-c2)
      );
    }

    .door::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      opacity: 0.34;
      transition: opacity var(--motion-standard);
    }

    .door-compass::before {
      --rail-1: var(--compass-mark-start);
      --rail-2: var(--compass-mark-end);
      background: linear-gradient(
        90deg,
        var(--rail-1),
        var(--rail-2)
      );
      opacity: 0.48;
    }

    .door-arcade::before {
      --rail-1: var(--arcade-mark-start);
      --rail-2: var(--arcade-mark-end);
      background: linear-gradient(
        90deg,
        var(--rail-1),
        var(--rail-2)
      );
      opacity: 0.40;
    }

    .door:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
      border-color: rgba(var(--accent-rgb), 0.22);
    }

    .door-compass:hover::before {
      opacity: 1;
    }

    .door-arcade:hover::before {
      opacity: 0.88;
    }

    .door:active {
      transform: translateY(0);
      box-shadow: var(--shadow-sm);
    }

    .door:focus-visible {
      outline: 3px solid rgba(var(--accent-rgb), 0.5);
      outline-offset: 3px;
    }

    .door-unavailable {
      opacity: 0.6;
      cursor: default;
    }

    .door-unavailable::before {
      opacity: 0;
    }

    .door-unavailable:hover {
      box-shadow: none;
      transform: none;
      border-color: var(--border-faint);
    }

    .door-unavailable:hover::before {
      opacity: 0;
    }

    .door-icon {
      width: 42px;
      height: 42px;
      border-radius: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.1rem;
      flex-shrink: 0;
    }

    .door-compass .door-icon {
      background: var(--compass-icon-surface);
      color: var(--compass-text);
    }

    .door-arcade .door-icon {
      background: var(--arcade-icon-surface);
      color: var(--arcade-text);
    }

    .door-name {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }

    .door-compass .door-name {
      color: var(--compass-text);
    }

    .door-arcade .door-name {
      color: var(--arcade-text);
    }

    .door-title {
      font-family: var(--font-display);
      font-size: 1.28rem;
      color: var(--text-heading);
      margin-bottom: 0.48rem;
      line-height: 1.2;
    }

    .door-desc {
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.5;
      flex: 1;
    }

    .door-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1rem;
    }

    .door-arrow {
      display: flex;
      align-items: center;
      color: var(--text-subtle);
      transition: var(--motion-standard);
      margin-left: auto;
    }

    .door:hover .door-arrow {
      color: var(--accent);
      transform: translateX(3px);
    }

    .door-soon-badge {
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-subtle);
      background: var(--surface-muted);
      border-radius: 20px;
      padding: 0.22rem 0.6rem;
    }

    /* ============================================================
       SAVED LANGUAGE REVIEW
       ============================================================ */
    .review-view {
      position: relative;
      z-index: 1;
      max-width: 620px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      animation: fadeIn 0.2s ease;
    }

    .review-topbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.75rem;
    }

    .review-back {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 0.85rem 0.45rem 0.65rem;
      border-radius: 20px;
      border: 1px solid var(--border-faint);
      background: var(--surface-raised);
      color: var(--text-body);
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--motion-standard);
      min-height: 40px;
    }

    .review-back:hover {
      border-color: var(--border-subtle);
      color: var(--text-heading);
      box-shadow: var(--shadow-sm);
    }

    .review-back:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .review-progress {
      margin-left: auto;
      font-size: 0.76rem;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    .review-heading {
      margin-bottom: 0.3rem;
    }

    .review-heading-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .review-heading-title {
      font-family: var(--font-display);
      font-size: clamp(1.4rem, 3.5vw, 1.7rem);
      color: var(--text-heading);
      line-height: 1.2;
      font-weight: 400;
    }

    .review-context {
      font-size: 0.84rem;
      color: var(--text-muted);
      margin-bottom: 1.75rem;
    }

    /* Recall card */
    .recall-card {
      background: var(--surface-raised);
      border: 1.5px solid var(--border-faint);
      border-radius: var(--radius-xl);
      padding: 2rem 1.9rem;
      box-shadow: var(--shadow-sm);
      min-height: 220px;
      display: flex;
      flex-direction: column;
    }

    .recall-type {
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--text-subtle);
      margin-bottom: 0.6rem;
    }

    .recall-term {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 5vw, 2.1rem);
      color: var(--text-heading);
      line-height: 1.15;
      margin-bottom: 1.5rem;
    }

    .recall-prompt {
      font-size: 0.95rem;
      color: var(--text-body);
      line-height: 1.6;
      padding: 0.9rem 1.1rem;
      background: var(--accent-pale);
      border-radius: var(--radius-md);
      border-left: 3px solid var(--accent-soft);
    }

    .recall-prompt-label {
      display: block;
      font-size: 0.64rem;
      font-weight: 600;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.35rem;
    }

    .recall-reveal-btn {
      margin-top: 1.5rem;
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.25rem;
      border-radius: var(--radius-md);
      border: 1px solid var(--accent);
      background: none;
      color: var(--accent);
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--motion-standard);
      min-height: 44px;
    }

    .recall-reveal-btn:hover {
      background: var(--accent-pale);
    }

    .recall-reveal-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Recall answer */
    .recall-answer {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border-faint);
      animation: fadeIn 0.25s ease;
      display: flex;
      flex-direction: column;
      gap: 1.35rem;
    }

    .recall-answer-section {
      min-width: 0;
    }

    .recall-answer-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.55rem;
    }

    .recall-def {
      font-size: 1rem;
      color: var(--text-heading);
      line-height: 1.7;
      margin: 0;
      overflow-wrap: anywhere;
    }

    .recall-answer-section.example {
      padding: 1rem 1.1rem 1.05rem 1.2rem;
      border: 1px solid rgba(var(--accent-rgb), 0.14);
      border-left: 3px solid var(--accent-soft);
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
      background: rgba(var(--accent-rgb), 0.055);
    }

    .recall-answer-section.example .recall-answer-label {
      color: var(--accent);
      margin-bottom: 0.6rem;
    }

    .recall-inaction {
      font-size: 0.94rem;
      color: var(--text-body);
      font-style: normal;
      line-height: 1.72;
      padding: 0;
      border: 0;
      overflow-wrap: anywhere;
    }

    /* Review controls */
    .review-controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 1.75rem;
    }

    .review-nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.7rem 1.1rem;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-faint);
      background: var(--surface-raised);
      color: var(--text-body);
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--motion-standard);
      min-height: 44px;
    }

    .review-nav-btn:hover:not(:disabled) {
      border-color: var(--border-subtle);
      color: var(--text-heading);
      box-shadow: var(--shadow-sm);
    }

    .review-nav-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .review-nav-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .review-nav-btn.primary {
      background: var(--accent);
      color: var(--accent-ink);
      border-color: var(--accent);
      margin-left: auto;
    }

    .review-nav-btn.primary:hover {
      background: var(--accent-soft);
    }

    /* ============================================================
       GATEWAY-OWNED BUTTONS AND WELCOME IMAGE SETTINGS
       ============================================================ */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--surface-modal-scrim);
      z-index: 700;
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .modal-overlay.open {
      display: flex;
      animation: fadeIn 0.18s ease;
    }

    .modal-panel {
      background: var(--surface-raised);
      border-radius: var(--radius-xl);
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.22s cubic-bezier(0.34, 1.25, 0.64, 1);
      max-height: 90svh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      padding: 1.3rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border-faint);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .modal-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-heading);
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-faint);
      background: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
    }

    .modal-close:hover {
      background: var(--surface-muted);
      color: var(--text-heading);
    }

    .modal-body {
      padding: 1.2rem 1.5rem 1.5rem;
      overflow-y: auto;
      flex: 1;
    }

    .modal-helper {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    .modal-section-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-subtle);
      margin: 1rem 0 0.5rem;
    }

    .session-input {
      flex: 1;
      padding: 0.6rem 0.8rem;
      border: 1.5px solid var(--border-faint);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 0.88rem;
      color: var(--text-heading);
      background: var(--surface-raised);
      outline: none;
      transition: var(--motion-standard);
      min-height: 44px;
    }

    .session-input:focus {
      border-color: var(--accent);
    }

    select.session-input {
      padding-right: 2.7rem;
      background-position: right 0.85rem center;
    }

    .btn-primary {
      padding: 0.6rem 1.1rem;
      border-radius: var(--radius-sm);
      border: none;
      background: var(--accent);
      color: var(--accent-ink);
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--motion-standard);
      white-space: nowrap;
      min-height: 44px;
    }

    .btn-primary:hover {
      background: var(--accent-soft);
    }

    .btn-ghost {
      padding: 0.6rem 1rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-faint);
      background: var(--surface-raised);
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-body);
      cursor: pointer;
      transition: var(--motion-standard);
      min-height: 44px;
    }

    .btn-ghost:hover {
      border-color: var(--border-subtle);
      color: var(--text-heading);
    }

    /* Welcome image controls */
    .atmosphere-preview {
      position: relative;
      height: 92px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-faint);
      background: var(--surface-muted);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-subtle);
      font-size: 0.78rem;
      margin-top: 0.65rem;
    }

    .atmosphere-preview-image {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0.78;
      display: none;
    }

    .atmosphere-preview.has-image .atmosphere-preview-image {
      display: block;
    }

    .atmosphere-preview.has-image .atmosphere-preview-empty {
      display: none;
    }

    .atmosphere-preview-empty {
      position: relative;
      z-index: 1;
    }

    .atmosphere-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.55rem;
      margin-top: 0.85rem;
    }

    .atmosphere-actions .btn-primary {
      grid-column: 1 / -1;
      width: 100%;
    }

    .atmosphere-actions .btn-ghost {
      width: 100%;
    }

    .atmosphere-favorites-list {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      margin-top: 0.6rem;
    }

    .atmosphere-favorite-item {
      display: grid;
      grid-template-columns: 52px minmax(0, 1fr) auto;
      align-items: center;
      gap: 0.65rem;
      padding: 0.5rem;
      border: 1px solid var(--border-faint);
      border-radius: var(--radius-sm);
      background: var(--surface-muted);
    }

    .atmosphere-favorite-thumb {
      width: 52px;
      height: 34px;
      border-radius: var(--radius-sm);
      background-size: cover;
      background-position: center;
      background-color: var(--surface-raised);
      border: 1px solid var(--border-faint);
    }

    .atmosphere-favorite-url {
      font-size: 0.74rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .atmosphere-favorite-actions {
      display: flex;
      gap: 0.3rem;
      flex-shrink: 0;
    }

    .atmosphere-mini-btn {
      min-height: 32px;
      padding: 0.35rem 0.65rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-faint);
      background: var(--surface-raised);
      color: var(--text-body);
      font-family: var(--font-body);
      font-size: 0.74rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--motion-standard);
    }

    .atmosphere-mini-btn:hover {
      border-color: var(--border-subtle);
      color: var(--text-heading);
    }

    .atmosphere-mini-btn.danger:hover {
      color: var(--danger-text);
      border-color: var(--danger-border);
      background: var(--danger-bg);
    }

    .atmosphere-empty-favorites {
      font-size: 0.76rem;
      color: var(--text-subtle);
      padding: 0.55rem 0;
    }

    /* ============================================================
       CONFIRMATION DIALOG, TOAST, AND ERROR STATES
       ============================================================ */
    .confirm-dialog {
      position: fixed;
      inset: 0;
      z-index: 800;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: var(--surface-dialog-scrim);
      backdrop-filter: blur(6px);
    }

    .confirm-dialog.open {
      display: flex;
      animation: fadeIn 0.15s ease;
    }

    .confirm-panel {
      background: var(--surface-raised);
      border-radius: var(--radius-lg);
      max-width: 360px;
      width: 100%;
      padding: 1.5rem;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.2s cubic-bezier(0.34, 1.25, 0.64, 1);
    }

    .confirm-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-heading);
      margin-bottom: 0.5rem;
    }

    .confirm-message {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.55;
      margin-bottom: 1.2rem;
    }

    .confirm-input {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1.5px solid var(--border-faint);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 0.88rem;
      color: var(--text-heading);
      background: var(--surface-raised);
      outline: none;
      transition: var(--motion-standard);
      margin-bottom: 0.5rem;
      display: none;
      min-height: 44px;
    }

    .confirm-input.visible {
      display: block;
    }

    .confirm-input:focus {
      border-color: var(--accent);
    }

    .confirm-error {
      font-size: 0.78rem;
      color: var(--danger-text);
      margin-bottom: 0.8rem;
      min-height: 1rem;
      display: none;
    }

    .confirm-error.visible {
      display: block;
    }

    .confirm-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
    }

    .btn-danger {
      padding: 0.6rem 1rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--danger-border);
      background: var(--danger-bg);
      color: var(--danger-text);
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--motion-standard);
      min-height: 44px;
    }

    .btn-danger:hover {
      background: var(--danger-bg-hover);
    }

    /* Gateway empty and bridge-error states */
    .empty-setup {
      max-width: 760px;
      margin: 0 auto;
      text-align: center;
      padding: 0.75rem 1rem 1.8rem;
    }

    .empty-setup-title {
      font-family: var(--font-display);
      font-size: clamp(1.65rem, 4vw, 2rem);
      color: var(--text-heading);
      margin-bottom: 0.65rem;
      line-height: 1.15;
      letter-spacing: -0.012em;
    }

    .empty-setup-sub {
      max-width: 58ch;
      margin: 0 auto 1.65rem;
      font-size: 0.92rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .empty-form {
      display: flex;
      gap: 0.4rem;
      max-width: 430px;
      margin: 0 auto 0.9rem;
      padding: 0.35rem;
      border: 1px solid var(--border-faint);
      border-radius: 16px;
      background: var(--surface-raised);
      box-shadow: var(--shadow-md);
      transition: var(--motion-standard);
    }

    .empty-form .session-input {
      min-width: 0;
      border: 0;
      border-radius: 11px;
      background: transparent;
      box-shadow: none;
      padding: 0.72rem 0.85rem;
    }

    .empty-form .session-input:focus {
      border-color: transparent;
      background: rgba(var(--accent-rgb), 0.035);
    }

    .empty-form .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      min-width: 118px;
      min-height: 46px;
      padding: 0.72rem 1.1rem;
      border-radius: 12px;
      font-weight: 600;
      box-shadow: 0 7px 18px rgba(var(--accent-rgb), 0.16);
      transition: var(--motion-standard);
    }

    .empty-form .btn-primary::after {
      content: '\2192';
      font-size: 0.9rem;
      line-height: 1;
      transition: transform var(--motion-standard);
    }

    .empty-form .btn-primary:hover {
      background: var(--accent-soft);
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(var(--accent-rgb), 0.20);
    }

    .empty-form .btn-primary:hover::after {
      transform: translateX(2px);
    }

    .empty-form .btn-primary:active {
      transform: translateY(0);
      box-shadow: 0 5px 14px rgba(var(--accent-rgb), 0.16);
    }

    .empty-form .btn-primary:focus-visible {
      outline: 3px solid rgba(var(--accent-rgb), 0.32);
      outline-offset: 2px;
    }

    .empty-default-link {
      font-size: 0.82rem;
      color: var(--text-subtle);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0.2rem 0.35rem;
      margin: -0.2rem -0.35rem;
      border-radius: 6px;
      font-family: var(--font-body);
      text-decoration: none;
      transition:
        color var(--motion-standard),
        transform var(--motion-standard);
    }

    .empty-default-link:hover {
      color: var(--text-body);
      transform: translateY(-1px);
    }

    .empty-default-link:active {
      color: var(--text-heading);
      transform: translateY(0);
    }

    .empty-default-link:focus-visible {
      outline: 2px solid rgba(var(--accent-rgb), 0.34);
      outline-offset: 3px;
    }

    .empty-default-link:focus-visible {
      outline: 3px solid rgba(var(--accent-rgb), 0.32);
      outline-offset: 2px;
    }

    .atlas-toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--surface-raised);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 0.7rem 1.2rem;
      font-size: 0.85rem;
      color: var(--text-body);
      z-index: 900;
      box-shadow: var(--shadow-md);
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
      max-width: calc(100vw - 2rem);
    }

    .atlas-toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ============================================================
       UTILITIES AND KEYFRAMES
       ============================================================ */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
    }

    @keyframes hubPageFadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(16px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-12px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* ============================================================
       MOTION PREFERENCES
       ============================================================ */
    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }

      .continue-rail-fill {
        transition: none;
      }
    }

    /* ============================================================
       RESPONSIVE LAYOUT
       ============================================================ */
    @media (max-width: 720px) {
      .spine {
        display: none;
      }

      .mobile-header {
        display: flex;
      }

      .doors-grid {
        grid-template-columns: 1fr;
      }

      .atlas-main {
        padding: 2.75rem 1rem 3.5rem;
      }

      .context-anchor {
        margin-bottom: 2rem;
      }

      .welcome-line {
        font-size: clamp(1.9rem, 9vw, 2.35rem);
      }

      .door {
        min-height: 150px;
      }

      .review-view {
        padding: 1.5rem 1rem 3rem;
      }

      .recall-card {
        padding: 1.6rem 1.4rem;
      }

      .recall-answer {
        gap: 1.15rem;
      }

      .recall-answer-section.example {
        padding: 0.9rem 0.95rem 0.95rem 1rem;
      }

      .recall-inaction {
        font-size: 0.92rem;
      }

      .empty-form {
        flex-direction: column;
      }

      .atlas-search-overlay {
        padding: 2rem 0.75rem 1rem;
      }

      .review-controls {
        flex-wrap: wrap;
      }
    }

    @media (max-width: 620px) {
      .continue-summary {
