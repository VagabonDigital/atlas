<!DOCTYPE html>
<!--
  ==========================================================================
  ATLAS V1 · GATEWAY RUNTIME
  SmartStudy™ Methodology
  --------------------------------------------------------------------------
  The calm threshold between learning worlds.

  Atlas does not teach the lesson.
  Atlas remembers where the lesson lives.

  It reads the bridge, restores the active session, surfaces the next path,
  and gives the tutor a quiet place to begin: Continue, Review, or choose a
  world.

  Compass may deepen.
  Arcade may play.
  Business may sharpen.
  The bridge remains the contract.
  Atlas opens the way.
  --------------------------------------------------------------------------
  LIMEN APERIT · PONS MEMINIT · ORBES VOCANT
  ==========================================================================
-->
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atlas</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath d='M50 4L96 50L50 96L4 50Z' fill='%235EC8F2' stroke='%231E8CB8' stroke-width='5' stroke-linejoin='round'/%3E%3Cpath d='M50 18L82 50L50 82L18 50Z' fill='%23EAFBFF' stroke='%23FFFFFF' stroke-width='3' stroke-linejoin='round'/%3E%3Cpath d='M50 34L66 50L50 66L34 50Z' fill='%2347BDE8' stroke='%231E8CB8' stroke-width='3' stroke-linejoin='round'/%3E%3Cpath d='M50 18L50 34M82 50L66 50M50 82L50 66M18 50L34 50' stroke='%235EC8F2' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./shared/atlas-search.css">
  <link rel="stylesheet" href="./shared/atlas-session-panel.css">

  <!-- Anti-flash: apply the active session theme before first paint. -->
  <script>
    (function () {
      var m = null;
      try {
        var sessionId = localStorage.getItem('atlas::activeSessionId') || 'default';
        var sessionModes = JSON.parse(localStorage.getItem('atlas::appearanceBySession') || '{}');
        m = sessionModes[sessionId] || localStorage.getItem('atlas::appearanceMode');
      } catch (e) { m = null; }
      document.documentElement.dataset.theme = (m === 'night') ? 'night' : 'light';
    })();
  </script>
  <style>
    /* ============================================================
   ATLAS V1 — DESIGN TOKENS
   Atlas is the threshold between worlds, not a world itself.
   Identity by contrast: where the worlds are warm, saturated, and
   atmospheric (Compass teal + photographic immersion, Arcade purple),
   Atlas is cool, matte, and architectural — flat paper, not a place.
   The accent is a neutral slate so it recedes behind every world and
   never competes with their colours. Boldness is spent on stillness.
   ============================================================ */
    :root {
      /* Neutrals — cool paper, stepping off the warm-cream default */
      --bg: #f3f0e9;
      --bg-raised: #fffdf9;
      --bg-subtle: #ebe7de;
      --border: rgba(49, 45, 38, 0.10);
      --border-mid: rgba(49, 45, 38, 0.16);
      /* Ink — cool, slightly blue-grey rather than warm brown */
      --ink: #211f1b;
      --ink-mid: #504b43;
      --ink-quiet: #7b7469;
      --ink-faint: #aaa297;
      /* Accent — neutral slate-ink. Not Compass teal, not Arcade purple.
     Connective tissue: recedes behind the worlds' saturated colours. */
      --accent: #526c67;
      --accent-soft: #718b85;
      --accent-pale: #e2e9e5;
      --accent-rgb: 82, 108, 103;
      /* Semantic */
      --continue-bg: rgba(255, 253, 248, 0.84);
      --continue-border: rgba(82, 108, 103, 0.20);
      --door-hover: rgba(255, 253, 249, 0.92);
      --danger: #b23a2e;
      --danger-bg: #fbf1f0;
      --danger-border: rgba(178, 58, 46, 0.3);
      /* Shadows — halved against Compass; Atlas sits flat */
      --shadow-sm: 0 2px 8px rgba(42, 37, 29, 0.045);
      --shadow-md: 0 10px 30px rgba(42, 37, 29, 0.075);
      --shadow-lg: 0 20px 56px rgba(42, 37, 29, 0.11);
      /* Radii — slightly tighter, more architectural than the worlds */
      --r-sm: 5px;
      --r-md: 10px;
      --r-lg: 14px;
      --r-xl: 20px;
      /* Type */
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      /* Motion */
      --t: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Night mode — cool charcoal-slate, not the worlds' warm brown night.
   Atlas stays the neutral threshold in the dark too. */
    html[data-theme="night"] {
      --bg: #1b1d1c;
      --bg-raised: #252826;
      --bg-subtle: #212421;
      --border: rgba(255, 255, 255, 0.08);
      --border-mid: rgba(255, 255, 255, 0.14);
      --ink: #ebe9e4;
      --ink-mid: #bdb8ae;
      --ink-quiet: #89847b;
      --ink-faint: #55534e;
      --accent: #8eaaa3;
      --accent-soft: #a4bdb7;
      --accent-pale: #2a3330;
      --accent-rgb: 142, 170, 163;
      --continue-bg: rgba(39, 45, 42, 0.88);
      --continue-border: rgba(142, 170, 163, 0.25);
      --door-hover: rgba(255, 255, 255, 0.04);
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.22);
      --shadow-md: 0 2px 10px rgba(0, 0, 0, 0.30);
      --shadow-lg: 0 6px 26px rgba(0, 0, 0, 0.40);
    }

    /* Smooth theme transitions */
    html.theme-transitioning *,
    html.theme-transitioning *::before,
    html.theme-transitioning *::after {
      transition: background-color 0.35s ease, color 0.35s ease,
        border-color 0.35s ease, box-shadow 0.35s ease !important;
    }

    /* ============================================================ RESET */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      min-height: 100%;
      scroll-behavior: smooth;
      overflow-y: scroll;
      overflow-x: clip;
      scrollbar-gutter: stable;
    }

    body {
      font-family: var(--font-body);
      background:
        radial-gradient(circle at 12% -8%, rgba(var(--accent-rgb), 0.12), transparent 34rem),
        radial-gradient(circle at 100% 18%, rgba(122, 110, 154, 0.055), transparent 34rem),
        var(--bg);
      background-attachment: fixed;
      color: var(--ink);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100svh;
      overflow-x: visible;
    }

    .atmosphere-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-size: cover;
      background-position: center;
      filter: blur(5px) saturate(0.82) contrast(0.98);
      transform: scale(1.025);
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .atmosphere-layer::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(243, 240, 233, 0.22), rgba(243, 240, 233, 0.68)),
        radial-gradient(circle at 50% 18%, transparent 0, rgba(243, 240, 233, 0.36) 68%);
    }

    .atmosphere-layer.visible {
      opacity: 0.24;
    }

    html[data-theme="night"] .atmosphere-layer.visible {
      opacity: 0.12;
    }

    html[data-theme="night"] .atmosphere-layer::after {
      background:
        linear-gradient(180deg, rgba(27, 29, 28, 0.18), rgba(27, 29, 28, 0.66)),
        radial-gradient(circle at 50% 18%, transparent 0, rgba(27, 29, 28, 0.38) 68%);
    }

    /* ============================================================ SPINE (desktop header) */
    .spine {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(243, 240, 233, 0.84);
      backdrop-filter: blur(22px) saturate(1.08);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      height: 56px;
      padding: 0 1.5rem;
      gap: 0.5rem;
    }

    html[data-theme="night"] .spine {
      background: rgba(27, 29, 28, 0.86);
    }

    .spine-mark {
      font-family: var(--font-display);
      font-size: 1.22rem;
      color: var(--ink);
      letter-spacing: -0.01em;
      flex: 1 1 0;
      cursor: default;
      user-select: none;
    }

    .spine-mark span {
      color: var(--accent);
    }

    /* Centered hub shortcut group */
    .spine-worlds {
      display: flex;
      align-items: center;
      gap: 0.18rem;
      flex: 0 0 auto;
      padding: 0.2rem;
      border-radius: 999px;
      background: var(--bg-subtle);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }

    .spine-world-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.42rem;
      min-height: 32px;
      padding: 0.32rem 0.82rem;
      border-radius: 999px;
      border: 1px solid transparent;
      background: transparent;
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--ink-quiet);
      cursor: pointer;
      transition: var(--t);
      white-space: nowrap;
    }

    .spine-world-btn svg {
      width: 13px;
      height: 13px;
      opacity: 0.72;
      flex-shrink: 0;
    }

    .spine-world-btn:hover {
      color: var(--ink);
      background: var(--bg-raised);
      border-color: var(--border);
      box-shadow: var(--shadow-sm);
    }

    .spine-world-btn:hover svg {
      opacity: 1;
    }

    .spine-world-btn.is-active {
      color: var(--ink);
      background: var(--bg-raised);
      border-color: var(--border-mid);
      box-shadow: var(--shadow-sm);
      cursor: default;
    }

    .spine-world-btn.is-active svg {
      opacity: 1;
    }

    .spine-world-btn[aria-disabled="true"] {
      opacity: 0.5;
      cursor: default;
    }

    .spine-world-btn[aria-disabled="true"]:hover {
      color: var(--ink-quiet);
      background: transparent;
      border-color: transparent;
      box-shadow: none;
    }

    /* Right-side controls: session pill, appearance, quick jump */
    .spine-actions {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex: 1 1 0;
      justify-content: flex-end;
    }

    .spine-session-pill {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.48rem 0.9rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg-raised);
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--ink-mid);
      cursor: pointer;
      transition: var(--t);
      max-width: 170px;
      white-space: nowrap;
      overflow: hidden;
    }

    .spine-session-pill:hover {
      border-color: var(--accent);
      color: var(--ink);
      box-shadow: var(--shadow-sm);
    }

    .spine-session-pill .pill-name {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .spine-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-raised);
      color: var(--ink-quiet);
      cursor: pointer;
      transition: var(--t);
      box-shadow: var(--shadow-sm);
    }

    .spine-btn:hover {
      color: var(--ink);
      border-color: var(--border-mid);
      box-shadow: var(--shadow-md);
    }

    /* ============================================================ MOBILE HEADER */
    .mobile-header {
      display: none;
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(243, 240, 233, 0.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      height: 56px;
      padding: 0 1rem;
      align-items: center;
      gap: 0.5rem;
    }

    html[data-theme="night"] .mobile-header {
      background: rgba(27, 29, 28, 0.90);
    }

    .mobile-header-mark {
      font-family: var(--font-display);
      font-size: 1.05rem;
      color: var(--ink);
      letter-spacing: -0.01em;
      flex: 1;
    }

    .mobile-header-mark span {
      color: var(--accent);
    }

    .mobile-header-actions {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      flex-shrink: 0;
    }

    .mobile-header-session {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.76rem;
      font-weight: 500;
      color: var(--ink-mid);
      cursor: pointer;
      padding: 0.25rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--bg-raised);
      max-width: 130px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      height: 40px;
    }

    .mobile-header-session span {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mobile-header-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-raised);
      color: var(--ink-quiet);
      cursor: pointer;
      transition: var(--t);
      flex-shrink: 0;
    }

    .mobile-header-btn:hover {
      color: var(--ink);
    }

    /* ============================================================ MOBILE DRAWER */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 400;
      backdrop-filter: blur(4px);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition:
        opacity 0.2s ease,
        visibility 0s linear 0.2s;
    }

    .drawer-overlay.open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition:
        opacity 0.2s ease,
        visibility 0s;
    }

    .drawer {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: min(300px, 85vw);
      background: var(--bg-raised);
      z-index: 500;
      display: flex;
      flex-direction: column;
      box-shadow: 4px 0 24px rgba(0, 0, 0, 0.15);
      transform: translate3d(-100%, 0, 0);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
      backface-visibility: hidden;
    }

    .drawer.open {
      transform: translate3d(0, 0, 0);
    }

    .drawer-header {
      padding: 1.2rem 1.2rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .drawer-title {
      font-family: var(--font-display);
      font-size: 1.05rem;
      color: var(--ink);
    }

    .drawer-title span {
      color: var(--accent);
    }

    .drawer-close {
      width: 32px;
      height: 32px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      background: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--ink-quiet);
    }

    .drawer-close:hover {
      background: var(--bg-subtle);
      color: var(--ink);
    }

    .drawer-nav {
      flex: 1;
      padding: 0.8rem;
      overflow-y: auto;
    }

    .drawer-nav-label {
      font-size: 0.64rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-faint);
      padding: 0.6rem 0.9rem 0.4rem;
    }

    .drawer-nav-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.8rem 0.9rem;
      border-radius: var(--r-md);
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--ink-mid);
      cursor: pointer;
      transition: var(--t);
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      min-height: 44px;
    }

    .drawer-nav-item:hover {
      background: var(--bg-subtle);
      color: var(--ink);
    }

    .drawer-nav-item[aria-disabled="true"] {
      opacity: 0.5;
      cursor: default;
    }

    .drawer-nav-item[aria-disabled="true"]:hover {
      background: none;
      color: var(--ink-mid);
    }

    .drawer-nav-item .nav-soon {
      margin-left: auto;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    .drawer-nav-item.is-active {
      background: var(--accent-pale);
      color: var(--ink);
      cursor: default;
    }

    .drawer-nav-item.is-active:hover {
      background: var(--accent-pale);
      color: var(--ink);
    }

    .drawer-footer {
      padding: 0.8rem;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .drawer-footer-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .drawer-session-btn {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 0.9rem;
      border-radius: var(--r-md);
      border: 1px solid var(--border);
      background: var(--bg-subtle);
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--ink-mid);
      cursor: pointer;
      min-height: 44px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .drawer-session-btn span {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .drawer-appearance-btn {
      width: 44px;
      height: 44px;
      border-radius: var(--r-md);
      border: 1px solid var(--border);
      background: var(--bg-subtle);
      color: var(--ink-quiet);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* ============================================================ MAIN LAYOUT */
    .atlas-main {
      position: relative;
      z-index: 1;
      max-width: 880px;
      margin: 0 auto;
      padding: clamp(3.4rem, 7vw, 5rem) 1.5rem 5rem;
    }

    /* ============================================================ CONTEXT ANCHOR */
    .context-anchor {
      margin-bottom: 2.5rem;
      padding-bottom: 1.65rem;
      position: relative;
    }

    /* Signature: the threshold sill — a hairline horizon under the greeting,
   with a single short accent tick at the left. Reads as the line between
   "here" (Atlas) and "there" (the worlds). Atlas's one deliberate flourish. */
    .context-anchor::after {
      content: '';
      position: absolute;
      left: 0;
      width: 88px;
      bottom: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--accent), rgba(var(--accent-rgb), 0));
    }

    .today-label {
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.8rem;
    }

    .welcome-line {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 2.7rem);
      color: var(--ink);
      line-height: 1.12;
      margin-bottom: 0.6rem;
      font-weight: 400;
      letter-spacing: -0.015em;
    }

    .welcome-sub {
      font-size: 0.92rem;
      color: var(--ink-quiet);
      font-weight: 300;
    }

    /* ============================================================ CONTINUE CARD */
    .continue-card {
      background: var(--continue-bg);
      border: 1px solid var(--continue-border);
      border-radius: 22px;
      margin-bottom: 1.35rem;
      transition: var(--t);
      position: relative;
      overflow: hidden;
      box-shadow:
        0 22px 56px rgba(55, 47, 35, 0.10),
        inset 0 1px 0 rgba(255, 255, 255, 0.76);
      backdrop-filter: blur(22px) saturate(1.08);
      -webkit-backdrop-filter: blur(22px) saturate(1.08);
    }

    html[data-theme="night"] .continue-card {
      box-shadow:
        0 24px 60px rgba(0, 0, 0, 0.26),
        inset 0 1px 0 rgba(255, 255, 255, 0.055);
    }

    .continue-summary {
      display: flex;
      align-items: center;
      gap: 1.15rem;
      padding: 1.45rem 1.5rem 1.2rem;
    }

    /* Extra bottom room so the rail doesn't crowd the actions */
    .continue-card.has-rail {
      padding-bottom: 1px;
    }

    .continue-pickup {
      margin-top: 0.62rem;
      color: var(--ink-mid);
      font-size: 0.82rem;
      line-height: 1.45;
    }

    .continue-pickup-label {
      color: var(--accent);
      font-weight: 650;
    }

    .continue-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.55rem;
    }

    .continue-summary>.continue-actions {
      flex-wrap: nowrap;
      margin-left: auto;
    }

    .continue-card>.continue-actions {
      padding: 0 1.5rem 1.3rem;
    }

    .continue-action {
      min-height: 40px;
      border-radius: 999px;
      padding: 0.55rem 1rem;
      border: 1px solid rgba(var(--accent-rgb), 0.2);
      background: rgba(255, 255, 255, 0.34);
      color: var(--ink-mid);
      font: inherit;
      font-size: 0.79rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--t);
    }

    .continue-action:hover {
      border-color: rgba(var(--accent-rgb), 0.38);
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
    }

    .continue-action:focus-visible {
      outline: 3px solid rgba(var(--accent-rgb), 0.52);
      outline-offset: 3px;
    }

    .continue-action.is-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      border-color: var(--accent);
      background: var(--accent);
      color: white;
    }

    .continue-action.is-primary:hover {
      background: #445e59;
      border-color: #445e59;
      color: white;
    }

    html[data-theme="night"] .continue-action {
      background: rgba(255, 255, 255, 0.045);
    }

    html[data-theme="night"] .continue-action:hover {
      background: rgba(255, 255, 255, 0.085);
    }

    html[data-theme="night"] .continue-action.is-primary,
    html[data-theme="night"] .continue-action.is-primary:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #17201e;
    }

    .continue-recap {
      margin: 0 1.5rem 1.15rem;
      padding: 1.25rem 1.3rem;
      border: 1px solid rgba(var(--accent-rgb), 0.15);
      border-radius: 16px;
      background: rgba(244, 241, 234, 0.68);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.62);
    }

    html[data-theme="night"] .continue-recap {
      background: rgba(17, 21, 19, 0.22);
      border-color: rgba(var(--accent-rgb), 0.16);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.035);
    }

    .continue-recap[hidden] {
      display: none;
    }

    .continue-recap-kicker {
      color: var(--accent);
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      line-height: 1.45;
      text-transform: uppercase;
    }

    .continue-recap-section {
      margin-top: 1rem;
    }

    .continue-recap-heading {
      margin: 0 0 0.38rem;
      color: var(--ink);
      font-size: 0.84rem;
      font-weight: 600;
    }

    .continue-recap-list {
      margin: 0;
      padding-left: 1.15rem;
      color: var(--ink-mid);
      font-size: 0.84rem;
      line-height: 1.6;
    }

    .continue-recap-copy {
      margin: 0;
      color: var(--ink-mid);
      font-size: 0.84rem;
      line-height: 1.55;
    }

    @media (max-width: 620px) {
      .continue-summary {
        align-items: flex-start;
        flex-wrap: wrap;
        padding-left: 1rem;
        padding-right: 1rem;
      }

      .continue-summary>.continue-actions {
        width: 100%;
        justify-content: flex-end;
      }

      .continue-card>.continue-actions {
        padding-left: 1rem;
        padding-right: 1rem;
      }

      .continue-recap {
        margin-left: 1rem;
        margin-right: 1rem;
      }

      .continue-action {
        min-height: 42px;
      }
    }

    /* Unlabeled coverage rail — pinned to the card's bottom edge. Reads as
   shape, not numbers. Quieter than the worlds' rail: a hairline track with
   a calm accent fill. */
    .continue-rail {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 1px;
      background: rgba(var(--accent-rgb), 0.06);
      overflow: hidden;
    }

    .continue-rail-fill {
      height: 100%;
      background: rgba(var(--accent-rgb), 0.28);
      border-radius: 0 2px 2px 0;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .continue-rail.is-complete .continue-rail-fill {
      background: rgba(var(--accent-rgb), 0.38);
      border-radius: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      .continue-rail-fill {
        transition: none;
      }
    }

    .continue-icon {
      width: 46px;
      height: 46px;
      flex-shrink: 0;
      border-radius: 14px;
      border: 1px solid rgba(var(--accent-rgb), 0.14);
      background: rgba(var(--accent-rgb), 0.10);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .continue-body {
      flex: 1;
      min-width: 0;
    }

    .continue-kicker {
      font-size: 0.64rem;
      font-weight: 650;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.3rem;
    }

    .continue-title {
      font-family: var(--font-display);
      font-size: clamp(1.15rem, 2.4vw, 1.38rem);
      font-weight: 400;
      color: var(--ink);
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .continue-meta {
      font-size: 0.77rem;
      color: var(--ink-quiet);
      margin-top: 0.22rem;
    }

    .continue-arrow {
      display: inline-flex;
      color: currentColor;
      flex-shrink: 0;
    }

    /* ============================================================ LANGUAGE REVIEW ROW */
    .review-row {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      background: rgba(255, 253, 249, 0.62);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.9rem 1.05rem;
      margin-bottom: 2rem;
      cursor: pointer;
      transition: var(--t);
      width: 100%;
      text-align: left;
      font-family: var(--font-body);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .review-row:hover {
      border-color: rgba(var(--accent-rgb), 0.22);
      background: rgba(255, 253, 249, 0.84);
      box-shadow: 0 7px 20px rgba(42, 37, 29, 0.065);
    }

    .review-row:focus-visible {
      outline: 3px solid rgba(var(--accent-rgb), 0.5);
      outline-offset: 3px;
    }

    html[data-theme="night"] .review-row,
    html[data-theme="night"] .review-row:hover {
      background: rgba(37, 40, 38, 0.72);
    }

    .review-row-icon {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      border-radius: 11px;
      background: var(--accent-pale);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .review-row-body {
      flex: 1;
      min-width: 0;
    }

    .review-row-name {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--ink-mid);
      margin-bottom: 0.1rem;
    }

    .review-row-count {
      font-size: 0.8rem;
      color: var(--ink-quiet);
    }

    .review-row-arrow {
      color: var(--ink-faint);
      flex-shrink: 0;
      transition: var(--t);
    }

    .review-row:hover .review-row-arrow {
      color: var(--accent);
      transform: translateX(2px);
    }

    /* ============================================================ DOORS */
    .doors-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-quiet);
      margin-bottom: 1rem;
    }

    .doors-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.15rem;
      margin-bottom: 1.5rem;
    }

    .door {
      display: flex;
      flex-direction: column;
      background: rgba(255, 253, 249, 0.74);
      border: 1px solid rgba(49, 45, 38, 0.11);
      border-radius: 20px;
      padding: 1.65rem 1.5rem 1.4rem;
      cursor: pointer;
      transition: var(--t);
      text-decoration: none;
      position: relative;
      overflow: hidden;
      min-height: 164px;
      width: 100%;
      text-align: left;
      font-family: var(--font-body);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .door-compass {
      background: linear-gradient(145deg, rgba(255, 253, 249, 0.9), rgba(92, 122, 110, 0.075));
    }

    .door-arcade {
      background: linear-gradient(145deg, rgba(255, 253, 249, 0.9), rgba(122, 110, 154, 0.07));
    }

    html[data-theme="night"] .door-compass {
      background: linear-gradient(145deg, rgba(37, 40, 38, 0.9), rgba(127, 168, 150, 0.085));
    }

    html[data-theme="night"] .door-arcade {
      background: linear-gradient(145deg, rgba(37, 40, 38, 0.9), rgba(160, 148, 190, 0.075));
    }

    .door::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      opacity: 0.34;
      transition: opacity var(--t);
    }

    .door-compass::before {
      background: linear-gradient(90deg, #5c7a6e, #7fa898);
    }

    .door-arcade::before {
      background: linear-gradient(90deg, #7a6e9a, #9a8eb8);
    }

    .door:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
      border-color: rgba(var(--accent-rgb), 0.22);
    }

    .door:hover::before {
      opacity: 0.9;
    }

    .door:active {
      transform: translateY(0);
      box-shadow: var(--shadow-sm);
    }

    .door:focus-visible {
      outline: 3px solid rgba(var(--accent-rgb), 0.5);
      outline-offset: 3px;
    }

    .door-unavailable {
      opacity: 0.6;
      cursor: default;
    }

    .door-unavailable::before {
      opacity: 0;
    }

    .door-unavailable:hover {
      box-shadow: none;
      transform: none;
      border-color: var(--border);
    }

    .door-unavailable:hover::before {
      opacity: 0;
    }

    .door-icon {
      width: 42px;
      height: 42px;
      border-radius: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.1rem;
      flex-shrink: 0;
    }

    .door-compass .door-icon {
      background: rgba(92, 122, 110, 0.12);
      color: #5c7a6e;
    }

    .door-arcade .door-icon {
      background: rgba(122, 110, 154, 0.12);
      color: #7a6e9a;
    }

    html[data-theme="night"] .door-compass .door-icon {
      background: rgba(127, 168, 150, 0.15);
      color: #7fa896;
    }

    html[data-theme="night"] .door-arcade .door-icon {
      background: rgba(160, 148, 190, 0.15);
      color: #a094be;
    }

    .door-name {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }

    .door-compass .door-name {
      color: #5c7a6e;
    }

    .door-arcade .door-name {
      color: #7a6e9a;
    }

    html[data-theme="night"] .door-compass .door-name {
      color: #7fa896;
    }

    html[data-theme="night"] .door-arcade .door-name {
      color: #a094be;
    }

    .door-title {
      font-family: var(--font-display);
      font-size: 1.28rem;
      color: var(--ink);
      margin-bottom: 0.48rem;
      line-height: 1.2;
    }

    .door-desc {
      font-size: 0.82rem;
      color: var(--ink-quiet);
      line-height: 1.5;
      flex: 1;
    }

    .door-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1rem;
    }

    .door-arrow {
      display: flex;
      align-items: center;
      color: var(--ink-faint);
      transition: var(--t);
      margin-left: auto;
    }

    .door:hover .door-arrow {
      color: var(--accent);
      transform: translateX(3px);
    }

    .door-soon-badge {
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-faint);
      background: var(--bg-subtle);
      border-radius: 20px;
      padding: 0.22rem 0.6rem;
    }

    /* ============================================================ LANGUAGE REVIEW — FOCUSED INLINE VIEW */
    .review-view {
      position: relative;
      z-index: 1;
      max-width: 620px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      animation: fadeIn 0.2s ease;
    }

    .review-topbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.75rem;
    }

    .review-back {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 0.85rem 0.45rem 0.65rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg-raised);
      color: var(--ink-mid);
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--t);
      min-height: 40px;
    }

    .review-back:hover {
      border-color: var(--border-mid);
      color: var(--ink);
      box-shadow: var(--shadow-sm);
    }

    .review-back:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .review-progress {
      margin-left: auto;
      font-size: 0.76rem;
      font-weight: 500;
      color: var(--ink-quiet);
      letter-spacing: 0.02em;
    }

    .review-heading {
      margin-bottom: 0.3rem;
    }

    .review-heading-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .review-heading-title {
      font-family: var(--font-display);
      font-size: clamp(1.4rem, 3.5vw, 1.7rem);
      color: var(--ink);
      line-height: 1.2;
      font-weight: 400;
    }

    .review-context {
      font-size: 0.84rem;
      color: var(--ink-quiet);
      margin-bottom: 1.75rem;
    }

    /* The recall card */
    .recall-card {
      background: var(--bg-raised);
      border: 1.5px solid var(--border);
      border-radius: var(--r-xl);
      padding: 2rem 1.9rem;
      box-shadow: var(--shadow-sm);
      min-height: 220px;
      display: flex;
      flex-direction: column;
    }

    .recall-type {
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 0.6rem;
    }

    .recall-term {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 5vw, 2.1rem);
      color: var(--ink);
      line-height: 1.15;
      margin-bottom: 1.5rem;
    }

    .recall-prompt {
      font-size: 0.95rem;
      color: var(--ink-mid);
      line-height: 1.6;
      padding: 0.9rem 1.1rem;
      background: var(--accent-pale);
      border-radius: var(--r-md);
      border-left: 3px solid var(--accent-soft);
    }

    .recall-prompt-label {
      display: block;
      font-size: 0.64rem;
      font-weight: 600;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.35rem;
    }

    .recall-reveal-btn {
      margin-top: 1.5rem;
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.25rem;
      border-radius: var(--r-md);
      border: 1px solid var(--accent);
      background: none;
      color: var(--accent);
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--t);
      min-height: 44px;
    }

    .recall-reveal-btn:hover {
      background: var(--accent-pale);
    }

    .recall-reveal-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Revealed answer */
    .recall-answer {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      animation: fadeIn 0.25s ease;
      display: flex;
      flex-direction: column;
      gap: 1.35rem;
    }

    .recall-answer-section {
      min-width: 0;
    }

    .recall-answer-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--ink-quiet);
      margin-bottom: 0.55rem;
    }

    .recall-def {
      font-size: 1rem;
      color: var(--ink);
      line-height: 1.7;
      margin: 0;
      overflow-wrap: anywhere;
    }

    .recall-answer-section.example {
      padding: 1rem 1.1rem 1.05rem 1.2rem;
      border: 1px solid rgba(var(--accent-rgb), 0.14);
      border-left: 3px solid var(--accent-soft);
      border-radius: 0 var(--r-md) var(--r-md) 0;
      background: rgba(var(--accent-rgb), 0.055);
    }

    .recall-answer-section.example .recall-answer-label {
      color: var(--accent);
      margin-bottom: 0.6rem;
    }

    .recall-inaction {
      font-size: 0.94rem;
      color: var(--ink-mid);
      font-style: normal;
      line-height: 1.72;
      padding: 0;
      border: 0;
      overflow-wrap: anywhere;
    }

    /* Review nav controls */
    .review-controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 1.75rem;
    }

    .review-nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.7rem 1.1rem;
      border-radius: var(--r-md);
      border: 1px solid var(--border);
      background: var(--bg-raised);
      color: var(--ink-mid);
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--t);
      min-height: 44px;
    }

    .review-nav-btn:hover:not(:disabled) {
      border-color: var(--border-mid);
      color: var(--ink);
      box-shadow: var(--shadow-sm);
    }

    .review-nav-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .review-nav-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .review-nav-btn.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      margin-left: auto;
    }

    .review-nav-btn.primary:hover {
      background: var(--accent-soft);
    }

    /* ============================================================ SESSION MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 700;
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .modal-overlay.open {
      display: flex;
      animation: fadeIn 0.18s ease;
    }

    .modal-panel {
      background: var(--bg-raised);
      border-radius: var(--r-xl);
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.22s cubic-bezier(0.34, 1.25, 0.64, 1);
      max-height: 90svh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      padding: 1.3rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .modal-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--ink);
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      background: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--ink-quiet);
    }

    .modal-close:hover {
      background: var(--bg-subtle);
      color: var(--ink);
    }

    .modal-body {
      padding: 1.2rem 1.5rem 1.5rem;
      overflow-y: auto;
      flex: 1;
    }

    .modal-helper {
      font-size: 0.8rem;
      color: var(--ink-quiet);
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    .modal-section-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin: 1rem 0 0.5rem;
    }

    .session-input {
      flex: 1;
      padding: 0.6rem 0.8rem;
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      font-family: var(--font-body);
      font-size: 0.88rem;
      color: var(--ink);
      background: var(--bg-raised);
      outline: none;
      transition: var(--t);
      min-height: 44px;
    }

    .session-input:focus {
      border-color: var(--accent);
    }

    select.session-input {
      padding-right: 2.7rem;
      background-position: right 0.85rem center;
    }

    .btn-primary {
      padding: 0.6rem 1.1rem;
      border-radius: var(--r-sm);
      border: none;
      background: var(--accent);
      color: #fff;
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--t);
      white-space: nowrap;
      min-height: 44px;
    }

    .btn-primary:hover {
      background: var(--accent-soft);
    }

    .btn-ghost {
      padding: 0.6rem 1rem;
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      background: var(--bg-raised);
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--ink-mid);
      cursor: pointer;
      transition: var(--t);
      min-height: 44px;
    }

    .btn-ghost:hover {
      border-color: var(--border-mid);
      color: var(--ink);
    }

    /* ============================================================ ATLAS WELCOME IMAGE */
    .atmosphere-preview {
      position: relative;
      height: 92px;
      border-radius: var(--r-md);
      border: 1px solid var(--border);
      background: var(--bg-subtle);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-faint);
      font-size: 0.78rem;
      margin-top: 0.65rem;
    }

    .atmosphere-preview-image {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0.78;
      display: none;
    }

    .atmosphere-preview.has-image .atmosphere-preview-image {
      display: block;
    }

    .atmosphere-preview.has-image .atmosphere-preview-empty {
      display: none;
    }

    .atmosphere-preview-empty {
      position: relative;
      z-index: 1;
    }

    .atmosphere-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.55rem;
      margin-top: 0.85rem;
    }

    .atmosphere-actions .btn-primary {
      grid-column: 1 / -1;
      width: 100%;
    }

    .atmosphere-actions .btn-ghost {
      width: 100%;
    }

    .atmosphere-favorites-list {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      margin-top: 0.6rem;
    }

    .atmosphere-favorite-item {
      display: grid;
      grid-template-columns: 52px minmax(0, 1fr) auto;
      align-items: center;
      gap: 0.65rem;
      padding: 0.5rem;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      background: var(--bg-subtle);
    }

    .atmosphere-favorite-thumb {
      width: 52px;
      height: 34px;
      border-radius: var(--r-sm);
      background-size: cover;
      background-position: center;
      background-color: var(--bg-raised);
      border: 1px solid var(--border);
    }

    .atmosphere-favorite-url {
      font-size: 0.74rem;
      color: var(--ink-quiet);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .atmosphere-favorite-actions {
      display: flex;
      gap: 0.3rem;
      flex-shrink: 0;
    }

    .atmosphere-mini-btn {
      min-height: 32px;
      padding: 0.35rem 0.65rem;
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      background: var(--bg-raised);
      color: var(--ink-mid);
      font-family: var(--font-body);
      font-size: 0.74rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--t);
    }

    .atmosphere-mini-btn:hover {
      border-color: var(--border-mid);
      color: var(--ink);
    }

    .atmosphere-mini-btn.danger:hover {
      color: var(--danger);
      border-color: var(--danger-border);
      background: var(--danger-bg);
    }

    .atmosphere-empty-favorites {
      font-size: 0.76rem;
      color: var(--ink-faint);
      padding: 0.55rem 0;
    }

    /* ============================================================ CONFIRM DIALOG */
    .confirm-dialog {
      position: fixed;
      inset: 0;
      z-index: 800;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(6px);
    }

    .confirm-dialog.open {
      display: flex;
      animation: fadeIn 0.15s ease;
    }

    .confirm-panel {
      background: var(--bg-raised);
      border-radius: var(--r-lg);
      max-width: 360px;
      width: 100%;
      padding: 1.5rem;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.2s cubic-bezier(0.34, 1.25, 0.64, 1);
    }

    .confirm-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 0.5rem;
    }

    .confirm-message {
      font-size: 0.85rem;
      color: var(--ink-quiet);
      line-height: 1.55;
      margin-bottom: 1.2rem;
    }

    .confirm-input {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      font-family: var(--font-body);
      font-size: 0.88rem;
      color: var(--ink);
      background: var(--bg-raised);
      outline: none;
      transition: var(--t);
      margin-bottom: 0.5rem;
      display: none;
      min-height: 44px;
    }

    .confirm-input.visible {
      display: block;
    }

    .confirm-input:focus {
      border-color: var(--accent);
    }

    .confirm-error {
      font-size: 0.78rem;
      color: var(--danger);
      margin-bottom: 0.8rem;
      min-height: 1rem;
      display: none;
    }

    .confirm-error.visible {
      display: block;
    }

    .confirm-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
    }

    .btn-danger {
      padding: 0.6rem 1rem;
      border-radius: var(--r-sm);
      border: 1px solid var(--danger-border);
      background: var(--danger-bg);
      color: var(--danger);
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--t);
      min-height: 44px;
    }

    .btn-danger:hover {
      background: #fee;
    }

    /* ============================================================ EMPTY STATE */
    .empty-setup {
      text-align: center;
      padding: 1rem 1rem 2rem;
    }

    .empty-setup-title {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 4vw, 1.9rem);
      color: var(--ink);
      margin-bottom: 0.55rem;
    }

    .empty-setup-sub {
      font-size: 0.92rem;
      color: var(--ink-quiet);
      margin-bottom: 2rem;
      line-height: 1.55;
    }

    .empty-form {
      display: flex;
      gap: 0.5rem;
      max-width: 360px;
      margin: 0 auto 1rem;
    }

    .empty-default-link {
      font-size: 0.82rem;
      color: var(--ink-faint);
      cursor: pointer;
      background: none;
      border: none;
      font-family: var(--font-body);
      text-decoration: underline;
      text-underline-offset: 2px;
      transition: var(--t);
    }

    .empty-default-link:hover {
      color: var(--ink-quiet);
    }

    /* ============================================================ TOAST */
    .atlas-toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--bg-raised);
      border: 1px solid var(--border-mid);
      border-radius: var(--r-md);
      padding: 0.7rem 1.2rem;
      font-size: 0.85rem;
      color: var(--ink-mid);
      z-index: 900;
      box-shadow: var(--shadow-md);
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
      max-width: calc(100vw - 2rem);
    }

    .atlas-toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ============================================================ UTILITIES */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(16px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-12px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ============================================================ RESPONSIVE */
    @media (max-width: 720px) {
      .spine {
        display: none;
      }

      .mobile-header {
        display: flex;
      }

      .doors-grid {
        grid-template-columns: 1fr;
      }

      .atlas-main {
        padding: 2.75rem 1rem 3.5rem;
      }

      .context-anchor {
        margin-bottom: 2rem;
      }

      .welcome-line {
        font-size: clamp(1.9rem, 9vw, 2.35rem);
      }

      .door {
        min-height: 150px;
      }

      .review-view {
        padding: 1.5rem 1rem 3rem;
      }

      .recall-card {
        padding: 1.6rem 1.4rem;
      }

      .recall-answer {
        gap: 1.15rem;
      }

      .recall-answer-section.example {
        padding: 0.9rem 0.95rem 0.95rem 1rem;
      }

      .recall-inaction {
        font-size: 0.92rem;
      }

      .empty-form {
        flex-direction: column;
      }

      .atlas-search-overlay {
        padding: 2rem 0.75rem 1rem;
      }

      .review-controls {
        flex-wrap: wrap;
      }
    }

    @media (min-width: 721px) {
      .mobile-header {
        display: none;
      }

      .spine {
        display: flex;
      }

      .drawer-overlay,
      .drawer {
        display: none !important;
      }
    }
  </style>
</head>

<body>
  <div class="atmosphere-layer" id="atmosphere-layer" aria-hidden="true"></div>
  <!-- ============================================================ SPINE (desktop) -->
  <header class="spine" role="banner">
    <div class="spine-mark">Atlas<span>.</span></div>
    <div class="spine-worlds" id="spine-worlds" role="group" aria-label="World navigation"></div>
    <div class="spine-actions">
      <button class="spine-session-pill" onclick="openSessionPanel(this)"
        aria-label="Open session panel. Working with Shared">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <circle cx="6" cy="4" r="2.2" stroke="currentColor" stroke-width="1.2" />
          <path d="M1.5 10.5c0-2.2 2-4 4.5-4s4.5 1.8 4.5 4" stroke="currentColor" stroke-width="1.2"
            stroke-linecap="round" />
        </svg>
        <span class="pill-name" id="spine-session-name">Shared</span>
      </button>

      <button class="spine-btn" data-atlas-search title="Search (⌘K)" aria-label="Search">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
          <circle cx="6.5" cy="6.5" r="4.2" stroke="currentColor" stroke-width="1.3" />
          <path d="M9.8 9.8l2.8 2.8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
        </svg>
      </button>

      <button class="spine-btn" onclick="openSettingsModal()" title="Settings" aria-label="Settings">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 4h10M3 8h10M3 12h10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" />
          <circle cx="6" cy="4" r="1.2" fill="var(--bg-raised)" stroke="currentColor" stroke-width="1.2" />
          <circle cx="10" cy="8" r="1.2" fill="var(--bg-raised)" stroke="currentColor" stroke-width="1.2" />
          <circle cx="7.5" cy="12" r="1.2" fill="var(--bg-raised)" stroke="currentColor" stroke-width="1.2" />
        </svg>
      </button>

      <button class="spine-btn" id="spine-appearance-btn" onclick="toggleAppearance()"
        aria-label="Toggle day/night"></button>
    </div>
  </header>
  <!-- ============================================================ MOBILE HEADER -->
  <header class="mobile-header" role="banner">
    <div class="mobile-header-mark">Atlas<span>.</span></div>

    <div class="mobile-header-actions">
      <button class="mobile-header-session" onclick="openSessionPanel(this)"
        aria-label="Open session panel. Working with Shared">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <circle cx="6" cy="4" r="2.2" stroke="currentColor" stroke-width="1.2" />
          <path d="M1.5 10.5c0-2.2 2-4 4.5-4s4.5 1.8 4.5 4" stroke="currentColor" stroke-width="1.2"
            stroke-linecap="round" />
        </svg>
        <span id="mobile-session-name">Shared</span>
      </button>

      <button class="mobile-header-btn" data-atlas-search aria-label="Search">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.3" />
          <path d="M10.5 10.5l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
        </svg>
      </button>

      <button class="mobile-header-btn" onclick="openDrawer()" aria-label="Menu">
        <svg width="17" height="17" viewBox="0 0 17 17" fill="none">
          <path d="M2 4h13M2 8.5h13M2 13h13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
        </svg>
      </button>
    </div>
  </header>
  <!-- Mobile drawer -->
  <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
  <nav class="drawer" id="drawer" aria-label="Navigation">
    <div class="drawer-header">
      <span class="drawer-title">Atlas<span>.</span></span>
      <button class="drawer-close" onclick="closeDrawer()" aria-label="Close menu">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
        </svg>
      </button>
    </div>
    <div class="drawer-nav">
      <div class="drawer-nav-label">Worlds</div>
      <div id="drawer-worlds"></div>
      <div class="drawer-nav-label">Find</div>
      <button class="drawer-nav-item" onclick="closeDrawer();AtlasSearch.open()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.3" />
          <path d="M10.5 10.5l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
        </svg>
        Search
      </button>
      <button class="drawer-nav-item" onclick="closeDrawer();openSettingsModal()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 4h10M3 8h10M3 12h10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" />
          <circle cx="6" cy="4" r="1.2" fill="var(--bg-raised)" stroke="currentColor" stroke-width="1.2" />
          <circle cx="10" cy="8" r="1.2" fill="var(--bg-raised)" stroke="currentColor" stroke-width="1.2" />
          <circle cx="7.5" cy="12" r="1.2" fill="var(--bg-raised)" stroke="currentColor" stroke-width="1.2" />
        </svg>
        Settings
      </button>
    </div>
    <div class="drawer-footer">
      <div class="drawer-footer-row">
        <button class="drawer-session-btn" aria-label="Open session panel. Working with Shared"
          onclick="closeDrawer();openSessionPanel(document.querySelector('.mobile-header-session'))">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <circle cx="7" cy="5" r="2.5" stroke="currentColor" stroke-width="1.2" />
            <path d="M2 12c0-2.5 2.2-4.5 5-4.5s5 2 5 4.5" stroke="currentColor" stroke-width="1.2"
              stroke-linecap="round" />
          </svg>
          <span id="drawer-session-name">Shared</span>
        </button>
        <button class="drawer-appearance-btn" onclick="toggleAppearance()" aria-label="Toggle appearance"></button>
      </div>
    </div>
  </nav>
  <!-- ============================================================ MAIN CONTENT -->
  <main class="atlas-main" id="atlas-main" role="main">
    <!-- Rendered by JS based on bridge state -->
  </main>
  <div id="atlas-session-panel-root"></div>

  <!-- ============================================================ SETTINGS MODAL -->
  <div class="modal-overlay" id="settings-modal" onclick="handleSettingsModalClick(event)" role="dialog"
    aria-label="Settings" aria-modal="true">
    <div class="modal-panel">
      <div class="modal-header">
        <span class="modal-title">Settings</span>
        <button class="modal-close" onclick="closeSettingsModal()" aria-label="Close">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <p class="modal-helper">Set a welcome image for the active session. Atlas stays clean by default; this image
          appears only for this learner.</p>

        <p class="modal-section-label">Welcome image URL</p>
        <input class="session-input" id="atmosphere-input" type="url" placeholder="https://..." autocomplete="off"
          oninput="handleAtmospherePreviewInput()">

        <div class="atmosphere-preview" id="atmosphere-preview">
          <div class="atmosphere-preview-image" id="atmosphere-preview-image"></div>
          <span class="atmosphere-preview-empty">No image selected</span>
        </div>

        <div class="atmosphere-actions">
          <button class="btn-primary" onclick="handleSaveSettings()">Save image</button>
          <button class="btn-ghost" onclick="handleRemoveAtmosphere()">Remove image</button>
          <button class="btn-ghost" onclick="handleSaveAtmosphereFavorite()">Save to favourites</button>
        </div>

        <p class="modal-section-label">Favourites</p>
        <div class="atmosphere-favorites-list" id="atmosphere-favorites-list"></div>
      </div>
    </div>
  </div>

  <!-- ============================================================ CONFIRM DIALOG -->
  <div class="confirm-dialog" id="confirm-dialog" role="alertdialog" aria-modal="true">
    <div class="confirm-panel">
      <div class="confirm-title" id="confirm-title"></div>
      <div class="confirm-message" id="confirm-message"></div>
      <input class="confirm-input" id="confirm-input" type="text" maxlength="40" autocomplete="off">
      <div class="confirm-error" id="confirm-error"></div>
      <div class="confirm-actions">
        <button class="btn-ghost" onclick="resolveConfirm(false)">Cancel</button>
        <button class="btn-danger" id="confirm-ok-btn" onclick="resolveConfirm(true)">OK</button>
      </div>
    </div>
  </div>
  <!-- ============================================================ SCRIPTS -->
  <script src="./shared/atlas-bridge.js"></script>
  <script src="./shared/atlas-session-panel.js"></script>
  <script src="./shared/atlas-search.js"></script>
  <script>
    'use strict';

    /* ================================================================
       ATLAS V1 RUNTIME
       Atlas is a calm threshold/router. AtlasBridge owns all state.
       Atlas reads through the bridge and writes only through public
       bridge methods. No local session/registry/ledger systems.
       ================================================================ */

    // ---- Bridge guard -------------------------------------------------
    // Atlas cannot function without the bridge. If it failed to load,
    // show a direct, in-voice message rather than a blank or broken page.
    if (!window.AtlasBridge) {
      document.getElementById('atlas-main').innerHTML =
        '<div class="empty-setup"><h1 class="empty-setup-title">Atlas can\u2019t start</h1>' +
        '<p class="empty-setup-sub">The shared runtime didn\u2019t load. Reload the page, and if it keeps happening, check that shared/atlas-bridge.js is in place.</p></div>';
    }
    const Bridge = window.AtlasBridge;

    // ---- Display labels (decoupled from storage) ----------------------
    const ATLAS_ID = 'atlas';
    const COMPASS_ID = 'compass';
    const ARCADE_ID = 'arcade';
    const ACTIVE_HUB_ID = ATLAS_ID;

    const WORLDS = {
      compass: {
        id: COMPASS_ID,
        name: 'Compass',
        desc: 'Deeper English conversation subjects \u2014 reflective, human, lesson-ready.',
        cssClass: 'door-compass',
        iconSvg: '<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M10 3v2M10 15v2M3 10h2M15 10h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="10" cy="10" r="2" fill="currentColor" opacity="0.4"/></svg>',
        smallIcon: '<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="4.8" stroke="currentColor" stroke-width="1.2"/><path d="M6.5 1.7v1.4M6.5 9.9v1.4M1.7 6.5h1.4M9.9 6.5h1.4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><circle cx="6.5" cy="6.5" r="1.5" fill="currentColor" opacity="0.5"/></svg>'
      },
      arcade: {
        id: ARCADE_ID,
        name: 'Arcade',
        desc: 'Conversation games for lighter, playful English practice.',
        cssClass: 'door-arcade',
        iconSvg: '<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="3" y="5.5" width="14" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 10h4M9 8v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="13" cy="10" r="0.9" fill="currentColor"/><circle cx="15" cy="8" r="0.9" fill="currentColor"/></svg>',
        smallIcon: '<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1.5" y="3" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M4.5 6.5h2M5.5 5.5v2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><circle cx="8.5" cy="6.5" r="0.6" fill="currentColor"/><circle cx="10" cy="5.5" r="0.6" fill="currentColor"/></svg>'
      }
    };

    const HUB_NAV = {
      atlas: {
        id: ATLAS_ID,
        name: 'Atlas',
        desc: 'Gateway',
        alwaysAvailable: true,
        launchUrl: './index.html',
        smallIcon: '<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1.4L11.6 6.5L6.5 11.6L1.4 6.5Z" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round"/><path d="M6.5 3.6L9.4 6.5L6.5 9.4L3.6 6.5Z" stroke="currentColor" stroke-width="1.15" stroke-linejoin="round" opacity="0.75"/></svg>'
      },
      compass: {
        id: COMPASS_ID,
        name: 'Compass',
        desc: WORLDS.compass.desc,
        worldId: COMPASS_ID,
        smallIcon: WORLDS.compass.smallIcon
      },
      arcade: {
        id: ARCADE_ID,
        name: 'Arcade',
        desc: WORLDS.arcade.desc,
        worldId: ARCADE_ID,
        smallIcon: WORLDS.arcade.smallIcon
      }
    };

    const REVIEW_MAX = 5; // V1 shows up to 5 most-recent saved language items
    const SESSION_ATMOSPHERE_KEY = 'atlas::sessionAtmosphereImages';
    const ATMOSPHERE_FAVORITES_KEY = 'atlas::welcomeImageFavorites';
    const MAX_ATMOSPHERE_FAVORITES = 12;

    // ================================================================
    // SAFE BRIDGE READS
    // ================================================================
    function getActiveSession() {
      try { return Bridge.readActiveSession(); }
      catch (e) { return { id: Bridge.defaultSessionId || 'default', name: 'Default' }; }
    }
    function getSessions() {
      try { return Bridge.readSessions() || []; }
      catch (e) { return []; }
    }
    function getRegistry() {
      try { return Bridge.readRegistry(); }
      catch (e) { return { worlds: {}, items: {}, sessionStates: {}, recentActivity: [] }; }
    }
    function getLedger() {
      try { return Bridge.readLedger(); }
      catch (e) { return { entries: {} }; }
    }
    function getLatestHandoff(sessionId) {
      try {
        return typeof Bridge.readLatestHandoff === 'function'
          ? Bridge.readLatestHandoff(sessionId)
          : null;
      } catch (e) {
        return null;
      }
    }
    function isDefaultSession(session) {
      return session && session.id === (Bridge.defaultSessionId || 'default');
    }

    // ================================================================
    // WORLD RESOLUTION
    // Prefer the clean key registry.worlds.compass; fall back narrowly
    // to a current-identity scan only. No obsolete names.
    // ================================================================
    function resolveWorld(reg, worldId) {
      const worlds = reg.worlds || {};
      if (worlds[worldId]) return worlds[worldId];
      return Object.values(worlds).find(w =>
        w && (w.registryId === worldId || w.id === worldId || w.world === worldId)
      ) || null;
    }
    function worldHasItems(reg, worldId) {
      const prefix = worldId + ':';
      return Object.keys(reg.items || {}).some(k => k.indexOf(prefix) === 0);
    }
    function getWorldLaunchUrl(reg, worldId) {
      if (worldId === COMPASS_ID) return './compass/index.html';
      if (worldId === ARCADE_ID) return './arcade/index.html';

      const w = resolveWorld(reg, worldId);
      return (w && w.launchUrl) ? w.launchUrl : null;
    }
    // A world is "available" (navigable as a hub) if it has a launchUrl.
    function isWorldAvailable(reg, worldId) {
      return !!getWorldLaunchUrl(reg, worldId);
    }

    // ================================================================
    // CONTINUE — most recent resumable item for the active session
    // ================================================================
    function getContinueItem(reg, sessionId) {
      const states = (reg.sessionStates || {})[sessionId];

      if (!states || typeof states !== 'object') return null;

      const candidates = Object.values(states)
        .map(state => {
          if (!state || typeof state !== 'object' || !state.registryId) {
            return null;
          }

          const item = (reg.items || {})[state.registryId] || {};

          const world =
            state.world ||
            item.world ||
            String(state.registryId).split(':')[0];

          const status = String(state.status || '').toLowerCase();
          const progress = state.progress || {};
          const raw = state.progressRaw || {};

          if (status === 'complete' || status === 'not-started') {
            return null;
          }

          let hasMeaningfulProgress = false;

          if (world === COMPASS_ID) {
            const explored = Number(progress.explored) || 0;
            const exploredIds = Array.isArray(raw.exploredIds)
              ? raw.exploredIds.length
              : 0;

            hasMeaningfulProgress =
              explored > 0 ||
              exploredIds > 0;
          }

          if (world === ARCADE_ID) {
            const covered = Number(progress.covered) || 0;

            hasMeaningfulProgress = covered > 0;
          }

          if (!hasMeaningfulProgress) {
            return null;
          }

          const launchUrl =
            state.launchUrl ||
            item.launchUrl ||
            '';

          if (!launchUrl) {
            return null;
          }

          return Object.assign({}, item, state, {
            world,
            launchUrl,
            lastTouchedAt:
              state.lastTouchedAt ||
              state.updatedAt ||
              0
          });
        })
        .filter(Boolean)
        .sort((a, b) =>
          b.lastTouchedAt - a.lastTouchedAt
        );

      return candidates[0] || null;
    }
    // Qualitative label only — never detailed progress counts.
    function continueLabel(item) {
      return 'In progress';
    }
    // Soft continuity fill for the Continue card. Reads the progress summary
    // the world already publishes (item.progress = { explored, total }).
    // Unlabeled by design: it conveys shape, not counts.
    // A wrapped-up lesson reads full.
    function continueCoverage(item) {
      const status = String(item.status || '').toLowerCase();

      if (status === 'complete') return 100;

      const progress = item.progress;

      if (!progress || typeof progress !== 'object') {
        return null;
      }

      const total =
        Number(progress.total) ||
        Number(item.total) ||
        0;

      if (total <= 0) return null;

      let amount = 0;

      if (item.world === COMPASS_ID) {
        amount = Number(progress.explored) || 0;
      }

      if (item.world === ARCADE_ID) {
        amount = Number(progress.covered) || 0;
      }

      if (amount <= 0) return null;

      const pct = Math.round((amount / total) * 100);

      return Math.max(0, Math.min(100, pct));
    }

    function itemTitle(item) {
      return item.navTitle || item.title || item.name || 'Untitled';
    }

    function itemWorldLabel(item) {
      if (item.world === COMPASS_ID) return WORLDS.compass.name;
      if (item.world === ARCADE_ID) return WORLDS.arcade.name;

      return item.world || '';
    }

    function getMatchingCompassHandoff(item, handoff) {
      if (!item || !handoff) return null;
      if (item.world !== COMPASS_ID || handoff.world !== COMPASS_ID) return null;

      const subjectId = typeof handoff.subjectId === 'string'
        ? handoff.subjectId.trim()
        : '';

      if (!subjectId) return null;

      const matchesSubjectId = item.id === subjectId;
      const matchesRegistryId = item.registryId === COMPASS_ID + ':' + subjectId;

      return matchesSubjectId || matchesRegistryId ? handoff : null;
    }

    let expandedContinueHandoffId = null;

    // ================================================================
    // LANGUAGE REVIEW — saved language entries for the active session
    // Filter: sessionId match, kind === 'language', status === 'saved'.
    // No legacy covered/viewed review data.
    // ================================================================
    function getSavedLanguageEntries(ledger, sessionId) {
      return Object.values(ledger.entries || {})
        .filter(entry =>
          entry &&
          entry.sessionId === sessionId &&
          entry.kind === 'language' &&
          entry.status === 'saved'
        )
        .sort((a, b) =>
          (b.savedAt || b.lastTouchedAt || b.updatedAt || 0) -
          (a.savedAt || a.lastTouchedAt || a.updatedAt || 0)
        );
    }

    function getReviewSet(ledger, sessionId) {
      return getSavedLanguageEntries(ledger, sessionId).slice(0, REVIEW_MAX);
    }

    // ================================================================
    // APPEARANCE — bridge only
    // ================================================================
    function applyAppearance(mode, animate) {
      if (animate) {
        document.documentElement.classList.add('theme-transitioning');
        setTimeout(() => document.documentElement.classList.remove('theme-transitioning'), 400);
      }
      document.documentElement.dataset.theme = mode;
      updateAppearanceButtons(mode);
    }
    function toggleAppearance() {
      const cur = Bridge.readAppearanceMode();
      const next = cur === 'night' ? 'light' : 'night';
      Bridge.setAppearanceMode(next); // dispatches atlas:appearance-change
      applyAppearance(next, true);
    }
    function moonSvg(size) {
      size = size || 17;
      return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 17 17" fill="none"><path d="M14.5 10.2A7 7 0 0 1 6.8 2.5a7 7 0 1 0 7.7 7.7Z" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    }
    function sunSvg(size) {
      size = size || 17;
      return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 17 17" fill="none"><circle cx="8.5" cy="8.5" r="3" stroke="currentColor" stroke-width="1.35"/><path d="M8.5 1.5v2M8.5 13.5v2M1.5 8.5h2M13.5 8.5h2M3.7 3.7l1.4 1.4M11.9 11.9l1.4 1.4M11.9 5.1l1.4-1.4M3.7 13.3l1.4-1.4" stroke="currentColor" stroke-width="1.35" stroke-linecap="round"/></svg>';
    }
    function updateAppearanceButtons(mode) {
      const icon = mode === 'night' ? sunSvg(17) : moonSvg(17);
      const label = mode === 'night' ? 'Switch to day mode' : 'Switch to night mode';
      ['spine-appearance-btn', 'mobile-appearance-btn'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.innerHTML = icon; el.setAttribute('aria-label', label); }
      });
      const da = document.querySelector('.drawer-appearance-btn');
      if (da) da.innerHTML = mode === 'night' ? sunSvg(16) : moonSvg(16);
    }

    // ================================================================
    // NAVIGATION
    // ================================================================
    function navigateTo(url) {
      if (!url) { showToast('That destination isn\u2019t available on this device yet.'); return; }
      window.location.href = url;
    }
    // Open a world by its hub launchUrl. If Compass has items but no hub
    // URL yet, say so plainly rather than inventing a route.
    function openWorld(worldId) {
      const reg = getRegistry();
      const url = getWorldLaunchUrl(reg, worldId);
      if (url) { navigateTo(url); return; }
      if (worldId === COMPASS_ID && worldHasItems(reg, COMPASS_ID)) {
        showToast('Compass is registered, but its hub isn\u2019t linked on this device yet.');
        return;
      }
      showToast('This world is coming soon.');
    }

    let toastTimer = null;
    function showToast(text) {
      let el = document.getElementById('atlas-toast');
      if (!el) {
        el = document.createElement('div');
        el.id = 'atlas-toast';
        el.className = 'atlas-toast';
        el.setAttribute('role', 'status');
        document.body.appendChild(el);
      }
      el.textContent = text;
      requestAnimationFrame(() => el.classList.add('visible'));
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        el.classList.remove('visible');
      }, 3200);
    }

    // ================================================================
    // CONFIRM DIALOG (promise-based)
    // ================================================================
    let confirmResolver = null;
    function showConfirm(opts) {
      opts = opts || {};
      return new Promise(resolve => {
        confirmResolver = resolve;
        document.getElementById('confirm-title').textContent = opts.title || '';
        document.getElementById('confirm-message').textContent = opts.message || '';
        const okBtn = document.getElementById('confirm-ok-btn');
        okBtn.textContent = opts.okLabel || 'Confirm';
        okBtn.className = opts.okClass || 'btn-danger';
        const inp = document.getElementById('confirm-input');
        inp.className = 'confirm-input' + (opts.inputMode ? ' visible' : '');
        inp.value = opts.inputValue || '';
        const err = document.getElementById('confirm-error');
        err.className = 'confirm-error';
        err.textContent = '';
        document.getElementById('confirm-dialog').classList.add('open');
        if (opts.inputMode) setTimeout(() => { inp.focus(); inp.select(); }, 50);
      });
    }
    function showConfirmError(msg) {
      const err = document.getElementById('confirm-error');
      err.textContent = msg;
      err.className = 'confirm-error visible';
    }
    function resolveConfirm(ok) {
      const inp = document.getElementById('confirm-input');
      const isInput = inp.classList.contains('visible');
      if (!ok) {
        document.getElementById('confirm-dialog').classList.remove('open');
        if (confirmResolver) { confirmResolver(isInput ? null : false); confirmResolver = null; }
        return;
      }
      const value = isInput ? inp.value.trim() : true;
      document.getElementById('confirm-dialog').classList.remove('open');
      if (confirmResolver) { confirmResolver(value); confirmResolver = null; }
    }
    document.getElementById('confirm-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') resolveConfirm(true);
      if (e.key === 'Escape') {
        e.stopPropagation();
        resolveConfirm(false);
      }
    });

    // ================================================================
    // SESSION MODAL — bridge methods only
    // ================================================================
    function openSessionPanel(trigger = document.activeElement) {
      if (window.AtlasSessionPanel) AtlasSessionPanel.open(trigger);
    }
    async function handleRenameSession(session) {
      const id = session.id;
      const sessions = getSessions();
      const s = sessions.find(x => x.id === id);
      if (!s) return;
      const newName = await showConfirm({
        title: 'Rename session',
        message: 'Give this session a new name.',
        okLabel: 'Rename',
        okClass: 'btn-primary',
        inputMode: true,
        inputValue: s.name
      });
      if (newName === null || newName === '' || newName === s.name) return;
      const renamed = Bridge.renameSession(id, newName);
      if (!renamed) {
        await showConfirm({
          title: 'Name taken',
          message: 'A session called \u201c' + newName + '\u201d already exists. Choose a different name.',
          okLabel: 'OK', okClass: 'btn-ghost'
        });
        return;
      }
      renderHome();
    }
    async function handleDeleteSession(session) {
      const id = session.id;
      const defId = Bridge.defaultSessionId || 'default';
      if (id === defId) return; // default can't be deleted
      const sessions = getSessions();
      const s = sessions.find(x => x.id === id);
      if (!s) return;
      const ok = await showConfirm({
        title: 'Delete session?',
        message: 'This permanently removes ' + s.name + ', their progress, and their covered language from this device.',
        okLabel: 'Delete session'
      });
      if (!ok) return;

      // 1) Purge ledger entries for this session.
      const ledger = getLedger();
      let ledgerChanged = false;
      Object.keys(ledger.entries || {}).forEach(k => {
        if (ledger.entries[k] && ledger.entries[k].sessionId === id) {
          delete ledger.entries[k];
          ledgerChanged = true;
        }
      });
      if (ledgerChanged) Bridge.writeLedger(ledger);

      // 2) Scrub this session's registry state + recent activity.
      const reg = getRegistry();
      if (reg.sessionStates) delete reg.sessionStates[id];
