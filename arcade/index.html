  ==========================================================================
-->
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcade</title>

  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath d='M50 4L96 50L50 96L4 50Z' fill='%239C3FE4' stroke='%236D28B8' stroke-width='5' stroke-linejoin='round'/%3E%3Cpath d='M50 18L82 50L50 82L18 50Z' fill='%23FBF5FF' stroke='%23FFFFFF' stroke-width='3' stroke-linejoin='round'/%3E%3Cpath d='M50 34L66 50L50 66L34 50Z' fill='%23C026D3' stroke='%237E22CE' stroke-width='3' stroke-linejoin='round'/%3E%3Cpath d='M50 18L50 34M82 50L66 50M50 82L50 66M18 50L34 50' stroke='%23E9B8FF' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="../shared/atlas-search.css?v=20260717-theme-architecture">
  <link rel="stylesheet" href="../shared/atlas-session-panel.css">

  <!-- Anti-flash: apply the active session theme before first paint -->
  <script>
    (function () {
      var m = null;
      try {
        var sessionId = localStorage.getItem('atlas::activeSessionId') || 'default';
        var sessionModes = JSON.parse(localStorage.getItem('atlas::appearanceBySession') || '{}');
        m = sessionModes[sessionId] || localStorage.getItem('atlas::appearanceMode');
      } catch (e) { }
      document.documentElement.dataset.theme = (m === 'night') ? 'night' : 'light';
    })();
  </script>

  <style>
    /* ============================================================
       ARCADE HUB — DESIGN TOKENS
       Premium prompt-deck table inside a fast improv studio.
       Day: warm studio ivory, coral-orange accent, aubergine ink.
       Night: warm charcoal/plum, coral-orange glow.
       Distinct from Compass (editorial cream/teal) and Atlas (cool slate).
       ============================================================ */
    :root {
      --bg: #f7f1f8;
      --bg-raised: #fffdfd;
      --bg-subtle: #efe7f1;
      --bg-card: #fffdfd;

      --arcade: #8a2fbd;
      --arcade-soft: #a84bd5;
      --arcade-pale: #ecdaf5;
      --arcade-dim: #f7edf9;
      --arcade-rgb: 138, 47, 189;

      --page-bg-day:
        radial-gradient(circle at 84% 4%, rgba(168, 75, 213, 0.13), transparent 30rem),
        radial-gradient(circle at 8% 22%, rgba(107, 76, 130, 0.085), transparent 34rem),
        linear-gradient(145deg, #fcf8fb 0%, #f7f1f8 48%, #f0e8f2 100%);

      --page-bg-night:
        radial-gradient(circle at 84% 4%, rgba(192, 38, 211, 0.19), transparent 31rem),
        radial-gradient(circle at 8% 22%, rgba(124, 58, 237, 0.12), transparent 35rem),
        linear-gradient(145deg, #17121d 0%, #1d1625 52%, #26172f 100%);

      --page-bg: var(--page-bg-day);

      --ink: #2d1f3d;
      --ink-mid: #5a4a6e;
      --ink-quiet: #8a7a9a;
      --ink-faint: #c4bad0;

      --border: rgba(58, 36, 63, 0.095);
      --border-mid: rgba(58, 36, 63, 0.16);

      --danger: #c0392b;
      --danger-bg: #fdf2f1;
      --danger-border: rgba(192, 57, 43, 0.28);

      --shadow-xs: 0 1px 2px rgba(45, 31, 61, 0.05);
      --shadow-sm: 0 7px 20px rgba(58, 36, 63, 0.07);
      --shadow-md: 0 16px 40px rgba(58, 36, 63, 0.11);
      --shadow-lg: 0 26px 68px rgba(58, 36, 63, 0.15);

      --r-sm: 6px;
      --r-md: 16px;
      --r-lg: 20px;
      --r-xl: 26px;

      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;

      --t: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
      --hub-theme-motion: 280ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    html[data-theme="night"] {
      --bg: #1d1625;
      --bg-raised: #292033;
      --bg-subtle: #241b2d;
      --bg-card: #292033;

      --arcade: #d36af0;
      --arcade-soft: #e18af5;
      --arcade-pale: rgba(211, 106, 240, 0.18);
      --arcade-dim: rgba(211, 106, 240, 0.11);
      --arcade-rgb: 211, 106, 240;

      --page-bg: var(--page-bg-night);

      --ink: #f2eafa;
      --ink-mid: #cdbdde;
      --ink-quiet: #9b89ad;
      --ink-faint: #51425f;

      --border: rgba(255, 255, 255, 0.085);
      --border-mid: rgba(255, 255, 255, 0.15);

      --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.22);
      --shadow-sm: 0 1px 6px rgba(0, 0, 0, 0.28);
      --shadow-md: 0 4px 18px rgba(0, 0, 0, 0.36);
      --shadow-lg: 0 8px 36px rgba(0, 0, 0, 0.48);
    }

    /* ============================================================
       THEME MOTION
       Bridge owns theme state. Arcade owns how Arcade surfaces interpolate.
       Pattern matched to Atlas and Compass hub motion.
       ============================================================ */

    html.theme-changing,
    html.theme-changing body,
    html.theme-changing .spine,
    html.theme-changing .spine-mark,
    html.theme-changing .spine-mark span,
    html.theme-changing .spine-worlds,
    html.theme-changing .spine-world-btn,
    html.theme-changing .spine-world-btn svg,
    html.theme-changing .spine-session-pill,
    html.theme-changing .spine-session-pill .pill-name,
    html.theme-changing .spine-btn,
    html.theme-changing .mobile-header,
    html.theme-changing .mobile-header-mark,
    html.theme-changing .mobile-header-mark span,
    html.theme-changing .mobile-header-actions,
    html.theme-changing .mobile-header-btn,
    html.theme-changing .mobile-session-pill,
    html.theme-changing .mobile-session-pill span,
    html.theme-changing .drawer-header,
    html.theme-changing .drawer-footer,
    html.theme-changing .drawer-title,
    html.theme-changing .drawer-title span,
    html.theme-changing .drawer-close,
    html.theme-changing .drawer-nav-label,
    html.theme-changing .drawer-nav-item,
    html.theme-changing .drawer-nav-item .nav-soon,
    html.theme-changing .drawer-session-btn,
    html.theme-changing .drawer-session-btn span,
    html.theme-changing .drawer-appearance-btn,
    html.theme-changing .hub-intro,
    html.theme-changing .hub-intro-text,
    html.theme-changing .hub-eyebrow,
    html.theme-changing .hub-title,
    html.theme-changing .hub-desc,
    html.theme-changing .library-zone,
    html.theme-changing .library-header,
    html.theme-changing .library-title,
    html.theme-changing .game-card,
    html.theme-changing .game-card-mark,
    html.theme-changing .game-card-title,
    html.theme-changing .game-card-premise,
    html.theme-changing .game-card-unit,
    html.theme-changing .game-card-action,
    html.theme-changing .game-card-progress-track,
    html.theme-changing .game-card-progress-fill,
    html.theme-changing .btn-primary,
    html.theme-changing .btn-ghost,
    html.theme-changing .confirm-panel,
    html.theme-changing .confirm-title,
    html.theme-changing .confirm-message,
    html.theme-changing .confirm-input,
    html.theme-changing .btn-danger,
    html.theme-changing .arcade-toast,
    html.theme-changing .bridge-error,
    html.theme-changing .bridge-error h2,
    html.theme-changing .bridge-error p {
      transition:
        background-color var(--hub-theme-motion),
        color var(--hub-theme-motion),
        border-color var(--hub-theme-motion),
        box-shadow var(--hub-theme-motion),
        opacity var(--hub-theme-motion),
        fill var(--hub-theme-motion),
        stroke var(--hub-theme-motion);
    }

    html.theme-changing :where(.library-zone *, .game-card *) {
      transition:
        color var(--hub-theme-motion),
        border-color var(--hub-theme-motion),
        opacity var(--hub-theme-motion),
        fill var(--hub-theme-motion),
        stroke var(--hub-theme-motion);
    }

    html.theme-changing .drawer {
      transition:
        transform 0.28s cubic-bezier(0.4, 0, 0.2, 1),
        background-color var(--hub-theme-motion),
        color var(--hub-theme-motion),
        border-color var(--hub-theme-motion),
        box-shadow var(--hub-theme-motion),
        opacity var(--hub-theme-motion);
    }

    /* ============================================================ RESET */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      min-height: 100%;
      background: var(--bg);
      scroll-behavior: smooth;
      overflow-y: scroll;
      scrollbar-gutter: stable;
    }

    body {
      position: relative;
      isolation: isolate;
      font-family: var(--font-body);
      background: transparent;
      color: var(--ink);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100svh;
      overflow-x: hidden;
      padding-top: 56px;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background-size: cover;
      background-position: center;
    }

    body::before {
      background: var(--page-bg-day);
      opacity: 1;
    }

    body::after {
      background: var(--page-bg-night);
      opacity: 0;
    }

    html[data-theme="night"] body::before {
      opacity: 0;
    }

    html[data-theme="night"] body::after {
      opacity: 1;
    }

    html.theme-changing body::before,
    html.theme-changing body::after {
      transition: opacity var(--hub-theme-motion);
    }

    /* ============================================================ SPINE (desktop) */
    .spine {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      background: rgba(249, 244, 250, 0.88);
      backdrop-filter: blur(22px) saturate(1.12);
      border-bottom: 1px solid rgba(138, 47, 189, 0.12);
      display: flex;
      align-items: center;
      height: 56px;
      padding: 0 1.5rem;
      gap: 0.6rem;
    }

    html[data-theme="night"] .spine {
      background: rgba(28, 21, 35, 0.95);
      border-bottom-color: rgba(211, 106, 240, 0.12);
    }

    .spine-mark {
      font-family: var(--font-display);
      font-size: 1.22rem;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: -0.01em;
      flex: 1 1 0;
      cursor: default;
      user-select: none;
      white-space: nowrap;
      line-height: 1;
    }

    .spine-mark span {
      color: var(--arcade);
    }

    /* Centred world switcher pill group */
    .spine-worlds {
      display: flex;
      align-items: center;
      gap: 0.18rem;
      flex: 0 0 auto;
      padding: 0.2rem;
      border-radius: 999px;
      background: rgba(240, 231, 222, 0.68);
      border: 1px solid rgba(93, 57, 86, 0.11);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
    }

    /* Night world switcher — prevent day-mode ivory capsule/highlight from leaking into Arcade night mode */
    html[data-theme="night"] .spine-worlds {
      background: rgba(42, 33, 48, 0.76);
      border-color: rgba(255, 255, 255, 0.13);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.055);
    }

    .spine-world-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.42rem;
      min-height: 32px;
      padding: 0.32rem 0.82rem;
      border-radius: 999px;
      border: 1px solid transparent;
      background: transparent;
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--ink-quiet);
      cursor: pointer;
      transition: var(--t);
      white-space: nowrap;
    }

    .spine-world-btn svg {
      width: 13px;
      height: 13px;
      opacity: 0.72;
      flex-shrink: 0;
    }

    .spine-world-btn:hover {
      color: var(--ink);
      background: rgba(255, 253, 249, 0.72);
      border-color: var(--border);
      box-shadow: 0 5px 14px rgba(58, 36, 63, 0.045);
    }

    html[data-theme="night"] .spine-world-btn:hover {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.055);
      border-color: rgba(255, 255, 255, 0.10);
      box-shadow: none;
    }

    .spine-world-btn.is-active {
      color: var(--arcade);
      background: var(--arcade-dim);
      border-color: rgba(var(--arcade-rgb), 0.24);
      box-shadow: var(--shadow-xs);
      cursor: default;
    }

    html[data-theme="night"] .spine-world-btn.is-active {
      color: var(--arcade-soft);
      background: rgba(var(--arcade-rgb), 0.18);
      border-color: rgba(var(--arcade-rgb), 0.36);
      box-shadow:
        0 0 0 1px rgba(var(--arcade-rgb), 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.045);
    }

    .spine-world-btn.is-active svg {
      opacity: 1;
    }

    .spine-world-btn[aria-disabled="true"] {
      opacity: 0.5;
      cursor: default;
    }

    .spine-world-btn[aria-disabled="true"]:hover {
      color: var(--ink-quiet);
      background: transparent;
      border-color: transparent;
      box-shadow: none;
    }

    /* Right actions */
    .spine-actions {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex: 1 1 0;
      justify-content: flex-end;
    }

    .spine-session-pill {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.46rem 0.88rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 253, 249, 0.68);
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--ink-mid);
      cursor: pointer;
      transition: var(--t);
      max-width: 170px;
      white-space: nowrap;
      overflow: hidden;
      box-shadow: 0 5px 14px rgba(58, 36, 63, 0.045);
    }

    .spine-session-pill:hover {
      border-color: var(--arcade-soft);
      color: var(--ink);
    }

    /* Night session pill — keep active learner readable without a pale day-mode capsule */
    html[data-theme="night"] .spine-session-pill {
      background: rgba(42, 33, 48, 0.78);
      border-color: rgba(255, 255, 255, 0.12);
      color: var(--ink-mid);
      box-shadow: none;
    }

    html[data-theme="night"] .spine-session-pill:hover {
      border-color: rgba(var(--arcade-rgb), 0.38);
      color: var(--ink);
      background: rgba(48, 38, 56, 0.92);
    }

    .spine-session-pill .pill-name {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .spine-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-raised);
      color: var(--ink-quiet);
      cursor: pointer;
      transition: var(--t);
      box-shadow: var(--shadow-xs);
      flex-shrink: 0;
    }

    .spine-btn:hover {
      color: var(--ink);
      border-color: var(--border-mid);
      box-shadow: var(--shadow-sm);
    }

    /* ============================================================ MOBILE HEADER */
    .mobile-header {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      background: rgba(249, 244, 250, 0.90);
      backdrop-filter: blur(20px) saturate(1.1);
      border-bottom: 1px solid rgba(138, 47, 189, 0.12);
      height: 56px;
      padding: 0 1rem;
      align-items: center;
      gap: 0.5rem;
    }

    html[data-theme="night"] .mobile-header {
      background: rgba(28, 21, 35, 0.96);
      border-bottom-color: rgba(211, 106, 240, 0.12);
    }

    .mobile-header-mark {
      font-family: var(--font-display);
      font-size: 1.05rem;
      color: var(--ink);
      letter-spacing: -0.01em;
      flex: 1;
      line-height: 1;
    }

    .mobile-header-mark span {
      color: var(--arcade);
    }

    .mobile-header-actions {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      flex-shrink: 0;
    }

    .mobile-header-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-raised);
      color: var(--ink-quiet);
      cursor: pointer;
      transition: var(--t);
      flex-shrink: 0;
    }

    .mobile-header-btn:hover {
      color: var(--ink);
    }

    .mobile-session-pill {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.25rem 0.7rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg-raised);
      font-size: 0.76rem;
      font-weight: 500;
      color: var(--ink-mid);
      cursor: pointer;
      max-width: 130px;
      height: 40px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .mobile-session-pill span {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    html[data-theme="night"] .mobile-session-pill {
      background: rgba(42, 33, 48, 0.86);
      border-color: rgba(255, 255, 255, 0.12);
      color: var(--ink-mid);
    }

    /* ============================================================ MOBILE DRAWER */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 400;
      backdrop-filter: blur(4px);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition:
        opacity 0.2s ease,
        visibility 0s linear 0.2s;
    }

    .drawer-overlay.open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition:
        opacity 0.2s ease,
        visibility 0s;
    }

    .drawer {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: min(300px, 85vw);
      background: var(--bg-raised);
      z-index: 500;
      display: flex;
      flex-direction: column;
      box-shadow: 4px 0 24px rgba(0, 0, 0, 0.15);
      transform: translate3d(-100%, 0, 0);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
      backface-visibility: hidden;
    }

    .drawer.open {
      transform: translate3d(0, 0, 0);
    }

    .drawer-header {
      padding: 1.2rem 1.2rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .drawer-title {
      font-family: var(--font-display);
      font-size: 1rem;
      color: var(--ink);
    }

    .drawer-title span {
      color: var(--arcade);
    }

    .drawer-close {
      width: 30px;
      height: 30px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      background: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--ink-quiet);
    }

    .drawer-close:hover {
      background: var(--bg-subtle);
      color: var(--ink);
    }

    .drawer-nav {
      flex: 1;
      padding: 0.8rem;
      overflow-y: auto;
    }

    .drawer-nav-label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-faint);
      padding: 0.6rem 0.75rem 0.35rem;
    }

    .drawer-nav-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.75rem 0.9rem;
      border-radius: var(--r-md);
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--ink-mid);
      cursor: pointer;
      transition: var(--t);
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      min-height: 44px;
    }

    .drawer-nav-item:hover {
      background: var(--bg-subtle);
      color: var(--ink);
    }

    .drawer-nav-item[aria-disabled="true"] {
      opacity: 0.5;
      cursor: default;
    }

    .drawer-nav-item[aria-disabled="true"]:hover {
      background: none;
      color: var(--ink-mid);
    }

    .drawer-nav-item .nav-soon {
      margin-left: auto;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    .drawer-nav-item.is-active {
      background: var(--arcade-dim);
      color: var(--arcade);
      cursor: default;
    }

    .drawer-nav-item.is-active:hover {
      background: var(--arcade-dim);
      color: var(--arcade);
    }

    .drawer-footer {
      padding: 0.8rem;
      border-top: 1px solid var(--border);
    }

    .drawer-footer-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 0.5rem;
    }

    .drawer-session-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 0.9rem;
      border-radius: var(--r-md);
      border: 1px solid var(--border);
      background: var(--bg-subtle);
      font-size: 0.84rem;
      font-weight: 500;
      color: var(--ink-mid);
      cursor: pointer;
      min-height: 44px;
      overflow: hidden;
    }

    .drawer-session-btn span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .drawer-appearance-btn {
      width: 44px;
      height: 44px;
      border-radius: var(--r-md);
      border: 1px solid var(--border);
      background: var(--bg-subtle);
      color: var(--ink-quiet);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    html[data-theme="night"] .drawer-session-btn,
    html[data-theme="night"] .drawer-appearance-btn {
      background: rgba(255, 255, 255, 0.045);
      border-color: rgba(255, 255, 255, 0.10);
      color: var(--ink-mid);
    }

    /* ============================================================ MAIN LAYOUT */
    .arcade-main {
      position: relative;
      z-index: 1;
      max-width: 1040px;
      margin: 0 auto;
      padding: 3.35rem 1.75rem 6rem;
    }

    /* ============================================================ HUB INTRO */
    .hub-intro {
      padding: 0 0 2.35rem;
      border-bottom: 1px solid var(--border-mid);
      margin-bottom: 0;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .hub-intro-text {
      min-width: 0;
    }

    .hub-eyebrow {
      font-size: 0.72rem;
      font-weight: 650;
      letter-spacing: 0.09em;
      text-transform: none;
      color: var(--arcade);
      margin-bottom: 0.72rem;
    }

    .hub-title {
      font-family: var(--font-display);
      font-size: clamp(2.05rem, 4.5vw, 2.85rem);
      font-weight: 400;
      color: var(--ink);
      line-height: 1.08;
      letter-spacing: -0.022em;
      margin-bottom: 0.72rem;
    }

    .hub-desc {
      font-size: 0.95rem;
      color: var(--ink-mid);
      font-weight: 400;
      line-height: 1.68;
      max-width: 56ch;
    }

    .hub-meta {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-shrink: 0;
    }

    .hub-meta-chip {
      display: inline-flex;
      align-items: center;
      padding: 0.32rem 0.75rem;
      border-radius: 999px;
      border: 1px solid rgba(93, 57, 86, 0.12);
      background: rgba(255, 253, 249, 0.68);
      font-size: 0.76rem;
      font-weight: 500;
      color: var(--ink-mid);
      box-shadow: 0 7px 18px rgba(58, 36, 63, 0.05);
    }

    html[data-theme="night"] .hub-meta-chip {
      background: rgba(42, 33, 48, 0.88);
      border-color: rgba(255, 255, 255, 0.12);
      color: var(--ink-mid);
    }

    /* ============================================================ GAME LIBRARY */
    .library-zone {
      position: relative;
      margin-top: 2.8rem;
      padding: 1.75rem;
      border: 1px solid rgba(var(--arcade-rgb), 0.10);
      border-radius: 30px;
      background-color: rgba(251, 248, 252, 0.90);
      box-shadow:
        0 20px 58px rgba(58, 36, 63, 0.075),
        inset 0 1px 0 rgba(255, 255, 255, 0.72);
    }

    html[data-theme="night"] .library-zone {
      background-color: rgba(32, 24, 40, 0.92);
      border-color: rgba(var(--arcade-rgb), 0.11);
      box-shadow:
        0 22px 60px rgba(0, 0, 0, 0.30),
        inset 0 1px 0 rgba(255, 255, 255, 0.035);
    }

    .library-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.35rem;
      gap: 1rem;
    }

    .library-title {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 400;
      color: var(--ink);
      line-height: 1.25;
    }

    .library-title-group {
      display: flex;
      align-items: baseline;
      gap: 0.55rem;
      min-width: 0;
    }

    /* Game grid */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.05rem;
    }

    /* ---- GAME CARD ---- */
    .game-card {
      display: flex;
      flex-direction: column;
      background-color: rgba(255, 253, 249, 0.91);
      border: 1px solid rgba(58, 36, 63, 0.135);
      border-radius: 22px;
      padding: 1.45rem 1.45rem 1.42rem;
      transition: var(--t);
      position: relative;
      overflow: hidden;
      text-decoration: none;
      cursor: pointer;
      text-align: left;
      font-family: var(--font-body);
      box-shadow: 0 10px 30px rgba(58, 36, 63, 0.055), inset 0 1px 0 rgba(255, 255, 255, 0.68);
    }

    html[data-theme="night"] .game-card {
      background-color: rgba(42, 33, 48, 0.955);
      border-color: rgba(255, 255, 255, 0.14);
      box-shadow:
        0 10px 34px rgba(0, 0, 0, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.045);
    }

    .game-card:hover {
      box-shadow:
        0 18px 44px rgba(58, 36, 63, 0.11),
        0 7px 18px rgba(var(--arcade-rgb), 0.045),
        inset 0 1px 0 rgba(255, 255, 255, 0.74);
      transform: translateY(-2px);
      border-color: rgba(var(--arcade-rgb), 0.42);
    }

    html[data-theme="night"] .game-card:hover {
      background: rgba(48, 38, 56, 0.98);
      border-color: var(--arcade-soft);
      box-shadow:
        0 0 0 1px rgba(var(--arcade-rgb), 0.24),
        0 14px 40px rgba(0, 0, 0, 0.30);
    }

    .game-card-progress-track {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      overflow: hidden;
      background: rgba(58, 36, 63, 0.10);
      pointer-events: none;
    }

    html[data-theme="night"] .game-card-progress-track {
      background: rgba(255, 255, 255, 0.10);
    }

    .game-card-progress-fill {
      display: block;
      width: var(--game-progress);
      height: 100%;
      background: var(--game-accent);
      transition: width var(--t);
    }

    .game-card:focus-visible {
      outline: 3px solid rgba(var(--arcade-rgb), 0.34);
      outline-offset: 3px;
    }

    .game-card-mark {
      width: 44px;
      height: 44px;
      font-size: 1.45rem;
      margin-bottom: 1rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      border-radius: 14px;
      background: rgba(var(--arcade-rgb), 0.085);
      border: 1px solid rgba(var(--arcade-rgb), 0.105);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }

    .game-card-title {
      font-family: var(--font-display);
      font-size: 1.12rem;
      font-weight: 400;
      color: var(--ink);
      line-height: 1.25;
      margin-bottom: 0.55rem;
    }

    .game-card-premise {
      font-size: 0.84rem;
      color: var(--ink-mid);
      opacity: 0.82;
      line-height: 1.6;
      flex: 1;
      margin-bottom: 1rem;
    }

    html[data-theme="night"] .game-card-premise {
      color: #ad9ac1;
      opacity: 0.95;
    }

    .game-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-top: auto;
    }

    .game-card-unit {
      min-width: 0;
      font-size: 0.76rem;
      color: var(--ink-quiet);
      font-weight: 500;
      line-height: 1.4;
    }

    html[data-theme="night"] .game-card-unit {
      color: #9886ad;
      opacity: 0.96;
    }

    .game-card-action {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      min-height: 38px;
      padding: 0.44rem 0.92rem;
      border-radius: 999px;
      background: rgba(246, 236, 250, 0.96);
      color: var(--arcade);
      font-family: var(--font-body);
      font-size: 0.76rem;
      font-weight: 600;
      border: 1px solid rgba(var(--arcade-rgb), 0.22);
      cursor: pointer;
      transition: var(--t);
      white-space: nowrap;
      text-decoration: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
    }

    .game-card:hover .game-card-action {
      background: var(--arcade);
      color: #fff;
      border-color: var(--arcade);
      box-shadow: 0 7px 18px rgba(var(--arcade-rgb), 0.17);
    }

    html[data-theme="night"] .game-card-action {
      background: rgba(var(--arcade-rgb), 0.18);
      border-color: rgba(var(--arcade-rgb), 0.32);
      color: var(--arcade);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    html[data-theme="night"] .game-card:hover .game-card-action {
      background: rgba(var(--arcade-rgb), 0.45);
      color: #fff;
      border-color: rgba(var(--arcade-rgb), 0.58);
    }

    .spine-world-btn:focus-visible,
    .spine-session-pill:focus-visible,
    .spine-btn:focus-visible,
    .mobile-header-btn:focus-visible,
    .mobile-session-pill:focus-visible {
      outline: 3px solid rgba(var(--arcade-rgb), 0.36);
      outline-offset: 3px;
    }

    .btn-primary {
      padding: 0.58rem 1.05rem;
      border-radius: var(--r-sm);
      border: none;
      background: var(--arcade);
      color: #fff;
      font-family: var(--font-body);
      font-size: 0.84rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--t);
      white-space: nowrap;
      min-height: 42px;
    }

    .btn-primary:hover {
      background: var(--arcade-soft);
    }

    .btn-ghost {
      padding: 0.58rem 0.95rem;
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      background: var(--bg-subtle);
      font-family: var(--font-body);
      font-size: 0.84rem;
      font-weight: 500;
      color: var(--ink-mid);
      cursor: pointer;
      transition: var(--t);
      min-height: 42px;
    }

    .btn-ghost:hover {
      border-color: var(--border-mid);
      color: var(--ink);
    }

    /* ============================================================ CONFIRM DIALOG */
    .confirm-dialog {
      position: fixed;
      inset: 0;
      z-index: 800;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(6px);
    }

    .confirm-dialog.open {
      display: flex;
      animation: fadeIn 0.15s ease;
    }

    .confirm-panel {
      background: var(--bg-raised);
      border-radius: var(--r-lg);
      max-width: 360px;
      width: 100%;
      padding: 1.4rem;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.2s cubic-bezier(0.34, 1.25, 0.64, 1);
    }

    .confirm-title {
      font-size: 0.94rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 0.45rem;
    }

    .confirm-message {
      font-size: 0.83rem;
      color: var(--ink-quiet);
      line-height: 1.55;
      margin-bottom: 1.1rem;
    }

    .confirm-input {
      display: none;
      width: 100%;
      min-height: 42px;
      margin-bottom: 0.75rem;
      padding: 0.58rem 0.8rem;
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      background: var(--bg-raised);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 0.86rem;
      outline: none;
    }

    .confirm-input.visible {
      display: block;
    }

    .confirm-input:focus {
      border-color: var(--arcade);
    }

    .confirm-actions {
      display: flex;
      gap: 0.45rem;
      justify-content: flex-end;
    }

    .btn-danger {
      padding: 0.55rem 0.95rem;
      border-radius: var(--r-sm);
      border: 1px solid var(--danger-border);
      background: var(--danger-bg);
      color: var(--danger);
      font-family: var(--font-body);
      font-size: 0.83rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--t);
      min-height: 40px;
    }

    /* ============================================================ TOAST */
    .arcade-toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--bg-raised);
      border: 1px solid var(--border-mid);
      border-radius: var(--r-md);
      padding: 0.65rem 1.15rem;
      font-size: 0.84rem;
      color: var(--ink-mid);
      z-index: 900;
      box-shadow: var(--shadow-md);
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
      max-width: calc(100vw - 2rem);
    }

    .arcade-toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ============================================================ BRIDGE ERROR */
    .bridge-error {
      max-width: 480px;
      margin: 4rem auto;
      text-align: center;
      padding: 0 1rem;
    }

    .bridge-error h2 {
      font-family: var(--font-display);
      font-size: 1.3rem;
      color: var(--ink);
      font-weight: 400;
      margin-bottom: 0.5rem;
    }

    .bridge-error p {
      font-size: 0.88rem;
      color: var(--ink-quiet);
      line-height: 1.65;
    }

    /* ============================================================ UTILITIES */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(14px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ============================================================ RESPONSIVE */
    @media (max-width: 680px) {
      html,
      body {
        background: var(--page-bg);
      }

      body::before,
      body::after {
        display: none !important;
        content: none !important;
      }

      .spine {
        display: none !important;
      }

      .mobile-header {
        display: flex !important;
      }

      .arcade-main {
        padding: 2.15rem 1rem 4.5rem;
      }

      .hub-intro {
        gap: 1rem;
        padding-bottom: 1.9rem;
      }

      .hub-title {
        font-size: clamp(2rem, 10vw, 2.5rem);
      }

      .game-grid {
        grid-template-columns: 1fr;
      }

      .library-zone {
        margin-top: 2.35rem;
        padding: 1.25rem 1rem 1.35rem;
        border-radius: 24px;
      }

      .library-header {
        align-items: flex-start;
        flex-wrap: wrap;
      }

      .game-card {
        padding: 1.35rem 1.25rem 1.38rem;
      }

      .jumpto-overlay {
        padding: 2rem 0.75rem 1rem;
      }
    }

    @media (min-width: 681px) {
      .mobile-header {
        display: none !important;
      }

      .drawer-overlay,
      .drawer {
        display: none !important;
      }
    }
  </style>
</head>

<body data-atlas-surface="hub">

  <!-- ============================================================ DESKTOP SPINE -->
  <header class="spine" role="banner">

        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">

        </svg>
      </button>
      <button class="mobile-header-btn" onclick="openDrawer()" aria-label="Menu">

        </svg>
      </button>
    </div>
  </header>

  <!-- Mobile drawer -->
  <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
  <nav class="drawer" id="drawer" aria-label="Navigation">
    <div class="drawer-header">
      <span class="drawer-title">Arcade<span>.</span></span>

        </svg>
      </button>
    </div>
    <div class="drawer-nav">
      <div class="drawer-nav-label">Worlds</div>
      <div id="drawer-hub-nav"></div>
      <div class="drawer-nav-label">Find</div>
      <button class="drawer-nav-item" type="button" onclick="closeDrawer(); AtlasSearch.open()">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
          <circle cx="6.5" cy="6.5" r="4.2" stroke="currentColor" stroke-width="1.3" />
          <path d="M9.8 9.8l2.8 2.8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />

  <!-- ============================================================ MAIN -->
  <main class="arcade-main" id="arcade-main" role="main">

  </main>

  <div id="atlas-session-panel-root"></div>

  <!-- ============================================================ CONFIRM DIALOG -->
  <div class="confirm-dialog" id="confirm-dialog" role="alertdialog" aria-modal="true">
    <div class="confirm-panel">
      <div class="confirm-title" id="confirm-title"></div>
      <div class="confirm-message" id="confirm-message"></div>
      <input class="confirm-input" id="confirm-input" type="text" maxlength="40" autocomplete="off">
      <div class="confirm-actions">
        <button class="btn-ghost" onclick="resolveConfirm(false)">Cancel</button>
        <button class="btn-danger" id="confirm-ok-btn" onclick="resolveConfirm(true)">Delete</button>
      </div>
    </div>
  </div>

  <!-- ============================================================ SCRIPTS -->
  <script src="../shared/atlas-bridge.js"></script>
  <script src="../shared/compass-catalog-data.js"></script>
  <script src="../shared/atlas-content-registry.js"></script>
  <script src="../shared/atlas-session-panel.js"></script>
  <script src="../shared/atlas-search.js"></script>
  <script>
    'use strict';
    /* ================================================================
       ARCADE HUB V1
       Reads and writes state only through window.AtlasBridge.
       No Arcade-specific localStorage. No parallel session system.
       No vocabulary tracking. No gamification metrics.
       ================================================================ */

    // ---- Bridge guard -------------------------------------------
    if (!window.AtlasBridge) {
      document.getElementById('arcade-main').innerHTML =
        '<div class="bridge-error">' +
        '<h2>Arcade can\'t start</h2>' +
        '<p>The shared runtime didn\'t load. Reload the page and check that <code>shared/atlas-bridge.js</code> is in place.</p>' +
        '</div>';
    }

    const Bridge = window.AtlasBridge;
    const ACTIVE_HUB_ID = 'arcade';
    const ARCADE_ATMOSPHERE_KEY = 'arcade::atmosphereImage';
    const ARCADE_ATMOSPHERE_MODE_KEY = 'arcade::atmosphereMode';
    const ARCADE_DEFAULT_ATMOSPHERE = './arcade-hub-atmosphere.jpg';

    // ---- Hub navigation map ------------------------------------
    // Atlas is always available. Compass resolves from registry.
    // Arcade is this hub (always available, no navigation needed).
    const HUB_NAV = {
      atlas: {
        id: 'atlas',
        name: 'Atlas',
        alwaysAvailable: true,
        launchUrl: '../index.html',
        icon: '<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1.4L11.6 6.5L6.5 11.6L1.4 6.5Z" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round"/><path d="M6.5 3.6L9.4 6.5L6.5 9.4L3.6 6.5Z" stroke="currentColor" stroke-width="1.15" stroke-linejoin="round" opacity="0.75"/></svg>'
      },
      compass: {
        id: 'compass',
        name: 'Compass',
        worldId: 'compass',
        icon: '<svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.2" stroke="currentColor" stroke-width="1.25"/><circle cx="7" cy="7" r="1.6" stroke="currentColor" stroke-width="1.15"/><path d="M7 1.8v1.6M7 10.6v1.6M1.8 7h1.6M10.6 7h1.6" stroke="currentColor" stroke-width="1.15" stroke-linecap="round"/></svg>'
      },
      arcade: {
        id: 'arcade',
        name: 'Arcade',
        alwaysAvailable: true,
        launchUrl: new URL('./index.html', window.location.href).href,
        icon: '<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1.5" y="3" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M4.5 6.5h2M5.5 5.5v2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><circle cx="8.5" cy="6.5" r="0.6" fill="currentColor"/><circle cx="10" cy="5.5" r="0.6" fill="currentColor"/></svg>'
      }
    };

    /* ================================================================
       PLAYABLE GAME CATALOGUE
       Every item listed here is complete and launchable.
       Future Arcade concepts live outside the operational hub.
       ================================================================ */
    const GAME_CATALOGUE = [
      {
        registryId: 'arcade:tomorrow-got-weird',
        title: 'Tomorrow Got Weird',
        premise: 'Step into strange future scenarios and decide what you would do next.',
        unitLabel: 'Scenarios',
        total: 25,
        mark: '🛸',
        accent: '#8b5cf6',
        order: 1,
        launchUrl: './tomorrow-got-weird/index.html'
      },
      {
        registryId: 'arcade:truth-trap',
        title: 'Truth Trap',
        premise: 'Two facts are true. One is a lie. Spot the fake and explain your reasoning.',
        unitLabel: 'Rounds',
        total: 20,
        mark: '🕵️',
        accent: '#c026d3',
        order: 2,
        launchUrl: './truth-trap/index.html'
      },
      {
        registryId: 'arcade:would-you-rather',
        title: 'Would You Rather',
        premise: 'Choose between impossible options and explain what made you decide.',
        unitLabel: 'Questions',
        total: 50,
        mark: '🤔',
        accent: '#6366f1',
        order: 3,
        launchUrl: './would-you-rather/index.html'
      }
    ];

    /* ================================================================
       SAFE BRIDGE READS
       ================================================================ */
    function getActiveSession() {
      try { return Bridge.readActiveSession(); }
      catch (e) { return { id: 'default', name: 'Default' }; }
    }
    function getSessions() {
      try { return Bridge.readSessions() || []; }
      catch (e) { return []; }
    }
    function getRegistry() {
      try { return Bridge.readRegistry(); }
      catch (e) { return { worlds: {}, items: {}, sessionStates: {}, recentActivity: [] }; }
    }
    function isDefaultSession(s) {
      return s && s.id === (Bridge.defaultSessionId || 'default');
    }
    function resolveWorldLaunchUrl(reg, worldId) {
      const worlds = reg.worlds || {};
      const w = worlds[worldId] || Object.values(worlds).find(x => x && (x.registryId === worldId || x.world === worldId));

      if (!w || !w.launchUrl) return null;

      if (window.AtlasSearch && typeof AtlasSearch.resolveAtlasUrl === 'function') {
        return AtlasSearch.resolveAtlasUrl(w.launchUrl);
      }

      return w.launchUrl;
    }

    /* ================================================================
       REGISTRATION
       Arcade and its playable games are registered idempotently on load.
       ================================================================ */
    function registerWithBridge() {
      if (!Bridge) return;

      try {
        Bridge.upsertWorld({
          registryId: 'arcade',
          world: 'arcade',
          type: 'world',
          title: 'Arcade',
          description: 'Playful conversation games for spontaneous, expressive English practice.',
          status: 'available',
          launchUrl: new URL('./index.html', window.location.href).href
        });
      } catch (e) { }

      GAME_CATALOGUE.forEach(game => {
        try {
          Bridge.upsertItem({
            registryId: game.registryId,
            world: 'arcade',
            type: 'game',
            title: game.title,
            premise: game.premise,
            status: 'available',
            unitLabel: game.unitLabel,
            total: game.total,
            mark: game.mark,
            accent: game.accent,
            order: game.order,
            launchUrl: new URL(game.launchUrl, window.location.href).href
          });
        } catch (e) { }
      });
    }

    /* ================================================================
       GAME DECK STATE
       Progress represents position in the current deck run.
       Reaching the end offers a fresh run; it does not permanently
       complete or retire the game.
       ================================================================ */
    function getGameDeckState(game, state) {
      const progress = state && typeof state === 'object'
        ? state.progress || {}
        : {};

      const status = String(
        state && state.status ? state.status : ''
      ).toLowerCase();

      const total = Math.max(
        0,
        Number(progress.total) || Number(game.total) || 0
      );

      const rawCovered = Math.max(
        0,
        Number(progress.covered) || 0
      );

      const exhausted = total > 0 && (
        rawCovered >= total ||
        status === 'complete' ||
        status === 'completed'
      );

      const covered = exhausted
        ? total
        : Math.min(rawCovered, total);

      const started = covered > 0;
      const unit = String(game.unitLabel || 'items').toLowerCase();

      if (exhausted) {
        return {
          mode: 'exhausted',
          actionLabel: 'Play again',
          positionLabel: total + ' of ' + total + ' ' + unit,
          progressPercent: 100
        };
      }

      if (started) {
        return {
          mode: 'in-progress',
          actionLabel: 'Resume',
          positionLabel: covered + ' of ' + total + ' ' + unit,
          progressPercent: total > 0
            ? Math.round((covered / total) * 100)
            : 0
        };
      }

      return {
        mode: 'unstarted',
        actionLabel: 'Play',
        positionLabel: total
          ? total + ' ' + unit
          : 'Open-ended',
        progressPercent: 0
      };
    }

    /* ================================================================
       APPEARANCE
       ================================================================ */
    function sunSvg(s) {
      return '<svg width="' + s + '" height="' + s + '" viewBox="0 0 17 17" fill="none"><circle cx="8.5" cy="8.5" r="3" stroke="currentColor" stroke-width="1.35"/><path d="M8.5 1.5v2M8.5 13.5v2M1.5 8.5h2M13.5 8.5h2M3.7 3.7l1.4 1.4M11.9 11.9l1.4 1.4M11.9 5.1l1.4-1.4M3.7 13.3l1.4-1.4" stroke="currentColor" stroke-width="1.35" stroke-linecap="round"/></svg>';
    }
    function moonSvg(s) {
      return '<svg width="' + s + '" height="' + s + '" viewBox="0 0 17 17" fill="none"><path d="M14.5 10.2A7 7 0 0 1 6.8 2.5a7 7 0 1 0 7.7 7.7Z" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    }
    function updateAppearanceButtons(mode) {
      const icon = mode === 'night' ? sunSvg(16) : moonSvg(16);
      const label = mode === 'night' ? 'Switch to day mode' : 'Switch to night mode';
      ['spine-appearance-btn', 'mobile-appearance-btn', 'drawer-appearance-btn'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.innerHTML = icon; el.setAttribute('aria-label', label); }
      });
    }
    function toggleAppearance() {
      const cur = Bridge.readAppearanceMode();
      const next = cur === 'night' ? 'light' : 'night';
      Bridge.setAppearanceMode(next);
    }

    /* ================================================================
       NAVIGATION
       ================================================================ */
    function navigateTo(url) {
      if (!url) { showToast('That destination isn\'t available yet.'); return; }
      window.location.href = url;
    }

    function openHub(hubId) {
      const hub = HUB_NAV[hubId];
      if (!hub) return;
      if (hub.id === ACTIVE_HUB_ID) { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
      if (hub.worldId) {
        const reg = getRegistry();
        const url = resolveWorldLaunchUrl(reg, hub.worldId);
        if (url) { navigateTo(url); return; }
        showToast(hub.name + ' isn\'t available on this device yet.');
        return;
      }
      if (hub.launchUrl) { navigateTo(hub.launchUrl); return; }
      showToast('That destination isn\'t available yet.');
    }

    function isHubAvailable(hub, reg) {
      if (hub.alwaysAvailable) return true;
      if (hub.worldId) return !!resolveWorldLaunchUrl(reg, hub.worldId);
      return false;
    }

    /* ================================================================
       SESSION LABELS
       ================================================================ */
    function setSessionLabels() {
      const s = getActiveSession();
      const name = AtlasSessionPanel.getSessionDisplayName(s);
      ['spine-session-name', 'mobile-session-name', 'drawer-session-name'].forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.textContent = name;
          const trigger = el.closest('button');
          if (trigger) trigger.setAttribute('aria-label', 'Open session panel. Working with ' + name);
        }
      });
    }

    /* ================================================================
       RENDER SPINE HUB NAV
       ================================================================ */
    function renderSpineHubNav() {
      const reg = getRegistry();
      const host = document.getElementById('spine-hub-nav');
      if (!host) return;
      host.innerHTML = Object.values(HUB_NAV).map(hub => {
        const active = hub.id === ACTIVE_HUB_ID;
        const available = isHubAvailable(hub, reg);
        const cls = 'spine-world-btn' + (active ? ' is-active' : '');
        const disabled = available ? '' : ' aria-disabled="true"';
        const click = available && !active ? ' onclick="openHub(\'' + hub.id + '\')"' : '';
        const title = active ? hub.name : (available ? 'Open ' + hub.name : hub.name + ' — coming soon');
        return '<button class="' + cls + '"' + disabled + click +
          (active ? ' aria-current="page"' : '') +
          ' title="' + escHtml(title) + '">' +
          hub.icon + '<span>' + escHtml(hub.name) + '</span>' +
          '</button>';
      }).join('');
    }

    function renderDrawerHubNav() {
      const reg = getRegistry();
      const host = document.getElementById('drawer-hub-nav');
      if (!host) return;
      host.innerHTML = Object.values(HUB_NAV).map(hub => {
        const active = hub.id === ACTIVE_HUB_ID;
        const available = isHubAvailable(hub, reg);
        const cls = 'drawer-nav-item' + (active ? ' is-active' : '');
        const disabled = available ? '' : ' aria-disabled="true"';
        const click = available && !active ? ' onclick="closeDrawer();openHub(\'' + hub.id + '\')"' : '';
        return '<button class="' + cls + '"' + disabled + click +
          (active ? ' aria-current="page"' : '') + '>' +
          hub.icon + escHtml(hub.name) +
          (available ? '' : '<span class="nav-soon">Soon</span>') +
          '</button>';
      }).join('');
    }

    /* ================================================================
       RENDER MAIN HUB
       ================================================================ */
    function renderHub() {
      if (!Bridge) return;

      const session = getActiveSession();
      const reg = getRegistry();
      const sessionStates = (reg.sessionStates || {})[session.id] || {};

      setSessionLabels();
      renderSpineHubNav();
      renderDrawerHubNav();

      const eyebrow = isDefaultSession(session)
        ? 'Arcade'
        : 'Welcome, ' + session.name;

      let html = '';

      html += '<div class="hub-intro">' +
        '<div class="hub-intro-text">' +
        '<div class="hub-eyebrow">' + escHtml(eyebrow) + '</div>' +
        '<h1 class="hub-title">Conversation games that get you talking.</h1>' +
        '<p class="hub-desc">Think fast, speak freely, and see where the game takes you.</p>' +
        '</div>' +
        '</div>';

      html += '<div class="library-zone">' +
        '<div class="library-header">' +
        '<h2 class="library-title">Choose a game</h2>' +
        '</div>' +
        '<div class="game-grid">';

      GAME_CATALOGUE.forEach(game => {
        html += renderGameCard(game, sessionStates[game.registryId]);
      });

      html += '</div>' +
        '</div>';

      document.getElementById('arcade-main').innerHTML = html;
    }

    function renderGameCard(game, state) {
      const deck = getGameDeckState(game, state);
      const hasProgressBar = deck.mode !== 'unstarted';

      const progressHtml = hasProgressBar
        ? '<span class="game-card-progress-track" aria-hidden="true">' +
          '<span class="game-card-progress-fill"></span>' +
          '</span>'
        : '';

      return '<a class="game-card game-card--' + escAttr(deck.mode) + '"' +
        ' href="' + escAttr(game.launchUrl) + '"' +
        ' style="--game-accent:' + escAttr(game.accent) + ';--game-progress:' + deck.progressPercent + '%"' +
        ' aria-label="' + escAttr(deck.actionLabel + ' ' + game.title) + '">' +
        '<span class="game-card-mark" aria-hidden="true">' + escHtml(game.mark) + '</span>' +
        '<div class="game-card-title">' + escHtml(game.title) + '</div>' +
        '<p class="game-card-premise">' + escHtml(game.premise) + '</p>' +
        '<div class="game-card-footer">' +
        '<span class="game-card-unit">' + escHtml(deck.positionLabel) + '</span>' +
        '<span class="game-card-action">' +
        escHtml(deck.actionLabel) +
        '<svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true">' +
        '<path d="M2 5h6M5 2l3 3-3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>' +
        '</svg>' +
        '</span>' +
        '</div>' +
        progressHtml +
        '</a>';
    }

    /* ================================================================
       SESSION MODAL
       ================================================================ */
    function openSessionPanel(trigger = document.activeElement) {
      if (window.AtlasSessionPanel) AtlasSessionPanel.open(trigger);
    }

    async function handleRenameSession(session) {
      const current = getSessions().find(item => item.id === session.id);
      if (!current) return;

      const newName = await showConfirm({
        title: 'Rename session',
        message: 'Choose a new name for ' + current.name + '.',
        okLabel: 'Rename',
        okClass: 'btn-primary',
        inputMode: true,
        inputValue: current.name
      });

      if (!newName || newName === current.name) return;
      if (!Bridge.renameSession(current.id, newName)) {
        showToast('That name is already in use.');
        return;
      }

      renderHub();
    }

    async function handleDeleteSession(session) {
      const id = session.id;
      const sessions = getSessions();
      const s = sessions.find(x => x.id === id);
      if (!s) return;
      const ok = await showConfirm({
        title: 'Delete session?',
        message: 'This permanently removes ' + s.name + ' and their Arcade progress on this device.',
        okLabel: 'Delete session'
      });
      if (!ok) return;
      Bridge.deleteSession(id);
      renderHub();
    }

    /* ================================================================
       CONFIRM DIALOG
       ================================================================ */
    let confirmResolver = null;
    function showConfirm(opts) {
      opts = opts || {};
      return new Promise(resolve => {
        confirmResolver = resolve;
        document.getElementById('confirm-title').textContent = opts.title || '';
        document.getElementById('confirm-message').textContent = opts.message || '';
        const okBtn = document.getElementById('confirm-ok-btn');
        okBtn.textContent = opts.okLabel || 'Confirm';
        okBtn.className = opts.okClass || 'btn-danger';
        const input = document.getElementById('confirm-input');
        input.className = 'confirm-input' + (opts.inputMode ? ' visible' : '');
        input.value = opts.inputValue || '';
        document.getElementById('confirm-dialog').classList.add('open');
        if (opts.inputMode) setTimeout(() => { input.focus(); input.select(); }, 50);
      });
    }
    function resolveConfirm(ok) {
      const input = document.getElementById('confirm-input');
      const isInput = input.classList.contains('visible');
      document.getElementById('confirm-dialog').classList.remove('open');
      if (confirmResolver) {
        confirmResolver(ok ? (isInput ? input.value.trim() : true) : (isInput ? null : false));
        confirmResolver = null;
      }
    }
    document.getElementById('confirm-input').addEventListener('keydown', event => {
      if (event.key === 'Enter') resolveConfirm(true);
      if (event.key === 'Escape') {
        event.stopPropagation();
        resolveConfirm(false);
      }
    });

    /* ================================================================
       MOBILE DRAWER
       ================================================================ */
    function openDrawer() {
      renderDrawerHubNav();
      const overlay = document.getElementById('drawer-overlay');
      overlay.style.display = 'block';
      document.getElementById('drawer').classList.add('open');
      document.body.style.overflow = 'hidden';
      setTimeout(() => overlay.classList.add('open'), 10);
    }
    function closeDrawer() {
      const overlay = document.getElementById('drawer-overlay');
      overlay.classList.remove('open');
      document.getElementById('drawer').classList.remove('open');
      document.body.style.overflow = '';
      setTimeout(() => { overlay.style.display = ''; }, 300);
    }

    /* ================================================================
       TOAST
       ================================================================ */
    let toastTimer = null;
    function showToast(text) {
      let el = document.getElementById('arcade-toast-el');
      if (!el) {
        el = document.createElement('div');
        el.id = 'arcade-toast-el';
        el.className = 'arcade-toast';
        el.setAttribute('role', 'status');
        document.body.appendChild(el);
      }
      el.textContent = text;
      requestAnimationFrame(() => el.classList.add('visible'));
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('visible'), 3200);
    }

    /* ================================================================
       GLOBAL KEYBOARD SHORTCUTS
       ================================================================ */
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        if (document.getElementById('confirm-dialog').classList.contains('open')) {
          e.stopImmediatePropagation();
          resolveConfirm(false);
          return;
        }

        if (window.AtlasSessionPanel && AtlasSessionPanel.isOpen()) return;
        if (document.getElementById('drawer').classList.contains('open')) closeDrawer();
      }
    });

    /* ================================================================
       LIVE REFRESH LISTENERS
       ================================================================ */
    function refresh() {
      if (!Bridge) return;
      const mode = Bridge.applyAppearanceMode(Bridge.readAppearanceMode());
      updateAppearanceButtons(mode);
      renderHub();
    }

    window.addEventListener('atlas:session-change', refresh);
    window.addEventListener('atlas:appearance-change', e => {
      const mode = (e.detail && e.detail.mode) || Bridge.readAppearanceMode();
      updateAppearanceButtons(mode);
    });
    window.addEventListener('focus', refresh);
    window.addEventListener('pageshow', refresh);
    document.addEventListener('visibilitychange', () => { if (!document.hidden) refresh(); });
    window.addEventListener('storage', e => {
      if (!e || !e.key) return;

      const k = e.key;

      if (k === Bridge.keys.appearance || k === Bridge.keys.appearanceBySession) {
        const mode = Bridge.applyAppearanceMode(Bridge.readAppearanceMode());
        updateAppearanceButtons(mode);
        return;
      }

      if (k === 'atlas::sessions' || k === 'atlas::activeSessionId' || k === 'atlas::registry') {
        refresh();
      }
    });

    /* ================================================================
       UTILITIES
       ================================================================ */
    function escHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function escAttr(s) { return escHtml(s); }

    /* ================================================================
       INIT
       ================================================================ */
    function init() {
      if (!Bridge) return;

      const mode = Bridge.readAppearanceMode();
      Bridge.applyAppearanceMode(mode);
      updateAppearanceButtons(mode);
      registerWithBridge();

      AtlasSearch.init({
        activeHubId: 'arcade',
        atlasUrl: '../index.html',
        compassUrl: '../compass/index.html',
        arcadeUrl: './index.html'
      });

      AtlasSessionPanel.mount({
        root: '#atlas-session-panel-root',
        initialView: 'manage',
        onRenameSession: handleRenameSession,
        onDeleteSession: handleDeleteSession
      });

      renderHub();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
