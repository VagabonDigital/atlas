<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tomorrow Got Weird</title>
  <link rel="stylesheet" href="../../shared/atlas-search.css">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛸</text></svg>">
  <script>
    (function () {
      var mode = null;
      try { mode = localStorage.getItem('atlas::appearanceMode') } catch (e) { }
      document.documentElement.dataset.theme = mode === 'night' ? 'night' : 'light';
    })();
  </script>
  <style>
    :root {
      --bg: #eef3f6;
      --surface: #ffffff;
      --surface-soft: rgba(255, 255, 255, 0.78);
      --surface-tint: #f5f8fa;
      --ink: #152235;
      --ink-soft: #536176;
      --ink-faint: #8490a1;
      --line: rgba(21, 34, 53, 0.11);
      --line-strong: rgba(21, 34, 53, 0.18);
      --cyan: #087f98;
      --cyan-soft: rgba(8, 127, 152, 0.1);
      --magenta: #b93776;
      --magenta-soft: rgba(185, 55, 118, 0.09);
      --green: #087957;
      --green-soft: rgba(8, 121, 87, 0.1);
      --amber: #9b6900;
      --arcade: #e8562a;
      --arcade-soft: rgba(232, 86, 42, 0.11);
      --shadow: 0 18px 55px rgba(21, 34, 53, 0.12);
      --shadow-soft: 0 8px 28px rgba(21, 34, 53, 0.08);
      --radius: 18px;
      --font-body: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-meta: "Courier New", Courier, monospace;
    }

    html[data-theme="night"] {
      --bg: #030a14;
      --surface: #081426;
      --surface-soft: rgba(8, 20, 38, 0.88);
      --surface-tint: #0c1b30;
      --ink: #e3effb;
      --ink-soft: #9db0c7;
      --ink-faint: #647990;
      --line: rgba(0, 240, 255, 0.13);
      --line-strong: rgba(0, 240, 255, 0.24);
      --cyan: #00d8ec;
      --cyan-soft: rgba(0, 216, 236, 0.1);
      --magenta: #ff4c9e;
      --magenta-soft: rgba(255, 76, 158, 0.1);
      --green: #22d79b;
      --green-soft: rgba(34, 215, 155, 0.1);
      --amber: #ffd15c;
      --arcade: #f07348;
      --arcade-soft: rgba(240, 115, 72, 0.13);
      --shadow: 0 22px 65px rgba(0, 0, 0, 0.45);
      --shadow-soft: 0 10px 34px rgba(0, 0, 0, 0.3);
    }

    html.theme-changing *,
    html.theme-changing *::before,
    html.theme-changing *::after {
      transition: background-color .32s ease, color .32s ease, border-color .32s ease, box-shadow .32s ease !important;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      min-height: 100%;
      overflow-y: scroll;
      scrollbar-gutter: stable
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 14% 20%, rgba(8, 127, 152, 0.09), transparent 34rem),
        radial-gradient(circle at 86% 72%, rgba(185, 55, 118, 0.07), transparent 34rem),
        var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
    }

    html[data-theme="night"] body {
      background:
        radial-gradient(circle at 18% 24%, rgba(0, 216, 236, 0.1), transparent 36rem),
        radial-gradient(circle at 82% 72%, rgba(117, 55, 220, 0.1), transparent 36rem),
        var(--bg);
    }

    button {
      font: inherit
    }

    button:focus-visible {
      outline: 2px solid var(--cyan);
      outline-offset: 3px
    }

    #launch {
      position: fixed;
      inset: 0;
      z-index: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        url("tomorrow-got-weird-cover.png") center center / cover no-repeat,
        var(--bg);
    }

    #launch::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: rgba(4, 10, 18, .28);
    }

    .launch-card {
      position: relative;
      z-index: 1;
      width: min(430px, 100%);
      padding: 36px;
      border: 1px solid var(--line-strong);
      border-radius: 24px;
      background: var(--surface-soft);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .launch-kicker {
      margin-bottom: 18px;
      color: var(--cyan);
      font-family: var(--font-meta);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
    }

    .launch-title {
      margin-bottom: 20px;
      color: var(--ink);
      font-size: clamp(42px, 7vw, 68px);
      font-weight: 780;
      letter-spacing: -.055em;
      line-height: .96;
    }

    .launch-title span {
      display: block;
      color: var(--magenta);
    }

    .launch-copy {
      max-width: 46ch;
      margin-bottom: 30px;
      color: var(--ink-soft);
      font-size: 16px;
      line-height: 1.7;
    }

    .btn-launch {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      min-height: 48px;
      padding: 0 22px;
      border: 1px solid var(--cyan);
      border-radius: 12px;
      background: var(--cyan);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
    }

    html[data-theme="night"] .btn-launch {
      color: #001217
    }

    .btn-launch:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 28px rgba(8, 127, 152, 0.2);
    }

    #game {
      display: none;
      min-height: 100vh;
    }

    #hdr {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 12px;
      height: 58px;
      padding: 0 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(238, 243, 246, 0.9);
      backdrop-filter: blur(16px);
    }

    html[data-theme="night"] #hdr {
      background: rgba(3, 10, 20, 0.9)
    }

    .header-back {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 34px;
      padding: 6px 13px 6px 10px;
      border: 1px solid rgba(232, 86, 42, 0.24);
      border-radius: 999px;
      background: var(--arcade-soft);
      color: var(--arcade);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background .18s ease, color .18s ease, border-color .18s ease;
    }

    .header-back:hover {
      border-color: var(--arcade);
      background: var(--arcade);
      color: #fff;
    }

    .hdr-logo {
      color: var(--cyan);
      font-family: var(--font-meta);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .hdr-logo span {
      color: var(--magenta)
    }

    .hdr-spacer {
      flex: 1
    }

    #progress-label {
      color: var(--ink-faint);
      font-family: var(--font-meta);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .header-search,
    .header-appearance {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      flex: 0 0 36px;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: var(--surface);
      color: var(--ink-soft);
      cursor: pointer;
      transition: border-color .18s ease, color .18s ease, background .18s ease;
    }

    .header-search:hover,
    .header-appearance:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    #main {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 46px 0 64px;
    }

    #scenario-card {
      position: relative;
      overflow: hidden;
      padding: clamp(28px, 5vw, 52px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    #scenario-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg,
          var(--cyan),
          var(--magenta),
          var(--amber),
          var(--cyan),
          var(--magenta));
      background-size: 300% 100%;
      animation: signal-flow 9s linear infinite;
      box-shadow: 0 0 10px rgba(8, 127, 152, .22);
      pointer-events: none;
    }

    #scenario-card.completed-card::before {
      background: linear-gradient(90deg,
          var(--green),
          var(--cyan),
          var(--green),
          var(--amber),
          var(--green));
      background-size: 300% 100%;
    }

    @keyframes signal-flow {
      from {
        background-position: 0% 50%;
      }

      to {
        background-position: 300% 50%;
      }
    }

    @media(prefers-reduced-motion:reduce) {
      #scenario-card::before {
        animation: none;
        background-position: 50% 50%;
      }
    }

    #scenario-card.transmitting {
      animation: card-in .28s ease both
    }

    @keyframes card-in {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .scenario-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 30px;
    }

    .scenario-number {
      color: var(--ink-faint);
      font-family: var(--font-meta);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .scenario-state {
      display: none;
      padding: 4px 9px;
      border: 1px solid rgba(8, 121, 87, 0.24);
      border-radius: 999px;
      background: var(--green-soft);
      color: var(--green);
      font-family: var(--font-meta);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .completed-card .scenario-state {
      display: inline-flex
    }

    .scenario-emoji {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      font-size: 24px;
      line-height: 1;
    }

    .scenario-question {
      max-width: 38ch;
      color: var(--ink);
      font-size: clamp(24px, 3.4vw, 38px);
      font-weight: 650;
      letter-spacing: -.025em;
      line-height: 1.28;
    }

    .support-switch {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 20px;
    }

    .support-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid var(--line-strong);
      border-radius: 11px;
      background: var(--surface-soft);
      color: var(--ink-soft);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: border-color .18s ease, color .18s ease, background .18s ease;
    }

    .support-button:hover,
    .support-button[aria-pressed="true"] {
      border-color: var(--cyan);
      background: var(--cyan-soft);
      color: var(--cyan);
    }

    #support-panel {
      margin-top: 12px;
      padding: 26px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: var(--surface);
      box-shadow: var(--shadow-soft);
    }

    #support-panel[hidden] {
      display: none
    }

    .support-heading {
      margin-bottom: 16px;
      color: var(--ink);
      font-size: 18px;
      font-weight: 750;
    }

    .support-text {
      max-width: 66ch;
      color: var(--ink-soft);
      font-size: 16px;
      line-height: 1.7;
    }

    .prompt-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      list-style: none;
    }

    .prompt-list li {
      position: relative;
      padding-left: 22px;
      color: var(--ink-soft);
      font-size: 16px;
      line-height: 1.65;
    }

    .prompt-list li::before {
      content: "→";
      position: absolute;
      left: 0;
      color: var(--cyan);
    }

    .scenario-rail {
      display: flex;
      justify-content: center;
      width: min(100%, 430px);
      margin: 16px auto 0;
      padding: 3px 0;
    }

    #scenario-dots {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      padding: 5px 0;
      overflow-x: auto;
      scrollbar-width: none;
    }

    #scenario-dots::-webkit-scrollbar {
      display: none
    }

    .scenario-dot {
      width: 9px;
      height: 9px;
      flex: 0 0 9px;
      padding: 0;
      border: 1px solid var(--line-strong);
      border-radius: 50%;
      background: transparent;
      cursor: pointer;
      transition: transform .16s ease, background .16s ease, border-color .16s ease, box-shadow .16s ease;
    }

    .scenario-dot:hover {
      border-color: var(--cyan);
      background: var(--cyan);
      transform: scale(1.2);
    }

    .scenario-dot.survived {
      border-color: var(--green);
      background: var(--green);
    }

    .scenario-dot.survived:hover {
      border-color: var(--green);
      background: var(--green);
      transform: scale(1.2);
    }

    .scenario-dot.current {
      border-color: var(--cyan);
      background: var(--cyan);
      box-shadow: none;
      transform: scale(1.25);
    }

    .scenario-dot.current.survived {
      border: 2px solid var(--cyan);
      background: var(--green);
      box-shadow: none;
      transform: scale(1.25);
    }

    .scenario-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-top: 18px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: var(--surface-soft);
      box-shadow: var(--shadow-soft);
    }

    .btn-complete {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid rgba(8, 121, 87, 0.28);
      border-radius: 11px;
      background: var(--green-soft);
      color: var(--green);
      font-size: 14px;
      font-weight: 750;
      cursor: pointer;
    }

    .btn-complete.done {
      border-color: var(--green);
      background: var(--green);
      color: #fff;
    }

    html[data-theme="night"] .btn-complete.done {
      color: #00170f
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-nav {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      background: var(--surface);
      color: var(--ink-soft);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-nav:hover:not(:disabled) {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .btn-nav:disabled {
      opacity: .35;
      cursor: not-allowed;
    }

    .btn-random {
      border-color: rgba(185, 55, 118, 0.24);
      color: var(--magenta);
    }

    .reset-row {
      display: flex;
      justify-content: center;
      margin-top: 14px;
    }

    .btn-reset {
      border: 0;
      background: transparent;
      color: var(--ink-faint);
      font-size: 12px;
      cursor: pointer;
    }

    .btn-reset:hover {
      color: var(--magenta)
    }

    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      z-index: 999;
      max-width: calc(100vw - 32px);
      padding: 10px 16px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: var(--surface);
      color: var(--ink-soft);
      box-shadow: var(--shadow-soft);
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 8px);
      transition: opacity .2s ease, transform .2s ease;
    }

    #toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media(max-width:700px) {
      #hdr {
        padding: 0 12px;
        gap: 8px
      }

      .hdr-logo {
        font-size: 10px;
        letter-spacing: .08em
      }

      #progress-label {
        display: none
      }

      #main {
        width: min(100% - 20px, 920px);
        padding: 22px 0 40px
      }

      #scenario-card {
        padding: 26px 22px
      }

      .scenario-question {
        font-size: 25px
      }

      .support-switch {
        grid-template-columns: 1fr
      }

      .support-button {
        padding: 0 10px;
        font-size: 13px
      }

      .scenario-footer {
        align-items: stretch;
        flex-direction: column
      }

      .btn-complete {
        width: 100%
      }

      .nav-actions {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr
      }

      .btn-nav {
        padding: 0 8px
      }

      #launch {
        align-items: flex-end;
        justify-content: center;
        padding: 20px;
        background-position: center top;
      }

      .launch-card {
        width: min(100%, 480px);
        padding: 28px 24px;
      }

      .scenario-rail {
        justify-content: flex-start;
        width: 100%;
        padding: 3px 0;
      }

      #scenario-dots {
        justify-content: flex-start;
      }
    }

    @media(max-width:480px) {
      .launch-card {
        padding: 32px 24px
      }

      .header-back {
        padding-right: 10px
      }

      .hdr-logo span {
        display: none
      }

      .support-switch {
        grid-template-columns: 1fr
      }
    }
  </style>
</head>

<body>

  <!-- ============================================================
     LAUNCH SCREEN
     ============================================================ -->
  <div id="launch">
    <section class="launch-card" aria-labelledby="launch-title">
      <p class="launch-kicker">Arcade · Future scenarios</p>
      <h1 class="launch-title" id="launch-title">Tomorrow <span>Got Weird</span></h1>
      <p class="launch-copy">
        Twenty-five strange futures. Decide what you would do, then push the scenario with follow-up questions,
        pressure, or a stranger twist.
      </p>
      <button class="btn-launch" id="launch-button" type="button" onclick="startGame()">
        Start sequence
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M3 2l9 5-9 5V2z" fill="currentColor" />
        </svg>
      </button>
    </section>
  </div>

  <!-- ============================================================
     GAME SCREEN
     ============================================================ -->
  <div id="game">
    <header id="hdr">
      <button class="header-back" type="button" onclick="goToArcade()" aria-label="Back to Arcade">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
          <path d="M7.5 2L3.5 6l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
        Arcade
      </button>
      <div class="hdr-logo">Tomorrow <span>Got Weird</span></div>
      <div class="hdr-spacer"></div>
      <div id="progress-label" aria-live="polite">Scenario <span id="hdr-current">1</span> of <span
          id="hdr-total">25</span></div>
      <button class="header-search" type="button" data-atlas-search aria-label="Atlas Search" title="Atlas Search">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.3" />
          <path d="M10.5 10.5l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
        </svg>
      </button>
      <button class="header-appearance" id="btn-appearance" type="button" onclick="toggleAppearance()"
        aria-label="Toggle appearance"></button>
    </header>

    <main id="main">
      <section id="scenario-card">
        <div class="scenario-meta">
          <span class="scenario-emoji" id="sc-emoji" aria-hidden="true"></span>
          <span class="scenario-number" id="scenario-number">Scenario 1 of 25</span>
          <span class="scenario-state">Survived</span>
        </div>
        <h2 class="scenario-question" id="sc-question"></h2>
      </section>

      <div class="support-switch" aria-label="Push the scenario">
        <button class="support-button" id="btn-missions" type="button" aria-pressed="false"
          onclick="toggleSupport('missions')">
          Mission prompts
        </button>
        <button class="support-button" id="btn-survival" type="button" aria-pressed="false"
          onclick="toggleSupport('survival')">
          Survival mode
        </button>
        <button class="support-button" id="btn-weirder" type="button" aria-pressed="false"
          onclick="toggleSupport('weirder')">
          Make it weirder
        </button>
      </div>

      <section id="support-panel" hidden>
        <div id="support-content"></div>
      </section>

      <div class="scenario-footer">
        <button class="btn-complete" id="btn-complete" type="button" onclick="toggleComplete()">
          <span id="complete-icon">○</span>
          <span id="complete-label">Mark survived</span>
        </button>

        <nav class="nav-actions" aria-label="Scenario navigation">
          <button class="btn-nav" id="btn-prev" type="button" onclick="go(-1)">Previous</button>
          <button class="btn-nav btn-random" type="button" onclick="randomScenario()">Random</button>
          <button class="btn-nav" id="btn-next" type="button" onclick="go(1)">Next</button>
        </nav>
      </div>

      <nav class="scenario-rail" aria-label="Choose scenario">
        <div id="scenario-dots"></div>
      </nav>

      <div class="reset-row">
        <button class="btn-reset" type="button" onclick="confirmReset()">Reset Tomorrow Got Weird progress</button>
      </div>
    </main>
  </div>

  <div id="toast" role="status" aria-live="polite"></div>
  <!-- ============================================================
     JAVASCRIPT

    /* ============================================================
       STATE — BRIDGE IS THE ONLY SOURCE OF TRUTH
       ============================================================ */
    const Bridge = window.AtlasBridge;
    const REGISTRY_ID = 'arcade:tomorrow-got-weird';
    let session = null;
    let state = createDefaultState();
    let openSupport = null;

    function createDefaultState() {
      const timestamp = Date.now();
      return {
        status: 'in-progress',
        current: 0,
        currentPosition: 1,
        currentLabel: 'Scenario 1 of ' + SCENARIOS.length,
        completed: {},
        progress: { covered: 0, total: SCENARIOS.length },
        lastOpenedAt: timestamp,
        lastTouchedAt: timestamp
      };
    }

    function normalizeState(saved) {
      const next = Object.assign(createDefaultState(), saved || {});
      next.current = Number.isInteger(next.current) && next.current >= 0 && next.current < SCENARIOS.length ? next.current : 0;
      next.completed = next.completed && typeof next.completed === 'object' && !Array.isArray(next.completed) ? next.completed : {};
      delete next.reveals;
      return next;
    }

    function readBridgeState() {
      if (!Bridge || !session) return null;
      const registry = Bridge.readRegistry();
      return (((registry.sessionStates || {})[session.id] || {})[REGISTRY_ID]) || null;
    }

    function countCompleted() {
      return Object.values(state.completed || {}).filter(Boolean).length;
    }

    function saveState(extra) {
      if (!Bridge || !session) return;
      const timestamp = Date.now();
      const completed = countCompleted();
      const isComplete = completed === SCENARIOS.length;
      state = Object.assign({}, state, extra || {}, {
        status: isComplete ? 'complete' : 'in-progress',
        currentPosition: state.current + 1,
        currentLabel: 'Scenario ' + (state.current + 1) + ' of ' + SCENARIOS.length,
        progress: { covered: completed, total: SCENARIOS.length },
        lastTouchedAt: timestamp
      });
      if (isComplete) {
        if (!state.completedAt) state.completedAt = timestamp;
      } else {
        delete state.completedAt;
      }
      Bridge.upsertSessionState(session.id, REGISTRY_ID, state);
    }

    function touchActivity() {
      if (!Bridge || !session) return;
      Bridge.touchRecentActivity({
        sessionId: session.id,
        registryId: REGISTRY_ID,
        title: 'Tomorrow Got Weird',
        launchUrl: './arcade/tomorrow-got-weird/index.html'
      });
    }

    /* ============================================================

       ============================================================ */
    function sunSvg(size) {
      return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 17 17" fill="none" aria-hidden="true"><circle cx="8.5" cy="8.5" r="3" stroke="currentColor" stroke-width="1.35"/><path d="M8.5 1.5v2M8.5 13.5v2M1.5 8.5h2M13.5 8.5h2M3.7 3.7l1.4 1.4M11.9 11.9l1.4 1.4M11.9 5.1l1.4-1.4M3.7 13.3l1.4-1.4" stroke="currentColor" stroke-width="1.35" stroke-linecap="round"/></svg>';
    }

    function moonSvg(size) {
      return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 17 17" fill="none" aria-hidden="true"><path d="M14.5 10.2A7 7 0 0 1 6.8 2.5a7 7 0 1 0 7.7 7.7Z" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    }

    function updateAppearanceButton(mode) {
      const button = document.getElementById('btn-appearance');
      if (!button) return;
      button.innerHTML = mode === 'night' ? sunSvg(15) : moonSvg(15);
      button.setAttribute('aria-label', mode === 'night' ? 'Switch to day mode' : 'Switch to night mode');
      button.title = mode === 'night' ? 'Switch to day mode' : 'Switch to night mode';
    }

    function toggleAppearance() {
      if (!Bridge) return;
      const current = Bridge.readAppearanceMode();
      const next = current === 'night' ? 'light' : 'night';
      document.documentElement.classList.add('theme-changing');
      setTimeout(() => document.documentElement.classList.remove('theme-changing'), 360);
      Bridge.setAppearanceMode(next);
      document.documentElement.dataset.theme = next;
      updateAppearanceButton(next);
    }

    /* ============================================================
       LAUNCH AND NAVIGATION
       ============================================================ */
    function startGame() {
      if (!Bridge || !session) return;
      state.lastOpenedAt = Date.now();
      saveState();
      touchActivity();
      document.getElementById('launch').style.display = 'none';
      document.getElementById('game').style.display = 'block';
      render();
    }

    function goToArcade() {
      saveState();
      window.location.href = '../index.html';
    }

    function go(direction) {
      const next = state.current + direction;
      if (next < 0 || next >= SCENARIOS.length) return;
      state.current = next;
      openSupport = null;
      saveState();
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function jumpTo(index) {
      const next = Number.parseInt(index, 10);
      if (!Number.isInteger(next) || next < 0 || next >= SCENARIOS.length) return;
      state.current = next;
      openSupport = null;
      saveState();
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function randomScenario() {
      if (SCENARIOS.length < 2) return;
      const candidates = SCENARIOS.map((_, index) => index).filter(index => index !== state.current);
      jumpTo(candidates[Math.floor(Math.random() * candidates.length)]);
    }

    /* ============================================================
       COMPLETION
       ============================================================ */
    function toggleComplete() {
      const index = state.current;
      state.completed[index] = !state.completed[index];
      saveState();
      render();
      showToast(state.completed[index] ? 'Scenario marked survived.' : 'Scenario reopened.');
    }

    /* ============================================================
       SUPPORT
       ============================================================ */
    function toggleSupport(mode) {
      openSupport = openSupport === mode ? null : mode;
      renderSupport();
    }

    function renderSupport() {
      const panel = document.getElementById('support-panel');
      const content = document.getElementById('support-content');
      const buttons = {
        missions: document.getElementById('btn-missions'),
        survival: document.getElementById('btn-survival'),
        weirder: document.getElementById('btn-weirder')
      };

      Object.entries(buttons).forEach(([mode, button]) => {
        button.setAttribute('aria-pressed', String(openSupport === mode));
      });

      if (!openSupport) {
        panel.hidden = true;
        content.innerHTML = '';
        return;
      }

      const scenario = SCENARIOS[state.current];
      panel.hidden = false;

      if (openSupport === 'missions') {
        content.innerHTML =
          '<h3 class="support-heading">Mission prompts</h3>' +
          '<ul class="prompt-list">' +
          scenario.prompts.map(prompt => '<li>' + esc(prompt) + '</li>').join('') +
          '</ul>';
        return;
      }

      if (openSupport === 'survival') {
        content.innerHTML =
          '<h3 class="support-heading">Survival mode</h3>' +
          '<p class="support-text">' + esc(scenario.survival) + '</p>';
        return;
      }

      content.innerHTML =
        '<h3 class="support-heading">Make it weirder</h3>' +
        '<p class="support-text">' + esc(scenario.twist) + '</p>';
    }

    /* ============================================================
       RENDER
       ============================================================ */
    function render() {
      const scenario = SCENARIOS[state.current];
      const index = state.current;
      const total = SCENARIOS.length;
      const done = Boolean(state.completed[index]);

      document.getElementById('hdr-current').textContent = index + 1;
      document.getElementById('hdr-total').textContent = total;
      document.getElementById('scenario-number').textContent = 'Scenario ' + (index + 1) + ' of ' + total;
      document.getElementById('sc-emoji').textContent = scenario.emoji;
      document.getElementById('sc-question').textContent = scenario.question;

      const card = document.getElementById('scenario-card');
      card.classList.remove('transmitting');
      void card.offsetWidth;
      card.classList.add('transmitting');
      card.classList.toggle('completed-card', done);

      const completeButton = document.getElementById('btn-complete');
      completeButton.classList.toggle('done', done);
      document.getElementById('complete-icon').textContent = done ? '✓' : '○';
      document.getElementById('complete-label').textContent = done ? 'Survived' : 'Mark survived';

      document.getElementById('btn-prev').disabled = index === 0;
      document.getElementById('btn-next').disabled = index === total - 1;

      updateScenarioDots();
      renderSupport();
    }

    function esc(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    /* ============================================================
   SCENARIO DOT NAVIGATION
   ============================================================ */
    function buildScenarioDots() {
      const wrap = document.getElementById('scenario-dots');
      if (!wrap) return;

      wrap.innerHTML = '';

      SCENARIOS.forEach((scenario, index) => {
        const dot = document.createElement('button');
        dot.type = 'button';
        dot.className = 'scenario-dot';
        dot.dataset.index = String(index);
        dot.setAttribute('aria-label', 'Open scenario ' + (index + 1));
        dot.title = 'Scenario ' + (index + 1);
        dot.addEventListener('click', () => jumpTo(index));
        wrap.appendChild(dot);
      });
    }

    function updateScenarioDots() {
      document.querySelectorAll('.scenario-dot').forEach((dot, index) => {
        const survived = Boolean(state.completed[index]);
        const current = index === state.current;

        dot.classList.toggle('survived', survived);
        dot.classList.toggle('current', current);
        dot.setAttribute('aria-current', current ? 'step' : 'false');
        dot.setAttribute(
          'aria-label',
          'Open scenario ' + (index + 1) + (survived ? ' — survived' : '')
        );
      });

      const currentDot = document.querySelector('.scenario-dot.current');
      if (currentDot) {
        currentDot.scrollIntoView({
          behavior: 'smooth',
          block: 'nearest',
          inline: 'center'
        });
      }
    }

    /* ============================================================
       RESET AND TOAST
       ============================================================ */
    function confirmReset() {
      const confirmed = window.confirm('Reset all Tomorrow Got Weird progress for the active session?');
      if (!confirmed) return;
      state = createDefaultState();
      openSupport = null;
      saveState();
      touchActivity();
      render();
      showToast('Tomorrow Got Weird reset.');
    }

    let toastTimer = null;

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
    }

    /* ============================================================
       INITIALISATION
       ============================================================ */
    function init() {
      if (!Bridge) {
        document.querySelector('.launch-card').innerHTML =
          '<p class="launch-kicker">Runtime unavailable</p>' +
          '<h1 class="launch-title">Can’t <span>Start</span></h1>' +
          '<p class="launch-copy">The shared Atlas runtime did not load. Check shared/atlas-bridge.js.</p>';
        return;
      }

      const mode = Bridge.readAppearanceMode();
      document.documentElement.dataset.theme = mode;
      updateAppearanceButton(mode);

      session = Bridge.readActiveSession();

      Bridge.upsertItem({
        registryId: REGISTRY_ID,
        world: 'arcade',
        type: 'game',
        title: 'Tomorrow Got Weird',
        premise: 'Future scenarios, strange consequences, and survival choices.',
        status: 'available',
        unitLabel: 'Scenarios',
        total: SCENARIOS.length,
        formatLabel: 'Future scenarios',
        launchUrl: './arcade/tomorrow-got-weird/index.html'
      });

      const saved = readBridgeState();
      state = normalizeState(saved);
      buildScenarioDots();

      const launchButton = document.getElementById('launch-button');
      if (launchButton && saved) {
        launchButton.innerHTML =
          (saved.status === 'complete' ? 'Re-enter timeline' : 'Continue sequence') +
          '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M3 2l9 5-9 5V2z" fill="currentColor"/></svg>';
      }
    }

    window.addEventListener('atlas:appearance-change', event => {
      if (!Bridge) return;
      const mode = (event.detail && event.detail.mode) || Bridge.readAppearanceMode();
      document.documentElement.dataset.theme = mode;
      updateAppearanceButton(mode);
    });

    window.addEventListener('atlas:session-change', event => {
      if (!Bridge) return;
      session = (event.detail && event.detail.session) || Bridge.readActiveSession();
      state = normalizeState(readBridgeState());
      openSupport = null;
      buildScenarioDots();

      const game = document.getElementById('game');
      if (game && getComputedStyle(game).display !== 'none') render();
    });

    window.addEventListener('pagehide', () => saveState());

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

    /* ============================================================
       KEYBOARD
       ============================================================ */
    document.addEventListener('keydown', event => {
      const game = document.getElementById('game');
      if (!game || getComputedStyle(game).display === 'none') return;

      const interactive = ['INPUT', 'SELECT', 'TEXTAREA', 'BUTTON', 'A'];
      if (interactive.includes(event.target.tagName)) return;

      if (event.key === 'ArrowRight') {
        event.preventDefault();
        go(1);
      }

      if (event.key === 'ArrowLeft') {
        event.preventDefault();
        go(-1);
      }
    });
  </script>

</body>
